<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ReveB 2 — Overclock</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bangers&family=Share+Tech+Mono&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Orbitron', monospace
    }

    canvas {
      display: block;
      cursor: none
    }

    #gl {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10
    }

    #gl::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 28%, rgba(0, 0, 0, 0.35) 70%, rgba(0, 0, 0, 0.85) 100%)
    }

    #fx {
      position: fixed;
      inset: 0;
      z-index: 88;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.05s
    }

    #tr {
      position: fixed;
      inset: 0;
      z-index: 95;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.12s
    }

    #tr.show {
      opacity: 1
    }

    .th {
      flex: 1;
      position: relative;
      overflow: hidden
    }

    .th:first-child {
      background: linear-gradient(135deg, #1a0008, #06000a);
      border-bottom: 2px solid rgba(138, 43, 226, 0.5);
      transition: transform 0.4s cubic-bezier(0.86, 0, 0.07, 1)
    }

    .th:last-child {
      background: linear-gradient(135deg, #000a1a, #00040d);
      border-top: 2px solid rgba(138, 43, 226, 0.5);
      transition: transform 0.4s cubic-bezier(0.86, 0, 0.07, 1) 0.04s
    }

    #tr.open .th:first-child {
      transform: translateY(-100%)
    }

    #tr.open .th:last-child {
      transform: translateY(100%)
    }

    .tt {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-weight: 900;
      font-size: clamp(1.3rem, 3.8vw, 2.5rem);
      letter-spacing: 0.15em;
      color: #fff;
      text-align: center;
      text-shadow: 0 0 20px #8A2BE2, 0 0 40px #8A2BE2
    }

    .tt span {
      display: block;
      font-size: 0.36em;
      letter-spacing: 0.3em;
      opacity: 0.5;
      margin-top: 0.3em
    }

    .ono {
      position: fixed;
      font-family: 'Bangers', cursive;
      font-weight: 900;
      pointer-events: none;
      z-index: 85;
      letter-spacing: 0.04em;
      white-space: pre;
      line-height: 1;
      text-align: center;
      animation: oA 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 0 0 14px currentColor
    }

    @keyframes oA {
      0% {
        opacity: 1;
        transform: scale(0.25)
      }

      18% {
        opacity: 1;
        transform: scale(1.35)
      }

      55% {
        opacity: 1;
        transform: scale(1)
      }

      100% {
        opacity: 0;
        transform: scale(0.85) translateY(-38px)
      }
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div id="gl"></div>
  <div id="fx"></div>
  <div id="tr">
    <div class="th">
      <div class="tt" id="t1"></div>
    </div>
    <div class="th">
      <div class="tt" id="t2"></div>
    </div>
  </div>

  <script src="stat.js"></script>
  <script src="joueur.js"></script>

  <script>
    "use strict";
    const cv = document.getElementById('c'), cx = cv.getContext('2d');
    const fogCv = document.createElement('canvas'), fogCx = fogCv.getContext('2d');
    let W, H, GSZ, TSZ, OX, OY;
    const resize = () => { W = cv.width = fogCv.width = innerWidth; H = cv.height = fogCv.height = innerHeight; GSZ = Math.floor(Math.min(W, H) * 0.55) };
    resize(); const relayout = () => { TSZ = Math.floor(GSZ / gSize); OX = Math.floor((W - TSZ * gSize) / 2); OY = Math.floor((H - TSZ * gSize) / 2) };
    addEventListener('resize', () => { resize(); relayout() });
    cv.addEventListener('contextmenu', e => e.preventDefault());

    const K = { red: '#FF003C', blue: '#00F5FF', pur: '#8A2BE2', gold: '#FFD700', wh: '#fff', bk: '#000', green: '#00FF41', pink: '#FF10F0' };
    const T = { HOLE: 0, SOLID: 1, GHOST: 2, PORTAL: 3, CONV: 4, PURPLE: 5, BOOST: 6 };
    const ST = { TITLE: 0, MENU: 1, PLAY: 2, DEAD: 3, WIN: 4, PAUSE: 5 };

    let st = ST.PLAY, level = 1, score = 0, best = 0, col = 'red', gTime = 0;
    let lives = 3, maxLives = 3;
    let grid = [], gSize = 4, traps = [], parts = [], shakes = [];
    let portal = { x: 0, y: 0 }, spawn = { x: 0, y: 0 };
    let dataCores = [], portalOpen = false, torches = [];
    let minotaurs = [], minoMoveT = 0;
    let bT = 0, ghostBrk = {}, critPS = new Set(), dAnim = 0, dTiles = [];

    let pl = new Joueur();

    let mx = W / 2, my = H / 2, rmb = false, lmb = false;
    let menuSel = 0; const MI = ['JOUER', 'CONTRÔLES', 'RETOUR'];
    let deadSel = 0;
    let pauseSel = 0;
    const PAUSE_MI = ['REPRENDRE', 'MENU PRINCIPAL'];

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY });
    cv.addEventListener('mousedown', e => { if (e.button === 2) { rmb = true; e.preventDefault() } if (e.button === 0) { lmb = true; handleLClick() } });
    cv.addEventListener('mouseup', e => { if (e.button === 2) rmb = false; if (e.button === 0) lmb = false });

    let sessionPlaytimeStart = Date.now();

    function autoSave() {
      const activeSlotId = localStorage.getItem('reveb_active_slot');
      if (activeSlotId === null) return;

      let saves = JSON.parse(localStorage.getItem('reveb_saves') || '[]');
      if (!saves[activeSlotId] || saves[activeSlotId].isEmpty) return;

      let currentSave = saves[activeSlotId];
      currentSave.palier = level;
      currentSave.saved = new Date().toLocaleDateString('fr-FR') + ' ' + new Date().toLocaleTimeString('fr-FR');
      currentSave.timestamp = Date.now();

      // ─── 1. TEMPS DE JEU (Avec les secondes !) ───
      let now = Date.now();
      currentSave.playtimeMs = (currentSave.playtimeMs || 0) + (now - sessionPlaytimeStart);
      sessionPlaytimeStart = now;

      let totalSeconds = Math.floor(currentSave.playtimeMs / 1000);
      let h = Math.floor(totalSeconds / 3600);
      let m = Math.floor((totalSeconds % 3600) / 60);
      let s = totalSeconds % 60;
      // Format : 01h 05m 12s
      currentSave.duree = `${String(h).padStart(2, '0')}h ${String(m).padStart(2, '0')}m ${String(s).padStart(2, '0')}s`;

      // ─── 2. SAUVEGARDE DES CONSÉQUENCES DU MONDE ───
      if (typeof gameStats !== 'undefined') {
        currentSave.corruption = gameStats.corruption || 0;
        currentSave.stats = {
          formater: gameStats.formater || 0,
          epargner: gameStats.epargner || 0
        };
      }

      // Statut visuel du slot
      if (currentSave.corruption >= 70) {
        currentSave.status = 'corrupt'; currentSave.statusLabel = 'CRITIQUE';
      } else if (currentSave.corruption >= 30) {
        currentSave.status = 'warn'; currentSave.statusLabel = 'INSTABLE';
      } else {
        currentSave.status = 'ok'; currentSave.statusLabel = 'STABLE';
      }

      // ─── 3. ÉTAT DES BOSS DANS LE MENU ───
      currentSave.entities = [];

      function getBossState(bossId, powerStat) {
        // On regarde si un choix a été forcé par le fichier du boss
        let state = localStorage.getItem(`rvb2_${bossId}_state`);
        if (state) return state; // Retourne 'FORMATÉ', 'FUSIONNÉ', etc.

        // Fallback si rien n'est trouvé
        let isFused = (typeof gameStats !== 'undefined' && gameStats[powerStat]);
        return isFused ? 'FUSIONNÉ' : 'ÉPARGNÉ';
      }

      if (level > 10) currentSave.entities.push(`PHANT0M.exe — ${getBossState('b10', 'hasClone')}`);
      if (level > 20) currentSave.entities.push(`INTERFACE — ${getBossState('b20', 'hasRegen')}`);
      if (level > 30) currentSave.entities.push(`ARCHITECTE — ${getBossState('b30', 'hasInvis')}`);
      if (level > 40) currentSave.entities.push(`NULL_POINTER — ${getBossState('b40', 'hasSlowmo')}`);

      // ─── 4. MÉMORISATION COMPLÈTE POUR LE PROCHAIN CHARGEMENT ───
      currentSave.powers = {
        clone: (typeof gameStats !== 'undefined' && gameStats.hasClone) || false,
        regen: (typeof gameStats !== 'undefined' && gameStats.hasRegen) || false,
        invis: (typeof gameStats !== 'undefined' && gameStats.hasInvis) || false,
        slowmo: (typeof gameStats !== 'undefined' && gameStats.hasSlowmo) || false,
        // On sauvegarde aussi les états des boss dans le slot !
        b10_state: localStorage.getItem('rvb2_b10_state'),
        b20_state: localStorage.getItem('rvb2_b20_state'),
        b30_state: localStorage.getItem('rvb2_b30_state'),
        b40_state: localStorage.getItem('rvb2_b40_state')
      };

      currentSave.logs.unshift({ text: `[SAVE] Progression au Palier ${level}.`, type: 'ok' });
      if (currentSave.logs.length > 5) currentSave.logs.pop();

      saves[activeSlotId] = currentSave;
      localStorage.setItem('reveb_saves', JSON.stringify(saves));

      ono('SAUVEGARDE...', pl.px, pl.py - 40, '#00F5FF');
    }


    function handleLClick() {
      if (st === ST.DEAD && dAnim > 1300) { if (deadSel === 0 && lives < maxLives) { } return }
      if (st === ST.WIN) { bTitle(); return }
      if (st === ST.PLAY && rmb) { const gx2 = Math.floor((mx - OX) / TSZ), gy2 = Math.floor((my - OY) / TSZ); for (const torch of torches) { if (!torch.lit && torch.x === gx2 && torch.y === gy2) { torch.lit = true; sfx.core(); burst(px2(torch.x), py2(torch.y), K.gold, 15, 4, 400); ono('TORCHE!', px2(torch.x), py2(torch.y) - 20, K.gold); break } } }
    }

    let pxLayers = [];
    // ── VARIABLES DU NOUVEAU FOND ──
    let bgGeoms = [];
    let bgStreams = [];

    function initPx() {
      bgGeoms = [];
      bgStreams = [];
      // 40 formes filaires très lointaines (Archétypes géométriques)
      for (let i = 0; i < 40; i++) {
        bgGeoms.push({
          x: rng(0, W),
          y: rng(0, H),
          s: rng(20, 100), // taille
          r: rng(0, Math.PI * 2), // rotation
          rs: (Math.random() - 0.5) * 0.015, // vitesse de rotation lente
          vy: (Math.random() - 0.5) * 0.2 - 0.1, // dérive verticale
          sides: irng(3, 6), // Triangle, Carré, Pentagone, Hexagone
          alpha: rng(0.02, 0.06) // Très faible opacité
        });
      }
      // 60 flux de données tombants
      for (let i = 0; i < 60; i++) {
        bgStreams.push({
          x: rng(0, W),
          y: rng(0, H),
          vy: rng(0.5, 2.5),
          len: rng(50, 200),
          w: rng(1, 3),
          phase: rng(0, Math.PI * 2)
        });
      }
    }
    const lerp = (a, b, t) => a + (b - a) * t, clamp = (v, a, b) => Math.max(a, Math.min(b, v)), rng = (a, b) => a + Math.random() * (b - a), irng = (a, b) => Math.floor(rng(a, b + 1));
    const shuffle = a => { for (let i = a.length - 1; i > 0; i--) { const j = ~~(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]] } return a };
    const tk = (x, y) => `${x},${y}`, inB = (x, y) => x >= 0 && y >= 0 && x < gSize && y < gSize;
    const px2 = gx => OX + gx * TSZ + TSZ / 2, py2 = gy => OY + gy * TSZ + TSZ / 2;
    const D4 = [{ dx: 1, dy: 0 }, { dx: -1, dy: 0 }, { dx: 0, dy: 1 }, { dx: 0, dy: -1 }];
    const glow = (c, b) => { cx.shadowColor = c; cx.shadowBlur = b }, noGlow = () => { cx.shadowBlur = 0 };
    initPx();

    function loadS() { try { best = JSON.parse(localStorage.getItem('rvb2v6') || '{}').b || 0 } catch { } }
    function doS() { localStorage.setItem('rvb2v6', JSON.stringify({ b: best })) } loadS();

    let aC = null; function au() { if (!aC) aC = new (window.AudioContext || window.webkitAudioContext)(); return aC }
    function tone(f, tp, d, v = 0.1) { try { const a = au(), o = a.createOscillator(), g = a.createGain(); o.connect(g); g.connect(a.destination); o.type = tp; o.frequency.value = f; g.gain.setValueAtTime(v, a.currentTime); g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + d); o.start(); o.stop(a.currentTime + d) } catch { } }
    const sfx = { move: () => tone(280, 'square', 0.04, 0.03), portal: () => { tone(880, 'sine', 0.28, 0.13); tone(1200, 'sine', 0.18, 0.08, 500) }, core: () => { tone(1320, 'sine', 0.16, 0.11); tone(1760, 'sine', 0.12, 0.07) }, die: () => { tone(100, 'sawtooth', 0.4, 0.18); tone(70, 'square', 0.3, 0.13) }, hit: () => tone(200, 'sawtooth', 0.15, 0.11), dash: () => { tone(660, 'sine', 0.1, 0.08) }, btn: () => tone(440, 'sine', 0.06, 0.04), sw: () => tone(440, 'sine', 0.1, 0.06), zap: () => tone(800, 'square', 0.12, 0.09), vortex: () => tone(60, 'sawtooth', 0.28, 0.13), snipe: () => tone(1200, 'square', 0.18, 0.12), boost: () => tone(500, 'sine', 0.1, 0.07), alert: () => tone(600, 'square', 0.07, 0.05) };

    // --- MUSIQUE DE FOND ---
    const bgMusic = new Audio(); // On crée l'audio vide pour l'instant
    bgMusic.loop = true;
    bgMusic.volume = 1;

    let musicStarted = false;

    function startMusic() {
      if (!musicStarted) {
        // On vérifie le niveau EXACTEMENT au moment où la musique se lance
        // (Comme ça, on est sûr que le jeu a bien chargé le bon "level")
        const isB30Dead = (level > 30 && localStorage.getItem('rvb2_b30_dead') === 'true');

        // Le Système prend le relais uniquement après le palier 30 si l'Architecte est mort
        bgMusic.src = isB30Dead ? 'music/system.mp3' : 'music/mainGame.mp3';

        bgMusic.play().catch(() => { });
        musicStarted = true;
      }
    }

    // Obligatoire : les navigateurs bloquent la musique tant que le joueur n'a pas interagi
    window.addEventListener('keydown', startMusic);
    window.addEventListener('mousedown', startMusic);
    // -----------------------

    function spark(x, y, c, n, sp, li) { for (let i = 0; i < n; i++) { const a = Math.random() * Math.PI * 2, s = sp * (0.3 + Math.random() * 0.9); parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, c, life: li, ml: li, sz: 1 + Math.random() * 2.2, g: 0.05 }) } }
    function burst(x, y, c, n, sp, li) { for (let i = 0; i < n; i++) { const a = Math.random() * Math.PI * 2, s = sp * (0.5 + Math.random()); parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1, c, life: li, ml: li, sz: 1.5 + Math.random() * 3, g: 0.1, sq: true }) } }
    function ring(x, y, c, r) { parts.push({ x, y, vx: 0, vy: 0, c, life: 350, ml: 350, sz: r, g: 0, ring: true, r0: r }) }
    function addSh(i, d) { shakes.push({ i, d, t: 0 }) }
    function getSh() { let ox = 0, oy = 0; for (const s of shakes) { const p = 1 - s.t / s.d; ox += (Math.random() - .5) * s.i * p * 2; oy += (Math.random() - .5) * s.i * p * 2 } return { x: ox, y: oy } }
    const fxEl = document.getElementById('fx'), trEl = document.getElementById('tr'), t1El = document.getElementById('t1'), t2El = document.getElementById('t2');
    let _tr = false, _ft = null;
    function fScr(c, d) { c = c || '#fff'; d = d || 80; if (_ft) clearTimeout(_ft); fxEl.style.background = c; fxEl.style.opacity = '0.4'; _ft = setTimeout(() => fxEl.style.opacity = '0', d) }
    function pageFlip(ti, su, cb) { if (_tr) { if (cb) cb(); return } _tr = true; t1El.innerHTML = `${ti}<span>${su}</span>`; t2El.innerHTML = `${ti}<span>${su}</span>`; trEl.classList.add('show'); setTimeout(() => { trEl.classList.add('open'); fScr('#8A2BE2', 90); if (cb) cb() }, 430); setTimeout(() => { trEl.classList.remove('show', 'open'); _tr = false }, 1100) }
    function ono(t, x, y, c) { const el = document.createElement('div'); el.className = 'ono'; el.style.left = `${clamp(x - 40, 5, W - 110)}px`; el.style.top = `${clamp(y - 20, 5, H - 55)}px`; el.style.fontSize = `${1.2 + Math.random() * 1.3}rem`; el.style.color = c || K.wh; el.textContent = t; document.body.appendChild(el); setTimeout(() => el.remove(), 850) }
    function drawMP(x, y, w, h, bc, th) { th = th || 2; cx.fillStyle = 'rgba(0,0,0,0.78)'; cx.fillRect(x, y, w, h); glow(bc, 8); cx.strokeStyle = bc; cx.lineWidth = th; cx.strokeRect(x, y, w, h); noGlow(); const cs = 8; cx.strokeStyle = 'rgba(255,255,255,0.6)'; cx.lineWidth = 1.2; cx.beginPath(); cx.moveTo(x + 1, y + cs + 1); cx.lineTo(x + 1, y + 1); cx.lineTo(x + cs + 1, y + 1); cx.moveTo(x + w - cs - 1, y + 1); cx.lineTo(x + w - 1, y + 1); cx.lineTo(x + w - 1, y + cs + 1); cx.moveTo(x + 1, y + h - cs - 1); cx.lineTo(x + 1, y + h - 1); cx.lineTo(x + cs + 1, y + h - 1); cx.moveTo(x + w - cs - 1, y + h - 1); cx.lineTo(x + w - 1, y + h - 1); cx.lineTo(x + w - 1, y + h - cs - 1); cx.stroke() }
    function drawCT(t, x, y, sz, fi, st2) { fi = fi || '#fff'; st2 = st2 || '#000'; cx.save(); cx.font = `900 ${sz}px Bangers, Impact, cursive`; cx.textAlign = 'center'; cx.textBaseline = 'middle'; cx.lineJoin = 'round'; cx.lineWidth = Math.max(2, sz * 0.12); cx.strokeStyle = st2; cx.strokeText(t, x, y); cx.fillStyle = fi; cx.fillText(t, x, y); cx.restore() }

    function solid(x, y, ib) { if (!inB(x, y)) return false; const t = grid[y][x]; if (t === T.HOLE) return false; if (t === T.GHOST) { if (!ib && ghostBrk[tk(x, y)]?.b) return false; return true } return t >= T.SOLID }
    function reachSet(sx, sy) { const vis = new Set(), q = [{ x: sx, y: sy }]; vis.add(tk(sx, sy)); while (q.length) { const { x, y } = q.shift(); for (const d of D4) { let nx = x + d.dx, ny = y + d.dy, k = tk(nx, ny); if (!vis.has(k) && solid(nx, ny, true)) { vis.add(k); q.push({ x: nx, y: ny }) } nx = x + d.dx * 2; ny = y + d.dy * 2; k = tk(nx, ny); if (!vis.has(k) && inB(nx, ny) && solid(nx, ny, true)) { vis.add(k); q.push({ x: nx, y: ny }) } } } return vis }
    function canReach(sx, sy, ex, ey) { return reachSet(sx, sy).has(tk(ex, ey)) }
    function isOnSafe() { return pl.gx === spawn.x && pl.gy === spawn.y }

    function spawnMinotaurs(count, S, E) {
      const cands = [];
      for (let y = 0; y < gSize; y++)for (let x = 0; x < gSize; x++) {
        if (grid[y][x] !== T.SOLID) continue;
        if (Math.abs(x - S.x) <= 1 && Math.abs(y - S.y) <= 1) continue;
        if (x === E.x && y === E.y) continue; cands.push({ x, y });
      }
      shuffle(cands);
      for (let i = 0; i < Math.min(count, cands.length); i++) {
        const pos = cands[i];
        minotaurs.push({
          gx: pos.x, gy: pos.y, px: px2(pos.x), py: py2(pos.y), tx: px2(pos.x), ty: py2(pos.y),
          moving: false, mT: 0, anim: 0, trail: [], moveDelay: 700 + i * 200, moveTimer: 0,
          facing: D4[irng(0, 3)], alerted: false, alertAnim: 0
        });
      }
    }
    function minoPath(m) {
      const sx = m.gx, sy = m.gy, ex = pl.gx, ey = pl.gy; if (sx === ex && sy === ey) return null;
      const vis = new Set([tk(sx, sy)]), q = [{ x: sx, y: sy, path: [] }];
      while (q.length) {
        const { x, y, path } = q.shift(); for (const d of D4) {
          const nx = x + d.dx, ny = y + d.dy, k = tk(nx, ny);
          if (!inB(nx, ny) || vis.has(k)) continue; if (grid[ny][nx] === T.HOLE) continue;
          if (grid[ny][nx] === T.GHOST && ghostBrk[k]?.b) continue; vis.add(k);
          const np = [...path, { dx: d.dx, dy: d.dy }]; if (nx === ex && ny === ey) return np[0] || null; q.push({ x: nx, y: ny, path: np })
        }
      } return null;
    }
    function minoSee(m) {
      if (Math.abs(pl.gx - spawn.x) <= 1 && Math.abs(pl.gy - spawn.y) <= 1) return false;
      for (let s = 1; s <= 4; s++) {
        const nx = m.gx + m.facing.dx * s, ny = m.gy + m.facing.dy * s;
        if (!inB(nx, ny) || grid[ny][nx] === T.HOLE) break; if (nx === pl.gx && ny === pl.gy) return true;
      } return false;
    }
    function minoWander(m) {
      const ds = shuffle([...D4]);
      for (const d of ds) {
        const nx = m.gx + d.dx, ny = m.gy + d.dy;
        if (!inB(nx, ny) || grid[ny][nx] === T.HOLE) continue;
        if (grid[ny][nx] === T.GHOST && ghostBrk[tk(nx, ny)]?.b) continue;
        m.facing = { dx: d.dx, dy: d.dy }; return d;
      } return null;
    }
    function updMinotaurs(dt) {
      if (!minotaurs.length) return; minoMoveT += dt;
      const inSafe = (x, y) => Math.abs(x - spawn.x) <= 1 && Math.abs(y - spawn.y) <= 1;
      for (const m of minotaurs) {
        m.anim += dt; if (m.alerted) m.alertAnim += dt;

    function drawPxBG() {
      const t = Date.now() / 1000;

      // 1. LOGIQUE DES COULEURS INVERSÉES DE BASE
      const isRedLevel = col === 'red';
      let centerCol = isRedLevel ? '#020a1a' : '#1a0205';
      let midCol = isRedLevel ? '#010510' : '#100103';
      let edgeCol = '#000000'; // <-- Changé en 'let' pour pouvoir le modifier
      let fxCol = isRedLevel ? '0, 245, 255' : '255, 0, 60';

      // 1.5 CONSÉQUENCES DES BOSS
      const isB20Dead = localStorage.getItem('rvb2_b20_dead') === 'true';
      const isB30Dead = localStorage.getItem('rvb2_b30_dead') === 'true'; // ARCHITECTE

      // Priorité au boss 30 (Salle Clinique)
      if (level > 30 && isB30Dead) {
        centerCol = '#ffffff'; // Blanc pur éblouissant
        midCol = '#eeeeee'; // Gris très clair
        edgeCol = '#cccccc'; // Bords gris clair (plus de noir)
        fxCol = '255, 0, 60'; // Tout devient rouge sang
      }
      // Sinon, si on est après le 20 et que l'Interface est morte
      else if (level > 20 && isB20Dead) {
        centerCol = '#0a0a0a';
        midCol = '#050505';
        fxCol = '150, 160, 170';
      }

      // 2. DESSIN DU DÉGRADÉ ABYSSAL
      const bg = cx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.9);
      bg.addColorStop(0, centerCol);
      bg.addColorStop(0.5, midCol);
      bg.addColorStop(1, edgeCol);
      cx.fillStyle = bg;
      cx.fillRect(0, 0, W, H);

      // 3. GRILLE DE FOND GÉANTE (Ne bouge pas avec le joueur)
      cx.save();
      cx.lineWidth = 1;
      cx.strokeStyle = `rgba(${fxCol}, 0.03)`;
      const gridOff = (t * 10) % 100;
      for (let i = 0; i < W; i += 100) { cx.beginPath(); cx.moveTo(i, 0); cx.lineTo(i, H); cx.stroke(); }
      for (let j = gridOff; j < H; j += 100) { cx.beginPath(); cx.moveTo(0, j); cx.lineTo(W, j); cx.stroke(); }
      cx.restore();

      // 4. FORMES FILAIRES FLOTTANTES (Blueprint 3D)
      cx.lineWidth = 1.5;
      for (let g of bgGeoms) {
        g.y += g.vy;
        g.r += g.rs;
        if (g.y < -100) g.y = H + 100;
        if (g.y > H + 100) g.y = -100;

        cx.save();
        cx.translate(g.x, g.y);
        cx.rotate(g.r);
        cx.strokeStyle = `rgba(${fxCol}, ${g.alpha})`;

        // Forme polygonale
        cx.beginPath();
        for (let i = 0; i < g.sides; i++) {
          const a = (i / g.sides) * Math.PI * 2;
          if (i === 0) cx.moveTo(Math.cos(a) * g.s, Math.sin(a) * g.s);
          else cx.lineTo(Math.cos(a) * g.s, Math.sin(a) * g.s);
        }
        cx.closePath();
        cx.stroke();

        // Ligne interne pour donner un style géométrie sacrée / plan de construction
        cx.beginPath(); cx.moveTo(0, 0); cx.lineTo(Math.cos(0) * g.s, Math.sin(0) * g.s); cx.stroke();
        cx.restore();
      }

      // 5. FLUX DE DONNÉES (Pluie numérique en arrière-plan)
      for (let s of bgStreams) {
        s.y += s.vy;
        if (s.y > H + s.len) s.y = -s.len;

        const alpha = (0.02 + Math.sin(t * 3 + s.phase) * 0.05);
        const grad = cx.createLinearGradient(0, s.y, 0, s.y + s.len);
        grad.addColorStop(0, `rgba(${fxCol}, 0)`);
        grad.addColorStop(0.8, `rgba(${fxCol}, ${alpha})`);
        grad.addColorStop(1, `rgba(255, 255, 255, ${alpha * 1.5})`); // Pointe lumineuse blanche

        cx.fillStyle = grad;
        cx.fillRect(s.x, s.y, s.w, s.len);

      // On vérifie qu'on a passé le boss (level > 10) ET qu'il n'a pas été épargné

    }

    function dGrid() {
      const isR = col === 'red';

      let darkEdge = isR ? '#220008' : '#001122';

      const isB30Dead = (level > 30 && localStorage.getItem('rvb2_b30_dead') === 'true');

      if (isB30Dead) {

      // 1. BORDURE GLOBALE DE L'ARÈNE (Halo de confinement)
      glow(bc, 25);
      cx.strokeStyle = bc;

      cx.strokeRect(OX - 3, OY - 3, gSize * TSZ + 6, gSize * TSZ + 6);
      noGlow();

      for (let y = 0; y < gSize; y++) {
        for (let x = 0; x < gSize; x++) {
          const t = grid[y][x];
          if (t === T.HOLE) continue;

          const tx = OX + x * TSZ;
          const ty = OY + y * TSZ;
          const d = 6; // Épaisseur 3D

          // --- EFFET DE PROFONDEUR 3D ---

          cx.beginPath(); cx.moveTo(tx + TSZ, ty); cx.lineTo(tx + TSZ + d, ty + d); cx.lineTo(tx + TSZ + d, ty + TSZ + d); cx.lineTo(tx + TSZ, ty + TSZ); cx.fill();

          cx.beginPath(); cx.moveTo(tx, ty + TSZ); cx.lineTo(tx + d, ty + TSZ + d); cx.lineTo(tx + TSZ + d, ty + TSZ + d); cx.lineTo(tx + TSZ, ty + TSZ); cx.fill();

          cx.strokeStyle = darkEdge; cx.lineWidth = 1;
          cx.beginPath(); cx.moveTo(tx + TSZ, ty + TSZ); cx.lineTo(tx + TSZ + d, ty + TSZ + d); cx.stroke();
          cx.beginPath(); cx.moveTo(tx + TSZ, ty); cx.lineTo(tx + TSZ + d, ty + d); cx.stroke();
          cx.beginPath(); cx.moveTo(tx, ty + TSZ); cx.lineTo(tx + d, ty + TSZ + d); cx.stroke();

          // --- DESSIN DU DESSUS DE LA CASE ---

            const holoAlpha = 0.05 + Math.sin(bT / 150 + x) * 0.03;

            // Les dalles cassables deviennent rouge sang si l'architecte est mort
            if (isB30Dead) {
              fi = `rgba(255, 0, 60, ${holoAlpha + 0.2})`;
              bo = 'rgba(255, 0, 60, 0.4)';
            } else {
              fi = `rgba(255, 255, 255, ${holoAlpha})`;
              bo = 'rgba(255, 255, 255, 0.2)';
            }

            if (gb) {
              fi = `rgba(255, 60, 30, ${(1 - gb.t / 1500) * 0.25})`; bo = 'rgba(255, 0, 0, 0.8)';
            }

          cx.strokeStyle = bo;
          cx.lineWidth = 1;

              cx.lineWidth = isB30Dead ? 3 : 2;

              for (let i = -1; i < 4; i++) {
                const off = ((bT / 350 + i / 3) % 1) * TSZ;
                cx.beginPath();
                if (cv.dx !== 0) {
                  const ox = tx + (cv.dx > 0 ? off : TSZ - off);
                  cx.moveTo(ox, ty + TSZ * 0.2); cx.lineTo(ox + cv.dx * TSZ * 0.2, ty + TSZ / 2); cx.lineTo(ox, ty + TSZ * 0.8);

                }

              }

    function dTraps() {
      for (const t of traps) {
        // ─── 1. PATROUILLE (DRONE DE SÉCURITÉ) ───
        if (t.k === 'patrol') {
          // Cône de vision holographique
          if (t.state !== 'charge' && t.dir) {
            cx.save();
            const grad = cx.createLinearGradient(t.px, t.py, t.px + t.dir.dx * t.vision * TSZ, t.py + t.dir.dy * t.vision * TSZ);
            grad.addColorStop(0, 'rgba(138,43,226,0.3)'); grad.addColorStop(1, 'rgba(138,43,226,0)');
            cx.fillStyle = grad;
            cx.beginPath();
            cx.moveTo(t.px, t.py);
            // Calcule le triangle de vision
            const w = TSZ * 0.6;
            if (t.dir.dy !== 0) { cx.lineTo(t.px - w, t.py + t.dir.dy * t.vision * TSZ); cx.lineTo(t.px + w, t.py + t.dir.dy * t.vision * TSZ); }
            else { cx.lineTo(t.px + t.dir.dx * t.vision * TSZ, t.py - w); cx.lineTo(t.px + t.dir.dx * t.vision * TSZ, t.py + w); }
            cx.fill(); cx.restore();
          }

          const s = TSZ * 0.45;
          const isAlert = (t.state === 'alert' || t.state === 'charge');
          const glowCol = isAlert ? K.red : K.pur;
          const floatY = Math.sin(bT / 150) * 4;

          cx.save(); cx.translate(t.px, t.py + floatY);
          glow(glowCol, 20);

          // Corps du drone (Octogone mécanique)
          cx.fillStyle = '#0a0514';
          cx.beginPath(); cx.moveTo(-s * 0.5, -s); cx.lineTo(s * 0.5, -s); cx.lineTo(s, -s * 0.5); cx.lineTo(s, s * 0.5); cx.lineTo(s * 0.5, s); cx.lineTo(-s * 0.5, s); cx.lineTo(-s, s * 0.5); cx.lineTo(-s, -s * 0.5); cx.closePath();
          cx.fill();
          cx.strokeStyle = glowCol; cx.lineWidth = 2; cx.stroke();

          // Œil du drone (Scanner)
          cx.fillStyle = isAlert ? '#FF003C' : '#00F5FF';
          const eyeScan = isAlert ? 0 : Math.sin(bT / 100) * s * 0.4;
          cx.beginPath(); cx.arc(eyeScan, 0, s * 0.3, 0, Math.PI * 2); cx.fill();
          cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(eyeScan + (t.dir ? t.dir.dx * 2 : 0), (t.dir ? t.dir.dy * 2 : 0), s * 0.1, 0, Math.PI * 2); cx.fill();
          cx.restore(); noGlow();

          if (isAlert) {
            glow(K.red, 15); cx.font = `bold ${Math.floor(TSZ * 0.5)}px Orbitron`; cx.textAlign = 'center'; cx.fillStyle = K.red;
            cx.fillText('!', t.px, t.py - s * 1.5 + floatY); noGlow();
          }
        }

        // ─── 2. GRAVITÉ (TROU NOIR / VORTEX) ───
        if (t.k === 'grav') {
          const gx = px2(t.x), gy = py2(t.y);
          const pu = t.active ? 1 : 0.2;
          cx.save(); cx.translate(gx, gy);

          // Anneaux de distorsion rotatifs
          for (let i = 0; i < 3; i++) {
            cx.rotate(bT / (200 + i * 100) * (i % 2 === 0 ? 1 : -1));
            cx.strokeStyle = `rgba(138,43,226,${pu * (0.8 - i * 0.2)})`;
            cx.lineWidth = 2;
            cx.beginPath(); cx.ellipse(0, 0, TSZ * (0.3 + i * 0.4), TSZ * (0.1 + i * 0.2), 0, 0, Math.PI * 2); cx.stroke();
          }

          cx.restore(); noGlow();
        }

        // ─── 8. SAW (SCIE CIRCULAIRE PLASMA) ───
        if (t.k === 'saw') {

          }

          cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(0, 0, r * 0.3, 0, Math.PI * 2); cx.fill();
          cx.restore(); noGlow();

          // Étincelles constantes
          if (Math.random() < 0.3) spark(t.px, t.py, K.blue, 1, 2, 200);
        }
      }
    }

    // ── HUD POUVOIRS DÉBLOQUÉS ──
    function drawPowerHUD() {
      if (typeof gameStats === 'undefined') return;
      const powers = [];

      // Invisibilité [C]
      if (gameStats.hasInvis) {
        let txt, col2;
        if (pl.invisActive) { txt = `[C] INVIS ${Math.ceil(pl.invisT / 1000)}s`; col2 = '#8A2BE2'; }
        else if (pl.invisCD > 0) { txt = `[C] ${Math.ceil(pl.invisCD / 1000)}s`; col2 = 'rgba(138,43,226,0.38)'; }
        else { txt = '[C] INVIS ●'; col2 = '#8A2BE2'; }
        powers.push({ txt, col: col2, glow: '#8A2BE2' });
      }

      // Clone [V] — indicateur déjà sur le joueur, on affiche juste le label
      if (pl.hasPowerClone) {
        const txt = pl.cloneActive ? '[V] RETOUR ◈' : '[V] CLONE ●';
        const col2 = pl.cloneActive ? '#44DDFF' : 'rgba(0,245,255,0.55)';
        powers.push({ txt, col: col2, glow: '#00F5FF' });
      }

      // Régénération passive
      if (gameStats.hasRegen) {
        const sec = Math.ceil((pl.REGEN_INTERVAL - pl.regenTimer) / 1000);
        const txt = `[REGEN] +1❤ ${sec}s`;
        powers.push({ txt, col: 'rgba(0,255,65,0.6)', glow: '#00FF41' });
      }

      // Ralenti temporel [X]
      if (gameStats.hasSlowmo) {
        let txt, col2;
        if (pl.slowmoActive) { txt = `[X] ×½ ${Math.ceil(pl.slowmoT / 1000)}s`; col2 = '#FFD700'; }
        else if (pl.slowmoCD > 0) { txt = `[X] ${Math.ceil(pl.slowmoCD / 1000)}s`; col2 = 'rgba(255,215,0,0.35)'; }
        else { txt = '[X] RALENTI ●'; col2 = '#FFD700'; }
        powers.push({ txt, col: col2, glow: '#FFD700' });
      }

      if (!powers.length) return;

      const rowH = 14, pad = 5, boxW = 110;
      const boxH = powers.length * rowH + pad * 2;
      const bx = W - boxW - 10, by = H - boxH - 36;

      // Fond semi-transparent
      cx.save();
      cx.fillStyle = 'rgba(0,0,0,0.65)';
      cx.fillRect(bx, by, boxW, boxH);
      cx.strokeStyle = 'rgba(255,255,255,0.06)';
      cx.lineWidth = 1;
      cx.strokeRect(bx, by, boxW, boxH);

      cx.font = 'bold 7px Orbitron';
      cx.textAlign = 'right';
      cx.textBaseline = 'top';

      for (let i = 0; i < powers.length; i++) {
        const p = powers[i];
        const ty = by + pad + i * rowH;
        cx.shadowColor = p.glow; cx.shadowBlur = 6;
        cx.fillStyle = p.col;
        cx.fillText(p.txt, bx + boxW - pad, ty);
      }
      cx.shadowBlur = 0;
      cx.restore();
    }

    let diagQueue = [];

    // Création de l'interface graphique
    const diagUI = document.createElement('div');
    diagUI.style.cssText = "position:fixed; bottom:5%; left:10%; width:80%; background:rgba(5,0,15,0.9); border:2px solid #FF003C; border-radius:4px; padding:20px; z-index:100; display:none; font-family:'Share Tech Mono',monospace; box-shadow:0 0 20px rgba(255,0,60,0.3);";

    document.body.appendChild(diagUI);

    function startDialogue(lines, onComplete) {
      diagQueue = [...lines];
      isDiagActive = true;
      _tr = true; // Gèle le temps
      diagUI.style.display = 'block';
      onDiagComplete = onComplete;

      window.addEventListener('keydown', keyHandler, true);
      window.addEventListener('mousedown', mouseHandler, true);

      showNextDiag();
    }

    function showNextDiag() {
      // Si on est déjà en train d'écrire, on skip l'animation et on affiche tout
      if (isTyping) {
        clearTimeout(typeTimeout);
        document.getElementById('diag-text').textContent = currentFullText;
        isTyping = false;
        return;
      }

      // Si plus de dialogue, on ferme
      if (diagQueue.length === 0) {
        isDiagActive = false;
        diagUI.style.display = 'none';
        _tr = false; // Dégèle le jeu
        window.removeEventListener('keydown', keyHandler, true);
        window.removeEventListener('mousedown', mouseHandler, true);
        if (onDiagComplete) onDiagComplete();
        return;
      }

      const step = diagQueue.shift();
      document.getElementById('diag-name').textContent = step.name;
      document.getElementById('diag-name').style.color = step.color || '#FFF';

      currentFullText = step.text;
      document.getElementById('diag-text').textContent = "";
      isTyping = true;

      // Animation lettre par lettre
      let charIndex = 0;
      function typeChar() {
        if (charIndex < currentFullText.length) {
          document.getElementById('diag-text').textContent += currentFullText.charAt(charIndex);
          charIndex++;

          // Petit bruit de frappe (optionnel, utilise sfx.move si dispo)
          if (typeof sfx !== 'undefined' && sfx.move && charIndex % 3 === 0) sfx.move();

          typeTimeout = setTimeout(typeChar, 30); // 30ms par lettre
        } else {
          isTyping = false;
        }
      }
      typeChar();
    }

    // Intercepteurs pour passer le texte
    function keyHandler(e) {
      if (e.code === 'Space' || e.code === 'Enter') {
        showNextDiag();
        e.stopImmediatePropagation(); e.preventDefault();
      }
    }
    function mouseHandler(e) {
      if (e.button === 0) {
        showNextDiag();
        e.stopImmediatePropagation(); e.preventDefault();
      }
    }

        diag = [
          { name: '[SYSTÈME]', color: '#FF003C', text: "SPARKY... Qu'as-tu fait ?" },
          { name: '[SYSTÈME]', color: '#FF003C', text: "Tu as détruit l'Antivirus PHANT0M. \nBravo pour un premier jour!!!" },
          { name: '[SPARKY]', color: '#00F5FF', text: "Je devais survivre. Il m'attaquait." },
          { name: '[SYSTÈME]', color: '#FF003C', text: "Tu détruis notre monde composant par composant évite cepandant dans détruire trop \nContinue, es ce sera la FIN !" }
        ];
      } else {
        // SCÉNARIO 2 : PHANT0M A ÉTÉ ÉPARGNÉ
        diag = [
          { name: '[SYSTÈME]', color: '#FF003C', text: "SPARKY... Analyse de ton rapport de combat..." },
          { name: '[SYSTÈME]', color: '#00FF41', text: "L'Antivirus PHANT0M est toujours en ligne. Tu l'as épargné." },
          { name: '[SPARKY]', color: '#00F5FF', text: "Il n'était plus une menace. Inutile de l'effacer." },
          { name: '[SYSTÈME]', color: '#00FF41', text: "C'est un choix... inattendu. Mais noble. Les défenses restent stables. Continue." }
        ];
      }

      startDialogue(diag, () => {
        pageFlip(`PALIER ${level}`, 'REPRISE DU SYSTÈME', null);
      });
    }


    function startLvl21Intro() {
      const isB20Dead = localStorage.getItem('rvb2_b20_dead') === 'true';
      let diag = [];

      if (isB20Dead) {
        diag = [
          { name: '[SYSTÈME]', color: '#FF003C', text: "L'Interface SYNC & ASYNC... Tu l'as brisée." },
          { name: '[SYSTÈME]', color: '#FF003C', text: "L'harmonie visuelle du système est morte. Regarde ces couleurs ternes..." },
          { name: '[SPARKY]', color: '#00F5FF', text: "C'est glacial ici... Tout est gris et sans vie." },
          { name: '[SYSTÈME]', color: '#FF003C', text: "C'est le prix de tes actes. Plus tu détruis de composants, plus ce monde devient un tombeau." }
        ];
      } else {
        diag = [
          { name: '[SYSTÈME]', color: '#00FF41', text: "L'Interface SYNC & ASYNC a retrouvé son cycle. Tu as choisi la clémence." },
          { name: '[SYSTÈME]', color: '#00FF41', text: "La chaleur des couleurs est maintenue dans les secteurs suivants." },
          { name: '[SPARKY]', color: '#00F5FF', text: "C'était elle qui gérait l'aspect visuel du noyau ?" },
          { name: '[SYSTÈME]', color: '#00FF41', text: "Exactement. Continue d'avancer, SPARKY." }
        ];
      }

      startDialogue(diag, () => {
        // Si l'interface est morte, le titre du niveau change
        pageFlip(`PALIER ${level}`, isB20Dead ? 'INTERFACE FRAGMENTÉE' : 'INTERFACE STABILISÉE', null);
      });
    }


    function startLvl31Intro() {
      const isB30Dead = localStorage.getItem('rvb2_b30_dead') === 'true';
      let diag = [];

      if (isB30Dead) {
        diag = [
          { name: '[SYSTÈME]', color: '#FF003C', text: "Bravo, SPARKY. Vraiment, félicitations." },
          { name: '[SYSTÈME]', color: '#FF003C', text: "Tu viens de formater L'Architecte. Celui qui concevait la structure même de ce monde." },
          { name: '[SYSTÈME]', color: '#FF003C', text: "Maintenant, dis-moi... Comment on fait sans environnement ?" },
          { name: '[SPARKY]', color: '#00F5FF', text: "Je n'ai pas besoin de ses labyrinthes. On va aller à l'essentiel." },
          { name: '[SYSTÈME]', color: '#FF003C', text: "Très bien. Tu vas voir, je vais te les faire, tes niveaux. Brut, sans filtre." }
        ];
      } else {
        diag = [
          { name: '[SYSTÈME]', color: '#00FF41', text: "L'Architecte est toujours en vie." },
          { name: '[SPARKY]', color: '#00F5FF', text: "Ses niveaux sont complexes, mais ils ont une logique." },
          { name: '[SYSTÈME]', color: '#00FF41', text: "Son code continue de générer le Secteur 4. Reste sur tes gardes." }
        ];
      }

      startDialogue(diag, () => {
        pageFlip(`PALIER ${level}`, isB30Dead ? 'GÉNÉRATION BRUTE' : 'ARCHITECTURE COMPLEXE', null);
      });
    }


    function startLvl41Intro() {
      const isB40Dead = localStorage.getItem('rvb2_b40_dead') === 'true';
      let diag = [];

      if (isB40Dead) {
        diag = [
          { name: '[SYSTÈME]', color: '#FF003C', text: "Erreur... var temporelle = NULL." },
          { name: '[SPARKY]', color: '#00F5FF', text: "Tout... saute. Je me vois à deux endroits en même temps." },
          { name: '[SYSTÈME]', color: '#FF003C', text: "Mais tu es complètement malade petit programme!" },
          { name: '[SYSTÈME]', color: '#FF003C', text: "Prépare-toi à des sauts asynchrones. La réalité va lagger." }
        ];
      } else {
        diag = [
          { name: '[SYSTÈME]', color: '#00FF41', text: "Flux temporel : Stable. L'horloge interne tourne." },
          { name: '[SPARKY]', color: '#00F5FF', text: "J'ai l'impression que l'air est lourd..." },
          { name: '[SYSTÈME]', color: '#00FF41', text: "C'est la densité du N.E.A.N. Le Palier 50 est proche." }
        ];
      }

      startDialogue(diag, () => {
        pageFlip(`PALIER ${level}`, isB40Dead ? 'DÉCHIRURE TEMPORELLE' : 'SYNCHRONISATION ACTIVE', null);
      });
    }


    // ─── BOOT DU JEU ───
    let _bossRet = false;
    try {
      const br = JSON.parse(localStorage.getItem('rvb2_bossReturn') || 'null');
      if (br) {
        level = br.level || 11; score = br.score || 0; lives = Math.max(1, br.lives || 3);
        if (br.maxLives && br.maxLives > maxLives) { maxLives = br.maxLives; lives = Math.min(lives + 1, maxLives) }
        col = br.col || 'red';
        localStorage.removeItem('rvb2_bossReturn');
        _bossRet = true;
      }
    } catch { }

    // Si on ne revient pas d'un boss, on charge la sauvegarde standard
    if (!_bossRet) {
      level = 1; score = 0; col = 'red'; gTime = 0; lives = maxLives;

      // 1. ON EFFACE TOUTE LA MÉMOIRE (Pour éviter que les parties se mélangent)
      const keysToClear = ['rvb2_stats', 'rvb2_power_clone', 'rvb2_power_regen', 'rvb2_power_invis', 'rvb2_power_slowmo', 'rvb2_b10_state', 'rvb2_b20_state', 'rvb2_b30_state', 'rvb2_b40_state'];
      keysToClear.forEach(k => localStorage.removeItem(k));

      if (typeof gameStats !== 'undefined') {
        gameStats.corruption = 0;
        gameStats.formater = 0;   // <-- OBLIGATOIRE POUR LE MONDE
        gameStats.epargner = 0;   // <-- OBLIGATOIRE POUR LE MONDE
        gameStats.hasClone = false; gameStats.hasRegen = false;
        gameStats.hasInvis = false; gameStats.hasSlowmo = false;
      }

      // 2. ON RESTAURE UNIQUEMENT LE SLOT SÉLECTIONNÉ
      try {
        const activeSlotId = localStorage.getItem('reveb_active_slot');
        if (activeSlotId !== null) {
          const saves = JSON.parse(localStorage.getItem('reveb_saves') || '[]');
          const currentSave = saves[activeSlotId];

          if (currentSave && !currentSave.isEmpty) {
            level = currentSave.palier || 1;

            if (typeof gameStats !== 'undefined') {
              // On restaure les conséquences du monde !
              if (currentSave.stats) {
                gameStats.formater = currentSave.stats.formater || 0;
                gameStats.epargner = currentSave.stats.epargner || 0;
              }
              gameStats.corruption = currentSave.corruption || 0;

              if (currentSave.powers) {
                gameStats.hasClone = currentSave.powers.clone || false;
                gameStats.hasRegen = currentSave.powers.regen || false;
                gameStats.hasInvis = currentSave.powers.invis || false;
                gameStats.hasSlowmo = currentSave.powers.slowmo || false;

                // On restaure le texte des boss pour le menu
                if (currentSave.powers.b10_state) localStorage.setItem('rvb2_b10_state', currentSave.powers.b10_state);
                if (currentSave.powers.b20_state) localStorage.setItem('rvb2_b20_state', currentSave.powers.b20_state);
                if (currentSave.powers.b30_state) localStorage.setItem('rvb2_b30_state', currentSave.powers.b30_state);
                if (currentSave.powers.b40_state) localStorage.setItem('rvb2_b40_state', currentSave.powers.b40_state);
              }
            }
          }
        }
      } catch (e) { console.error("Erreur de chargement du slot", e); }
    }

    if (typeof gameStats !== 'undefined') gameStats.save();

    if (typeof gameStats !== 'undefined') gameStats.save(); // On sauvegarde ce nouvel état propre

    if (typeof gameStats !== 'undefined') gameStats.load();

    if (typeof gameStats !== 'undefined') gameStats.load();
    pl.refreshPowers();
    genLevel();
    st = ST.PLAY;

    // --- GESTION DU DÉMARRAGE ---
    if (level === 1 && !_bossRet) {
      setTimeout(() => startLvl1Intro(), 200);
    } else if (level === 11 && _bossRet) {
      setTimeout(() => startLvl11Intro(), 200);
    } else if (level === 21 && _bossRet) {
      setTimeout(() => startLvl21Intro(), 200);
    } else if (level === 31 && _bossRet) {
      setTimeout(() => startLvl31Intro(), 200);
    } else if (level === 41 && _bossRet) {
      setTimeout(() => startLvl41Intro(), 200); // <-- AJOUT DU PALIER 41
    } else {
      pageFlip(`PALIER ${level}`, 'STABILISE LE NOYAU', () => { });
    }

    function loop(ts) { update(ts); draw(); requestAnimationFrame(loop) }
    requestAnimationFrame(loop);


  </script>
</body>

</html>
