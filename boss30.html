    function finalize(ret) {
      localStorage.setItem('rvb2_bossReturn', JSON.stringify(ret));
      pageFlip('PALIER 31', 'RETOUR AU JEU…', () => { window.location.href = 'ReveB2_Overclock.html'; });
    }

    // ═══════════════════════════════════════════════════════════
    //  UPDATE PRINCIPAL
    // ═══════════════════════════════════════════════════════════
    function update(ts) {
      const dt = Math.min(ts - lastT, 50); lastT = ts; bT += dt; globalTime = ts;
      for (const s of shakes) s.t += dt; shakes = shakes.filter(s => s.t < s.d);
      for (const p of parts) { p.x += p.vx * (dt / 16); p.y += p.vy * (dt / 16); p.vy += p.g * (dt / 16); p.life = Math.max(0, p.life - dt); if (p.ring) p.sz = p.r0 * (1 + (1 - p.life / p.ml) * 1.5); }
      parts = parts.filter(p => p.life > 0);
      if (bossState === BST.END) return;
      if (bossState === BST.TRANS) {
        transState.t += dt;
        if (transState.t >= transState.dur && transState.active) {
          transState.active = false;
          const _cb = transState.cb;
          transState.cb = null;
          if (_cb) _cb();
        }
        return;
      }
      if (bossState === BST.DYING) { dyingTimer += dt; pl.update(dt); return; }
      if (!isDialogActive) {
        if (bossState === BST.P1) updateP1(dt);
        else if (bossState === BST.P2) updateP2(dt);
        else if (bossState === BST.P3) updateP3(dt);
      } else {
        if (bossState === BST.P1) pl.update(dt);
      }
    }

    // ─── UI DU JOUEUR (CŒURS, SCORE, DASH) ───
    function drawUI() {
      // Cadre des cœurs
      const heartW = 26;
      const boxW = maxLives * heartW + 16;
      const boxY = 8;

      cx.fillStyle = 'rgba(0,0,0,.85)'; cx.fillRect(16, boxY, boxW, 32);
      glow(K.blue, 8); cx.strokeStyle = K.blue; cx.lineWidth = 2; cx.strokeRect(16, boxY, boxW, 32); noGlow();

      cx.font = '22px Arial';
      cx.textAlign = 'left';
      cx.textBaseline = 'middle';

      // Dessin des cœurs
      for (let h = 0; h < maxLives; h++) {
        const isAlive = h < lives;
        cx.globalAlpha = isAlive ? 1 : 0.3;
        if (isAlive) glow(K.red, 15);
        cx.fillStyle = isAlive ? K.red : '#444';
        cx.fillText('❤', 24 + h * heartW, boxY + 18);
        noGlow();
      }
      cx.globalAlpha = 1;

      // Score et Dash
      cx.font = 'bold 10px Orbitron'; cx.textAlign = 'left'; cx.fillStyle = 'rgba(200,180,255,.6)'; cx.fillText(`SCORE ${score}`, 16, 55);
      const dp = pl.dashCD > 0 ? 1 - pl.dashCD / pl.DASH_CD : 1, dw = 90, dh = 5, dx = W / 2 - dw / 2, dy = H - 18;
      cx.fillStyle = '#0a0014'; cx.fillRect(dx, dy, dw, dh); cx.fillStyle = dp >= 1 ? K.pur : 'rgba(138,43,226,.38)'; cx.fillRect(dx, dy, dw * dp, dh);
      glow(K.pur, 3); cx.strokeStyle = '#2a0040'; cx.lineWidth = .8; cx.strokeRect(dx, dy, dw, dh); noGlow();
      cx.font = 'bold 6px Orbitron'; cx.textAlign = 'center'; cx.fillStyle = dp >= 1 ? K.pur : 'rgba(138,43,226,.4)'; cx.fillText(dp >= 1 ? 'DASH [ESPACE]' : 'DASH', W / 2, dy - 4);

      // Hint Scan (RMB)
      if (rmb) { cx.globalAlpha = .42 + Math.sin(globalTime / 200) * .28; cx.font = 'bold 7px Orbitron'; cx.fillStyle = K.gold; cx.fillText('🔍 SCAN ACTIF', W / 2, 20); cx.globalAlpha = 1; }
    }

    function drawCursor() {
      cx.save(); glow(K.gold, rmb ? 12 : 4); cx.strokeStyle = K.gold; cx.lineWidth = rmb ? 2 : 1.2; cx.beginPath(); cx.arc(mx, my, rmb ? 8 : 5, 0, Math.PI * 2); cx.stroke();
      if (rmb) { cx.beginPath(); cx.moveTo(mx - 12, my); cx.lineTo(mx + 12, my); cx.moveTo(mx, my - 12); cx.lineTo(mx, my + 12); cx.strokeStyle = 'rgba(255,215,0,.28)'; cx.lineWidth = .8; cx.stroke(); }
      noGlow(); cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(mx, my, 1, 0, Math.PI * 2); cx.fill(); cx.restore();
    }


    // ═══════════════════════════════════════════════════════════
    //  DRAW PRINCIPAL
    // ═══════════════════════════════════════════════════════════
    function draw() {
      const time = globalTime;
      cx.clearRect(0, 0, W, H);
      if (bossState === BST.TRANS) {
        drawDancefloorBg(time);
        drawTransGlitch();
        drawParts();
        return;
      }
      const sk = getSh(); cx.save(); cx.translate(sk.x, sk.y);
      if (bossState === BST.P1 || bossState === BST.INTRO) {
        drawDancefloorBg(time); drawArenaP1(time); drawBossP1(time); pl.draw(cx, time, TSZ);
      } else if (bossState === BST.P2) {
        drawP2Screen(time); pl.draw(cx, time, TSZ);
      } else if (bossState === BST.P3) {
        drawDancefloorBg(time); drawArenaP3(time); drawOsuZone(time); pl.draw(cx, time, TSZ);
      } else if (bossState === BST.DYING) {
        drawDancefloorBg(time);
        if (p3.bossHP <= 0) { drawArenaP3(time); drawOsuZone(time); } else { drawArenaP1(time); }
        drawBossDying(time); pl.draw(cx, time, TSZ);
      }
      drawParts(); cx.restore();
      drawUI();
      drawCursor();
    }

    // ═══════════════════════════════════════════════════════════
    //  INPUTS
    // ═══════════════════════════════════════════════════════════
    const dirKeys = { ArrowUp: { dx: 0, dy: -1 }, ArrowDown: { dx: 0, dy: 1 }, ArrowLeft: { dx: -1, dy: 0 }, ArrowRight: { dx: 1, dy: 0 }, KeyW: { dx: 0, dy: -1 }, KeyS: { dx: 0, dy: 1 }, KeyA: { dx: -1, dy: 0 }, KeyD: { dx: 1, dy: 0 }, KeyZ: { dx: 0, dy: -1 }, KeyQ: { dx: -1, dy: 0 } };
    const ddrKeyMap = { ArrowLeft: 0, ArrowDown: 1, ArrowUp: 2, ArrowRight: 3 };

    document.addEventListener('keydown', e => {
      unlockAudio();
      if (isDialogActive) { if (e.code === 'Space' || e.code === 'Enter') { showNextDialogue(); e.preventDefault(); } return; }
      if (bossState === BST.END) return;
      if (bossState === BST.P2) {
        if (e.code in ddrKeyMap) { onDDRKey(ddrKeyMap[e.code]); e.preventDefault(); }
        return;
      }
      if (bossState !== BST.DYING && bossState !== BST.TRANS) {
        if (dirKeys[e.code]) { if (!pl.iq || !pl.mv) { pl.iq = dirKeys[e.code]; pl.lDir = dirKeys[e.code]; } }
        if (e.code === 'Space') pl.tryDash();
        if (e.code === 'KeyV') pl.tryClone();
        if (e.code === 'KeyC') pl.tryInvis();
      }
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    cv.addEventListener('mousedown', e => {
      unlockAudio();
      if (isDialogActive && e.button === 0) { showNextDialogue(); e.preventDefault(); return; }
      if (e.button === 0) { lmb = true; if (bossState === BST.P3) onOsuClick(e.clientX, e.clientY); }
      if (e.button === 2) { rmb = true; e.preventDefault(); }
    });
    cv.addEventListener('mouseup', e => { if (e.button === 0) lmb = false; if (e.button === 2) rmb = false; });

    // ═══════════════════════════════════════════════════════════
    //  BOUCLE
    // ═══════════════════════════════════════════════════════════
    function loop(ts) { update(ts); draw(); requestAnimationFrame(loop); }

    // ═══════════════════════════════════════════════════════════
    //  BOOT
    // ═══════════════════════════════════════════════════════════
    buildP1Arena();
    pl.reset(spawn1.x, spawn1.y); pl.inv = 1800;
    showHUDs();

    pageFlip("L'ARCHITECTE D.J.", 'BOSS — PALIER 30', () => { startP1(); });
    requestAnimationFrame(loop);
  </script>
</body>
