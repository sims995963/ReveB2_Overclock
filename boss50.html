<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ReveB 2 — N·E·A·N — Phases 1-2-3</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bangers&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      background: #010002;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Share Tech Mono', monospace;
      color: #fff;
      cursor: crosshair
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1
    }

    #crt {
      position: fixed;
      inset: 0;
      z-index: 90;
      pointer-events: none;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, .22) 50%), linear-gradient(90deg, rgba(255, 0, 60, .04), rgba(138, 43, 226, .025), rgba(255, 0, 60, .03));
      background-size: 100% 2px, 3px 100%;
      opacity: .55
    }

    #vignette {
      position: fixed;
      inset: 0;
      z-index: 89;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0, 0, 10, .7) 80%, #000 120%)
    }

    #fx {
      position: fixed;
      inset: 0;
      z-index: 88;
      opacity: 0;
      pointer-events: none;
      transition: opacity .05s
    }

    #tr {
      position: fixed;
      inset: 0;
      z-index: 95;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity .12s
    }

    #tr.show {
      opacity: 1
    }

    .th {
      flex: 1;
      position: relative;
      overflow: hidden
    }

    .th:first-child {
      background: linear-gradient(135deg, #130005, #010002);
      border-bottom: 2px solid rgba(255, 0, 60, .7);
      transition: transform .4s cubic-bezier(.86, 0, .07, 1)
    }

    .th:last-child {
      background: linear-gradient(135deg, #0d0015, #010002);
      border-top: 2px solid rgba(138, 43, 226, .7);
      transition: transform .4s cubic-bezier(.86, 0, .07, 1) .04s
    }

    #tr.open .th:first-child {
      transform: translateY(-100%)
    }

    #tr.open .th:last-child {
      transform: translateY(100%)
    }

    .tt {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-weight: 900;
      font-size: clamp(1.3rem, 3.8vw, 2.5rem);
      letter-spacing: .15em;
      color: #fff;
      text-align: center;
      text-shadow: 0 0 25px #FF003C
    }

    .tt span {
      display: block;
      font-size: .36em;
      letter-spacing: .3em;
      opacity: .6;
      margin-top: .3em;
      color: #FF003C
    }

    .ono {
      position: fixed;
      font-family: 'Bangers', cursive;
      font-weight: 900;
      pointer-events: none;
      z-index: 85;
      letter-spacing: .04em;
      white-space: pre;
      line-height: 1;
      text-align: center;
      animation: oA .85s cubic-bezier(.22, 1, .36, 1) forwards;
      text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 0 0 14px currentColor
    }

    @keyframes oA {
      0% {
        opacity: 1;
        transform: scale(.25)
      }

      18% {
        opacity: 1;
        transform: scale(1.35)
      }

      55% {
        opacity: 1;
        transform: scale(1)
      }

      100% {
        opacity: 0;
        transform: scale(.85) translateY(-38px)
      }
    }

    #dl-bar-wrap {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 7px;
      z-index: 20;
      pointer-events: none;
      background: #0a0002
    }

    #dl-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #550000, #FF003C, #FF4444);
      box-shadow: 0 0 12px #FF003C;
      transition: width .5s
    }

    #dl-label {
      position: fixed;
      top: 9px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 9px;
      letter-spacing: .15em;
      color: #FF003C;
      text-shadow: 0 0 8px #FF003C;
      font-family: 'Orbitron', monospace;
      pointer-events: none;
      text-align: center;
      white-space: nowrap
    }

    #boss-hud {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: none;
      text-align: center;
      min-width: 280px;
      opacity: 0;
      transition: opacity .5s
    }

    #boss-nm {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .25em;
      margin-bottom: 5px;
      color: #FF003C;
      text-shadow: 0 0 18px #FF003C
    }

    #boss-ph {
      font-size: 9px;
      color: rgba(255, 0, 60, .55);
      letter-spacing: .14em
    }

    #chrono {
      position: fixed;
      top: 24px;
      right: 18px;
      z-index: 20;
      font-family: 'Orbitron', monospace;
      font-size: 26px;
      font-weight: 900;
      color: #FF003C;
      text-shadow: 0 0 20px #FF003C;
      letter-spacing: .05em;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none
    }

    #lives-hud {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(15, 0, 5, 0.85);
      border: 2px solid #FF003C;
      padding: 6px 12px;
      display: flex;
      gap: 6px;
      box-shadow: 0 0 15px rgba(255, 0, 60, 0.4), inset 0 0 10px rgba(255, 0, 60, 0.2);
      border-radius: 3px;
    }

    .heart {
      color: #FF003C;
      font-size: 18px;
      text-shadow: 0 0 8px #FF003C;
    }

    .heart.empty {
      color: rgba(255, 0, 60, 0.2);
      /* Cœur grisé quand on perd de la vie */
      text-shadow: none;
    }

    .life-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00F5FF;
      box-shadow: 0 0 10px #00F5FF;
      transition: all .3s
    }

    .life-dot.empty {
      background: transparent;
      border: 2px solid rgba(0, 245, 255, .3);
      box-shadow: none
    }

    #shield-hud {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: none;
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #00F5FF;
      text-shadow: 0 0 10px #00F5FF;
      letter-spacing: .12em;
      opacity: 0;
      transition: opacity .3s
    }

    #dialog-box {
      position: fixed;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: min(90vw, 680px);
      background: rgba(1, 0, 2, .97);
      border: 2px solid #FF003C;
      border-radius: 4px;
      padding: 18px 26px;
      z-index: 98;
      display: none;
      flex-direction: column;
      box-shadow: 0 0 30px rgba(255, 0, 60, .5), inset 0 0 15px rgba(255, 0, 60, .08)
    }

    #dialog-box.show {
      display: flex;
      animation: fadeup .3s ease-out
    }

    @keyframes fadeup {
      from {
        opacity: 0;
        transform: translate(-50%, 15px)
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0)
      }
    }

    #dialog-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: .1em;
      margin-bottom: 11px;
      text-shadow: 0 0 12px currentColor
    }

    #dialog-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      line-height: 1.65;
      color: #ff9999;
      min-height: 50px;
      white-space: pre-wrap
    }

    #dialog-choices {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 14px
    }

    #dialog-hint {
      align-self: flex-end;
      font-size: 9px;
      color: #556;
      margin-top: 12px;
      letter-spacing: .1em;
      animation: blink 1.5s infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .choice-btn {
      padding: 10px 18px;
      background: rgba(1, 0, 2, .9);
      border: 1px solid #FF003C;
      color: #FF003C;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      letter-spacing: .08em;
      cursor: pointer;
      transition: all .2s;
      text-align: left
    }

    .choice-btn:hover {
      background: rgba(255, 0, 60, .1);
      box-shadow: 0 0 14px rgba(255, 0, 60, .4);
      transform: translateX(3px)
    }

    #p8-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: rgba(1, 0, 2, .97)
    }

    #p8-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(13px, 2.2vw, 24px);
      font-weight: 900;
      color: #FF003C;
      text-shadow: 0 0 25px #FF003C;
      letter-spacing: .18em;
      text-align: center
    }

    #p8-bar-wrap {
      width: min(580px, 90vw);
      height: 22px;
      background: #110000;
      border: 2px solid #FF003C;
      box-shadow: 0 0 20px rgba(255, 0, 60, .4);
      position: relative;
      overflow: hidden
    }

    #p8-bar {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #550000, #FF003C, #FF4444);
      box-shadow: 0 0 15px #FF003C;
      transition: width .1s
    }

    #p8-bar-lbl {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: .1em;
      color: #fff;
      pointer-events: none
    }

    #p8-desc {
      font-size: 11px;
      color: #885555;
      letter-spacing: .06em;
      text-align: center;
      max-width: 500px;
      line-height: 1.6
    }

    #p8-btn {
      padding: 18px 48px;
      background: transparent;
      border: 3px solid #FF003C;
      color: #FF003C;
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: .2em;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(255, 0, 60, .4);
      transition: all .1s;
      user-select: none
    }

    #p8-btn:active {
      background: rgba(255, 0, 60, .2);
      transform: scale(.97)
    }

    #p8-chrono {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      color: #888;
      letter-spacing: .1em
    }

    #death-menu {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 10, .97);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center
    }

    #death-menu.show {
      display: flex
    }

    .ebtn {
      display: block;
      width: min(420px, 88vw);
      padding: 16px 24px;
      margin: 7px 0;
      background: rgba(0, 0, 0, .85);
      border: 1px solid currentColor;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      letter-spacing: .09em;
      cursor: pointer;
      transition: background .2s, box-shadow .2s, transform .1s;
      text-align: left
    }

    .ebtn:hover {
      background: rgba(255, 255, 255, .04);
      box-shadow: 0 0 24px currentColor;
      transform: translateX(4px)
    }

    .ebtn span {
      display: block;
      font-size: 10px;
      opacity: .4;
      margin-top: 4px;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: .04em
    }

    .ebtn-r {
      color: #FF003C;
      border-color: rgba(255, 0, 60, .4)
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div id="crt"></div>
  <div id="vignette"></div>
  <div id="fx"></div>
  <div id="tr">
    <div class="th">
      <div class="tt" id="t1"></div>
    </div>
    <div class="th">
      <div class="tt" id="t2"></div>
    </div>
  </div>
  <div id="dl-bar-wrap">
    <div id="dl-bar"></div>
  </div>
  <div id="dl-label">TÉLÉCHARGEMENT EN COURS… 0%</div>
  <div id="boss-hud">
    <div id="boss-nm">N·E·A·N — LE NÉANT FINAL</div>
    <div id="boss-ph">INITIALISATION…</div>
  </div>
  <div id="chrono">20</div>
  <div id="lives-hud"></div>

  <div id="dialog-box">
    <div id="dialog-name"></div>
    <div id="dialog-text"></div>
    <div id="dialog-choices"></div>
    <div id="dialog-hint">[ ESPACE / CLIC POUR CONTINUER ]</div>
  </div>
  <div id="death-menu">
    <h1
      style="color:#FF003C;font-family:'Orbitron',sans-serif;font-size:clamp(26px,5vw,54px);margin-bottom:10px;text-shadow:0 0 30px #FF003C;font-weight:900">
      SYSTÈME DÉTRUIT</h1>
    <p style="color:#554;font-family:'Share Tech Mono',monospace;font-size:15px;margin-bottom:40px;letter-spacing:.1em">
      Le Néant a consumé votre processeur.</p>
    <button class="ebtn ebtn-r" onclick="restartGame()">[ RECOMMENCER ]<span>Relancer depuis la Phase 1.</span></button>
  </div>
  <script src="menu/succes_global.js"></script>
  <script>

    // ─── MUSIQUE CONTINUE DU NÉANT (RELAIS INTER-PHASES) ───
    const bgm = new Audio("music/boss50.mp3");
    bgm.loop = true;
    bgm.volume = 1;

    // On récupère le temps de la phase précédente
    const savedBgmTime = sessionStorage.getItem('boss50_bgm_time');
    if (savedBgmTime) {
      bgm.currentTime = parseFloat(savedBgmTime);
      // On tente de relancer automatiquement (les navigateurs l'autorisent souvent entre deux pages du même site)
      bgm.play().catch(() => { });
    }

    // On sauvegarde la position de la musique en temps réel (toutes les 100ms)
    setInterval(() => {
      if (!bgm.paused) sessionStorage.setItem('boss50_bgm_time', bgm.currentTime);
    }, 100);
    // ───────────────────────────────────────────────────────



    // ═══ JOUEUR.JS INLINÉ ═══
    "use strict";

    class Joueur {
      constructor() {
        this.gx = 0; this.gy = 0;
        this.px = 0; this.py = 0;
        this.tx = 0; this.ty = 0;
        this.mv = false; this.mT = 0; this.MD = 88;
        this.alive = true; this.inv = 0; this.rot = 0;
        this.pulse = 0; this.sq = 1;
        this.boosted = false; this.bDir = null;
        this.iq = null; this.lDir = { dx: 0, dy: 1 };
        this.dashCD = 0; this.DASH_CD = 1000;
        this.dashAct = false; this.dashT2 = 0;
        this.state = 'idle'; this.gemT = 0;
        this.idleT = 0; this.hurtT = 0; this.happyT = 0;

        // ─── EFFETS VISUELS ───
        this.trail = []; // Pour la traînée de dash

        // ─── CLONE ───
        this.cloneActive = false;
        this.hasPowerClone = (typeof localStorage !== 'undefined' && localStorage.getItem('rvb2_power_clone') === 'true');
        this.origGx = 0; this.origGy = 0;
        this.origPx = 0; this.origPy = 0;
        this._glitchT = 0; this._glitchX = 0; this._glitchY = 0;
      }

      refreshPowers() {
        this.hasPowerClone = (typeof localStorage !== 'undefined' && localStorage.getItem('rvb2_power_clone') === 'true');
      }

      reset(sx, sy) {
        this.cloneActive = false;
        this.gx = sx; this.gy = sy;
        this.px = px2(sx); this.py = py2(sy);
        this.tx = this.px; this.ty = this.py;
        this.mv = false; this.alive = true; this.inv = 800;
        this.rot = 0; this.pulse = 0; this.sq = 1;
        this.boosted = false; this.bDir = null;
        this.dashAct = false; this.dashT2 = 0; this.dashCD = 0;
        this.trail = [];
        this.refreshPowers();
        burst(this.px, this.py, col === 'red' ? K.red : K.blue, 12, 4, 400);
      }

      tryClone() {
        if (!this.hasPowerClone || !this.alive || _tr) return;
        if (this.cloneActive) { this.killClone(); return; }
        if (this.mv || this.dashAct || this.boosted) return;
        this.origGx = this.gx; this.origGy = this.gy;
        this.origPx = this.px; this.origPy = this.py;
        this.cloneActive = true;
        this.inv = 250; this._glitchT = 0;
        spark(this.px, this.py, '#44DDFF', 14, 4, 450);
        ono('DÉDOUBLEMENT!', this.px, this.py - 32, '#44DDFF');
        if (typeof sfx !== 'undefined') sfx.dash();
      }

      killClone() {
        if (!this.cloneActive) return;
        spark(this.px, this.py, '#8844FF', 10, 3, 280);
        ono('RETOUR!', this.px, this.py - 26, '#8844FF');
        this.gx = this.origGx; this.gy = this.origGy;
        this.px = this.origPx; this.py = this.origPy;
        this.tx = this.px; this.ty = this.py;
        this.mv = false; this.mT = 0;
        this.dashAct = false; this.inv = 400;
        this.cloneActive = false;
      }

      hurtOriginal() {
        if (!this.alive) return;

        lives--;
        if (typeof updateLivesHUD === 'function') updateLivesHUD(); // <-- MISE À JOUR DU HUD ICI

        this.hurtT = 900;
        if (lives <= 0) { this.cloneActive = false; this.kill(); return; }
        this.inv = 1200;
        if (typeof sfx !== 'undefined') sfx.hit();
        burst(this.origPx, this.origPy, K.red, 16, 4, 350);
        addSh(7, 200); fScr(K.red, 150);
        ono('HIT! (ORIG)', this.origPx, this.origPy - 26, K.red);
      }

      tryMove(dx, dy) {
        if (this.mv || !this.alive || _tr || this.dashAct || this.boosted) return;
        this.lDir = { dx, dy };
        const nx = this.gx + dx, ny = this.gy + dy;
        if (!solid(nx, ny, false)) return;
        if (!this.cloneActive) {
          for (const t of traps) {
            if (t.k === 'laser' && t.fir) {
              if (t.ax === 'h' && ny === t.rc) return;
              if (t.ax === 'v' && nx === t.rc) return;
            }
          }
        }
        this.gx = nx; this.gy = ny;
        this.tx = px2(nx); this.ty = py2(ny);
        this.mv = true; this.mT = 0;
        this.rot = Math.atan2(dy, dx); this.sq = 0.7;
        if (typeof sfx !== 'undefined') sfx.move();
      }

      tryDash() {
        if (this.dashCD > 0 || !this.alive || this.mv || this.dashAct || _tr || this.boosted) return;
        const { dx, dy } = this.lDir;
        const nx = this.gx + dx * 2, ny = this.gy + dy * 2;
        if (!inB(nx, ny) || !solid(nx, ny, false)) return;
        this.dashAct = true; this.dashT2 = 0; this.dashCD = this.DASH_CD;
        this.gx = nx; this.gy = ny;
        this.tx = px2(nx); this.ty = py2(ny);
        this.mv = true; this.mT = 0; this.inv = 120;
        if (typeof sfx !== 'undefined') sfx.dash();
        spark(this.px, this.py, K.pur, 10, 4, 300);
        ono('DASH!', this.px, this.py - 25, K.pur);
        addSh(3, 120);
      }

      hurt() {
        if (!this.alive) return;
        if (this.cloneActive) {
          if (this.inv > 0) return;
          spark(this.px, this.py, '#FF00AA', 12, 3, 300);
          ono('CLONE DÉTRUIT!', this.px, this.py - 28, '#FF00AA');
          addSh(4, 150); fScr('#FF00AA', 120);
          this.killClone(); return;
        }
        if (this.inv > 0 || isOnSafe()) return;

        lives--;
        if (typeof updateLivesHUD === 'function') updateLivesHUD(); // <-- MISE À JOUR DU HUD ICI

        this.hurtT = 900;
        if (lives <= 0) { this.kill(); return; }
        this.inv = 1200;
        if (typeof sfx !== 'undefined') sfx.hit();
        burst(this.px, this.py, K.red, 16, 4, 350);
        addSh(7, 200); fScr(K.red, 150);
        ono('HIT!', this.px, this.py - 26, K.red);
      }

      kill() {
        if (!this.alive) return;
        this.alive = false;
        if (typeof addGlobalDeath === 'function') addGlobalDeath();
        lives = 0; this.cloneActive = false;
        if (typeof sfx !== 'undefined') sfx.die();
        if (score > best) { best = score; if (typeof doS !== 'undefined') doS(); }
        burst(this.px, this.py, col === 'red' ? K.red : K.blue, 45, 6, 750);
        ring(this.px, this.py, col === 'red' ? K.red : K.blue, TSZ * 1.4);
        addSh(13, 450);
        dTiles = [];
        for (let y = 0; y < gSize; y++) {
          for (let x = 0; x < gSize; x++) {
            if (grid[y][x] === T.HOLE) continue;
            const a = Math.random() * Math.PI * 2, s = 1.5 + Math.random() * 3.5;
            dTiles.push({
              x: OX + x * TSZ, y: OY + y * TSZ,
              vx: Math.cos(a) * s, vy: Math.sin(a) * s - 2.5,
              rot: Math.random() * Math.PI * 2, rv: (Math.random() - .5) * 0.18,
              c: grid[y][x] === T.PORTAL ? K.gold : col === 'red' ? K.red : K.blue,
              a: 1, sz: TSZ - 2
            });
          }
        }
        st = ST.DEAD; dAnim = 0; deadSel = 0;
        ono('SYSTEM CRASH!', this.px - 28, this.py - 38, K.red);
        fScr(K.red, 280);
      }

      update(dt) {

        // GESTION DE LA TRAÎNÉE DE DASH/BOOST
        if (this.dashAct || this.boosted) {
          this.trail.push({ x: this.px, y: this.py, life: 180, ml: 180, sqX: this.dashAct ? 1.25 : 1.1, sqY: this.dashAct ? 0.75 : 0.9, state: this.state });
        }

        if (this.mv) {

      _clrAdd(hex, v, alpha = 1) {

          cx.beginPath();

      draw(cx, now, TSZ) {

          cx.globalAlpha = invRatio * 0.7;

          cx.strokeStyle = K.gold;
          cx.lineWidth = 2.5;
          cx.beginPath();

        }
      }

    function drawArena(t) {

          cx.fillRect(cp + TSZ - o - s, cq + o, s, s);
          cx.fillRect(cp + o, cq + TSZ - o - s, s, s);

    // ═══════════════════════════════════════════════════════════════
    // SWORD ATTACK SYSTEM (Lames Massives)

    let WARN_DUR = 680, ACT_DUR = 350;
    let swordAttacks = [];

    function spawnSwordAttack(cells, c, rect, axis, isCurved = false, curveDir = 1) {
      swordAttacks.push({ cells, c: c || K.red, warnT: 0, activeT: 0, state: 'warn', rect, axis, isCurved, curveDir });
      sfx.alert();
    }

    function updateSwordAttacks(dt) {
      for (let i = swordAttacks.length - 1; i >= 0; i--) {
        const a = swordAttacks[i];
        if (a.state === 'warn') {
          a.warnT += dt;
          if (a.warnT >= WARN_DUR) {
            a.state = 'active'; a.activeT = 0;
            sfx.explode(); addSh(8, 250);
          }
        }
        else if (a.state === 'active') {
          a.activeT += dt;

          // Hitbox mobile : on ne prend des dégâts QUE si on touche la lame !
          if (pl.alive && pl.inv <= 0 && a.rect) {
            let hit = false;
            if (a.isCurved) {
              const prog = a.activeT / ACT_DUR;
              const pOffset = Math.pow(prog, 0.6);
              if (a.axis === 'h') {
                const mY = a.curveDir === 1 ? a.rect.y + a.rect.h * pOffset : a.rect.y + a.rect.h - a.rect.h * pOffset;
                if (Math.abs(pl.py - mY) < 35 && pl.px >= a.rect.x && pl.px <= a.rect.x + a.rect.w) hit = true;
              } else {
                const mX = a.curveDir === 1 ? a.rect.x + a.rect.w * pOffset : a.rect.x + a.rect.w - a.rect.w * pOffset;
                if (Math.abs(pl.px - mX) < 35 && pl.py >= a.rect.y && pl.py <= a.rect.y + a.rect.h) hit = true;
              }
            } else {
              if (pl.px >= a.rect.x && pl.px <= a.rect.x + a.rect.w && pl.py >= a.rect.y && pl.py <= a.rect.y + a.rect.h) hit = true;
            }
            if (hit) pl.hurt();
          }

          if (a.activeT >= ACT_DUR) swordAttacks.splice(i, 1);
        }
      }
    }

    function drawSwordAttacks() {
      for (const a of swordAttacks) {
        if (!a.rect) continue;

          const prog = a.warnT / WARN_DUR;
          cx.save(); glow(a.c, 12 + prog * 18);

          } else {
            for (let i = 0; i < 4; i++) {

              cx.beginPath(); cx.moveTo(x + w / 2 + off, y); cx.lineTo(x + w / 2 + off, y + h); cx.stroke();

              cx.quadraticCurveTo(x + w / 2, mY + a.curveDir * (curveDepth * 0.3), x - 30, mY);

    function saveState(extra) {
      const data = { lives, maxLives, score, col, ...(extra || {}) };
      localStorage.setItem('rvb2_boss50_state', JSON.stringify(data));
    }
    function loadState() {
      try {
        const d = JSON.parse(localStorage.getItem('rvb2_boss50_state') || '{}');
        if (d.lives !== undefined) lives = Math.max(1, d.lives);
        if (d.maxLives !== undefined) maxLives = d.maxLives;
        if (d.score !== undefined) score = d.score;
        if (d.col !== undefined) col = d.col;
        return d;
      } catch (e) { return {}; }

    // PHASE 1 — 3×3, 20s, coups d'épée des 4 côtés (Trous Noirs)
    // ═══════════════════════════════════════════════════════════════
    let p1 = { timer: 20000, spawnTimer: 0 };

    function buildP1Arena() {
      GCOLS = 3; GROWS = 3; gSize = 3;
      grid = Array.from({ length: GROWS }, () => Array(GCOLS).fill(T.SOLID));
      traps = []; swordAttacks = []; relayout();
    }

    function startP1() {
      bossState = BST.P1; lastSpawn = { x: 1, y: 1 };
      setPhaseHUD('PHASE 1 — SINGULARITÉ'); showTimer(true); setTimer(20);
      p1.timer = 20000; p1.spawnTimer = 0;
      WARN_DUR = 300; // 0.3 seconde : le joueur doit réagir au réflexe
      ACT_DUR = 150;  // La lame passe plus vite
    }

    function updateP1(dt) {
      if (st === ST.DEAD) return;
      p1.timer -= dt; p1.spawnTimer += dt;
      setTimer(Math.max(0, Math.ceil(p1.timer / 1000)));

      // Accélération : de 800ms à 300ms entre chaque attaque
      const currentInterval = 800 + (p1.timer / 20000) * 800;

      if (p1.spawnTimer >= currentInterval) {
        p1.spawnTimer = 0;
        spawnP1Attack();
      }

      updateSwordAttacks(dt);

      if (p1.timer <= 0) {
        WARN_DUR = 800; ACT_DUR = 750; // La lame de la phase 2 traverse l'écran en 750ms (idéal pour dasher au travers)
        startTransition(1, 2, () => {
          setDownload(16.7, 1); buildP2Arena(); lastSpawn = { x: 0, y: 2 }; pl.reset(0, 2); pl.inv = 1800; bossState = BST.P2;
          setPhaseHUD('PHASE 2 — L\'ÉTENDUE'); p2.timer = 20000; p2.spawnTimer = 0; p2.patrolTimer = 0;
          sfx.power(); pageFlip('PHASE 2', 'L\'ÉTENDUE — 9×4', null);
        });
      }
    }

    function spawnP1Attack() {
      const dir = irng(0, 3);
      const cells = [];
      let rect, axis, curveDir;

      // On garde 2 de large mais avec WARN_DUR à 300ms, c'est le timing qui compte
      if (dir === 0) { // Haut -> Bas
        for (let y = 0; y < 2; y++) for (let x = 0; x < GCOLS; x++) cells.push({ x, y });
        rect = { x: OX, y: OY, w: GCOLS * TSZ, h: 2 * TSZ }; axis = 'h'; curveDir = 1;
      } else if (dir === 1) { // Bas -> Haut
        for (let y = 1; y < 3; y++) for (let x = 0; x < GCOLS; x++) cells.push({ x, y });
        rect = { x: OX, y: OY + TSZ, w: GCOLS * TSZ, h: 2 * TSZ }; axis = 'h'; curveDir = -1;
      } else if (dir === 2) { // Gauche -> Droite
        for (let x = 0; x < 2; x++) for (let y = 0; y < GROWS; y++) cells.push({ x, y });
        rect = { x: OX, y: OY, w: 2 * TSZ, h: GROWS * TSZ }; axis = 'v'; curveDir = 1;
      } else { // Droite -> Gauche
        for (let x = 1; x < 3; x++) for (let y = 0; y < GROWS; y++) cells.push({ x, y });
        rect = { x: OX + TSZ, y: OY, w: 2 * TSZ, h: GROWS * TSZ }; axis = 'v'; curveDir = -1;
      }

      spawnSwordAttack(cells, K.red, rect, axis, true, curveDir);
    }

    function drawP1BlackHoles(t) {
      const aW = GCOLS * TSZ; const aH = GROWS * TSZ;
      const cx_c = OX + aW / 2; const cy_c = OY + aH / 2;

      const holes = [
        { x: cx_c, y: OY - 35, w: aW * 0.6, h: 15 }, // Haut
        { x: cx_c, y: OY + aH + 35, w: aW * 0.6, h: 15 }, // Bas
        { x: OX - 35, y: cy_c, w: 15, h: aH * 0.6 }, // Gauche
        { x: OX + aW + 35, y: cy_c, w: 15, h: aH * 0.6 } // Droite
      ];

      for (let i = 0; i < holes.length; i++) {
        let h = holes[i];
        cx.save(); cx.translate(h.x, h.y);
        const pulse = Math.sin(t * 5 + i) * 0.2;

        glow(K.blue, 30);
        cx.fillStyle = `rgba(0, 50, 200, ${0.4 + pulse})`;
        cx.beginPath(); cx.ellipse(0, 0, h.w + pulse * 10, h.h + pulse * 10, 0, 0, Math.PI * 2); cx.fill();
        cx.strokeStyle = '#0055FF'; cx.lineWidth = 3;
        cx.beginPath(); cx.ellipse(0, 0, h.w, h.h, 0, 0, Math.PI * 2); cx.stroke();

        glow('#000', 20); cx.fillStyle = '#000';
        cx.beginPath(); cx.ellipse(0, 0, h.w * 0.7, h.h * 0.7, 0, 0, Math.PI * 2); cx.fill();

        noGlow(); cx.restore();
      }
    }
    // ═══════════════════════════════════════════════════════════════
    // PHASE 2 — 9×4, 20s, Patrouilleurs 1x1 et Juges 2x2 "Ne te retourne pas"
    // ═══════════════════════════════════════════════════════════════
    let p2 = {
      timer: 20000,
      smallPatrols: [],
      giantState: 'idle',
      giantTimer: 0,
      backTimer: 0
    };

    function buildP2Arena() {
      GCOLS = 9; GROWS = 4; gSize = 9;
      grid = Array.from({ length: GROWS }, () => Array(GCOLS).fill(T.SOLID));

      // Trou de 2 cases à droite pour les Juges (colonnes 7 et 8)
      for (let y = 0; y < 4; y++) { grid[y][7] = T.VOID; grid[y][8] = T.VOID; }

      traps = []; swordAttacks = []; relayout();

      // Création des 4 patrouilleurs 1x1 (un par ligne, tout à droite sur la colonne 6)
      p2.smallPatrols = [];
      for (let y = 0; y < 4; y++) {
        let speedF = (y % 2 === 0) ? 1 : 2; // 1 sur 2 est deux fois plus lent
        p2.smallPatrols.push({
          x: 6, y: y, px: px2(6), py: py2(y), tx: px2(6), ty: py2(y),
          dx: -1,
          speedFactor: speedF,
          mvT: -2000, // Démarre à -2000ms = attend 2 secondes pleines avant de bouger
          mvI: irng(400, 800) * speedF, // L'intervalle de pause est doublé pour les plus lents
          mvg: false, mT: 0,
          playerWasBehind: false // Mémorise la position du joueur pour le lancer de dés (10%)
        });
      }
    }

    function startP2() {
      bossState = BST.P2; lastSpawn = { x: 0, y: 2 };
      setPhaseHUD('PHASE 2 — LE JUGEMENT'); showTimer(true); setTimer(20);
      p2.timer = 20000; p2.giantState = 'idle'; p2.backTimer = 0;
    }

    function updateP2(dt) {
      if (st === ST.DEAD) return;
      p2.timer -= dt; setTimer(Math.max(0, Math.ceil(p2.timer / 1000)));

      // --- MÉCANIQUE DU REGARD (NE PAS TOURNER LE DOS AUX JUGES) ---
      if (pl.alive && pl.lDir.dx === -1) {
        p2.backTimer += dt;
        if (p2.backTimer >= 2000 && p2.giantState === 'idle') {
          p2.giantState = 'warn'; p2.giantTimer = 500; sfx.alert();
        }
      } else {
        p2.backTimer = 0;
      }

      // --- ÉTATS DES GÉANTS 2x2 ---
      if (p2.giantState === 'warn') {
        p2.giantTimer -= dt;
        if (p2.giantTimer <= 0) {
          p2.giantState = 'fire'; p2.giantTimer = 3000;
          sfx.laser(); addSh(15, 3000);
        }
      } else if (p2.giantState === 'fire') {
        p2.giantTimer -= dt;
        if (pl.alive && pl.inv <= 0 && pl.gx <= 6) { pl.hurt(); }
        if (p2.giantTimer <= 0) { p2.giantState = 'idle'; p2.backTimer = 0; }
      }

      // --- GESTION DES PATROUILLEURS 1x1 (VITESSE + 10% RÉFLEXE) ---
      for (let p of p2.smallPatrols) {
        p.mvT += dt;

        // On regarde si le joueur se trouve dans le dos du patrouilleur
        let isBehind = false;
        if (pl.alive && pl.gy === p.y) {
          if (p.dx === -1 && pl.gx > p.x) isBehind = true;
          if (p.dx === 1 && pl.gx < p.x) isBehind = true;
        }

        // I.A. Réflexe : On ne jette les dés (10%) QU'AU MOMENT où le joueur passe derrière
        if (isBehind && !p.playerWasBehind) {
          if (Math.random() < 0.10) { // 10% de chance !
            p.dx *= -1; // Demi-tour
            p.mvI = irng(400, 800) * p.speedFactor; // Reset timer
            if (!p.mvg) p.mvT = p.mvI; // Le force à bouger instantanément s'il était à l'arrêt
          }
        }
        // On met à jour la mémoire du patrouilleur
        p.playerWasBehind = isBehind;

        // Déplacement classique
        if (!p.mvg && p.mvT >= p.mvI) {
          p.mvT = 0; let nx = p.x + p.dx;
          if (nx < 0 || nx > 6) { p.dx *= -1; nx = p.x + p.dx; p.mvI = irng(400, 800) * p.speedFactor; }
          p.x = nx; p.tx = px2(nx); p.mvg = true; p.mT = 0;
        }
        if (p.mvg) {
          p.mT += dt;
          // 300ms de base, doublé à 600ms si c'est un patrouilleur "lent" (speedFactor=2)
          let r = Math.min(p.mT / (300 * p.speedFactor), 1);
          p.px = lerp(p.px, p.tx, r);
          if (r >= 1) p.mvg = false;
        }

        // Collision
        if (pl.alive && pl.inv <= 0 && Math.hypot(pl.px - p.px, pl.py - p.py) < TSZ * 0.4) {
          ono('INTERCEPTÉ!', pl.px, pl.py - 20, K.red); pl.hurt();
        }
      }

      // TRANSITION VERS P3
      if (p2.timer <= 0) {
        startTransition(2, 3, () => {
          setDownload(33.3, 2); buildP3Arena(); lastSpawn = { x: 2, y: 2 }; pl.reset(2, 2); pl.inv = 1800; bossState = BST.P3;
          setPhaseHUD('PHASE 3 — POURSUITE'); p3.timer = 30000; p3.portalCD = 0;
          sfx.power(); pageFlip('PHASE 3', 'POURSUITE — 5×5', null);
        });
      }
    }

    function drawP2Elements(t) {
      // 1. Dessin des petits patrouilleurs 1x1
      for (let p of p2.smallPatrols) {
        cx.save(); cx.translate(p.px, p.py + Math.sin(t * 8 + p.y) * 3);
        glow(K.red, 15); cx.fillStyle = '#0a0514'; cx.strokeStyle = K.red; cx.lineWidth = 2;
        let s = TSZ * 0.35;
        cx.beginPath(); cx.moveTo(-s, 0); cx.lineTo(0, -s); cx.lineTo(s, 0); cx.lineTo(0, s); cx.closePath();
        cx.fill(); cx.stroke();
        cx.fillStyle = '#f00'; cx.beginPath(); cx.arc(p.dx * 5, 0, 4, 0, Math.PI * 2); cx.fill();
        cx.restore(); noGlow();
      }

      // 2. Dessin des deux Juges Géants 2x2 (à droite)
      for (let i = 0; i < 2; i++) {
        let cy = OY + (i * 2 + 1) * TSZ; // Centre sur lignes 0-1 et 2-3
        let cx_p = OX + 7.5 * TSZ;     // Centre sur colonnes 7-8
        cx.save(); cx.translate(cx_p, cy + Math.sin(t * 3 + i) * 5);

        // L'œil devient rouge si le joueur tourne le dos, vert s'il regarde
        let lookingAtThem = (pl.lDir.dx !== -1);
        let col = p2.giantState === 'fire' ? '#FFF' : (p2.giantState === 'warn' ? '#FF003C' : (lookingAtThem ? '#00FF41' : '#FF003C'));

        glow(col, 30); cx.fillStyle = '#05000a'; cx.strokeStyle = col; cx.lineWidth = 4;
        let s = TSZ * 0.9;
        cx.beginPath(); cx.moveTo(-s, -s * 0.5); cx.lineTo(-s * 0.5, -s); cx.lineTo(s * 0.5, -s); cx.lineTo(s, -s * 0.5);
        cx.lineTo(s, s * 0.5); cx.lineTo(s * 0.5, s); cx.lineTo(-s * 0.5, s); cx.lineTo(-s, s * 0.5);
        cx.closePath(); cx.fill(); cx.stroke();

        // Œil dirigé vers la gauche
        cx.fillStyle = col; cx.beginPath(); cx.arc(-s * 0.4, 0, s * 0.2, 0, Math.PI * 2); cx.fill();
        cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(-s * 0.4 - 5, 0, s * 0.08, 0, Math.PI * 2); cx.fill();

        if (p2.giantState === 'warn' || (!lookingAtThem && p2.giantState === 'idle')) {
          cx.fillStyle = '#FF003C'; cx.font = `bold ${TSZ * 0.6}px Orbitron`; cx.textAlign = 'center';
          cx.fillText('!', 0, -s - 10);
        }
        cx.restore(); noGlow();
      }

      // 3. Dessin des Lasers Massifs (Warn ou Fire)
      if (p2.giantState === 'warn' || p2.giantState === 'fire') {
        let prog = p2.giantState === 'warn' ? p2.giantTimer / 500 : 1;
        cx.save(); cx.globalCompositeOperation = 'screen';
        let lw = 7 * TSZ; let lh = 4 * TSZ;
        let lx = OX; let ly = OY;

        if (p2.giantState === 'warn') {
          cx.fillStyle = `rgba(255, 0, 60, ${0.1 + (1 - prog) * 0.2})`; cx.fillRect(lx, ly, lw, lh);
          cx.strokeStyle = `rgba(255, 0, 60, ${0.5 + (1 - prog) * 0.5})`; cx.lineWidth = 2;
          for (let i = 0; i < 4; i++) { cx.beginPath(); cx.moveTo(lx, ly + (i + 0.5) * TSZ); cx.lineTo(lx + lw, ly + (i + 0.5) * TSZ); cx.stroke(); }
        } else {
          glow(K.red, 40); cx.fillStyle = `rgba(255, 0, 60, ${0.6 + Math.random() * 0.3})`; cx.fillRect(lx, ly, lw, lh);
          cx.fillStyle = '#FFF'; cx.globalAlpha = 0.8; cx.fillRect(lx, ly + Math.random() * 10, lw, lh - 20);
        }
        cx.restore(); noGlow();
      }
    }
    // ═══════════════════════════════════════════════════════════════
    // PHASE 3 — 5x5, 30s, Portails latéraux et Patrouilleur 3x3 GÉANT (+200% Vitesse)
    // ═══════════════════════════════════════════════════════════════
    let p3 = {
      timer: 30000,
      patrol: null,
      portalCD: 0
    };

    function buildP3Arena() {
      GCOLS = 5; GROWS = 5; gSize = 5;
      grid = Array.from({ length: GROWS }, () => Array(GCOLS).fill(T.SOLID));
      traps = []; swordAttacks = []; relayout();

      // Portails uniquement sur les bords gauche et droite
      grid[2][0] = T.PORTAL;
      grid[2][4] = T.PORTAL;

      // Patrouilleur Géant 3x3 (+200% de vitesse)
      // Sur une grille 5x5, un monstre 3x3 prend presque tout l'écran !
      p3.patrol = {
        gx: 1, gy: 1,
        px: px2(1) + TSZ, py: py2(1) + TSZ, // Centre d'un carré 3x3
        tx: px2(1) + TSZ, ty: py2(1) + TSZ,
        dir: { dx: 1, dy: 0 }, mvT: 0, mvI: 500, mvg: false, mT: 0, // mvI: 100 = 3x plus rapide que la base
        state: 'patrol'
      };
    }

    function startP3() {
      bossState = BST.P3; lastSpawn = { x: 2, y: 2 };
      setPhaseHUD('PHASE 3 — POURSUITE COLOSSALE'); showTimer(true); setTimer(30);
      p3.timer = 30000; p3.portalCD = 0;
    }

    function updateP3(dt) {
      if (st === ST.DEAD) return;
      p3.timer -= dt; setTimer(Math.max(0, Math.ceil(p3.timer / 1000)));

      // --- PORTAILS ---
      if (p3.portalCD > 0) p3.portalCD -= dt;
      if (grid[pl.gy]?.[pl.gx] === T.PORTAL && !pl.mv && p3.portalCD <= 0) {
        if (pl.gx === 0) { pl.gx = 4; pl.px = px2(4); }
        else if (pl.gx === 4) { pl.gx = 0; pl.px = px2(0); }
        pl.tx = pl.px; p3.portalCD = 1000;
        sfx.portal(); burst(pl.px, pl.py, K.gold, 20, 5, 400); ono('WARP!', pl.px, pl.py - 20, K.gold);
      }

      // --- PATROUILLEUR 3x3 EXTRÊMEMENT RAPIDE (+200% vitesse) ---
      let p = p3.patrol;
      if (p) {
        // Fonction pour vérifier si un bloc de 3x3 cases est libre
        function canMove3x3(nx, ny) {
          for (let y = 0; y < 3; y++) {
            for (let x = 0; x < 3; x++) {
              if (!solid(nx + x, ny + y)) return false;
            }
          }
          return true;
        }

        p.mvT += dt;
        if (!p.mvg && p.mvT >= p.mvI) {
          p.mvT = 0;
          let nx = p.gx + p.dir.dx, ny = p.gy + p.dir.dy;

          if (!canMove3x3(nx, ny)) {
            // Rotation immédiate s'il tape un mur
            const dirs = [{ dx: 1, dy: 0 }, { dx: 0, dy: 1 }, { dx: -1, dy: 0 }, { dx: 0, dy: -1 }];
            let idx = dirs.findIndex(d => d.dx === p.dir.dx && d.dy === p.dir.dy);
            p.dir = dirs[(idx + 1) % 4];
          } else {
            p.gx = nx; p.gy = ny;
            p.tx = px2(nx) + TSZ; p.ty = py2(ny) + TSZ; // On centre sur 3x3
            p.mvg = true; p.mT = 0;
          }
        }

        if (p.mvg) {
          p.mT += dt;
          let r = Math.min(p.mT / 200, 1); // 200ms au lieu de 30ms
          p.px = lerp(p.px, p.tx, r);
          p.py = lerp(p.py, p.ty, r);
          if (r >= 1) p.mvg = false;
        }

        // Collision 3x3 fatale
        if (pl.alive && pl.inv <= 0) {
          // Si le joueur se trouve n'importe où dans le carré de 3x3
          if (pl.gx >= p.gx && pl.gx <= p.gx + 2 && pl.gy >= p.gy && pl.gy <= p.gy + 2) {
            pl.hurt(); ono('ÉCRASÉ!', pl.px, pl.py - 20, K.red);
          }
        }
      }

      // FIN DE LA PHASE 3 -> REDIRECTION VERS PARTIE 2
      if (p3.timer <= 0) {
        window.location.href = 'boss50_partie2.html';
      }
    }

    function drawP3Elements(t) {
      // Dessin des Portails
      for (let y = 0; y < GROWS; y++) {
        for (let x = 0; x < GCOLS; x++) {
          if (grid[y][x] === T.PORTAL) {
            const px = OX + x * TSZ + TSZ / 2, py = OY + y * TSZ + TSZ / 2;
            cx.save(); cx.translate(px, py);
            const pulse = 0.5 + Math.sin(t * 4 + x + y) * 0.5;
            glow(K.gold, 15 * pulse); cx.fillStyle = `rgba(255, 215, 0, ${0.18 * pulse})`;
            cx.fillRect(-TSZ * 0.4, -TSZ * 0.4, TSZ * 0.8, TSZ * 0.8);
            cx.font = `bold ${TSZ * 0.42}px Orbitron`; cx.textAlign = 'center'; cx.textBaseline = 'middle';
            cx.fillStyle = K.gold; cx.fillText('⬡', 0, 0); noGlow(); cx.restore();
          }
        }
      }

      // Dessin du Patrouilleur COLOSSAL (3x3)
      let p = p3.patrol;
      if (p) {
        cx.save(); cx.translate(p.px, p.py + Math.sin(t * 20) * 8); // Tremblement de rage lourd
        glow('#FF003C', 50);
        let s = TSZ * 1.35; // Rayon adapté pour couvrir ~3 cases
        cx.fillStyle = '#0a0002'; cx.strokeStyle = '#FF003C'; cx.lineWidth = 6;
        cx.beginPath(); cx.moveTo(-s, -s * 0.5); cx.lineTo(-s * 0.5, -s); cx.lineTo(s * 0.5, -s); cx.lineTo(s, -s * 0.5);
        cx.lineTo(s, s * 0.5); cx.lineTo(s * 0.5, s); cx.lineTo(-s * 0.5, s); cx.lineTo(-s, s * 0.5);
        cx.closePath(); cx.fill(); cx.stroke();

        cx.fillStyle = K.gold; cx.beginPath(); cx.arc(0, 0, s * 0.4, 0, Math.PI * 2); cx.fill();
        cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(p.dir.dx * 25, p.dir.dy * 25, s * 0.15, 0, Math.PI * 2); cx.fill();
        noGlow(); cx.restore();
      }
    }

    function startDialogue(dlgs, cb) {
      isDialogActive2 = true; currentDialogues = dlgs; diagIdx = 0; onDiagEnd = cb;
      const box = document.getElementById('dialog-box'); document.getElementById('dialog-choices').style.display = 'none'; document.getElementById('dialog-hint').style.display = ''; box.classList.add('show'); showNextDialogue();

      const d = currentDialogues[diagIdx]; document.getElementById('dialog-name').textContent = d.name; document.getElementById('dialog-name').style.color = d.color || K.red;

    // ═══ MAIN UPDATE
    function update(ts) {
      const dt = Math.min(ts - lastT, 50); lastT = ts; bT += dt; globalTime = ts;
      for (const s of shakes) s.t += dt; shakes = shakes.filter(s => s.t < s.d);
      for (const p of parts) { p.x += p.vx * (dt / 16); p.y += p.vy * (dt / 16); p.vy += p.g * (dt / 16); p.life = Math.max(0, p.life - dt); }
      parts = parts.filter(p => p.life > 0);
      if (bossState === BST.TRANS) { transState.t += dt; if (transState.t >= transState.dur && transState.active) { transState.active = false; const cb = transState.cb; transState.cb = null; if (cb) cb(); } return; }
      if (st === ST.DEAD) return;
      if (!isDialogActive2) {
        if (bossState === BST.P1) { pl.update(dt); updateP1(dt); }
        else if (bossState === BST.P2) { pl.update(dt); updateP2(dt); }
        else if (bossState === BST.P3) { pl.update(dt); updateP3(dt); }
      } else { pl.update(dt * .04); }
    }


    // ═══ MAIN DRAW
    function draw() {
      const t = globalTime / 1000; cx.clearRect(0, 0, W, H);

      // Déduction de la phase actuelle (1, 2 ou 3)
      const phNum = bossState === BST.P2 ? 2 : (bossState === BST.P3 ? 3 : 1);

      if (bossState === BST.TRANS) {
        drawBackground(t, phNum);
        drawTransGlitch();
        drawParts();
        return;
      }

      const sk = getSh(); cx.save(); cx.translate(sk.x, sk.y);

      // 1. Fond et décor cathédrale
      drawBackground(t, phNum);

      // 2. Cendres magiques
      embers.spawn(phNum); embers.spawn(phNum);
      embers.updateAndDraw(t, phNum);

      // 3. Le Boss
      if (bossState !== BST.INTRO) {
        drawTheSovereign(t, phNum);
      }

      // 4. L'arène par dessus
      // 4. L'arène par dessus
      if (bossState === BST.P1) { drawArena(t); drawP1BlackHoles(t); drawSwordAttacks(); if (pl.alive) pl.draw(cx, globalTime, TSZ); }
      else if (bossState === BST.P2) { drawArena(t); drawP2Elements(t); if (pl.alive) pl.draw(cx, globalTime, TSZ); }
      else if (bossState === BST.P3) { drawArena(t); drawP3Elements(t); if (pl.alive) pl.draw(cx, globalTime, TSZ); }

      drawParts(); cx.restore();
    }

    // ═══ INPUT
    const dirKeys = { ArrowUp: { dx: 0, dy: -1 }, ArrowDown: { dx: 0, dy: 1 }, ArrowLeft: { dx: -1, dy: 0 }, ArrowRight: { dx: 1, dy: 0 }, KeyW: { dx: 0, dy: -1 }, KeyS: { dx: 0, dy: 1 }, KeyA: { dx: -1, dy: 0 }, KeyD: { dx: 1, dy: 0 }, KeyZ: { dx: 0, dy: -1 }, KeyQ: { dx: -1, dy: 0 } };
    document.addEventListener('keydown', e => {
      unlockAudio();
      if (isDialogActive2) { if (e.code === 'Space' || e.code === 'Enter') { showNextDialogue(); e.preventDefault(); } return; }
      if (bossState === BST.END || st === ST.DEAD) return;
      if (bossState !== BST.TRANS) {
        if (dirKeys[e.code]) { if (!pl.iq || !pl.mv) { pl.iq = dirKeys[e.code]; pl.lDir = dirKeys[e.code]; } }
        if (e.code === 'Space') pl.tryDash();
        if (e.code === 'KeyV') pl.tryClone();
      }
      e.preventDefault();
    });
    window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    cv.addEventListener('mousedown', e => {
      unlockAudio();
      if (isDialogActive2 && e.button === 0) { showNextDialogue(); e.preventDefault(); return; }
      if (e.button === 0) lmb = true;
      if (e.button === 2) { rmb = true; e.preventDefault(); }
    });
    cv.addEventListener('mouseup', e => { if (e.button === 0) lmb = false; if (e.button === 2) rmb = false; });
    cv.addEventListener('contextmenu', e => e.preventDefault());


    // ═══ LOOP & BOOT
    function loop(ts) { update(ts); draw(); requestAnimationFrame(loop); }
    resize(); buildP1Arena(); pl.reset(1, 1); pl.inv = 1800;
    loadState();
    lives = maxLives; // <-- Force la vie au maximum au lancement
    updateLivesHUD();
    document.getElementById('boss-hud').style.opacity = '1';
    pageFlip('N·E·A·N', 'LE NÉANT FINAL — PALIER 50', () => { bossState = BST.INTRO; setTimeout(() => startIntroDiag(), 200); });
    requestAnimationFrame(loop);
  </script>
</body>

</html>
