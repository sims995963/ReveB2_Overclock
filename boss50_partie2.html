<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ReveB 2 — N·E·A·N — Phases 4-5-6</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bangers&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            background: #010002;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Share Tech Mono', monospace;
            color: #fff;
            cursor: crosshair
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1
        }

        #crt {
            position: fixed;
            inset: 0;
            z-index: 90;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, .22) 50%), linear-gradient(90deg, rgba(255, 0, 60, .04), rgba(138, 43, 226, .025), rgba(255, 0, 60, .03));
            background-size: 100% 2px, 3px 100%;
            opacity: .55
        }

        #vignette {
            position: fixed;
            inset: 0;
            z-index: 89;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0, 0, 10, .7) 80%, #000 120%)
        }

        #fx {
            position: fixed;
            inset: 0;
            z-index: 88;
            opacity: 0;
            pointer-events: none;
            transition: opacity .05s
        }

        #tr {
            position: fixed;
            inset: 0;
            z-index: 95;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity .12s
        }

        #tr.show {
            opacity: 1
        }

        .th {
            flex: 1;
            position: relative;
            overflow: hidden
        }

        .th:first-child {
            background: linear-gradient(135deg, #130005, #010002);
            border-bottom: 2px solid rgba(255, 0, 60, .7);
            transition: transform .4s cubic-bezier(.86, 0, .07, 1)
        }

        .th:last-child {
            background: linear-gradient(135deg, #0d0015, #010002);
            border-top: 2px solid rgba(138, 43, 226, .7);
            transition: transform .4s cubic-bezier(.86, 0, .07, 1) .04s
        }

        #tr.open .th:first-child {
            transform: translateY(-100%)
        }

        #tr.open .th:last-child {
            transform: translateY(100%)
        }

        .tt {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-weight: 900;
            font-size: clamp(1.3rem, 3.8vw, 2.5rem);
            letter-spacing: .15em;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 25px #FF003C
        }

        .tt span {
            display: block;
            font-size: .36em;
            letter-spacing: .3em;
            opacity: .6;
            margin-top: .3em;
            color: #FF003C
        }

        .ono {
            position: fixed;
            font-family: 'Bangers', cursive;
            font-weight: 900;
            pointer-events: none;
            z-index: 85;
            letter-spacing: .04em;
            white-space: pre;
            line-height: 1;
            text-align: center;
            animation: oA .85s cubic-bezier(.22, 1, .36, 1) forwards;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 0 0 14px currentColor
        }

        @keyframes oA {
            0% {
                opacity: 1;
                transform: scale(.25)
            }

            18% {
                opacity: 1;
                transform: scale(1.35)
            }

            55% {
                opacity: 1;
                transform: scale(1)
            }

            100% {
                opacity: 0;
                transform: scale(.85) translateY(-38px)
            }
        }

        #dl-bar-wrap {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 7px;
            z-index: 20;
            pointer-events: none;
            background: #0a0002
        }

        #dl-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #550000, #FF003C, #FF4444);
            box-shadow: 0 0 12px #FF003C;
            transition: width .5s
        }

        #dl-label {
            position: fixed;
            top: 9px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 9px;
            letter-spacing: .15em;
            color: #FF003C;
            text-shadow: 0 0 8px #FF003C;
            font-family: 'Orbitron', monospace;
            pointer-events: none;
            text-align: center;
            white-space: nowrap
        }

        #boss-hud {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            pointer-events: none;
            text-align: center;
            min-width: 280px;
            opacity: 0;
            transition: opacity .5s
        }

        #boss-nm {
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: .25em;
            margin-bottom: 5px;
            color: #FF003C;
            text-shadow: 0 0 18px #FF003C
        }

        #boss-ph {
            font-size: 9px;
            color: rgba(255, 0, 60, .55);
            letter-spacing: .14em
        }

        #chrono {
            position: fixed;
            top: 24px;
            right: 18px;
            z-index: 20;
            font-family: 'Orbitron', monospace;
            font-size: 26px;
            font-weight: 900;
            color: #FF003C;
            text-shadow: 0 0 20px #FF003C;
            letter-spacing: .05em;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none
        }

        #lives-hud {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(15, 0, 5, 0.85);
            border: 2px solid #FF003C;
            padding: 6px 12px;
            display: flex;
            gap: 6px;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.4), inset 0 0 10px rgba(255, 0, 60, 0.2);
            border-radius: 3px;
        }

        .heart {
            color: #FF003C;
            font-size: 18px;
            text-shadow: 0 0 8px #FF003C;
        }

        .heart.empty {
            color: rgba(255, 0, 60, 0.2);
            /* Cœur grisé quand on perd de la vie */
            text-shadow: none;
        }

        #shield-hud {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            pointer-events: none;
            text-align: center;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            color: #00F5FF;
            text-shadow: 0 0 10px #00F5FF;
            letter-spacing: .12em;
            opacity: 0;
            transition: opacity .3s
        }

        #dialog-box {
            position: fixed;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: min(90vw, 680px);
            background: rgba(1, 0, 2, .97);
            border: 2px solid #FF003C;
            border-radius: 4px;
            padding: 18px 26px;
            z-index: 98;
            display: none;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(255, 0, 60, .5), inset 0 0 15px rgba(255, 0, 60, .08)
        }

        #dialog-box.show {
            display: flex;
            animation: fadeup .3s ease-out
        }

        @keyframes fadeup {
            from {
                opacity: 0;
                transform: translate(-50%, 15px)
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0)
            }
        }

        #dialog-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 17px;
            font-weight: 900;
            letter-spacing: .1em;
            margin-bottom: 11px;
            text-shadow: 0 0 12px currentColor
        }

        #dialog-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            line-height: 1.65;
            color: #ff9999;
            min-height: 50px;
            white-space: pre-wrap
        }

        #dialog-choices {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-top: 14px
        }

        #dialog-hint {
            align-self: flex-end;
            font-size: 9px;
            color: #556;
            margin-top: 12px;
            letter-spacing: .1em;
            animation: blink 1.5s infinite
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        .choice-btn {
            padding: 10px 18px;
            background: rgba(1, 0, 2, .9);
            border: 1px solid #FF003C;
            color: #FF003C;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: .08em;
            cursor: pointer;
            transition: all .2s;
            text-align: left
        }

        .choice-btn:hover {
            background: rgba(255, 0, 60, .1);
            box-shadow: 0 0 14px rgba(255, 0, 60, .4);
            transform: translateX(3px)
        }

        #p8-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            background: rgba(1, 0, 2, .97)
        }

        #p8-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(13px, 2.2vw, 24px);
            font-weight: 900;
            color: #FF003C;
            text-shadow: 0 0 25px #FF003C;
            letter-spacing: .18em;
            text-align: center
        }

        #p8-bar-wrap {
            width: min(580px, 90vw);
            height: 22px;
            background: #110000;
            border: 2px solid #FF003C;
            box-shadow: 0 0 20px rgba(255, 0, 60, .4);
            position: relative;
            overflow: hidden
        }

        #p8-bar {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #550000, #FF003C, #FF4444);
            box-shadow: 0 0 15px #FF003C;
            transition: width .1s
        }

        #p8-bar-lbl {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            letter-spacing: .1em;
            color: #fff;
            pointer-events: none
        }

        #p8-desc {
            font-size: 11px;
            color: #885555;
            letter-spacing: .06em;
            text-align: center;
            max-width: 500px;
            line-height: 1.6
        }

        #p8-btn {
            padding: 18px 48px;
            background: transparent;
            border: 3px solid #FF003C;
            color: #FF003C;
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: .2em;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 60, .4);
            transition: all .1s;
            user-select: none
        }

        #p8-btn:active {
            background: rgba(255, 0, 60, .2);
            transform: scale(.97)
        }

        #p8-chrono {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            color: #888;
            letter-spacing: .1em
        }

        #death-menu {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 10, .97);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center
        }

        #death-menu.show {
            display: flex
        }

        .ebtn {
            display: block;
            width: min(420px, 88vw);
            padding: 16px 24px;
            margin: 7px 0;
            background: rgba(0, 0, 0, .85);
            border: 1px solid currentColor;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            letter-spacing: .09em;
            cursor: pointer;
            transition: background .2s, box-shadow .2s, transform .1s;
            text-align: left
        }

        .ebtn:hover {
            background: rgba(255, 255, 255, .04);
            box-shadow: 0 0 24px currentColor;
            transform: translateX(4px)
        }

        .ebtn span {
            display: block;
            font-size: 10px;
            opacity: .4;
            margin-top: 4px;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: .04em
        }

        .ebtn-r {
            color: #FF003C;
            border-color: rgba(255, 0, 60, .4)
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="crt"></div>
    <div id="vignette"></div>
    <div id="fx"></div>
    <div id="tr">
        <div class="th">
            <div class="tt" id="t1"></div>
        </div>
        <div class="th">
            <div class="tt" id="t2"></div>
        </div>
    </div>
    <div id="dl-bar-wrap">
        <div id="dl-bar"></div>
    </div>
    <div id="dl-label">TÉLÉCHARGEMENT EN COURS… 0%</div>
    <div id="boss-hud">
        <div id="boss-nm">N·E·A·N — LE NÉANT FINAL</div>
        <div id="boss-ph">INITIALISATION…</div>
    </div>
    <div id="chrono">20</div>
    <div id="lives-hud"></div>
    <div id="shield-hud">BOUCLIERS: 0/5</div>
    <div id="dialog-box">
        <div id="dialog-name"></div>
        <div id="dialog-text"></div>
        <div id="dialog-choices"></div>
        <div id="dialog-hint">[ ESPACE / CLIC POUR CONTINUER ]</div>
    </div>
    <div id="death-menu">
        <h1
            style="color:#FF003C;font-family:'Orbitron',sans-serif;font-size:clamp(26px,5vw,54px);margin-bottom:10px;text-shadow:0 0 30px #FF003C;font-weight:900">
            SYSTÈME DÉTRUIT</h1>
        <p
            style="color:#554;font-family:'Share Tech Mono',monospace;font-size:15px;margin-bottom:40px;letter-spacing:.1em">
            Le Néant a consumé votre processeur.</p>
        <button class="ebtn ebtn-r" onclick="restartGame()">[ RECOMMENCER ]<span>Relancer depuis la Phase
                1.</span></button>
    </div>
    <script src="menu/succes_global.js"></script>
    <script>


        // ─── MUSIQUE CONTINUE DU NÉANT (RELAIS INTER-PHASES) ───
        const bgm = new Audio("music/boss50.mp3");
        bgm.loop = true;
        bgm.volume = 1;

        // On récupère le temps de la phase précédente
        const savedBgmTime = sessionStorage.getItem('boss50_bgm_time');
        if (savedBgmTime) {
            bgm.currentTime = parseFloat(savedBgmTime);
            // On tente de relancer automatiquement (les navigateurs l'autorisent souvent entre deux pages du même site)
            bgm.play().catch(() => { });
        }

        // On sauvegarde la position de la musique en temps réel (toutes les 100ms)
        setInterval(() => {
            if (!bgm.paused) sessionStorage.setItem('boss50_bgm_time', bgm.currentTime);
        }, 100);
        // ───────────────────────────────────────────────────────

        // ═══ JOUEUR.JS INLINÉ ═══
        "use strict";

        // ═══ LE VAISSEAU DE SPARKY ═══
        class Joueur {
            constructor() {
                this.px = W / 2;
                this.py = H * 0.8;
                this.vx = 0; this.vy = 0;
                this.alive = true;
                this.inv = 0;
                this.rot = 0;
                this.hurtT = 0;
                this.stunT = 0;

                // NOUVEAU : Bouclier personnel
                this.shieldT = 0;  // Temps d'activation
                this.shieldCD = 0; // Temps de recharge

                this.trail = [];
            }

            hurt() {
                // Le bouclier annule totalement les dégâts !
                if (!this.alive || this.inv > 0 || this.shieldT > 0) return;

                if (typeof lives !== 'undefined') {
                    lives--;
                    if (typeof updateLivesHUD === 'function') updateLivesHUD();
                }

                this.hurtT = 500;
                this.inv = 1500;
                if (typeof sfx !== 'undefined' && sfx.hit) sfx.hit();

                burst(this.px, this.py, '#FF003C', 15, 4, 300);
                addSh(12, 300);
                fScr('#FF003C', 150);

                if (typeof lives !== 'undefined' && lives <= 0) { this.die(); }
            }

            die() {
                if (!this.alive) return;
                this.alive = false;
                if (typeof addGlobalDeath === 'function') addGlobalDeath();

                if (typeof sfx !== 'undefined' && sfx.die) sfx.die();
                burst(this.px, this.py, '#00F5FF', 60, 10, 1000);
                ring(this.px, this.py, '#00F5FF', 150);
                addSh(25, 600);
                fScr('#FF003C', 300);

                let dm = document.getElementById('death-menu');
                if (dm) dm.classList.add('show');
                if (typeof st !== 'undefined' && typeof ST !== 'undefined') st = ST.DEAD;
            }

            update(dt, now) {
                if (!this.alive) return;

                // GESTION DU BOUCLIER
                if (this.shieldT > 0) this.shieldT -= dt;
                if (this.shieldCD > 0) this.shieldCD -= dt;

                // Activation du bouclier (Clic droit 'rmb')
                if (typeof rmb !== 'undefined' && rmb && this.shieldCD <= 0 && this.stunT <= 0) {
                    this.shieldT = 3000;   // 3 secondes d'activation
                    this.shieldCD = 10000; // 10 secondes de cooldown
                    if (typeof sfx.shield === 'function') sfx.shield();
                }

                if (this.stunT > 0) {
                    this.stunT -= dt;
                    this.vx *= 0.85; this.vy *= 0.85;
                } else {
                    const speed = 1.2;
                    let dx = 0, dy = 0;
                    if (window.shipKeys) {
                        if (window.shipKeys['ArrowUp'] || window.shipKeys['KeyW']) dy -= speed;
                        if (window.shipKeys['ArrowDown'] || window.shipKeys['KeyS']) dy += speed;
                        if (window.shipKeys['ArrowLeft'] || window.shipKeys['KeyA']) dx -= speed;
                        if (window.shipKeys['ArrowRight'] || window.shipKeys['KeyD']) dx += speed;
                    }
                    this.vx += dx; this.vy += dy;
                    this.vx *= 0.90; this.vy *= 0.90;

                    if (typeof mx !== 'undefined' && typeof my !== 'undefined' && !isNaN(mx) && !isNaN(my)) {
                        this.rot = Math.atan2(my - this.py, mx - this.px);
                    }
                }

                this.px += this.vx; this.py += this.vy;
                this.px = Math.max(25, Math.min(W - 25, this.px));
                this.py = Math.max(25, Math.min(H - 25, this.py));

                if (this.inv > 0) this.inv -= dt;
                if (this.hurtT > 0) this.hurtT -= dt;

                if (Math.abs(this.vx) > 0.5 || Math.abs(this.vy) > 0.5) {
                    this.trail.push({ x: this.px, y: this.py, rot: this.rot, life: 150, ml: 150 });
                }
                for (let tr of this.trail) tr.life -= dt;
                this.trail = this.trail.filter(t => t.life > 0);
            }

            draw(cx, now) {
                if (!this.alive) return;

                let shakeX = 0, shakeY = 0;
                if (this.hurtT > 0) { shakeX = Math.sin(now * 0.08) * 5; shakeY = Math.cos(now * 0.08) * 5; }

                for (let tr of this.trail) {
                    let alpha = Math.max(0, tr.life / tr.ml) * 0.4;
                    cx.save(); cx.translate(tr.x + shakeX, tr.y + shakeY); cx.rotate(tr.rot);
                    cx.globalAlpha = alpha; cx.fillStyle = '#00F5FF'; cx.shadowColor = '#00F5FF'; cx.shadowBlur = 10;
                    cx.beginPath(); cx.moveTo(-10, 0); cx.lineTo(-30, 12); cx.lineTo(-20, 0); cx.lineTo(-30, -12); cx.closePath(); cx.fill(); cx.restore();
                }

                cx.save();
                cx.translate(this.px + shakeX, this.py + shakeY);
                cx.rotate(this.rot);

                let isFlashing = (this.inv > 0 && Math.floor(now / 100) % 2 === 0);
                let mainCol = isFlashing ? '#FFFFFF' : '#00F5FF';
                let darkCol = isFlashing ? '#AAAAAA' : '#051122';
                let wingCol = isFlashing ? '#EEEEEE' : '#0088AA';

                if (this.stunT > 0) {
                    mainCol = '#555555'; darkCol = '#222222'; wingCol = '#444444';
                    if (Math.floor(now / 50) % 2 === 0) cx.translate(Math.random() * 4 - 2, Math.random() * 4 - 2);
                }

                if (this.stunT <= 0 && (Math.abs(this.vx) > 0.5 || Math.abs(this.vy) > 0.5)) {
                    cx.fillStyle = '#FF003C'; cx.shadowColor = '#FF003C'; cx.shadowBlur = 20;
                    cx.beginPath(); let flameLen = 25 + Math.random() * 20;
                    cx.moveTo(-15, 6); cx.lineTo(-15 - flameLen, 0); cx.lineTo(-15, -6); cx.closePath(); cx.fill(); cx.shadowBlur = 0;
                }

                cx.fillStyle = darkCol; cx.strokeStyle = wingCol; cx.lineWidth = 2;
                cx.beginPath(); cx.moveTo(-5, 0); cx.lineTo(-20, 25); cx.lineTo(5, 25); cx.lineTo(15, 0); cx.lineTo(5, -25); cx.lineTo(-20, -25); cx.closePath(); cx.fill(); cx.stroke();

                cx.fillStyle = darkCol; cx.strokeStyle = mainCol; cx.lineWidth = 2.5; cx.shadowColor = mainCol; cx.shadowBlur = this.stunT > 0 ? 0 : 15;
                cx.beginPath(); cx.moveTo(35, 0); cx.lineTo(0, 12); cx.lineTo(-15, 0); cx.lineTo(0, -12); cx.closePath(); cx.fill(); cx.stroke(); cx.shadowBlur = 0;

                cx.fillStyle = this.stunT > 0 ? '#333333' : 'rgba(255, 255, 255, 0.8)';
                cx.beginPath(); cx.moveTo(20, 0); cx.lineTo(5, 5); cx.lineTo(-5, 0); cx.lineTo(5, -5); cx.closePath(); cx.fill();

                cx.strokeStyle = mainCol; cx.lineWidth = 1.5;
                cx.beginPath(); cx.moveTo(0, 15); cx.lineTo(-10, 22); cx.stroke();
                cx.beginPath(); cx.moveTo(0, -15); cx.lineTo(-10, -22); cx.stroke();
                cx.restore();

                // DESSIN DU BOUCLIER (Clic Droit)
                if (this.shieldT > 0) {
                    cx.save(); cx.translate(this.px + shakeX, this.py + shakeY);
                    glow('#00FF41', 20);
                    cx.fillStyle = 'rgba(0, 255, 65, 0.15)';
                    cx.beginPath(); cx.arc(0, 0, 45 + Math.random() * 5, 0, Math.PI * 2); cx.fill();
                    cx.strokeStyle = '#00FF41'; cx.lineWidth = 3; cx.stroke();
                    cx.restore(); noGlow();
                }

                // JAUGE DE COOLDOWN DU BOUCLIER
                if (this.shieldCD > 0 && this.shieldT <= 0) {
                    cx.save(); cx.translate(this.px + shakeX, this.py + shakeY);
                    cx.beginPath(); cx.arc(0, 0, 55, -Math.PI / 2, -Math.PI / 2 + (1 - this.shieldCD / 10000) * Math.PI * 2);
                    cx.strokeStyle = 'rgba(0, 255, 65, 0.4)'; cx.lineWidth = 3; cx.stroke();
                    cx.restore();
                }

                if (this.inv > 0 && this.hurtT <= 0 && this.shieldT <= 0) {
                    const invRatio = Math.min(1, this.inv / 500); const TSZ = 45;
                    cx.save(); cx.globalAlpha = invRatio * 0.7; cx.translate(this.px, this.py); cx.rotate(now / 400);

        // PHASE 4 — DOUBLE CONDUIT 3×11, 20s, tapis roulant + météorites
        // ═══════════════════════════════════════════════════════════════
        // --- LOGIQUE PHASE 4 : LA SINGULARITÉ ---
        let p4 = {
            hp: 2000,
            maxHp: 2000,
            asteroids: [],
            bullets: [],
            lastFire: 0,
            astSpawnT: 0
        };

        function buildP4Arena() {
            GCOLS = 3; GROWS = 11; gSize = 11; grid = Array.from({ length: GROWS }, () => Array(GCOLS).fill(T.CONV));
            grid[0] = Array(GCOLS).fill(T.HOLE); grid[10] = Array(GCOLS).fill(T.VOID);
            traps = []; swordAttacks = []; p4.meteorites = []; p4.portalUnlocked = false; p4.portalTriggered = false; relayoutP4();
        }
        function updateP4(dt) {
            const bX = W / 2, bY = H / 2; // Le trou noir est bien au centre

            // 1. GRAVITÉ DU TROU NOIR
            const dx = bX - pl.px;
            const dy = bY - pl.py;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 10) {
                const gravityForce = 0.35; // Aspiration
                pl.vx += (dx / dist) * gravityForce;
                pl.vy += (dy / dist) * gravityForce;
            }

            // 2. MORT SI ENGLOUTI PAR LE BOSS
            if (dist < 80) pl.hurt();

            // 3. GÉNÉRATION DES ASTÉROÏDES
            p4.astSpawnT -= dt;
            if (p4.astSpawnT <= 0) {
                p4.asteroids.push({
                    angle: Math.random() * Math.PI * 2,
                    dist: 120, // Sortent du centre massif
                    speed: (Math.random() > 0.5 ? 1 : -1) * (0.01 + Math.random() * 0.02),
                    expandRate: 1.5 + Math.random() * 2.5,
                    size: 20 + Math.random() * 30
                });
                p4.astSpawnT = 300;
            }

            for (let i = p4.asteroids.length - 1; i >= 0; i--) {
                let a = p4.asteroids[i];
                a.angle += a.speed; a.dist += a.expandRate;
                a.x = bX + Math.cos(a.angle) * a.dist; a.y = bY + Math.sin(a.angle) * a.dist;

                // Collision Astéroïde <-> Joueur
                const adx = pl.px - a.x, ady = pl.py - a.y;
                if (Math.sqrt(adx * adx + ady * ady) < a.size + 10) pl.hurt();
                if (a.dist > Math.max(W, H) * 1.5) p4.asteroids.splice(i, 1);
            }

            // INITIALISATION DES VARIABLES DE CHARGE ET LASER
            p4.chargeT = p4.chargeT || 0;
            p4.maxChargeReached = p4.maxChargeReached || false;
            p4.laserT = p4.laserT || 0;

            // 4. LE JOUEUR TIRE (Uniquement s'il n'est pas étourdi)
            if (pl.stunT <= 0) {
                if (lmb) {
                    p4.chargeT += dt;
                    // Tir normal automatique si on maintient moins d'une seconde
                    if (p4.chargeT < 300 && globalTime - p4.lastFire > 120) {
                        p4.bullets.push({ x: pl.px, y: pl.py, vx: Math.cos(pl.rot) * 22, vy: Math.sin(pl.rot) * 22 });
                        p4.lastFire = globalTime; sfx.laser();
                    } else if (p4.chargeT >= 1500 && !p4.maxChargeReached) {
                        // Charge maximum atteinte !
                        p4.maxChargeReached = true;
                        if (typeof sfx.power === 'function') sfx.power();
                    }
                } else {
                    // Bouton relâché
                    if (p4.chargeT >= 1500) {
                        // DÉCLENCHEMENT DU MÉGA-LASER CONTINU (3 SECONDES)
                        p4.laserT = 3000;
                        pl.stunT = 3000; // Le vaisseau est bloqué/étourdi pendant le tir

                        if (typeof sfx.explode === 'function') sfx.explode();
                    } else if (p4.chargeT > 0 && p4.chargeT >= 300) {
                        // S'il a relâché avant la fin de la charge, tir normal
                        p4.bullets.push({ x: pl.px, y: pl.py, vx: Math.cos(pl.rot) * 22, vy: Math.sin(pl.rot) * 22 });
                        sfx.laser();
                    }
                    p4.chargeT = 0; p4.maxChargeReached = false;
                }
            }

            // 4.1 MISE À JOUR DU MÉGA-LASER
            if (p4.laserT > 0) {
                p4.laserT -= dt;
                addSh(8, 100); // L'écran tremble en continu pendant le tir
                if (Math.random() < 0.1 && typeof sfx.laser === 'function') sfx.laser(); // Bruit crépitant

                // Recul constant du vaisseau à cause de la puissance du tir
                pl.px -= Math.cos(pl.rot) * 1.5;
                pl.py -= Math.sin(pl.rot) * 1.5;

                // Calcul des collisions du laser avec le boss (Raycast géométrique)
                let nx = Math.cos(pl.rot), ny = Math.sin(pl.rot);
                let bdx = bX - pl.px, bdy = bY - pl.py;
                let dot = bdx * nx + bdy * ny; // Projection du boss sur l'axe du laser

                if (dot > 0) { // Si le boss est DEVANT le vaisseau
                    // Point le plus proche du boss sur la ligne du laser
                    let projX = pl.px + dot * nx;
                    let projY = pl.py + dot * ny;
                    let distToLine = Math.sqrt((bX - projX) ** 2 + (bY - projY) ** 2);

                    // Si la distance est plus petite que (Rayon du boss 150 + Demi-largeur du laser 30)
                    if (distToLine < 180) {
                        // Dégâts : 20% des HP max répartis sur les 3 secondes (3000ms)
                        let damagePerMs = (p4.maxHp * 0.20) / 3000;
                        p4.hp -= damagePerMs * dt;

                        // Explosions dorées sur la coque du boss
                        if (Math.random() < 0.4) burst(projX + (Math.random() - 0.5) * 40, projY + (Math.random() - 0.5) * 40, '#FFD700', 4, 6, 200);
                    }
                }
            }

            // 4.2 MISE À JOUR DES TIRS NORMAUX
            for (let i = p4.bullets.length - 1; i >= 0; i--) {
                let b = p4.bullets[i];
                b.x += b.vx; b.y += b.vy;

                const bdx = bX - b.x, bdy = bY - b.y;
                if (Math.sqrt(bdx * bdx + bdy * bdy) < 150) {
                    p4.hp -= 15;
                    burst(b.x, b.y, '#FF00FF', 8, 3, 200);
                    if (typeof sfx.hit === 'function') sfx.hit();
                    p4.bullets.splice(i, 1);
                    continue;
                }
                if (b.x < -100 || b.x > W + 100 || b.y < -100 || b.y > H + 100) p4.bullets.splice(i, 1);
            }

            // 5. TRANSITION VERS P5
            if (p4.hp <= 0 && bossState === BST.P4) {
                p4.hp = 9999; // Empêche de déclencher la transition en boucle
                startTransition(4, 5, () => {
                    bossState = BST.P5;
                    setPhaseHUD('PHASE 5 — LA SURCHARGE');
                    pl.px = W / 2; pl.py = H * 0.85; pl.inv = 1800; // Replace le vaisseau
                });
            }
        }

            safeZones: [], waveBlastT: 0,
            nextThreshold: 0.8, waveActive: false, waveTimer: 0
        };

        function buildP5Arena() {
            p5.hp = 4000; p5.maxHp = 4000;
            p5.bullets = []; p5.chargeT = 0; p5.maxChargeReached = false; p5.laserT = 0; p5.lastFire = 0;
            p5.servers = []; p5.serverSpawnT = 0;
            p5.safeZones = []; p5.waveBlastT = 0;
            p5.nextThreshold = 0.8; p5.waveActive = false; p5.waveTimer = 0;
            traps = []; swordAttacks = [];
        }

        function updateP5(dt) {
            if (st === ST.DEAD) return;
            const bX = W / 2, bY = H / 2;

            // 1. REPULSION CONSTANTE VERS LES MURS
            if (pl.stunT <= 0) {
                const dx = pl.px - bX, dy = pl.py - bY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 10) {
                    const repulsion = 0.6;
                    pl.vx += (dx / dist) * repulsion;
                    pl.vy += (dy / dist) * repulsion;
                }
            }

            // 2. TIRS DU JOUEUR & MÉGA-LASER
            if (pl.stunT <= 0) {
                if (lmb) {
                    p5.chargeT += dt;
                    if (p5.chargeT < 300 && globalTime - p5.lastFire > 120) {
                        p5.bullets.push({ x: pl.px, y: pl.py, vx: Math.cos(pl.rot) * 22, vy: Math.sin(pl.rot) * 22 });
                        p5.lastFire = globalTime; sfx.laser();
                    } else if (p5.chargeT >= 1500 && !p5.maxChargeReached) {
                        p5.maxChargeReached = true; if (typeof sfx.power === 'function') sfx.power();
                    }
                } else {
                    if (p5.chargeT >= 1500) {
                        p5.laserT = 3000; pl.stunT = 3000; if (typeof sfx.explode === 'function') sfx.explode();
                    } else if (p5.chargeT > 0 && p5.chargeT >= 300) {
                        p5.bullets.push({ x: pl.px, y: pl.py, vx: Math.cos(pl.rot) * 22, vy: Math.sin(pl.rot) * 22 });
                        sfx.laser();
                    }
                    p5.chargeT = 0; p5.maxChargeReached = false;
                }
            }

            let damageDealt = 0;
            if (p5.laserT > 0) {
                p5.laserT -= dt; addSh(8, 100);
                if (Math.random() < 0.1 && typeof sfx.laser === 'function') sfx.laser();
                pl.px -= Math.cos(pl.rot) * 1.5; pl.py -= Math.sin(pl.rot) * 1.5;

                let nx = Math.cos(pl.rot), ny = Math.sin(pl.rot);

                // Dégâts au Boss via le Méga-Laser
                let bdx = bX - pl.px, bdy = bY - pl.py;
                let dot = bdx * nx + bdy * ny;
                if (dot > 0) {
                    let projX = pl.px + dot * nx, projY = pl.py + dot * ny;
                    if (Math.sqrt((bX - projX) ** 2 + (bY - projY) ** 2) < 180) {
                        damageDealt += ((p5.maxHp * 0.20) / 3000) * dt;
                        if (Math.random() < 0.4) burst(projX + (Math.random() - 0.5) * 40, projY + (Math.random() - 0.5) * 40, '#FFD700', 4, 6, 200);
                    }
                }

                // Le Méga-Laser pulvérise les serveurs sur son passage
                for (let s of p5.servers) {
                    let sdx = s.x - pl.px, sdy = s.y - pl.py;
                    let sDot = sdx * nx + sdy * ny;
                    if (sDot > 0) {
                        let projSX = pl.px + sDot * nx, projSY = pl.py + sDot * ny;
                        let sRadius = Math.max(s.width, s.height) * 0.45;
                        if (Math.sqrt((s.x - projSX) ** 2 + (s.y - projSY) ** 2) < sRadius + 40) {
                            s.hp -= 200 * (dt / 16); // Subit d'énormes dégâts très vite
                            if (Math.random() < 0.3) burst(s.x, s.y, '#FFD700', 3, 4, 150);
                        }
                    }
                }
            }

            for (let i = p5.bullets.length - 1; i >= 0; i--) {
                let b = p5.bullets[i]; b.x += b.vx; b.y += b.vy;
                let bulletDestroyed = false;

                // Les serveurs bloquent les tirs et prennent des dégâts
                for (let j = p5.servers.length - 1; j >= 0; j--) {
                    let s = p5.servers[j];
                    let sRadius = Math.max(s.width, s.height) * 0.45;
                    if (Math.sqrt((s.x - b.x) ** 2 + (s.y - b.y) ** 2) < sRadius) {
                        s.hp -= 15; // 2 Tirs normaux suffisent à détruire un serveur
                        burst(b.x, b.y, '#FFD700', 5, 2, 150);
                        bulletDestroyed = true;
                        break;
                    }
                }

                if (bulletDestroyed) {
                    p5.bullets.splice(i, 1);
                    continue;
                }

                // Dégâts normaux au boss si aucun serveur n'a bloqué
                if (Math.sqrt((bX - b.x) ** 2 + (bY - b.y) ** 2) < 150) {
                    damageDealt += 15; burst(b.x, b.y, '#FF00FF', 8, 3, 200);
                    if (typeof sfx.hit === 'function') sfx.hit();
                    p5.bullets.splice(i, 1); continue;
                }
                if (b.x < -100 || b.x > W + 100 || b.y < -100 || b.y > H + 100) p5.bullets.splice(i, 1);
            }

            // GESTION DES SEUILS (ZONES SÛRES TOUS LES 20%)
            if (!p5.waveActive && damageDealt > 0) {
                p5.hp -= damageDealt;
                let hpRatio = p5.hp / p5.maxHp;
                if (hpRatio <= p5.nextThreshold && p5.nextThreshold >= 0) {
                    p5.hp = p5.nextThreshold * p5.maxHp;
                    p5.waveActive = true;
                    p5.waveTimer = 5000;
                    let angle = Math.random() * Math.PI * 2;
                    let r = 200 + Math.random() * (Math.min(W, H) / 2 - 300);
                    p5.safeZones.push({ x: bX + Math.cos(angle) * r, y: bY + Math.sin(angle) * r, radius: 140 }); // <-- RAYON AUGMENTÉ À 140 !
                    sfx.alert();
                }
            }

            // 3. GROS SERVEURS EN RUINE (Pop hors écran, Limite à 5, Destruction)
            if (!p5.waveActive) {
                p5.serverSpawnT -= dt;
                if (p5.servers.length < 5 && p5.serverSpawnT <= 0) { // LIMITE DE 5 SERVEURS
                    p5.servers.push({
                        angle: Math.random() * Math.PI * 2,
                        dist: Math.max(W, H) + 200,
                        angleSpeed: (Math.random() > 0.5 ? 1 : -1) * (0.005 + Math.random() * 0.01),
                        approachSpeed: 0.8 + Math.random() * 1.5, // Vitesse d'aspiration vers le boss
                        width: 70 + Math.random() * 50,
                        height: 140 + Math.random() * 80,
                        rot: Math.random() * Math.PI * 2,
                        rotSpeed: (Math.random() - 0.5) * 0.04,
                        hp: 30, // Points de vie du serveur
                        sparks: Array.from({ length: irng(3, 6) }, () => ({
                            rx: Math.random(), ry: Math.random(), timer: Math.random() * 1000
                        }))
                    });
                    p5.serverSpawnT = 800;
                }
            }

            for (let i = p5.servers.length - 1; i >= 0; i--) {
                let s = p5.servers[i];
                s.angle += s.angleSpeed; s.rot += s.rotSpeed;

                // Le serveur est inexorablement attiré par le boss
                s.dist -= s.approachSpeed * (dt / 16);
                s.x = bX + Math.cos(s.angle) * s.dist;
                s.y = bY + Math.sin(s.angle) * s.dist;

                for (let sp of s.sparks) {
                    sp.timer -= dt;
                    if (sp.timer <= 0) {
                        if (Math.random() < 0.3) {
                            let spX = s.x + (sp.rx - 0.5) * s.width; let spY = s.y + (sp.ry - 0.5) * s.height;
                            parts.push({ x: spX, y: spY, vx: (Math.random() - .5) * 5, vy: (Math.random() - .5) * 5, c: '#FFD700', life: 250, ml: 250, sz: 2, g: 0, ring: false });
                        }
                        sp.timer = 150 + Math.random() * 600;
                    }
                }

                let hitRadius = Math.max(s.width, s.height) * 0.45;
                if (Math.sqrt((pl.px - s.x) ** 2 + (pl.py - s.y) ** 2) < hitRadius + 15) pl.hurt();

                // EXPLOSION DU SERVEUR (Soit aspiré par le boss, soit détruit par le joueur)
                if (s.dist < 130 || s.hp <= 0) {
                    burst(s.x, s.y, '#FFD700', 20, 6, 350);
                    if (s.hp <= 0 && typeof sfx.explode === 'function') sfx.explode(); // Son si on le détruit
                    p5.servers.splice(i, 1);
                }
            }

            // 4. ONDE D'ÉNERGIE MASSIVE (La Purge)
            if (p5.waveActive) {
                p5.waveTimer -= dt;
                if (p5.waveTimer <= 0) {
                    let isSafe = false;
                    for (let sz of p5.safeZones) {
                        if (Math.sqrt((pl.px - sz.x) ** 2 + (pl.py - sz.y) ** 2) < sz.radius) { isSafe = true; break; }
                    }
                    p5.waveBlastT = 800;
                    sfx.explode(); addSh(35, 800); fScr('#FFD700', 300);

                    if (!isSafe && pl.alive && pl.shieldT <= 0) { lives = 0; pl.die(); }

                    p5.safeZones = []; p5.waveActive = false;
                    p5.nextThreshold = Math.round((p5.nextThreshold - 0.2) * 10) / 10;
                }
            }
            if (p5.waveBlastT > 0) p5.waveBlastT -= dt;

            // 5. TRANSITION VERS LA PHASE 6
            if (p5.hp <= 0 && p5.nextThreshold < 0 && !p5.waveActive && bossState === BST.P5) {
                p5.hp = 9999;
                startTransition(5, 6, () => {
                    setDownload(83.3, 5); buildP6Arena();
                    pl.px = W / 2; pl.py = H * 0.85; pl.inv = 1800; bossState = BST.P6;
                    setPhaseHUD("PHASE 6 — L'ABSOLU"); p6.timer = 20000; sfx.power();
                    // Suppression de pageFlip() ! Le flash blanc suffit.
                });
            }
        }

        function drawP5Waves(t) {
            const bX = W / 2, bY = H / 2;

            cx.save(); cx.strokeStyle = `rgba(255, 215, 0, 0.4)`; cx.lineWidth = 3;
            cx.setLineDash([15, 20]); cx.lineDashOffset = -t * 100;
            cx.beginPath(); cx.moveTo(bX, bY); cx.lineTo(pl.px, pl.py); cx.stroke(); cx.restore();

            if (p5.laserT > 0) {
                let prog = p5.laserT / 3000; let intensity = Math.min(1, prog * 5) * Math.min(1, (1 - prog) * 10);
                cx.save(); cx.globalCompositeOperation = 'screen'; cx.translate(pl.px, pl.py); cx.rotate(pl.rot); cx.translate(0, (Math.random() - 0.5) * 6);
                glow('#FF3300', 40); cx.fillStyle = `rgba(255, 50, 0, ${0.5 * intensity})`; cx.fillRect(25, -40, W * 1.5, 80);
                glow('#FFFFFF', 20); cx.fillStyle = `rgba(255, 255, 200, ${0.9 * intensity})`; cx.fillRect(25, -20, W * 1.5, 40);
                cx.strokeStyle = `rgba(255, 255, 255, ${0.8 * intensity})`; cx.lineWidth = 3;
                cx.beginPath(); for (let i = 25; i < W * 1.2; i += 60) { cx.moveTo(i, -20); cx.lineTo(i + 30 + Math.random() * 50, 20); } cx.stroke();
                cx.restore(); noGlow();
            }
            cx.fillStyle = '#00F5FF'; cx.shadowColor = '#00F5FF'; cx.shadowBlur = 10;
            for (let b of p5.bullets) cx.fillRect(b.x - 3, b.y - 3, 6, 6); noGlow();

            if (p5.chargeT > 300 && pl.alive && pl.stunT <= 0) {
                let chargeRatio = Math.min(1, (p5.chargeT - 300) / 1200);
                cx.save(); cx.translate(pl.px, pl.py); cx.rotate(pl.rot); let tipX = 28;
                cx.fillStyle = '#FFD700'; cx.shadowColor = '#FFD700'; cx.shadowBlur = 15;
                cx.beginPath(); cx.arc(tipX, 0, 4 + chargeRatio * 15, 0, Math.PI * 2); cx.fill();
                if (p5.maxChargeReached) { cx.beginPath(); cx.arc(tipX, 0, 25 + Math.sin(t * 30) * 6, 0, Math.PI * 2); cx.strokeStyle = '#FFFFFF'; cx.lineWidth = 3; cx.stroke(); }
                cx.restore(); noGlow();
            }

            // DESSIN DES SERVEURS EN RUINE
            for (let s of p5.servers) {
                cx.save(); cx.translate(s.x, s.y); cx.rotate(s.rot);

                cx.shadowColor = 'rgba(255, 215, 0, 0.15)'; cx.shadowBlur = 20;

                // Châssis dégradé sombre
                let grad = cx.createLinearGradient(-s.width / 2, 0, s.width / 2, 0);
                grad.addColorStop(0, '#0a0a0f'); grad.addColorStop(0.5, '#1a1a24'); grad.addColorStop(1, '#050508');
                cx.fillStyle = grad; cx.strokeStyle = '#445'; cx.lineWidth = 2;
                cx.fillRect(-s.width / 2, -s.height / 2, s.width, s.height);
                cx.strokeRect(-s.width / 2, -s.height / 2, s.width, s.height);

                cx.shadowBlur = 0;

                // Racks de serveurs (Détails)
                const rackH = 14;
                for (let ry = -s.height / 2 + 10; ry < s.height / 2 - 10; ry += rackH + 4) {
                    if (Math.random() > 0.75) {
                        // Emplacement détruit (Trous et câbles)
                        cx.fillStyle = '#000'; cx.fillRect(-s.width / 2 + 4, ry, s.width - 8, rackH);
                        cx.strokeStyle = '#FF003C'; cx.lineWidth = 1.5;
                        cx.beginPath(); cx.moveTo(-s.width / 3, ry); cx.quadraticCurveTo(0, ry + rackH, s.width / 3, ry); cx.stroke();
                    } else {
                        // Serveur corrompu avec LEDs
                        cx.fillStyle = '#111'; cx.fillRect(-s.width / 2 + 4, ry, s.width - 8, rackH);
                        if (Math.random() > 0.4) {
                            let ledCol = Math.random() > 0.5 ? '#FFD700' : '#FF003C';
                            glow(ledCol, 10); cx.fillStyle = ledCol;
                            cx.fillRect(-s.width / 2 + 12, ry + 4, 6, 4);
                            cx.fillRect(-s.width / 2 + 22, ry + 4, 6, 4);
                            noGlow();
                        }
                    }
                }

                // Flash des étincelles internes
                for (let sp of s.sparks) {
                    if (sp.timer < 80) {
                        let spX = (sp.rx - 0.5) * s.width; let spY = (sp.ry - 0.5) * s.height;
                        glow('#FFF', 15); cx.fillStyle = '#FFF';
                        cx.beginPath(); cx.arc(spX, spY, 2 + Math.random() * 3, 0, Math.PI * 2); cx.fill(); noGlow();
                    }
                }
                cx.restore();
            }

            // ZONES SÛRES
            for (let sz of p5.safeZones) {
                cx.save(); cx.translate(sz.x, sz.y); cx.rotate(t);
                glow('#00FF41', 20); cx.fillStyle = `rgba(0, 255, 65, ${0.2 + Math.sin(t * 10) * 0.1})`;
                cx.beginPath(); cx.arc(0, 0, sz.radius, 0, Math.PI * 2); cx.fill();
                cx.strokeStyle = '#00FF41'; cx.lineWidth = 4; cx.setLineDash([20, 10]); cx.beginPath(); cx.arc(0, 0, sz.radius, 0, Math.PI * 2); cx.stroke(); cx.restore();

                cx.save(); cx.translate(sz.x, sz.y);
                cx.font = 'bold 16px Orbitron'; cx.fillStyle = '#FFF'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
                cx.fillText("ZONE SÛRE", 0, -12);
                cx.fillStyle = '#00FF41'; cx.fillText((p5.waveTimer / 1000).toFixed(1) + "s", 0, 12); cx.restore(); noGlow();
            }

            if (p5.waveBlastT > 0) {
                let prog = 1 - (p5.waveBlastT / 800);
                cx.save(); cx.globalCompositeOperation = 'screen';
                glow('#FFD700', 50); cx.fillStyle = `rgba(255, 215, 0, ${(1 - prog) * 0.8})`; cx.fillRect(0, 0, W, H);
                cx.strokeStyle = `rgba(255, 255, 255, ${1 - prog})`; cx.lineWidth = 30 * (1 - prog);
                cx.beginPath(); cx.arc(bX, bY, prog * Math.max(W, H) * 1.5, 0, Math.PI * 2); cx.stroke(); cx.restore(); noGlow();
            }

            // BARRE DE VIE
            const hpPct = Math.max(0, p5.hp / p5.maxHp);
            const barW = 600, barH = 20;
            cx.fillStyle = 'rgba(255, 215, 0, 0.2)'; cx.fillRect(W / 2 - barW / 2, 30, barW, barH);
            cx.fillStyle = '#FFD700'; glow('#FFD700', 10); cx.fillRect(W / 2 - barW / 2, 30, barW * hpPct, barH);
            cx.strokeStyle = '#FFF'; cx.lineWidth = 2; noGlow(); cx.strokeRect(W / 2 - barW / 2, 30, barW, barH);

            cx.fillStyle = '#FFF'; cx.textAlign = 'center'; cx.font = '22px "Share Tech Mono"';
            cx.fillText(p5.waveActive ? "!!! PURGE IMMINENTE !!!" : "SURCHARGE - ANOMALIE : " + Math.ceil(hpPct * 100) + "%", W / 2, 20);
        }


        // ═══════════════════════════════════════════════════════════════
        // PHASE 6 — LE DIEU DU NÉANT (Trous Noirs, Insta-kill, Overclock)
        // ═══════════════════════════════════════════════════════════════
        let p6 = {
            hp: 6000, maxHp: 6000,
            bullets: [], chargeT: 0, maxChargeReached: false, laserT: 0, lastFire: 0,
            phasePart: 1, // 1: Séparés | 2: Fusion en bas | 3: OVERCLOCK | 4: Dash
            hands: [], servers: [], serverSpawnT: 0,
            repelTimer: 0, repelPulse: 0,
            clicked: false, dashTimer: 0, ended: false
        };

        function buildP6Arena() {
            p6.hp = 6000; p6.maxHp = 6000;
            p6.bullets = []; p6.chargeT = 0; p6.maxChargeReached = false; p6.laserT = 0; p6.lastFire = 0;
            p6.phasePart = 1;
            p6.hands = [
                { id: 1, x: W / 2 - 200, y: H / 2 - 100, tx: W * 0.2, ty: H * 0.25, size: 40, isBH: false },
                { id: 2, x: W / 2 + 200, y: H / 2 - 100, tx: W * 0.8, ty: H * 0.25, size: 40, isBH: false }
            ];
            p6.servers = []; p6.serverSpawnT = 0; p6.repelTimer = 0; p6.repelPulse = 0;
            p6.clicked = false; p6.dashTimer = 0; p6.ended = false;
            traps = []; swordAttacks = [];
            pl.px = W / 2; pl.py = H * 0.85; pl.inv = 1800; pl.stunT = 0;
        }

        function updateP6(dt) {
            if (st === ST.DEAD) return;
            const bX = W / 2, bY = H / 2 - 50;

            // --- SÉQUENCE DE FIN (0% HP) : OVERCLOCK ---
            if (p6.phasePart >= 3) {
                pl.stunT = 9999; // Le vaisseau est figé par l'énergie

                if (p6.phasePart === 3) {
                    // Attente du Clic Gauche
                    if (lmb && !p6.clicked) {
                        p6.clicked = true; p6.phasePart = 4;
                        sfx.power(); sfx.explode(); p6.dashTimer = 0; pl.inv = 9999;
                    }
                } else if (p6.phasePart === 4) {
                    // Animation : Dash massif dans la tête du boss
                    p6.dashTimer += dt;
                    let prog = Math.min(1, p6.dashTimer / 800);
                    let ease = 1 - Math.pow(1 - prog, 3); // Effet d'accélération foudroyante

                    pl.px = lerp(pl.px, bX, ease);
                    pl.py = lerp(pl.py, bY - 120, ease);

                    if (prog >= 1 && !p6.ended) {
                        p6.ended = true;
                        sfx.explode(); burst(bX, bY - 120, '#FFF', 100, 15, 2000);
                        addSh(50, 1500); fScr('#FFF', 1500);

                        // REDIRECTION PROLONGÉE (3.5 secondes) pour voir le texte de fin !
                        setTimeout(() => { window.location.href = 'boss50_partie3.html'; }, 3500);
                    }
                }
                return; // Bloque tout le reste de l'update
            }

            // --- 1. TIRS DU JOUEUR ---
            if (pl.stunT <= 0) {
                if (lmb) {
                    p6.chargeT += dt;
                    if (p6.chargeT < 300 && globalTime - p6.lastFire > 120) {
                        p6.bullets.push({ x: pl.px, y: pl.py, vx: Math.cos(pl.rot) * 22, vy: Math.sin(pl.rot) * 22 });
                        p6.lastFire = globalTime; sfx.laser();
                    } else if (p6.chargeT >= 1500 && !p6.maxChargeReached) {
                        p6.maxChargeReached = true; if (typeof sfx.power === 'function') sfx.power();
                    }
                } else {
                    if (p6.chargeT >= 1500) {
                        p6.laserT = 3000; pl.stunT = 3000; if (typeof sfx.explode === 'function') sfx.explode();
                    } else if (p6.chargeT > 0 && p6.chargeT >= 300) {
                        p6.bullets.push({ x: pl.px, y: pl.py, vx: Math.cos(pl.rot) * 22, vy: Math.sin(pl.rot) * 22 }); sfx.laser();
                    }
                    p6.chargeT = 0; p6.maxChargeReached = false;
                }
            }

            if (p6.laserT > 0) {
                p6.laserT -= dt; addSh(8, 100);
                if (Math.random() < 0.1 && typeof sfx.laser === 'function') sfx.laser();
                pl.px -= Math.cos(pl.rot) * 1.5; pl.py -= Math.sin(pl.rot) * 1.5;
                let nx = Math.cos(pl.rot), ny = Math.sin(pl.rot);
                let bdx = bX - pl.px, bdy = bY - pl.py; let dot = bdx * nx + bdy * ny;
                if (dot > 0) {
                    let projX = pl.px + dot * nx, projY = pl.py + dot * ny;
                    if (Math.sqrt((bX - projX) ** 2 + (bY - projY) ** 2) < 220) {
                        p6.hp -= ((p6.maxHp * 0.20) / 3000) * dt;
                        if (Math.random() < 0.4) burst(projX + (Math.random() - 0.5) * 40, projY + (Math.random() - 0.5) * 40, '#FFD700', 4, 6, 200);
                    }
                }
            }

            for (let i = p6.bullets.length - 1; i >= 0; i--) {
                let b = p6.bullets[i]; b.x += b.vx; b.y += b.vy;
                if (Math.sqrt((bX - b.x) ** 2 + (bY - b.y) ** 2) < 180) {
                    p6.hp -= 15; burst(b.x, b.y, '#FF00FF', 8, 3, 200); if (typeof sfx.hit === 'function') sfx.hit();
                    p6.bullets.splice(i, 1); continue;
                }
                if (b.x < -100 || b.x > W + 100 || b.y < -100 || b.y > H + 100) p6.bullets.splice(i, 1);
            }

            // --- 2. GESTION DES MAINS / TROUS NOIRS ---
            let isMerged = p6.phasePart === 2;

            if (!isMerged && p6.hp <= p6.maxHp * 0.5) {
                p6.phasePart = 2;
                let mergedY = H * 0.75; // TROU NOIR GÉANT EN BAS AU CENTRE !
                p6.hands[0].tx = bX; p6.hands[0].ty = mergedY;
                p6.hands[1].tx = bX; p6.hands[1].ty = mergedY;
                sfx.power(); addSh(25, 1500); fScr('#FFF', 300);
            }

            let pullingForce = 0;

            for (let i = 0; i < p6.hands.length; i++) {
                let h = p6.hands[i];
                h.x += (h.tx - h.x) * 0.04; h.y += (h.ty - h.y) * 0.04;
                let distToTarget = Math.sqrt((h.tx - h.x) ** 2 + (h.ty - h.y) ** 2);

                if (!isMerged) {
                    if (distToTarget < 10 && !h.isBH) { h.isBH = true; sfx.explode(); addSh(10, 400); }
                    if (h.isBH) { h.size += (120 - h.size) * 0.05; pullingForce = 0.35; }
                } else {
                    if (distToTarget < 15) { h.isBH = true; h.size += (220 - h.size) * 0.05; pullingForce = 0.75; }
                }

                // ASPIRATION ET INSTA-KILL DU JOUEUR
                if (h.isBH && pl.stunT <= 0 && p6.repelTimer <= 0) {
                    let dx = h.x - pl.px, dy = h.y - pl.py;
                    let d = Math.sqrt(dx * dx + dy * dy);
                    if (d > 10) { pl.vx += (dx / d) * pullingForce; pl.vy += (dy / d) * pullingForce; }

                    if (d < h.size * 0.35) { // CENTRE ABSOLU = INSTA KILL
                        lives = 0; pl.die();
                    } else if (d < h.size * 0.65) { // Bords = Dégâts
                        pl.hurt();
                    }
                }
            }

            // --- 3. ASPIRATION DES SERVEURS ---
            p6.serverSpawnT -= dt;
            if (p6.serverSpawnT <= 0) {
                let ang = Math.random() * Math.PI * 2;
                p6.servers.push({
                    x: bX + Math.cos(ang) * (Math.max(W, H) + 200), y: bY + Math.sin(ang) * (Math.max(W, H) + 200),
                    vx: 0, vy: 0, rot: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.1, size: 40 + Math.random() * 40
                });
                p6.serverSpawnT = 400;
            }

            for (let i = p6.servers.length - 1; i >= 0; i--) {
                let s = p6.servers[i];
                let targetBH = null, minDist = Infinity;
                for (let h of p6.hands) {
                    if (h.isBH) {
                        let d = Math.sqrt((h.x - s.x) ** 2 + (h.y - s.y) ** 2);
                        if (d < minDist) { minDist = d; targetBH = h; }
                    }
                }
                if (targetBH) {
                    let force = isMerged ? 1.5 : 0.8; let dx = targetBH.x - s.x, dy = targetBH.y - s.y;
                    s.vx += (dx / minDist) * force; s.vy += (dy / minDist) * force;
                }
                s.x += s.vx; s.y += s.vy; s.rot += s.rotSpeed;
                if (Math.sqrt((pl.px - s.x) ** 2 + (pl.py - s.y) ** 2) < s.size * 0.8 + 15) pl.hurt();
                if (minDist < targetBH?.size * 0.5) { burst(s.x, s.y, '#FF00FF', 5, 4, 150); p6.servers.splice(i, 1); }
            }

            // --- 4. LE REJET (Part 2 uniquement) ---
            if (isMerged) {
                p6.repelPulse -= dt;
                if (p6.repelPulse <= -3500) {
                    p6.repelPulse = 1000; p6.repelTimer = 1000; sfx.explode(); addSh(30, 800); fScr('#FFF', 200);
                    for (let s of p6.servers) { s.vx *= -2; s.vy *= -2; }
                }
                if (p6.repelTimer > 0) {
                    p6.repelTimer -= dt;
                    let dx = pl.px - bX, dy = pl.py - bY; let d = Math.sqrt(dx * dx + dy * dy);
                    if (d > 0) { pl.vx += (dx / d) * 3.5; pl.vy += (dy / d) * 3.5; }
                }
            }

            // --- 5. FIN DE LA PHASE (0% HP) ---
            if (p6.hp <= 0 && p6.phasePart < 3) {
                p6.hp = 0;
                p6.phasePart = 3; // Déclenche l'OVERCLOCK !
                p6.hands = [];    // Efface les trous noirs
                p6.servers = [];  // Efface les serveurs
                sfx.power(); addSh(40, 2000); fScr('#FFF', 800);
            }
        }


        function drawArenaP6(t) {
            const bX = W / 2, bY = H / 2 - 50;

            // EFFET VISUEL OVERCLOCK (Le joueur est pure lumière)
            if (p6.phasePart >= 3) {
                glow('#FFF', 80); cx.fillStyle = '#FFF';
                let aura = p6.phasePart === 4 ? 60 : 30 + Math.random() * 20; // Grossit pendant le dash
                cx.beginPath(); cx.arc(pl.px, pl.py, aura, 0, Math.PI * 2); cx.fill(); noGlow();

                if (p6.phasePart === 3) {
                    const pulse = 0.5 + Math.sin(t * 15) * 0.5;
                    cx.font = 'bold 32px Orbitron'; cx.textAlign = 'center';
                    glow('#FFD700', 30); cx.fillStyle = `rgba(255, 255, 255, ${0.5 + pulse * 0.5})`;
                    cx.fillText("⚡ OVERCLOCK PRÊT ⚡", W / 2, H / 2 + 80);
                    cx.font = 'bold 18px Share Tech Mono'; cx.fillStyle = `rgba(255, 215, 0, ${0.5 + pulse * 0.5})`;
                    cx.fillText("[ CLIQUEZ POUR ANNIHILER ]", W / 2, H / 2 + 120);
                    noGlow();
                }
            }

            // DESSIN DU MÉGA-LASER ET TIRS
            if (p6.laserT > 0 && p6.phasePart < 3) {
                let prog = p6.laserT / 3000; let intensity = Math.min(1, prog * 5) * Math.min(1, (1 - prog) * 10);
                cx.save(); cx.globalCompositeOperation = 'screen';
                cx.translate(pl.px, pl.py); cx.rotate(pl.rot); cx.translate(0, (Math.random() - 0.5) * 6);
                glow('#FF3300', 40); cx.fillStyle = `rgba(255, 50, 0, ${0.5 * intensity})`; cx.fillRect(25, -40, W * 1.5, 80);
                glow('#FFFFFF', 20); cx.fillStyle = `rgba(255, 255, 200, ${0.9 * intensity})`; cx.fillRect(25, -20, W * 1.5, 40);
                cx.strokeStyle = `rgba(255, 255, 255, ${0.8 * intensity})`; cx.lineWidth = 3;
                cx.beginPath(); for (let i = 25; i < W * 1.2; i += 60) { cx.moveTo(i, -20); cx.lineTo(i + 30 + Math.random() * 50, 20); } cx.stroke();
                cx.restore(); noGlow();
            }
            cx.fillStyle = '#00F5FF'; cx.shadowColor = '#00F5FF'; cx.shadowBlur = 10;
            if (p6.bullets && p6.phasePart < 3) for (let b of p6.bullets) cx.fillRect(b.x - 3, b.y - 3, 6, 6); noGlow();

            if (p6.chargeT > 300 && pl.alive && pl.stunT <= 0 && p6.phasePart < 3) {
                let chargeRatio = Math.min(1, (p6.chargeT - 300) / 1200);
                cx.save(); cx.translate(pl.px, pl.py); cx.rotate(pl.rot); let tipX = 28;
                cx.fillStyle = '#FFD700'; cx.shadowColor = '#FFD700'; cx.shadowBlur = 15;
                cx.beginPath(); cx.arc(tipX, 0, 4 + chargeRatio * 15, 0, Math.PI * 2); cx.fill();
                if (p6.maxChargeReached) { cx.beginPath(); cx.arc(tipX, 0, 25 + Math.sin(t * 30) * 6, 0, Math.PI * 2); cx.strokeStyle = '#FFFFFF'; cx.lineWidth = 3; cx.stroke(); }
                cx.restore(); noGlow();
            }

            // DESSIN DES MAINS / TROUS NOIRS
            for (let h of p6.hands) {
                cx.save(); cx.translate(h.x, h.y);
                if (!h.isBH) {
                    cx.rotate(t * 2);
                    glow('#FFF', 30); cx.fillStyle = '#000'; cx.strokeStyle = '#FFF'; cx.lineWidth = 4;
                    cx.fillRect(-h.size / 2, -h.size / 2, h.size, h.size); cx.strokeRect(-h.size / 2, -h.size / 2, h.size, h.size);
                } else {
                    cx.rotate(t * -3);
                    glow('#FF00FF', 40); cx.fillStyle = '#000';
                    cx.beginPath(); cx.arc(0, 0, h.size, 0, Math.PI * 2); cx.fill();
                    cx.strokeStyle = '#FF00FF'; cx.lineWidth = 6; cx.stroke();
                    cx.globalCompositeOperation = 'screen'; cx.strokeStyle = '#FFF'; cx.lineWidth = 2;
                    for (let r = h.size; r < h.size * 2.5; r += 20) { cx.beginPath(); cx.arc(0, 0, r + Math.sin(t * 10 + r) * 5, 0, Math.PI * 2); cx.stroke(); }
                    cx.globalCompositeOperation = 'source-over';
                }
                cx.restore(); noGlow();
            }

            // DESSIN DES SERVEURS ASPIRÉS
            for (let s of p6.servers) {
                cx.save(); cx.translate(s.x, s.y); cx.rotate(s.rot);
                glow('#FF00FF', 10); cx.fillStyle = '#111'; cx.strokeStyle = '#555'; cx.lineWidth = 2;
                cx.fillRect(-s.size / 2, -s.size, s.size, s.size * 2); cx.strokeRect(-s.size / 2, -s.size, s.size, s.size * 2);
                if (Math.random() > 0.5) { cx.fillStyle = '#FF003C'; cx.fillRect(-s.size / 4, -s.size / 2, s.size / 2, 4); }
                cx.restore(); noGlow();
            }

            // EFFET VISUEL DE PROPULSION (Part 2)
            if (p6.phasePart === 2 && p6.repelTimer > 0) {
                let prog = 1 - (p6.repelTimer / 1000);
                cx.save(); cx.translate(bX, bY); cx.globalCompositeOperation = 'screen';
                glow('#FFF', 50); cx.strokeStyle = `rgba(255, 255, 255, ${1 - prog})`; cx.lineWidth = 40 * (1 - prog);
                cx.beginPath(); cx.arc(0, 0, prog * Math.max(W, H) * 1.5, 0, Math.PI * 2); cx.stroke();
                cx.restore(); noGlow();
            }

            // BARRE DE VIE DU BOSS FINAL
            const hpPct = Math.max(0, p6.hp / p6.maxHp);
            const barW = 600, barH = 20;
            cx.fillStyle = 'rgba(255, 255, 255, 0.2)'; cx.fillRect(W / 2 - barW / 2, 30, barW, barH);
            cx.fillStyle = '#FFF'; glow('#FFF', 15); cx.fillRect(W / 2 - barW / 2, 30, barW * hpPct, barH);
            cx.strokeStyle = '#FFD700'; cx.lineWidth = 2; noGlow(); cx.strokeRect(W / 2 - barW / 2, 30, barW, barH);

            cx.fillStyle = '#FFF'; cx.textAlign = 'center'; cx.font = '22px "Share Tech Mono"';
            cx.fillText(p6.phasePart === 1 ? "L'ABSOLU : " + Math.ceil(hpPct * 100) + "%" : (p6.phasePart === 2 ? "FUSION CRITIQUE : " + Math.ceil(hpPct * 100) + "%" : "DÉFAILLANCE SYSTÈME"), W / 2, 20);


            // --- ÉCRAN BLANC ET TEXTE DE FIN (OVERCLOCK RÉUSSI) ---
            if (p6.phasePart === 4 && p6.dashTimer >= 800) {
                let whiteProg = Math.min(1, (p6.dashTimer - 800) / 600); // L'écran devient blanc en 0.6s

                cx.save();
                // On réinitialise la caméra pour que le texte ne tremble pas avec les explosions
                cx.setTransform(1, 0, 0, 1, 0, 0);

                cx.fillStyle = `rgba(255, 255, 255, ${whiteProg})`;
                cx.fillRect(0, 0, W, H);

                // Une fois l'écran tout blanc, on fait apparaître le texte en noir
                if (whiteProg >= 1) {
                    let textAlpha = Math.min(1, (p6.dashTimer - 1400) / 800); // Apparaît en douceur
                    if (textAlpha > 0) {
                        cx.fillStyle = `rgba(0, 0, 0, ${textAlpha})`;
                        cx.font = 'bold 28px "Share Tech Mono"';
                        cx.textAlign = 'center';
                        // Si le navigateur supporte l'espacement des lettres sur le canvas
                        if (cx.letterSpacing !== undefined) cx.letterSpacing = "4px";

                        cx.fillText("[ ACCÈS AU CERVEAU DU NÉANT SÉCURISÉ ]", W / 2, H / 2);
                    }
                }
                cx.restore();
            }
        }
        // ═══════════════════════════════════════════════════════════════
        // ═══ DIALOGUE ENGINE
        function startDialogue(dlgs, cb) {
            isDialogActive2 = true; currentDialogues = dlgs; diagIdx = 0; onDiagEnd = cb;
            const box = document.getElementById('dialog-box'); document.getElementById('dialog-choices').style.display = 'none'; document.getElementById('dialog-hint').style.display = ''; box.classList.add('show'); showNextDialogue();
        }
        function showNextDialogue() {
            const textEl = document.getElementById('dialog-text');
            if (diagTyping) { clearInterval(typeIntv); textEl.textContent = currentDialogues[diagIdx - 1]?.text || ''; diagTyping = false; return; }
            if (diagIdx >= currentDialogues.length) { isDialogActive2 = false; document.getElementById('dialog-box').classList.remove('show'); if (onDiagEnd) onDiagEnd(); return; }
            const d = currentDialogues[diagIdx]; document.getElementById('dialog-name').textContent = d.name; document.getElementById('dialog-name').style.color = d.color || K.red;
            textEl.textContent = ''; diagTyping = true; let i = 0; clearInterval(typeIntv);
            typeIntv = setInterval(() => { textEl.textContent += d.text[i]; i++; if (i >= d.text.length) { clearInterval(typeIntv); diagTyping = false; } }, 20);
            try { sfx.move(); } catch (e) { } diagIdx++;


        }
        // ═══ PLAYER
        const pl = new Joueur();
        // Plus de "lastSpawn", de "pl.kill" ou de "onPlayerDead" ! 
        // La classe Joueur (vaisseau) gère désormais sa mort toute seule avec pl.die() et pl.hurt().

        function restartGame() {
            // --- REMBOBINAGE DE LA MUSIQUE ---
            bgm.currentTime = 0;
            sessionStorage.removeItem('boss50_bgm_time');
            // ---------------------------------
            document.getElementById('death-menu').classList.remove('show');
            st = ST.PLAY; lives = maxLives; updateLivesHUD();
            swordAttacks = []; traps = []; showShieldHUD(false);
            // Retour à la partie 1
            window.location.href = 'boss50.html';
        }

        // Fonction vide de sécurité : Empêche le jeu de planter si on arrive en Phase 5 prématurément
        function drawArena(t) { }
        // ═══ MAIN UPDATE
        function update(ts) {
            const dt = Math.min(ts - lastT, 50); lastT = ts; bT += dt; globalTime = ts;
            for (const s of shakes) s.t += dt; shakes = shakes.filter(s => s.t < s.d);
            for (const p of parts) { p.x += p.vx * (dt / 16); p.y += p.vy * (dt / 16); p.vy += p.g * (dt / 16); p.life = Math.max(0, p.life - dt); }
            parts = parts.filter(p => p.life > 0);
            if (bossState === BST.TRANS) { transState.t += dt; if (transState.t >= transState.dur && transState.active) { transState.active = false; const cb = transState.cb; transState.cb = null; if (cb) cb(); } return; }
            if (st === ST.DEAD) return;
            if (!isDialogActive2) {
                if (bossState === BST.P4) { pl.update(dt); updateP4(dt); }
                else if (bossState === BST.P5) { pl.update(dt); updateP5(dt); }
                else if (bossState === BST.P6) { pl.update(dt); updateP6(dt); }
            } else { pl.update(dt * .04); }
        }


        // ═══ MAIN DRAW
        function draw() {
            const t = globalTime / 1000;
            cx.clearRect(0, 0, W, H);

            if (bossState === BST.TRANS) {
                cx.fillStyle = '#010002'; cx.fillRect(0, 0, W, H);
                drawTransGlitch();
                drawParts();
                return;
            }

            const sk = getSh();
            cx.save();
            cx.translate(sk.x, sk.y);

            const phMap = { [BST.P4]: 4, [BST.P5]: 5, [BST.P6]: 6 };
            const phase = phMap[bossState] || 4;

            // LE BOSS EST TOUJOURS CENTRÉ MAINTENANT
            const bX = W / 2;
            const bY = H / 2;

            // 1. Décor et particules
            drawCathedralArena(t, phase, bX, bY);
            embers.spawn(phase); if (phase >= 4) embers.spawn(phase);
            embers.updateAndDraw(t, phase, bX, bY);

            // 2. Rendu du Boss (Aggrandi x2.5)
            cx.save();
            cx.translate(bX, bY);
            cx.scale(2.5, 2.5); // <-- C'est ici qu'on augmente la taille de +150%
            cx.translate(-bX, -bY);

            if (phase === 4) drawUltimateVoid(t, bX, bY);
            else if (phase === 5) drawOverloadVoid(t, bX, bY);
            else if (phase === 6) drawGodOfVoid(t, bX, bY);

            cx.restore();

            // 3. Arène et Joueur
            if (bossState === BST.P4) { drawArenaP4(t); if (pl.alive) pl.draw(cx, globalTime); }
            else if (bossState === BST.P5) { drawP5Waves(t); if (pl.alive) pl.draw(cx, globalTime); } // Grille supprimée !
            else if (bossState === BST.P6) { drawArenaP6(t); if (pl.alive) pl.draw(cx, globalTime); }

            // 4. Interface par-dessus
            drawParts();

            if (phase === 4) {
                cx.fillStyle = `rgba(255, 0, 255, ${0.05 + Math.random() * 0.05})`; cx.fillRect(0, 0, W, H);
            } else if (phase === 5) {
                cx.fillStyle = Math.random() > 0.5 ? `rgba(255, 215, 0, ${0.1 + Math.random() * 0.1})` : `rgba(255, 0, 255, ${0.1 + Math.random() * 0.1})`; cx.fillRect(0, 0, W, H);
            } else if (phase === 6) {
                cx.fillStyle = `rgba(255, 255, 255, ${0.02 + Math.sin(t * 2) * 0.02})`; cx.fillRect(0, 0, W, H);
            }

            cx.restore();
        }

        // ═══ INPUT
        document.addEventListener('keydown', e => {
            unlockAudio();
            // Dialogue
            if (isDialogActive2) {
                if (e.code === 'Space' || e.code === 'Enter') { showNextDialogue(); e.preventDefault(); }
                return;
            }
            if (bossState === BST.END || st === ST.DEAD) return;

            // TOUT L'ANCIEN SYSTÈME DE CASES A ÉTÉ SUPPRIMÉ ICI.
            // Le vaisseau gère ses mouvements tout seul grâce à "window.shipKeys".
        });

        window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        cv.addEventListener('mousedown', e => {
            unlockAudio();
            if (isDialogActive2 && e.button === 0) { showNextDialogue(); e.preventDefault(); return; }
            if (e.button === 0) {
                lmb = true;
                if (bossState === BST.P6 && p6.canClickBoss && !p6.clickTriggered) {
                    let bossBy = P6_PlatOY - 92; if (bossBy < 52) bossBy = 52;
                    const dx = e.clientX - W / 2, dy = e.clientY - bossBy;
                    if (Math.sqrt(dx * dx + dy * dy) < 90) {
                        p6.clickTriggered = true; p6.canClickBoss = false;
                        sfx.explode(); burst(W / 2, bossBy, K.red, 65, 11, 1300); addSh(22, 900); fScr(K.pur, 400); ono('INTRUSION LANCÉE!', W / 2 - 80, bossBy - 52, K.gold);
                        saveState({ downloadPct: 100 });
                        setTimeout(() => { window.location.href = 'boss50_partie3.html'; }, 800);
                    }
                }
            }
            if (e.button === 2) { rmb = true; e.preventDefault(); }
        });
        cv.addEventListener('mouseup', e => { if (e.button === 0) lmb = false; if (e.button === 2) rmb = false; });
        cv.addEventListener('contextmenu', e => e.preventDefault());

        window.km = {};
        window.addEventListener('keydown', e => window.km[e.code] = true);
        window.addEventListener('keyup', e => window.km[e.code] = false);

        //













        //


        //
        // ═══ CONTRÔLES DU VAISSEAU
        window.shipKeys = {};
        window.addEventListener('keydown', e => window.shipKeys[e.code] = true);
        window.addEventListener('keyup', e => window.shipKeys[e.code] = false);

        function loop(ts) { update(ts); draw(); requestAnimationFrame(loop); }
        resize();
        // load state from partie 1
        const _saved2 = loadState();

        // ── FORCER 5 VIES POUR LE GRAND FINAL ──
        maxLives = 5;
        lives = 5;
        // ───────────────────────────────────────

        buildP4Arena();

        // ── INITIALISATION DU VAISSEAU ──
        pl.px = W / 2;
        pl.py = H * 0.85;
        pl.inv = 1800;
        pl.alive = true;

        updateLivesHUD(); // Dessine les 5 cœurs !
        showShieldHUD(false);
        setDownload(50, 4);
        document.getElementById('boss-hud').style.opacity = '1';

        pageFlip('PHASE 4', 'LA SINGULARITÉ', () => {
            bossState = BST.P4;
            setPhaseHUD('PHASE 4 — LA SINGULARITÉ');
            showTimer(true);
            sfx.power();
        });

        requestAnimationFrame(loop);
    </script>
</body>
