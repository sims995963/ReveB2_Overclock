<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReveB 2 — OS_SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00F5FF;
    --red: #FF003C;
    --purple: #8A2BE2;
    --green: #00FF41;
    --bg-dark: #010005;
    --font-ui: 'Orbitron', sans-serif;
    --font-term: 'Share Tech Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background-color: var(--bg-dark);
    color: var(--cyan);
    font-family: var(--font-term);
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* --- EFFETS VISUELS GLOBAUX --- */
  #crt {
    position: fixed; inset: 0; z-index: 999; pointer-events: none;
    background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,.15) 50%),
                linear-gradient(90deg, rgba(0,245,255,.02), rgba(255,0,60,.02), rgba(138,43,226,.02));
    background-size: 100% 3px, 3px 100%;
    opacity: 0.8;
  }
  
  #vignette {
    position: fixed; inset: 0; z-index: 998; pointer-events: none;
    background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.9) 100%);
  }

  /* Grille animée en fond */
  #bg-grid {
    position: absolute; inset: -50%; z-index: 0;
    background-image: 
      linear-gradient(rgba(0, 245, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 245, 255, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
    animation: gridMove 10s linear infinite;
  }
  @keyframes gridMove { from { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); } to { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); } }

  /* --- ÉCRAN DE BOOT --- */
  #boot-screen {
    position: absolute; inset: 0; z-index: 50;
    padding: 40px;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .log-line { margin-bottom: 5px; opacity: 0; }

  /* --- MENU PRINCIPAL (GAUCHE) --- */
  #main-menu {
    position: absolute; left: 0; top: 0; bottom: 0; width: 50vw; z-index: 100;
    display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
    padding-left: 8vw;
    opacity: 0; pointer-events: none; transition: opacity 1s ease-in-out;
  }
  #main-menu.active { opacity: 1; pointer-events: all; }

  .sys-title {
    font-family: var(--font-ui); font-size: 4.5rem; font-weight: 900;
    letter-spacing: 10px; margin-bottom: 5px;
    text-shadow: 0 0 20px var(--cyan);
  }
  .sys-subtitle {
    font-size: 1rem; color: #aaa; margin-bottom: 40px; letter-spacing: 4px;
  }

  .menu-list { display: flex; flex-direction: column; gap: 15px; width: 450px; }

  .menu-btn {
    background: rgba(0, 20, 40, 0.6);
    border: 1px solid rgba(0, 245, 255, 0.3);
    border-left: 4px solid var(--cyan);
    color: var(--cyan);
    padding: 15px 25px;
    font-family: var(--font-ui); font-size: 1.1rem; font-weight: 700; letter-spacing: 3px;
    text-align: left; cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  
  .menu-btn::before { content: '> '; opacity: 0.5; transition: opacity 0.2s; }

  .menu-btn:hover {
    background: var(--cyan); color: #000;
    box-shadow: 0 0 25px rgba(0, 245, 255, 0.6);
    transform: translateX(15px);
  }
  .menu-btn:hover::before { opacity: 1; color: #000; }

  .btn-disabled { opacity: 0.4; pointer-events: none; border-left-color: #555; color: #888; }
  
  .btn-admin {
    border-left-color: var(--red); color: var(--red); margin-top: 20px;
    background: rgba(40, 0, 0, 0.6); border-color: rgba(255, 0, 60, 0.3);
  }
  .btn-admin:hover {
    background: var(--red); color: #000;
    box-shadow: 0 0 30px rgba(255, 0, 60, 0.8);
    animation: glitch-anim 0.2s infinite;
  }

  @keyframes glitch-anim {
    0% { transform: translateX(15px) translate(2px, 1px); }
    20% { transform: translateX(15px) translate(-2px, -1px); }
    40% { transform: translateX(15px) translate(1px, -2px); }
    60% { transform: translateX(15px) translate(-1px, 2px); }
    80% { transform: translateX(15px) translate(2px, -1px); }
    100% { transform: translateX(15px) translate(0); }
  }

  /* --- ZONE DE SCANNER / CRÉATION SPARKY (DROITE) --- */
  #scanner-zone {
    position: absolute; right: 0; top: 0; bottom: 0; width: 50vw; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 2s ease-in;
  }
  #scanner-zone.active { opacity: 1; }

  /* Sparky (Le petit carré holographique) */
  #sparky-core {
    position: relative;
    width: 60px; height: 60px;
    background: rgba(0, 245, 255, 0.85);
    border: 2px solid #FFF;
    box-shadow: 0 0 40px var(--cyan), inset 0 0 20px #FFF;
    transform: rotate(45deg);
    animation: sparkyFloat 3s ease-in-out infinite, sparkyGlitch 4s infinite;
  }
  
  #sparky-core::before, #sparky-core::after {
    content: ''; position: absolute; top: 15px; width: 8px; height: 12px; background: #FFF;
    box-shadow: 0 0 10px #FFF;
  }
  #sparky-core::before { left: 12px; }
  #sparky-core::after { right: 12px; }

  @keyframes sparkyFloat {
    0%, 100% { transform: translateY(0px) rotate(0deg); box-shadow: 0 0 40px var(--cyan); }
    50% { transform: translateY(-15px) rotate(0deg); box-shadow: 0 0 60px var(--cyan); }
  }

  @keyframes sparkyGlitch {
    95% { transform: translateY(0px) scale(1) skew(0deg); opacity: 1; }
    96% { transform: translateY(0px) scale(1.2) skew(20deg); opacity: 0.8; filter: hue-rotate(90deg); }
    97% { transform: translateY(0px) scale(0.9) skew(-20deg); opacity: 1; }
    98% { transform: translateY(0px) scale(1) skew(0deg); opacity: 1; filter: hue-rotate(0deg); }
  }

  /* --- DRONES DE CONSTRUCTION --- */
  .drone-orbit {
    position: absolute;
    left: 50%; top: 50%;
    animation: spin linear infinite;
    z-index: 60;
  }

  @keyframes spin { 100% { transform: rotate(360deg); } }

  .drone {
    position: absolute;
    width: 14px; height: 14px;
    background: #051005;
    border: 2px solid var(--green);
    box-shadow: 0 0 12px var(--green), inset 0 0 5px var(--green);
    border-radius: 3px;
    transform: translate(0, -50%);
  }
  .drone::after {
    content: ''; position: absolute;
    top: 3px; left: 3px; right: 3px; bottom: 3px;
    background: #fff; border-radius: 1px;
    animation: droneBlink 0.2s infinite alternate;
  }
  @keyframes droneBlink { from { opacity: 0.2; } to { opacity: 0.8; } }

  /* Faisceau du drone vers le centre */
  .drone-laser {
    position: absolute;
    left: 0; top: -1px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green));
    box-shadow: 0 0 10px var(--green);
    opacity: 0.6;
    animation: laserFlicker 0.1s infinite alternate;
  }
  @keyframes laserFlicker { from { opacity: 0.4; } to { opacity: 0.8; } }

  /* Orbites des 3 drones */
  .orb-1 { animation-duration: 3s; }
  .orb-1 .drone { left: 160px; }
  .orb-1 .drone-laser { width: 160px; }

  .orb-2 { animation-duration: 5s; animation-direction: reverse; }
  .orb-2 .drone { left: 210px; }
  .orb-2 .drone-laser { width: 210px; }

  .orb-3 { animation-duration: 4s; }
  .orb-3 .drone { left: 260px; }
  .orb-3 .drone-laser { width: 260px; }

  /* Particules générées */
  .build-particle {
    position: absolute;
    width: 4px; height: 4px;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
    transition: all 1.5s cubic-bezier(0.1, 0.8, 0.3, 1);
    pointer-events: none;
  }

  /* Textes HUD du scanner */
  .scan-hud {
    position: absolute;
    font-family: var(--font-term);
    color: var(--green);
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-shadow: 0 0 10px var(--green);
    white-space: nowrap;
    opacity: 0.8;
  }
  .hud-1 { top: 30%; left: 10%; transform: rotate(-15deg); }
  .hud-2 { bottom: 35%; right: 15%; transform: rotate(25deg); font-weight: bold; }

  /* Modale d'alerte */
  #modal {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(5,0,10,0.95); border: 2px solid var(--cyan); padding: 30px;
    z-index: 1000; display: none; text-align: center; box-shadow: 0 0 40px rgba(0,245,255,0.4);
  }
  #modal.error { border-color: var(--red); color: var(--red); box-shadow: 0 0 40px rgba(255,0,60,0.4); }
  
</style>
</head>
<body>

<div id="crt"></div>
<div id="vignette"></div>
<div id="bg-grid"></div>

<div id="boot-screen">
  <div id="logs"></div>
</div>

<div id="main-menu">
  <div class="sys-title">REVEB_OS</div>
  <div class="sys-subtitle">NOYAU v2.0.50 // CONNEXION STABLE</div>

  <div class="menu-list">
    <div class="menu-btn" onclick="startGame()">NOUVELLE SIMULATION</div>
    <div class="menu-btn" id="btn-continue" onclick="showModal('RESTAURATION EN COURS...', false)">RESTAURER SESSION</div>
    <div class="menu-btn" onclick="showModal('ACCÈS AUX MÉTRIQUES DU NOYAU', false)">MÉTRIQUES & SUCCÈS</div>
    <div class="menu-btn" onclick="showModal('OUVERTURE DES ARCHIVES...', false)">ARCHIVES SYSTÈME</div>
    <div class="menu-btn" onclick="showModal('PARAMÈTRES AUDIO/VIDÉO', false)">PARAMÈTRES</div>
    <div class="menu-btn" onclick="showModal('AFFICHER LES CONTRIBUTEURS', false)">CODE_SOURCE</div>
    <div class="menu-btn" onclick="quitGame()" style="margin-top:10px;">DÉCONNEXION</div>
    <div class="menu-btn btn-admin" onclick="adminAccess()">[ ACCÈS ADMIN ] 🔒</div>
  </div>
</div>

<div id="scanner-zone">
  
  <div class="drone-orbit orb-1">
    <div class="drone-laser"></div>
    <div class="drone"></div>
  </div>
  <div class="drone-orbit orb-2">
    <div class="drone-laser"></div>
    <div class="drone"></div>
  </div>
  <div class="drone-orbit orb-3">
    <div class="drone-laser"></div>
    <div class="drone"></div>
  </div>

  <div class="scan-hud hud-1">[ SCANNER PROTOCOLE 73 ]</div>
  <div class="scan-hud hud-2">[ MATÉRIALISATION DE SPARKY EN COURS ]</div>

  <div id="sparky-core"></div>
  
  <div id="particle-container" style="position:absolute; inset:0; pointer-events:none;"></div>
</div>

<div id="modal">
  <h2 id="modal-text" style="font-family:'Orbitron'; letter-spacing:2px;"></h2>
</div>

<script>
// --- GESTION AUDIO DE BASE ---
let aC = null;
function au() { if(!aC) aC = new(window.AudioContext||window.webkitAudioContext)(); return aC; }
function tone(f, tp, d, v=0.1) {
  try {
    const a = au(), o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = tp; o.frequency.value = f;
    g.gain.setValueAtTime(v, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + d);
    o.start(); o.stop(a.currentTime + d);
  } catch(e) {}
}

const sfx = {
  hover: () => tone(440, 'square', 0.05, 0.02),
  click: () => tone(880, 'sine', 0.1, 0.05),
  error: () => { tone(150, 'sawtooth', 0.3, 0.1); tone(100, 'square', 0.4, 0.1); },
  boot: () => tone(1200, 'sine', 0.05, 0.01),
  scan: () => tone(2000, 'sawtooth', 0.02, 0.005) 
};

document.querySelectorAll('.menu-btn').forEach(btn => {
  btn.addEventListener('mouseenter', sfx.hover);
});

// --- SÉQUENCE D'AMORÇAGE (BOOT) ---
const bootLogs = [
  "INITIALISATION DU NOYAU REVEB...",
  "VÉRIFICATION DES COMPOSANTS MAJEURS...",
  "[PHANT0M] : EN LIGNE",
  "[ARCHITECTE] : EN LIGNE",
  "[CHRONOS] : EN LIGNE",
  "RÉSOLUTION DES ANOMALIES...",
  "ATTENTION : INSTABILITÉ DÉTECTÉE AU PALIER 50.",
  "CONTOURNEMENT DES PROTOCOLES DE SÉCURITÉ...",
  "LANCEMENT DE L'INTERFACE GRAPHIQUE."
];

async function runBootSequence() {
  const logContainer = document.getElementById('logs');
  
  logContainer.innerHTML = "<div class='log-line' style='opacity:1; color:#FFD700; animation:blink 1s infinite;'>APPUYEZ SUR UNE TOUCHE POUR AMORCER LE SYSTÈME</div>";
  await new Promise(resolve => {
    window.addEventListener('keydown', resolve, {once:true});
    window.addEventListener('mousedown', resolve, {once:true});
  });
  
  logContainer.innerHTML = "";
  if(au().state === 'suspended') au().resume();

  for(let i=0; i<bootLogs.length; i++) {
    const el = document.createElement('div');
    el.className = 'log-line';
    el.textContent = "> " + bootLogs[i];
    logContainer.appendChild(el);
    
    setTimeout(() => { el.style.opacity = 1; sfx.boot(); }, 50);
    
    let waitTime = Math.random() * 300 + 100;
    if(i === 6) { el.style.color = "var(--red)"; waitTime = 800; }
    await new Promise(r => setTimeout(r, waitTime));
  }

  await new Promise(r => setTimeout(r, 600));
  document.getElementById('boot-screen').style.display = 'none';
  
  // Affiche le Menu ET le Scanner
  document.getElementById('main-menu').classList.add('active');
  document.getElementById('scanner-zone').classList.add('active');
  tone(600, 'sine', 0.8, 0.1); 
  
  checkSaveFile();
  startScannerParticles(); // Lance l'effet de matérialisation
}

// --- EFFET DE MATÉRIALISATION SPARKY (PARTICULES) ---
function startScannerParticles() {
  const container = document.getElementById('particle-container');
  
  setInterval(() => {
    const p = document.createElement('div');
    p.className = 'build-particle';
    
    // Position de départ (cercle large autour de Sparky)
    const angle = Math.random() * Math.PI * 2;
    const distance = 160 + Math.random() * 100;
    const startX = Math.cos(angle) * distance;
    const startY = Math.sin(angle) * distance;
    
    p.style.left = `calc(50% + ${startX}px)`;
    p.style.top = `calc(50% + ${startY}px)`;
    
    // Parfois rouge, parfois cyan, mais majoritairement vert
    const colors = ['#00FF41', '#00FF41', '#00FF41', '#00F5FF', '#FF003C'];
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.boxShadow = `0 0 10px ${p.style.background}`;

    container.appendChild(p);

    // Animation vers le centre (Sparky)
    setTimeout(() => {
      p.style.transform = `translate(${-startX}px, ${-startY}px)`;
      p.style.opacity = '0';
      if(Math.random() < 0.1) sfx.scan();
    }, 50);

    // Nettoyage du DOM
    setTimeout(() => p.remove(), 1500);
  }, 40);
}

function checkSaveFile() {
  const btnCont = document.getElementById('btn-continue');
  const hasSave = localStorage.getItem('rvb2_bossReturn') || localStorage.getItem('rvb2v6');
  if(!hasSave) {
    btnCont.classList.add('btn-disabled');
    btnCont.innerHTML = "RESTAURER SESSION [VIDE]";
    btnCont.onclick = null;
  }
}

// --- ACTIONS DES BOUTONS ---
function startGame() {
  sfx.click();
  document.getElementById('main-menu').style.opacity = '0';
  document.getElementById('main-menu').style.transform = 'scale(1.1)';
  document.getElementById('scanner-zone').style.opacity = '0';
  setTimeout(() => { window.location.href = "ReveB2_Overclock.html"; }, 1000);
}

function adminAccess() {
  sfx.error();
  const modal = document.getElementById('modal');
  const modalText = document.getElementById('modal-text');
  
  modal.className = "error";
  modalText.innerHTML = "ERREUR 403<br><br>ACCÈS REFUSÉ.<br><span style='font-size:0.6em; color:#888'>NIVEAU D'ACCRÉDITATION INSUFFISANT.</span>";
  modal.style.display = 'block';
  
  document.body.style.transform = "translate(5px, 5px)";
  setTimeout(() => document.body.style.transform = "translate(-5px, -5px)", 50);
  setTimeout(() => document.body.style.transform = "translate(0)", 100);
  setTimeout(() => { modal.style.display = 'none'; }, 2500);
}

function quitGame() {
  sfx.error();
  document.body.innerHTML = "<div style='height:100vh;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#FF003C;'>[ CONNEXION ROMPUE ]</div>";
  setTimeout(() => window.close(), 1000);
}

function showModal(text, isError) {
  sfx.click();
  const modal = document.getElementById('modal');
  const modalText = document.getElementById('modal-text');
  
  modal.className = isError ? "error" : "";
  modalText.textContent = text;
  modal.style.display = 'block';
  
  setTimeout(() => { modal.style.display = 'none'; }, 1500);
}

runBootSequence();

</script>
</body>
</html>
