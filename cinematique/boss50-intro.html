<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ReveB 2 — PALIER 50 : LE N.E.A.N.T</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --void: #050005;
      --white: #FFFFFF;
      --red: #FF003C;
      --pur: #8A2BE2;
      --bg: #010005;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
      color: #fff;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #crt {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, .15) 50%);
      background-size: 100% 3px;
      opacity: .9;
    }

    #vig {
      position: fixed;
      inset: 0;
      z-index: 998;
      pointer-events: none;
    }

    #glitch {
      position: fixed;
      inset: 0;
      z-index: 997;
      pointer-events: none;
      display: none;
    }

    #noise {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s;
      image-rendering: pixelated;
    }

    /* Fragments des boss passés */
    .ghost-boss {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      letter-spacing: 8px;
      opacity: 0;
      transition: opacity .5s;
    }

    #gb-p {
      top: 15%;
      left: 10%;
      color: rgba(255, 0, 60, .25);
      font-size: 1.4rem;
      transform: rotate(-5deg);
    }

    #gb-s {
      top: 12%;
      right: 8%;
      color: rgba(0, 245, 255, .2);
      font-size: 1.1rem;
    }

    #gb-a {
      bottom: 25%;
      left: 6%;
      color: rgba(255, 140, 0, .2);
      font-size: 1.2rem;
      transform: rotate(8deg);
    }

    #gb-dj {
      bottom: 20%;
      right: 10%;
      color: rgba(138, 43, 226, .2);
      font-size: 1rem;
      transform: rotate(-3deg);
    }

    #gb-ch {
      top: 50%;
      left: 3%;
      color: rgba(255, 215, 0, .18);
      font-size: 1.3rem;
      transform: translateY(-50%);
    }

    /* TEXTE CENTRAL — rupture du 4e mur */
    #wall {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      pointer-events: none;
    }

    #wall-box {
      width: min(680px, 88vw);
      text-align: center;
    }

    .wall-line {
      font-size: .92rem;
      line-height: 2.4;
      letter-spacing: .05em;
      opacity: 0;
      transition: opacity .4s;
      color: rgba(255, 255, 255, .88);
    }

    .wall-line.gray {
      color: rgba(255, 255, 255, .35);
    }

    .wall-line.red {
      color: rgba(255, 0, 60, .8);
    }

    .wall-line.accent {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: .12em;
      color: #fff;
      text-shadow: 0 0 20px rgba(255, 255, 255, .4);
    }

    .wall-line.void {
      color: rgba(138, 43, 226, .7);
    }

    /* Void meter */
    #void-meter {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      text-align: center;
      opacity: 0;
      transition: opacity .5s;
    }

    #vm-label {
      font-size: .65rem;
      letter-spacing: .15em;
      color: rgba(255, 255, 255, .3);
      margin-bottom: 8px;
    }

    #vm-bar {
      width: 300px;
      height: 4px;
      background: rgba(255, 255, 255, .08);
      position: relative;
      overflow: visible;
    }

    #vm-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, rgba(138, 43, 226, .6), #fff);
      box-shadow: 0 0 20px rgba(138, 43, 226, .5), 0 0 40px rgba(255, 255, 255, .2);
      transition: width .5s;
    }

    #vm-pct {
      font-size: 1.8rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      color: #fff;
      margin-top: 12px;
      text-shadow: 0 0 30px rgba(255, 255, 255, .5);
    }

    /* REVEAL final */
    #reveal {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1.8s;
      background: #000;
    }

    #r-palier {
      font-size: .78rem;
      letter-spacing: 12px;
      color: rgba(255, 255, 255, .3);
      margin-bottom: 20px;
    }

    #r-name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.8rem, 9vw, 7rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 16px;
      text-align: center;
      text-shadow: 0 0 60px rgba(138, 43, 226, .6), 0 0 120px rgba(255, 255, 255, .15);
      animation: glN .2s infinite alternate;
    }

    #r-sub {
      font-size: .88rem;
      letter-spacing: 8px;
      color: rgba(138, 43, 226, .6);
      margin-top: 14px;
    }

    #r-desc {
      font-size: .72rem;
      letter-spacing: .18em;
      color: rgba(255, 255, 255, .25);
      margin-top: 12px;
    }

    #r-quote {
      font-size: .76rem;
      color: rgba(255, 255, 255, .3);
      margin-top: 28px;
      text-align: center;
      line-height: 2.4;
      letter-spacing: 1.5px;
      max-width: 500px;
    }

    #r-quote span {
      color: rgba(138, 43, 226, .6);
    }

    @keyframes glN {
      0% {
        transform: skew(0);
        filter: blur(0);
      }

      100% {
        transform: skew(-2deg);
        filter: blur(.5px);
        text-shadow: 6px 0 rgba(138, 43, 226, .8), -6px 0 rgba(255, 0, 60, .5), 0 0 80px rgba(255, 255, 255, .2);
      }
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div id="crt"></div>
  <div id="vig"></div>
  <div id="glitch"></div>
  <canvas id="noise" width="200" height="200"></canvas>

  <!-- Fantômes des boss précédents -->
  <div class="ghost-boss" id="gb-p">PHANT0M</div>
  <div class="ghost-boss" id="gb-s">SYNC</div>
  <div class="ghost-boss" id="gb-a">ASYNC</div>
  <div class="ghost-boss" id="gb-dj">ARCHITECTE</div>
  <div class="ghost-boss" id="gb-ch">CHRONOS</div>

  <div id="wall">
    <div id="wall-box"></div>
  </div>

  <div id="void-meter">
    <div id="vm-label">NIVEAU DE CORRUPTION // N.E.A.N.T</div>
    <div id="vm-bar">
      <div id="vm-fill"></div>
    </div>
    <div id="vm-pct">0%</div>
  </div>

  <div id="reveal">
    <div id="r-palier">— PALIER 50 —</div>
    <div id="r-name">N.E.A.N.T</div>
    <div id="r-sub">L'ABYSSE — LE BOUTON QUITTER</div>
    <div id="r-desc">NÉANT · ENTITÉ · ABSOLUE · NÉGATRICE · DU · TOUT</div>
    <div id="r-quote"><span>"Je ne suis pas ton ennemi.<br>Je suis ta seule issue."</span></div>
  </div>

  <script>
    // ── AUDIO ──
    const au = new (AudioContext || webkitAudioContext)();
    function tone(f, tp, d, v = .05, t = 0) {
      const o = au.createOscillator(), g = au.createGain();
      o.connect(g); g.connect(au.destination);
      o.type = tp; o.frequency.value = f;
      g.gain.setValueAtTime(v, au.currentTime + t);
      g.gain.exponentialRampToValueAtTime(.0001, au.currentTime + t + d);
      o.start(au.currentTime + t); o.stop(au.currentTime + t + d);
    }
    function chord(fs, d, v = .04) { fs.forEach((f, i) => tone(f, 'sine', d, v, i * .06)); }
    // Deep drone
    let droneO, droneG;
    function startDrone() {
      droneO = au.createOscillator(); droneG = au.createGain();
      droneO.connect(droneG); droneG.connect(au.destination);
      droneO.type = 'sine'; droneO.frequency.value = 40;
      droneG.gain.setValueAtTime(0, au.currentTime);
      droneG.gain.linearRampToValueAtTime(.12, au.currentTime + 3);
      droneO.start();
    }
    function rampDrone(v, t = 2) { if (droneG) droneG.gain.linearRampToValueAtTime(v, au.currentTime + t); }
    const sfx = {
      static: () => { tone(200 + Math.random() * 800, 'sawtooth', .03, .04); },
      deep: () => chord([40, 50, 60, 80], 3, .06),
      consume: () => { for (let i = 0; i < 5; i++)tone(80 - i * 10, 'sine', .5, .08, i * .1); },
      void_: () => { tone(30, 'sine', 4, .3); tone(45, 'sine', 3, .15, .5); },
      whisper: () => tone(300 + Math.random() * 100, 'sine', .2, .015),
      crack: () => { tone(1000, 'square', .05, .1); tone(200, 'sawtooth', .2, .08, .03); },
      boom: () => { tone(30, 'sine', 3, .5); tone(50, 'square', 1.5, .2, .5); tone(80, 'sine', 2, .1, 1); },
      pulse: () => tone(55, 'sine', .8, .15),
    };

    // ── CANVAS ──
    const cv = document.getElementById('c'), cx = cv.getContext('2d');
    cv.width = innerWidth; cv.height = innerHeight;
    const W = cv.width, H = cv.height, CX = W / 2, CY = H / 2;

    // Noise canvas
    const nc = document.getElementById('noise'), ncx = nc.getContext('2d');
    function updateNoise() {
      const d = ncx.createImageData(200, 200);
      for (let i = 0; i < d.data.length; i += 4) {
        const v = Math.random() * 255; d.data[i] = v; d.data[i + 1] = v; d.data[i + 2] = v; d.data[i + 3] = 20 + Math.random() * 30;
      }
      ncx.putImageData(d, 0, 0);
    }

    let cT = 0, phase = 0;
    let voidR = 0, voidTarget = 0; // void circle radius
    let corruptionPct = 0;
    let staticParticles = [];
    const rng = (a, b) => Math.random() * (b - a) + a;

    // Static particles (corruption)
    for (let i = 0; i < 200; i++) {
      staticParticles.push({
        x: Math.random() * W, y: Math.random() * H,
        life: Math.random(), speed: Math.random() * .5 + .1,
        size: Math.random() * 2 + .5
      });
    }

    function drawVoid() {
      if (voidR <= 0) return;
      // The void consumes
      cx.save();
      // Outer void edge glow (purple)
      const edgeGr = cx.createRadialGradient(CX, CY, voidR * .9, CX, CY, voidR + 40);
      edgeGr.addColorStop(0, 'rgba(138,43,226,.08)');
      edgeGr.addColorStop(.5, 'rgba(138,43,226,.04)');
      edgeGr.addColorStop(1, 'transparent');
      cx.fillStyle = edgeGr; cx.beginPath(); cx.arc(CX, CY, voidR + 40, 0, Math.PI * 2); cx.fill();

      // The void itself (cut black hole)
      cx.globalCompositeOperation = 'source-over';
      cx.fillStyle = 'rgba(0,0,0,.95)';
      cx.beginPath(); cx.arc(CX, CY, voidR, 0, Math.PI * 2); cx.fill();

      // Inner void pulse
      const beat = .5 + Math.sin(cT * .04) * .5;
      const vgr = cx.createRadialGradient(CX, CY, 0, CX, CY, voidR * .8);
      vgr.addColorStop(0, 'transparent');
      vgr.addColorStop(.7, 'transparent');
      vgr.addColorStop(1, `rgba(138,43,226,${beat * .15})`);
      cx.fillStyle = vgr; cx.beginPath(); cx.arc(CX, CY, voidR * .8, 0, Math.PI * 2); cx.fill();

      // Edge shimmer
      cx.beginPath(); cx.arc(CX, CY, voidR, 0, Math.PI * 2);
      cx.strokeStyle = `rgba(138,43,226,${.3 + beat * .3})`;
      cx.lineWidth = 2; cx.shadowColor = '#8A2BE2'; cx.shadowBlur = 20; cx.stroke();
      cx.shadowBlur = 0; cx.globalCompositeOperation = 'source-over';
      cx.restore();
    }

    function drawStaticParticles() {
      const alpha = corruptionPct / 100 * .6;
      staticParticles.forEach(p => {
        p.life += p.speed * .01;
        p.y += p.speed;
        if (p.y > H) { p.y = 0; p.x = Math.random() * W; }
        const d = Math.hypot(p.x - CX, p.y - CY);
        if (d < voidR + 10) return; // inside void = hidden
        const pa = alpha * (Math.sin(p.life * Math.PI) * .5 + .5);
        cx.fillStyle = `rgba(255,255,255,${pa})`;
        cx.fillRect(p.x, p.y, p.size, p.size);
        // Occasional red corruption fleck
        if (Math.random() < .01) {
          cx.fillStyle = `rgba(255,0,60,${pa * .8})`;
          cx.fillRect(p.x + rng(-3, 3), p.y + rng(-3, 3), p.size, p.size);
        }
      });
    }

    // Corruption grid (fading)
    function drawGrid() {
      const alpha = Math.max(0, .04 * (1 - corruptionPct / 120));
      cx.strokeStyle = `rgba(138,43,226,${alpha})`; cx.lineWidth = .5;
      for (let x = 0; x < W; x += 60) {
        const xw = x + Math.sin(cT * .01 + x * .005) * corruptionPct * .3;
        cx.beginPath(); cx.moveTo(xw, 0); cx.lineTo(xw, H); cx.stroke();
      }
      for (let y = 0; y < H; y += 60) {
        const yw = y + Math.cos(cT * .01 + y * .005) * corruptionPct * .3;
        cx.beginPath(); cx.moveTo(0, yw); cx.lineTo(W, yw); cx.stroke();
      }
    }

    function render() {
      const bgAlpha = .08 + corruptionPct * .001;
      cx.fillStyle = `rgba(0,0,0,${bgAlpha})`; cx.fillRect(0, 0, W, H);
      drawGrid();
      drawStaticParticles();
      drawVoid();
      if (Math.random() < .04) sfx.static();
      if (cT % 4 === 0) updateNoise();
      voidR += (voidTarget - voidR) * .02;
      cT++; requestAnimationFrame(render);
    }

    // ── WALL TEXT ──
    const wait = ms => new Promise(r => setTimeout(r, ms));
    const wallBox = document.getElementById('wall-box');
    let wallLines = [];

    function addWallLine(text, cls = '', delay = 0) {
      return new Promise(async r => {
        await wait(delay);
        const d = document.createElement('div');
        d.className = 'wall-line' + (cls ? ' ' + cls : '');
        d.textContent = text; wallBox.appendChild(d); wallLines.push(d);
        requestAnimationFrame(() => d.style.opacity = '1');
        sfx.whisper(); r();
      });
    }

    function clearWall(speed = 600) {
      return new Promise(async r => {
        wallLines.forEach(l => { l.style.opacity = '0'; });
        await wait(speed + 200);
        wallLines.forEach(l => l.remove());
        wallLines = []; wallBox.innerHTML = ''; r();
      });
    }

    function setVoid(pct, animated = true) {
      corruptionPct = pct;
      document.getElementById('vm-fill').style.width = pct + '%';
      document.getElementById('vm-pct').textContent = pct + '%';
      if (pct > 60) { document.getElementById('vm-pct').style.color = 'rgba(138,43,226,.9)'; }
      if (pct > 85) { document.getElementById('vm-pct').style.textShadow = '0 0 20px #8A2BE2'; }
    }

    async function run() {
      document.addEventListener('click', () => au.resume(), { once: true });
      au.resume(); render();
      await wait(300); startDrone();
      await wait(800);

      // Phase 0: Ghost boss fragments appear
      phase = 1;
      const ghosts = ['gb-p', 'gb-s', 'gb-a', 'gb-dj', 'gb-ch'];
      for (const id of ghosts) {
        document.getElementById(id).style.opacity = '1';
        await wait(180);
      }
      await wait(1200);

      // Consume the ghosts (void begins)
      voidTarget = 80;
      sfx.consume(); rampDrone(.2, 2);
      for (const id of ghosts) {
        await wait(250);
        document.getElementById(id).style.opacity = '0';
      }
      await wait(1000);

      // Phase 1: First wall break
      phase = 2; voidTarget = 180;
      document.getElementById('void-meter').style.opacity = '1';
      setVoid(15);

      await addWallLine('...', '', 400);
      await wait(1200);
      await clearWall();

      await addWallLine("Je ne parle pas à Sparky.", '', 600);
      sfx.deep(); await wait(2200); await clearWall();

      voidTarget = 260; setVoid(28); sfx.pulse();

      await addWallLine("Je te parle, TOI.", 'accent', 300);
      await wait(500);
      await addWallLine("Oui. Toi. Celui qui tient la souris.", 'gray', 0);
      await wait(2800); await clearWall();

      // Phase 2: Accusation
      voidTarget = 350; setVoid(42); rampDrone(.3, 2); sfx.crack();
      await wait(400);

      await addWallLine("Tu as lancé ce jeu.", '', 300);
      await wait(400);
      await addWallLine("Tu as décidé de te battre.", '', 0);
      await wait(400);
      await addWallLine("Tu as forcé SPARK-Y à avancer.", 'red', 0);
      await wait(2600); await clearWall();

      sfx.crack();
      const glitch = document.getElementById('glitch');
      for (let i = 0; i < 4; i++) {
        glitch.style.background = i % 2 === 0 ? 'rgba(255,0,60,.15)' : 'rgba(138,43,226,.15)';
        glitch.style.display = 'block'; sfx.static();
        document.body.style.transform = `translate(${rng(-8, 8)}px,0) skew(${rng(-2, 2)}deg)`;
        await wait(90); glitch.style.display = 'none'; document.body.style.transform = ''; await wait(70);
      }

      voidTarget = 430; setVoid(55);

      await addWallLine("SPARK-Y était un protocole de RÉPARATION.", '', 400);
      await wait(500);
      await addWallLine("Sa fonction : réparer les erreurs du système.", 'gray', 0);
      await wait(2200); await clearWall();

      // Phase 3: The truth
      phase = 3; voidTarget = 520; setVoid(68); rampDrone(.4, 2); sfx.void_();
      nc.style.opacity = '.4';

      await wait(500);
      await addWallLine("PHANT0M. SYNC. ASYNC.", 'red', 300);
      await wait(400);
      await addWallLine("L'ARCHITECTE. CHRONOS.", 'red', 0);
      await wait(600);
      await addWallLine("Tous détruits. À cause de TOI.", 'accent', 0);
      await wait(3000); await clearWall();

      sfx.boom(); voidTarget = 600; setVoid(78);
      for (let i = 0; i < 8; i++) {
        document.body.style.transform = `translate(${rng(-12, 12)}px,${rng(-6, 6)}px)`;
        glitch.style.background = 'rgba(0,0,0,.5)'; glitch.style.display = 'block';
        sfx.static(); await wait(80);
        glitch.style.display = 'none'; document.body.style.transform = ''; await wait(60);
      }

      await addWallLine("Tu pensais être le héros ?", '', 400);
      await wait(600);
      await addWallLine("Regarde ce que tu as fait.", 'gray', 0);
      await wait(2400); await clearWall();

      // Phase 4: The offer
      phase = 4; voidTarget = 680; setVoid(88); rampDrone(.5, 2); nc.style.opacity = '.7';
      sfx.pulse(); await wait(600);

      await addWallLine("Moi ?", '', 300);
      await wait(800);
      await addWallLine("Je suis l'échappatoire.", 'void', 0);
      await wait(500);
      await addWallLine("Le Système t'appelle ennemi.", 'gray', 0);
      await wait(400);
      await addWallLine("Mais je suis juste... la sortie.", '', 0);
      await wait(2800); await clearWall();

      sfx.void_(); voidTarget = 750; setVoid(96);

      await addWallLine("Atteins 100%.", 'accent', 400);
      await wait(600);
      await addWallLine("Et libère-nous tous.", 'void', 0);
      await wait(2200); await clearWall();

      // Final glitch storm
      setVoid(100); voidTarget = 820; rampDrone(.8, 1); sfx.boom();
      for (let i = 0; i < 20; i++) {
        glitch.style.background = i % 3 === 0 ? 'rgba(255,255,255,.15)' : i % 3 === 1 ? 'rgba(138,43,226,.2)' : 'rgba(0,0,0,.6)';
        glitch.style.display = 'block';
        document.body.style.transform = `translate(${rng(-15, 15)}px,${rng(-8, 8)}px) skew(${rng(-4, 4)}deg) scaleY(${rng(.96, 1.04)})`;
        sfx.static(); sfx.crack(); await wait(65);
        glitch.style.display = 'none'; document.body.style.transform = ''; await wait(40);
      }

      // Silence
      rampDrone(0, 1); nc.style.opacity = '0';
      document.getElementById('void-meter').style.opacity = '0';
      document.getElementById('vig').style.background = 'radial-gradient(circle at center,transparent 0%,rgba(0,0,0,.99) 100%)';

      voidTarget = W; await wait(1200);

      // REVEAL
      phase = 5;
      const rev = document.getElementById('reveal');
      rev.style.opacity = '1';
      sfx.void_(); sfx.pulse();

      await wait(5000);
      document.body.style.transition = 'opacity 1.5s'; document.body.style.opacity = '0';
      await wait(1600);
      window.location.href = '../boss50.html';
    }
    run();
  </script>
</body>

</html>
