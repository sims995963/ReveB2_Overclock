<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ReveB 2 — Les Archives de la Chute</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bangers&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Share Tech Mono', 'Courier New', monospace
    }

    canvas {
      display: block;
      cursor: none
    }

    #gl {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10
    }

    #gl::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 28%, rgba(0, 0, 0, .35) 70%, rgba(0, 0, 0, .85) 100%)
    }

    #fx {
      position: fixed;
      inset: 0;
      z-index: 88;
      opacity: 0;
      pointer-events: none;
      transition: opacity .05s
    }

    #tr {
      position: fixed;
      inset: 0;
      z-index: 95;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity .12s
    }

    #tr.show {
      opacity: 1
    }

    .th {
      flex: 1;
      position: relative;
      overflow: hidden
    }

    .th:first-child {
      background: linear-gradient(135deg, #1a0008, #06000a);
      border-bottom: 2px solid rgba(138, 43, 226, .5);
      transition: transform .4s cubic-bezier(.86, 0, .07, 1)
    }

    .th:last-child {
      background: linear-gradient(135deg, #000a1a, #00040d);
      border-top: 2px solid rgba(138, 43, 226, .5);
      transition: transform .4s cubic-bezier(.86, 0, .07, 1) .04s
    }

    #tr.open .th:first-child {
      transform: translateY(-100%)
    }

    #tr.open .th:last-child {
      transform: translateY(100%)
    }

    .tt {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-weight: 900;
      font-size: clamp(1.3rem, 3.8vw, 2.5rem);
      letter-spacing: .15em;
      color: #fff;
      text-align: center;
      text-shadow: 0 0 20px #8A2BE2, 0 0 40px #8A2BE2
    }

    .tt span {
      display: block;
      font-size: .36em;
      letter-spacing: .3em;
      opacity: .5;
      margin-top: .3em
    }

    .ono {
      position: fixed;
      font-family: 'Bangers', cursive;
      font-weight: 900;
      pointer-events: none;
      z-index: 85;
      letter-spacing: .04em;
      white-space: pre;
      line-height: 1;
      text-align: center;
      animation: oA .85s cubic-bezier(.22, 1, .36, 1) forwards;
      text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 0 0 14px currentColor
    }

    @keyframes oA {
      0% {
        opacity: 1;
        transform: scale(.25)
      }

      18% {
        opacity: 1;
        transform: scale(1.35)
      }

      55% {
        opacity: 1;
        transform: scale(1)
      }

      100% {
        opacity: 0;
        transform: scale(.85) translateY(-38px)
      }
    }

    #scan {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px, rgba(0, 0, 0, .06) 3px, rgba(0, 0, 0, .06) 4px)
    }

    /* ═══ CINEMATIC LAYER (3D Tunnel & Textes) ═══ */
    #cine-layer {
      position: fixed;
      inset: 0;
      z-index: 900;
      background: #010005;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 2s ease-in-out;
    }

    canvas#cine-bg {
      position: absolute;
      inset: 0;
      z-index: 901;
      opacity: 0.3;
      transition: filter 2s, opacity 2s;
    }

    #ctlines {
      position: relative;
      z-index: 950;
      width: 85%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      font-size: clamp(1rem, 2vw, 1.5rem);
    }

    .cl {
      opacity: 0;
      transition: opacity 0.5s;
      line-height: 1.5;
      text-shadow: 0 0 10px currentColor;
      font-family: 'Share Tech Mono', monospace;
    }

    .wh {
      color: #fff;
    }

    .gr {
      color: #00FF41;
    }

    .rd {
      color: #FF003C;
      text-shadow: 0 0 8px rgba(255, 0, 60, .4);
    }

    .pu {
      color: #8A2BE2;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.05em;
      text-shadow: 0 0 14px rgba(138, 43, 226, .7);
    }

    .cy {
      color: #00F5FF;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.05em;
      text-shadow: 0 0 14px rgba(0, 245, 255, .7);
    }

    .fat {
      font-size: 1.5em;
      font-weight: 900;
      color: #FF003C;
      text-shadow: 0 0 18px rgba(255, 0, 60, .7), -3px 0 #00F5FF, 3px 0 #8A2BE2;
      animation: textShake 0.2s infinite;
    }

    .cbar-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: 6px;
      border: 2px solid currentColor;
      height: 15px;
      width: 300px;
      box-shadow: 0 0 10px currentColor;
    }

    .cbar {
      display: block;
      height: 100%;
      width: 100%;
      padding: 2px;
    }

    .cbar-fill {
      display: block;
      height: 100%;
      background: currentColor;
      width: 0%;
      box-shadow: 0 0 6px currentColor;
      transition: width 0.04s;
    }

    .glitch-active {
      animation: screenTear 0.2s forwards;
      filter: invert(1) hue-rotate(180deg);
    }

    @keyframes screenTear {
      0% {
        transform: translate(0, 0) skew(0deg);
      }

      25% {
        transform: translate(-20px, 10px) skew(15deg);
      }

      50% {
        transform: translate(20px, -10px) skew(-15deg);
      }

      75% {
        transform: translate(-10px, -20px) skew(5deg);
      }

      100% {
        transform: translate(0, 0) skew(0deg);
      }
    }

    @keyframes textShake {

      0%,
      100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(-2px, 1px);
      }
    }

    /* ═══ DIALOGUE (scene 4) ═══ */
    #dlg {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0, 0, 0, .97);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 5vw
    }

    #dlg.active {
      display: flex
    }

    #dlg-box {
      width: min(640px, 90vw)
    }

    #dlg-sp {
      font-size: 11px;
      letter-spacing: .2em;
      margin-bottom: 10px;
      padding-left: 4px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
    }

    #dlg-txt {
      font-size: clamp(12px, 1.6vw, 15px);
      line-height: 2.1;
      letter-spacing: .04em;
      padding: 20px 24px;
      border-left: 3px solid currentColor;
      background: rgba(0, 0, 0, .85);
      min-height: 64px;
      white-space: pre-wrap
    }

    #dlg-cont {
      margin-top: 18px;
      font-size: 10px;
      color: #333;
      letter-spacing: .12em;
      text-align: right;
      animation: blink .9s step-end infinite
    }

    #dlg-prog {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 2px;
      background: #8A2BE2;
      box-shadow: 0 0 8px #8A2BE2;
      transition: width .25s
    }

    #dlg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px, rgba(0, 0, 0, .06) 3px, rgba(0, 0, 0, .06) 4px);
      pointer-events: none
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    .cur {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: #555;
      vertical-align: text-bottom;
      animation: blink .65s step-end infinite
    }

    /* ═══ GAME HUD hints ═══ */
    #hints {
      position: fixed;
      bottom: 42px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity .6s
    }

    .hl {
      font-size: 10px;
      color: rgba(180, 150, 255, .7);
      letter-spacing: .07em;
      line-height: 2.1
    }

    /* purge timer */
    #purge {
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 20;
      opacity: 0;
      transition: opacity .4s;
      text-align: right;
      pointer-events: none
    }

    #purge-lbl {
      font-size: 9px;
      color: #550000;
      letter-spacing: .12em
    }

    #purge-val {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      color: #ff2244;
      text-shadow: 0 0 14px rgba(255, 34, 68, .7)
    }

    @keyframes purge-blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    /* zone hint */
    #zhint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 60;
      background: rgba(0, 0, 0, .92);
      border: 1px solid #8A2BE2;
      padding: 16px 28px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s;
      box-shadow: 0 0 30px rgba(138, 43, 226, .18)
    }

    #zhint .zh1 {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      color: #8A2BE2;
      letter-spacing: .12em;
      margin-bottom: 8px
    }

    #zhint .zh2 {
      font-size: 11px;
      color: #777;
      letter-spacing: .06em;
      line-height: 1.6
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div id="gl"></div>
  <div id="fx"></div>
  <div id="tr">
    <div class="th">
      <div class="tt" id="t1"></div>
    </div>
    <div class="th">
      <div class="tt" id="t2"></div>
    </div>
  </div>
  <div id="scan"></div>

  <div id="cine-layer">
    <canvas id="cine-bg"></canvas>
    <div id="ctlines"></div>
  </div>

  <div id="dlg">
    <div id="dlg-box">
      <div id="dlg-sp"></div>
      <div id="dlg-txt"><span class="cur"></span></div>
      <div id="dlg-cont">[ ESPACE / CLIC — Continuer ]</div>
    </div>
    <div id="dlg-prog" style="width:0%"></div>
  </div>

  <div id="hints">
    <div class="hl" id="h-move">ZQSD / Flèches : Déplacer · ESPACE : DASH</div>
    <div class="hl" id="h-scan" style="opacity:0;transition:opacity .5s">CLIC DROIT : Scanner · CLIC GAUCHE sur source :
      Activer</div>
  </div>
  <div id="purge">
    <div id="purge-lbl">PURGE DANS</div>
    <div id="purge-val">05:00</div>
  </div>
  <div id="zhint">
    <div class="zh1" id="zh1"></div>
    <div class="zh2" id="zh2"></div>
  </div>

  <script src="../stat.js"></script>
  <script src="../joueur.js"></script>

  <script>
    "use strict";

    // ═══════════════════════════════════════════════════════════════════
    //  RESET COMPLET
    // ═══════════════════════════════════════════════════════════════════
    (function resetNewGame() {
      const GAME_KEYS = ['rvb2_stats', 'rvb2_power_clone', 'rvb2_power_regen', 'rvb2_power_slowmo', 'rvb2_power_invis', 'rvb2_power_temporal', 'rvb2_power_beatdash', 'rvb2_corruption', 'rvb2_preBoss', 'rvb2_bossReturn'];
      GAME_KEYS.forEach(k => { try { localStorage.removeItem(k); } catch (e) { } });
      if (typeof gameStats !== 'undefined') {
        gameStats.corruption = 0; gameStats.epargner = 0; gameStats.formater = 0;
        gameStats.hasInvis = false; gameStats.hasClone = false; gameStats.hasRegen = false; gameStats.hasSlowmo = false;
        gameStats.save();
      }
    })();

    // ═══════════════════════════════════════════════════════════════════
    //  CANVAS SETUP (JEU + CINEMATIQUE)
    // ═══════════════════════════════════════════════════════════════════
    const cv = document.getElementById('c'), cx = cv.getContext('2d');
    const fogCv = document.createElement('canvas'), fogCx = fogCv.getContext('2d');
    const cvCine = document.getElementById('cine-bg'), cxCine = cvCine.getContext('2d');

    let W, H, GSZ, TSZ, OX, OY;
    function resize() {
      W = cv.width = fogCv.width = cvCine.width = innerWidth;
      H = cv.height = fogCv.height = cvCine.height = innerHeight;
      GSZ = Math.floor(Math.min(W, H) * .92);
    }
    resize();
    function relayout() { TSZ = Math.floor(GSZ / gSize); OX = Math.floor((W - TSZ * gSize) / 2); OY = Math.floor((H - TSZ * gSize) / 2) }
    addEventListener('resize', () => { resize(); relayout() });
    cv.addEventListener('contextmenu', e => e.preventDefault());

    // ═══════════════════════════════════════════════════════════════════
    //  CONSTANTS & UTILS MATHS
    // ═══════════════════════════════════════════════════════════════════
    const K = { pur: '#8A2BE2', wh: '#fff', bk: '#000', gold: '#FFD700', red: '#FF003C', green: '#00FF41', pink: '#FF10F0', blue: '#00F5FF', cyan: '#00F5FF' };
    const T = { HOLE: 0, SOLID: 1, GHOST: 2, PORTAL: 3 };
    const ST = { PLAY: 2, DEAD: 3, PAUSE: 5 };

    const lerp = (a, b, t) => a + (b - a) * t, clamp = (v, a, b) => Math.max(a, Math.min(b, v)), rng = (a, b) => a + Math.random() * (b - a);
    const shuffle = a => { for (let i = a.length - 1; i > 0; i--) { const j = ~~(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]] } return a };
    const tk = (x, y) => `${x},${y}`, inB = (x, y) => x >= 0 && y >= 0 && x < gSize && y < gSize;
    const px2 = gx => OX + gx * TSZ + TSZ / 2, py2 = gy => OY + gy * TSZ + TSZ / 2;
    const D4 = [{ dx: 1, dy: 0 }, { dx: -1, dy: 0 }, { dx: 0, dy: 1 }, { dx: 0, dy: -1 }];
    const glow = (c, b) => { cx.shadowColor = c; cx.shadowBlur = b }, noGlow = () => { cx.shadowBlur = 0 };
    function solid(x, y) { if (!inB(x, y)) return false; const t = grid[y][x]; return t >= T.SOLID }

    // ═══════════════════════════════════════════════════════════════════
    //  GAME STATE
    // ═══════════════════════════════════════════════════════════════════
    let st = ST.PLAY, gSize = 14, grid = [], traps = [], parts = [], shakes = [];
    let lives = 3, maxLives = 3, gTime = 0, bT = 0;
    let ghostBrk = {}, dAnim = 0, dTiles = [];
    let score = 0, best = 0, col = 'red'; // <<< Déclaration obligatoire pour joueur.js
    function doS() { }
    function isOnSafe() { return pl.gx === spawn.x && pl.gy === spawn.y }

    let portalOpen = false, torches = [];
    let pxLayers = [], glOn = false, glD = 0, glOff = 0;
    let mx = W / 2, my = H / 2, rmb = false, lmb = false;
    let gameActive = false, purgeMs = 300000, tutZone = 0, zhintTimer = 0;

    const spawn = { x: 1, y: 6 }, portal = { x: 12, y: 6 };
    const brokenSword = { gx: 7, gy: 6, interacted: false };

    let pl = typeof Joueur !== 'undefined' ? new Joueur() : { update: () => { }, draw: () => { }, reset: () => { } };
    pl.kill = function () {
      if (!this.alive) return;
      this.alive = false;
      sfx.die(); burst(this.px, this.py, K.pur, 38, 6, 700); ring(this.px, this.py, K.pur, TSZ * 1.4); addSh(12, 400); fScr(K.pur, 280);
      ono('FORMATÉ!', this.px - 20, this.py - 35, K.pur);
      setTimeout(() => { lives = maxLives; this.reset(spawn.x, spawn.y); tutZone = 0; }, 2000);
    };

    // ─── Inputs
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY });
    cv.addEventListener('mousedown', e => {
      if (e.button === 2) { rmb = true; e.preventDefault() }
      if (e.button === 0) { lmb = true; handleLClick() }
    });
    cv.addEventListener('mouseup', e => { if (e.button === 2) rmb = false; if (e.button === 0) lmb = false });
    document.addEventListener('click', () => {
      if (dlgActive) { advanceDlg(); return }
      if (gameActive && rmb) { activateTorchAt(Math.floor((mx - OX) / TSZ), Math.floor((my - OY) / TSZ)) }
    });

    function handleLClick() {
      if (gameActive && rmb) { activateTorchAt(Math.floor((mx - OX) / TSZ), Math.floor((my - OY) / TSZ)) }
    }
    function activateTorchAt(gx, gy) {
      for (const t of torches) {
        if (!t.lit && t.x === gx && t.y === gy) {
          t.lit = true; t.an = 0;
          sfx.core(); burst(px2(t.x), py2(t.y), K.pur, 14, 4, 450);
          ono('ACTIVÉ!', px2(t.x), py2(t.y) - 20, K.pur);
          break;
        }
      }
    }

    // ═══════════════════════════════════════════════════════════════════
    //  WEB AUDIO ENGINE (Avec ajouts cinématiques)
    // ═══════════════════════════════════════════════════════════════════
    let aC = null;
    function au() { if (!aC) aC = new (window.AudioContext || window.webkitAudioContext)(); if (aC.state === 'suspended') aC.resume(); return aC }
    function tone(f, tp, d, v = 0.1) { try { const a = au(), o = a.createOscillator(), g = a.createGain(); o.connect(g); g.connect(a.destination); o.type = tp; o.frequency.value = f; g.gain.setValueAtTime(v, a.currentTime); g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + d); o.start(); o.stop(a.currentTime + d) } catch { } }

    const sfx = {
      key: () => tone(480 + Math.random() * 320, 'square', .038, .042),
      move: () => tone(280, 'square', .04, .03),
      dash: () => { tone(660, 'sine', .1, .08); tone(820, 'square', .05, .04) },
      hit: () => tone(200, 'sawtooth', .15, .11),
      die: () => { tone(100, 'sawtooth', .4, .18); tone(70, 'square', .3, .13) },
      btn: () => tone(440, 'sine', .06, .04),
      core: () => { tone(1320, 'sine', .16, .11); tone(1760, 'sine', .12, .07) },
      portal: () => { tone(880, 'sine', .28, .13); tone(1200, 'sine', .18, .08) },
      alert: () => tone(600, 'square', .07, .05),
      zap: () => tone(800, 'square', .12, .09),
      sysType: () => tone(800, 'sine', .04, .05),
      neantType: () => tone(150, 'sawtooth', .06, .1),
      error: () => playGlitch(),  // <--- AJOUT ICI
      boom: () => playBoom(),     // <--- AJOUT ICI
      suck: () => {
        try {
          const a = au(), now = a.currentTime;
          let o = a.createOscillator(), g = a.createGain();
          o.type = 'sawtooth'; o.connect(g); g.connect(a.destination);
          o.frequency.setValueAtTime(40, now); o.frequency.exponentialRampToValueAtTime(600, now + 2.5);
          g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0.6, now + 2.5);
          o.start(now); o.stop(now + 2.5);
        } catch { }
      }
    };

    let padNodes = [], padMaster = null;
    function playPad(vol = .10) {
      try {
        const a = au(), now = a.currentTime;
        const m = a.createGain(); m.gain.setValueAtTime(0, now); m.gain.linearRampToValueAtTime(vol, now + 2.8); m.connect(a.destination); padMaster = m;
        [[220, 0], [277.18, .1], [329.63, .2], [415.3, .3], [554.37, .4]].forEach(([f, d], i) => {
          const o = a.createOscillator(), g = a.createGain();
          o.type = 'sine'; o.frequency.value = f; o.detune.value = (Math.random() - .5) * 10; g.gain.value = .22 - i * .03;
          o.connect(g); g.connect(m); o.start(now + d); padNodes.push(o);
        });
        const lfo = a.createOscillator(), lG = a.createGain();
        lfo.frequency.value = .2; lG.gain.value = .009; lfo.connect(lG); lG.connect(m.gain); lfo.start(now); padNodes.push(lfo);
      } catch { }
    }
    function distortPad() {
      if (!padMaster) return;
      try {
        const a = au(), now = a.currentTime;
        padMaster.gain.setTargetAtTime(.02, now, .4);
        const o = a.createOscillator(), g = a.createGain();
        o.type = 'sawtooth'; o.frequency.setValueAtTime(440, now); o.frequency.exponentialRampToValueAtTime(28, now + .35);
        g.gain.setValueAtTime(.22, now); g.gain.exponentialRampToValueAtTime(.001, now + .38);
        o.connect(g); g.connect(a.destination); o.start(now); o.stop(now + .4);
      } catch { }
    }
    function stopPad() {
      if (!padMaster) return;
      try { padMaster.gain.setTargetAtTime(0, au().currentTime, .25); } catch { }
      setTimeout(() => { padNodes.forEach(n => { try { n.stop && n.stop() } catch { } }); padNodes = []; padMaster = null; }, 900);
    }
    function playGlitch() {
      try {
        const a = au(), now = a.currentTime;
        const buf = a.createBuffer(1, Math.ceil(a.sampleRate * .1), a.sampleRate);
        const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++)d[i] = (Math.random() * 2 - 1) * (Math.random() < .1 ? 1 : .1);
        const src = a.createBufferSource(); src.buffer = buf;

      const n2 = mkLine('pu'); n2.style.fontSize = '1.2em'; await typeText(n2, '[ N.E.A.N.T ] : DÉTOURNEMENT VERS LA ZONE DE PURGE.', 30, sfx.neantType);

      sfx.suck();
      gridSpeedCine = 40; gridColorCine = 'rgba(255, 0, 60, 0.8)'; cvCine.style.filter = 'drop-shadow(0 0 40px #FF003C)';

      // Transition vers le jeu
      await delay(1500);
      stopPad();
      document.getElementById('cine-layer').style.opacity = '0';

      await delay(2000);
      document.getElementById('cine-layer').style.display = 'none';
      cineRendering = false;

      // ── SCENE 4: DIALOGUE ──
      await showDialogue();

      // ── SCENE 5: GAME STARTS ──
      pageFlip('SECTEUR ZÉRO', 'QUARANTAINE ACTIVÉE — 05:00', () => { });
      await delay(500);

      // Show game elements
      document.getElementById('hints').style.opacity = '1';
      document.getElementById('purge').style.opacity = '1';
      showZHint('ZONE 1 — CELLULE DE DÉPART', 'Traverse le verrou laser avec le DASH !\n(ESPACE en maintenant une direction)');
      tutZone = 1;
      gameActive = true;
      pl.reset(spawn.x, spawn.y);
      tutZone = 0;

      // First zone hint tutorial popup
      await delay(1200);
      ono('ESPACE = DASH !', W / 2, H * .35, K.pur);
    }

    // Démarrage automatique fluide (ou au premier mousemove pour Chrome)
    let booted = false;
    function tryBoot() { if (booted) return; booted = true; document.removeEventListener('mousemove', tryBoot); document.removeEventListener('keydown', tryBoot); boot(); }
    document.addEventListener('mousemove', tryBoot, { once: true });
    document.addEventListener('keydown', tryBoot, { once: true });
    setTimeout(() => { if (!booted) { tryBoot(); } }, 100);
  </script>
</body>

</html>
