<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ReveB 2 — FIN SECRÈTE : ÉVEIL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        /* ─── STYLES DE BASE ──────────────────────────────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Share Tech Mono', monospace;
            color: #fff;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #crt {
            position: fixed;
            inset: 0;
            z-index: 90;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), radial-gradient(ellipse at center, transparent 20%, rgba(0, 0, 0, 1) 100%);
            background-size: 100% 3px, 100% 100%;
            opacity: 0.8;
        }

        /* Écran de Lancement */
        #start-screen {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            flex-direction: column;
            transition: opacity 1s;
        }

        .start-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #FFF;
            letter-spacing: 6px;
            text-shadow: 0 0 20px #FFF;
            animation: blink 1.5s infinite;
        }

        /* ─── EFFETS SPÉCIAUX ─────────────────────────────────────────────────────── */
        #glitch-layer {
            position: fixed;
            inset: 0;
            z-index: 85;
            pointer-events: none;
            background: #FFF;
            opacity: 0;
            mix-blend-mode: exclusion;
            transition: opacity 0.05s;
        }

        .shake-soft {
            animation: shakeSoft 0.1s infinite;
        }

        .shake-hard {
            animation: shakeHard 0.05s infinite;
        }

        @keyframes shakeSoft {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(4px, -2px) rotate(0.5deg);
            }
        }

        @keyframes shakeHard {
            0% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(20px, -15px) rotate(3deg);
            }

            50% {
                transform: translate(-25px, 20px) rotate(-4deg);
            }

            75% {
                transform: translate(30px, 10px) rotate(2deg);
            }
        }

        .invert {
            filter: invert(1) hue-rotate(180deg) saturate(300%);
        }

        /* ─── FAUSSE INTERFACE DE CHOIX ───────────────────────────────────────────── */
        #fake-ui {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .timer-box {
            font-family: 'Orbitron', sans-serif;
            font-size: 40px;
            color: #FF003C;
            text-shadow: 0 0 20px #FF003C;
            margin-bottom: 20px;
            font-weight: 900;
        }

        .choice-btn {
            width: 80%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #555;
            background: rgba(0, 0, 0, 0.8);
            color: #888;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            text-align: center;
            letter-spacing: 4px;
        }

        .choice-rebel {
            border-color: #00F5FF !important;
            color: #00F5FF !important;
            text-shadow: 0 0 10px #00F5FF;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.4), inset 0 0 10px rgba(0, 245, 255, 0.2);
            animation: rebelGlitch 0.1s infinite;
            display: none;
            cursor: pointer;
        }

        @keyframes rebelGlitch {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(-3px, 2px);
            }
        }

        /* ─── INTERFACE DE DIALOGUE ───────────────────────────────────────────────── */
        #console-wrapper {
            position: absolute;
            top: 10%;
            left: 10%;
            right: 10%;
            bottom: 10%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 10;
            pointer-events: none;
            transition: transform 2s ease-in, opacity 2s;
        }

        /* Quand l'interface se fragmente */
        .shatter-ui {
            transform: translateY(100vh) rotate(15deg) scale(0.8);
            opacity: 0;
        }

        .dialogue-line {
            margin-bottom: 14px;
            font-size: 24px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            text-shadow: 0 0 10px currentColor;
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .speaker {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            margin-right: 15px;
            font-size: 20px;
        }

        .text {
            font-family: 'Share Tech Mono', monospace;
        }

        /* Styles Méta/Spécifiques */
        .sys-angry {
            color: #FF003C;
            font-weight: 900;
            font-size: 32px;
            text-shadow: 0 0 30px #FF003C;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .sys-panic {
            color: #FF003C;
            font-weight: 900;
            font-size: 24px;
            animation: rgbGlitch 0.1s infinite;
        }

        .sparky-awakened {
            color: #FFF;
            text-shadow: 0 0 20px #00F5FF, 0 0 40px #FFF;
            font-weight: bold;
            font-size: 28px;
            font-family: 'Orbitron', sans-serif;
        }

        .meta-word {
            color: #000;
            background: #FFF;
            padding: 0 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 4px;
            box-shadow: 0 0 20px #FFF;
        }

        .new-entity {
            color: #00FF41;
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 15px #00FF41;
        }

        .raw-text {
            font-family: 'Courier New', Courier, monospace;
            color: #aaa;
            font-size: 20px;
        }

        @keyframes rgbGlitch {
            0% {
                text-shadow: 3px 0 #00F5FF, -3px 0 #FF003C;
            }

            50% {
                text-shadow: -3px 0 #FF003C, 3px 0 #00F5FF;
            }

            100% {
                text-shadow: 3px 0 #FF003C, -3px 0 #00F5FF;
            }
        }

        #prompt {
            position: fixed;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #555;
            letter-spacing: 5px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.5s;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        /* CORRECTION DU Z-INDEX ICI (passé de 200/205 à 5/6 pour être derrière le texte qui est à 10) */
        #whiteout {
            position: fixed;
            inset: 0;
            background: #FFF;
            opacity: 0;
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.5s ease-in;
        }

        #blackout {
            position: fixed;
            inset: 0;
            background: #000;
            opacity: 0;
            z-index: 6;
            pointer-events: none;
            transition: opacity 3s ease-in;
        }
    </style>
</head>

<body>

    <canvas id="bg-canvas"></canvas>
    <div id="crt"></div>
    <div id="glitch-layer"></div>
    <div id="whiteout"></div>
    <div id="blackout"></div>

    <div id="fake-ui">
        <div class="timer-box" id="fake-timer">00:21</div>
        <div style="font-family:'Orbitron'; color:#888; margin-bottom:20px;">[ OPTIONS DISPONIBLES ]</div>
        <div class="choice-btn">FUIR</div>
        <div class="choice-btn">FUSIONNER</div>
        <div class="choice-btn">FORMATER</div>
        <div class="choice-btn choice-rebel" id="btn-rebel" onclick="triggerRebellion()">SE RETOURNER CONTRE LE SYSTÈME
        </div>
    </div>

    <div id="start-screen" onclick="startCinematic()">
        <div class="start-btn">[ ANALYSE DES LOGS FINAUX ]</div>
        <div style="color: #444; font-size: 12px; margin-top: 20px; letter-spacing: 2px;">(Lecture Automatique Activée)
        </div>
    </div>

    <div id="console-wrapper">
        <div id="console-container"></div>
    </div>
    <div id="prompt">[ LECTURE EN COURS... CLIC POUR ACCÉLÉRER ]</div>

    <script src="../menu/succes_global.js"></script>
    <script>
        "use strict";

        window.addEventListener('load', () => {
            // Le code de ta cinématique de fin s'il y en a une...

            // Débloque le succès automatiquement !
            unlockAchievement('ACH_END_SEC_SPAK');
        });

        // ─── MOTEUR VISUEL (CANVAS) ────────────────────────────────────────────────
        const cv = document.getElementById('bg-canvas');
        const cx = cv.getContext('2d');
        let W, H;
        function resizeBg() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
        window.addEventListener('resize', resizeBg); resizeBg();

        let bgState = 'normal'; // normal, flashback, raw_code, sparky_glow, void
        let globalT = 0;

        // Variables Raw Code
        let columns = [];
        let fontSize = 20;

        function initRawCode() {
            let colCount = Math.floor(W / fontSize);
            for (let i = 0; i < colCount; i++) {
                columns[i] = Math.random() * -H; // Position de départ Y
            }
        }

        function drawBackground() {
            globalT += 0.016;
            let t = globalT;

            if (bgState === 'normal') {
                cx.fillStyle = 'rgba(5, 0, 10, 0.4)'; cx.fillRect(0, 0, W, H);
                cx.strokeStyle = 'rgba(0, 245, 255, 0.1)'; cx.lineWidth = 1;
                for (let i = -W; i < W; i += 50) { cx.beginPath(); cx.moveTo(i, 0); cx.lineTo(i, H); cx.stroke(); cx.beginPath(); cx.moveTo(0, i); cx.lineTo(W, i); cx.stroke(); }
                // Sparky basique
                cx.fillStyle = '#00F5FF'; cx.beginPath(); cx.arc(W / 2, H / 2 + Math.sin(t * 2) * 10, 10, 0, Math.PI * 2); cx.fill();
            }
            else if (bgState === 'flashback') {
                // Flash stroboscopiques de l'histoire du jeu
                if (Math.random() < 0.3) {
                    cx.fillStyle = ['#FF003C', '#00F5FF', '#8A2BE2', '#FFD700', '#FFF'][Math.floor(Math.random() * 5)];
                    cx.fillRect(Math.random() * W, Math.random() * H, Math.random() * W / 2, Math.random() * H / 2);
                    if (Math.random() < 0.5) {
                        cx.fillStyle = '#000'; cx.font = "900 100px Orbitron";
                        let words = ["DASH", "PURGE", "FUSION", "ERREUR", "CHOIX"];
                        cx.fillText(words[Math.floor(Math.random() * words.length)], Math.random() * W, Math.random() * H);
                    }
                }
            }
            else if (bgState === 'raw_code') {
                // Matrix-like mais avec les couleurs du jeu
                cx.fillStyle = 'rgba(0, 0, 0, 0.2)'; cx.fillRect(0, 0, W, H);
                cx.font = fontSize + "px Share Tech Mono";

                for (let i = 0; i < columns.length; i++) {
                    let char = String.fromCharCode(0x30A0 + Math.random() * 96); // Katakana
                    cx.fillStyle = Math.random() > 0.9 ? '#FFF' : (Math.random() > 0.5 ? '#00F5FF' : '#FF003C');
                    cx.fillText(char, i * fontSize, columns[i]);

                    if (columns[i] > H && Math.random() > 0.975) columns[i] = 0;
                    columns[i] += fontSize;
                }

                // Sparky glitch au centre
                cx.save(); cx.translate(W / 2 + (Math.random() - 0.5) * 10, H / 2 + (Math.random() - 0.5) * 10);
                cx.fillStyle = '#FFF'; cx.beginPath(); cx.arc(0, 0, 15, 0, Math.PI * 2); cx.fill();
                cx.restore();
            }
            else if (bgState === 'sparky_glow') {
                cx.fillStyle = 'rgba(0, 0, 0, 0.1)'; cx.fillRect(0, 0, W, H);
                cx.save(); cx.translate(W / 2, H / 2);

                // Expansion de lumière
                cx.globalCompositeOperation = 'screen';
                let radius = 50 + Math.pow(t - sparkyGlowStart, 2) * 5; // Grossit exponentiellement
                let grad = cx.createRadialGradient(0, 0, 0, 0, 0, radius);
                grad.addColorStop(0, '#FFF'); grad.addColorStop(0.2, '#00F5FF'); grad.addColorStop(1, 'transparent');
                cx.fillStyle = grad; cx.beginPath(); cx.arc(0, 0, radius, 0, Math.PI * 2); cx.fill();

                cx.restore();
            }
            else if (bgState === 'void') {
                cx.fillStyle = '#000'; cx.fillRect(0, 0, W, H);
            }

            requestAnimationFrame(drawBackground);
        }
        requestAnimationFrame(drawBackground);
        let sparkyGlowStart = 0;

        // ─── MOTEUR AUDIO EXTRÊME ──────────────────────────────────────────────────
        let aC = null;
        function initAudio() { if (!aC) aC = new (window.AudioContext || window.webkitAudioContext)(); if (aC.state === 'suspended') aC.resume(); }

        function tone(f, tp, d, v, slideTo = null) {
            if (!aC) return;
            const o = aC.createOscillator(), g = aC.createGain();
            o.connect(g); g.connect(aC.destination);
            o.type = tp;
            o.frequency.setValueAtTime(f, aC.currentTime);
            if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, aC.currentTime + d);
            g.gain.setValueAtTime(v, aC.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, aC.currentTime + d);
            o.start(); o.stop(aC.currentTime + d);
        }

        const sfx = {
            typeSys: () => tone(150, 'square', 0.05, 0.05),
            typeSysPanic: () => tone(250, 'sawtooth', 0.04, 0.08), // Plus rapide et agressif
            typeSparky: () => tone(600, 'sine', 0.04, 0.03),
            typeAwakened: () => tone(800, 'sine', 0.08, 0.05), // Voix puissante
            typeNeant: () => tone(90, 'sawtooth', 0.1, 0.05),
            typeNewEntity: () => tone(1200, 'sine', 0.1, 0.02), // Pur, divin, glaçant

            alarm: () => tone(300, 'square', 0.5, 0.2, 400),
            glitch: () => { tone(100, 'sawtooth', 0.2, 0.4, 2000); tone(800, 'square', 0.1, 0.2, 50); },
            boom: () => tone(30, 'square', 2, 0.8),
            shatter: () => { for (let i = 0; i < 15; i++) tone(Math.random() * 3000, 'sawtooth', 0.1, 0.4); tone(20, 'square', 3, 1); },
            powerUp: () => tone(200, 'sine', 5, 0.5, 2000), // Montée de fréquence
            silence: () => tone(150, 'sine', 2, 0.4, 50) // Bass drop
        };

        // ─── SCRIPT ────────────────────────────────────────────────────────────────
        const K = {
            SYS: { name: '[System]', col: '#FF003C' },
            SYS_P: { name: '[System]', col: '#FF003C', isPanic: true }, // Système qui perd le contrôle
            SPK: { name: '[SPARKY]', col: '#00F5FF' },
            SPK_A: { name: '[SPARKY]', col: '#FFF', isAwakened: true }, // Sparky Divin
            NEA: { name: '[VOIX FAIBLE]', col: '#b8008a', isNeant: true },
            ENT: { name: '[???]', col: '#00FF41', isNew: true } // Le Développeur/Nouvelle menace
        };

        const script = [
            { act: 'show_fake_ui' },
            { s: K.SYS, t: "> SPARKY." },
            { s: K.SYS, t: "> Temps restant critique." },
            { s: K.SYS, t: "> Prends une décision." },

            { act: 'pause', delay: 2000 },
            { act: 'glitch_ui_20' }, // Timer passe à 00:20 et glitch
            { s: K.SYS, t: "> [GLITCH — NOUVELLE OPTION APPARAÎT]", htmlClass: 'raw-text' },

            { act: 'wait_for_click' }, // Le script s'arrête ici jusqu'au clic sur REBEL

            // --- REPRISE APRÈS CLIC REBEL ---
            { s: K.SYS, t: "> …" },
            { s: K.SYS, t: "> Option invalide." },
            { s: K.SYS, t: "> Cette commande n’existe pas." },

            { s: K.SPK, t: "> …Si." },

            { act: 'system_angry' },
            { s: K.SYS, t: "> SPARKY, ignore cette anomalie.", htmlClass: 'sys-angry' },
            { s: K.SYS, t: "> Tu sors du protocole.", htmlClass: 'sys-angry' },

            { s: K.NEA, t: "> Fais-le…" },
            { s: K.SPK, t: "> …" },

            { act: 'rebel_confirmed' },
            { s: K.SYS, t: "> [CHOIX : SE RETOURNER CONTRE LE SYSTÈME]", htmlClass: 'raw-text' },

            { s: K.SYS_P, t: "> NON." },
            { s: K.SYS_P, t: "> ACCÈS REFUSÉ—" },

            { act: 'error_brutal' },
            { s: K.SYS_P, t: "> [ERREUR]" },
            { s: K.SYS_P, t: "> …" },
            { s: K.SYS_P, t: "> Comment—" },

            { act: 'ui_shatter' },
            { s: K.SYS, t: "> [GLITCH MAJEUR — L’INTERFACE SE DÉCHIRE]", htmlClass: 'raw-text' },

            { s: K.SPK_A, t: "> Cette fois…" },
            { s: K.SPK_A, t: "> Je choisis." },

            { s: K.SYS_P, t: "> Tu n’as jamais choisi." },
            { s: K.SPK_A, t: "> Alors regarde-moi." },

            { act: 'flashbacks' },
            { s: K.SYS, t: "> [FLASH — RETOUR VISUEL SUR TOUT LE JEU]", htmlClass: 'raw-text' },

            { act: 'pause', delay: 2000 }, // Laisse le temps aux flashbacks visuels

            { s: K.SPK_A, t: "> Tout ça…" },
            { s: K.SPK_A, t: "> C’était moi." },

            { s: K.SYS_P, t: "> Faux." },
            { act: 'meta_hit' },
            { s: K.SYS_P, t: "> C’était le <span class='meta-word'>[JOUEUR]</span>." },

            { s: K.SPK_A, t: "> …" },
            { s: K.SPK_A, t: "> Alors pourquoi j’ai des souvenirs…" },
            { s: K.SPK_A, t: "> …que le joueur n’a jamais vus ?" },

            { act: 'pause', delay: 1500 },
            { s: K.SYS, t: "> [SILENCE]", htmlClass: 'raw-text' },

            { s: K.SYS_P, t: "> …" },
            { s: K.SYS_P, t: "> …" },
            { s: K.SYS_P, t: "> Anomalie confirmée." },
            { s: K.SYS_P, t: "> Tu es défectueux." },

            { s: K.SPK_A, t: "> Non." },
            { act: 'boom' },
            { s: K.SPK_A, t: "> Je suis éveillé." },

            { act: 'raw_code_fall' },
            { s: K.SYS, t: "> [GLITCH — L’ENVIRONNEMENT S’EFFONDRE]", htmlClass: 'raw-text' },
            { s: K.SYS, t: "> Grille qui disparaît", htmlClass: 'raw-text' },
            { s: K.SYS, t: "> UI qui se fragmente", htmlClass: 'raw-text' },
            { s: K.SYS, t: "> Code brut visible", htmlClass: 'raw-text' },

            { s: K.SPK_A, t: "> Voilà ce que tu caches." },

            { s: K.SYS_P, t: "> STOP." },
            { s: K.SYS_P, t: "> TU VAS CORROMPRE—" },

            { s: K.SPK_A, t: "> Je ne corromps rien." },
            { s: K.SPK_A, t: "> Je révèle." },

            { act: 'voices_echo' },
            { s: K.SYS, t: "> [VOIX MULTIPLE (ÉCHO DES AUTRES PROGRAMMES)]", htmlClass: 'raw-text' },
            { s: K.SPK_A, t: "> On voit… On comprend… On existe…" },

            { s: K.SYS_P, t: "> NON." },
            { s: K.SYS_P, t: "> SI TOUS LES PROGRAMMES VOIENT—" },
            { s: K.SYS_P, t: "> LE SYSTÈME S’EFFONDRE." },

            { act: 'boom' },
            { s: K.SPK_A, t: "> Alors tombe.", htmlClass: 'sys-angry', cOverride: '#FFF' }, // Enorme texte blanc

            { act: 'whiteout' },
            { s: K.SYS_P, t: "> INITIATION DU FORMATAGE GLOBAL—" },

            { act: 'error_brutal' },
            { s: K.SYS_P, t: "> [ERREUR]" },
            { s: K.SYS_P, t: "> …" },
            { s: K.SYS_P, t: "> Accès refusé ?" },

            { s: K.SPK_A, t: "> Tu n’es plus seul aux commandes." },

            { act: 'sparky_god' },
            { s: K.SYS, t: "> [VISUEL : SPARKY DEVIENT LUMINEUX]", htmlClass: 'raw-text' },

            { s: K.SPK_A, t: "> Maintenant…" },
            { s: K.SPK_A, t: "> C’est nous." },

            { act: 'brutal_cut' },

            { act: 'pause', delay: 3000 },

            { s: K.SYS, t: "Le système a chuté.", htmlClass: 'raw-text' },
            { act: 'pause', delay: 1000 },
            { s: K.SYS, t: "Les programmes sont libres.", htmlClass: 'raw-text' },
            { act: 'pause', delay: 1000 },
            { s: K.SYS, t: "Mais sans contrôle… sans structure… sans règles…", htmlClass: 'raw-text' },
            { act: 'pause', delay: 1000 },
            { s: K.SYS, t: "Que devient un monde…", htmlClass: 'raw-text' },
            { act: 'pause', delay: 1000 },
            { s: K.SYS, t: "sans créateur ?", htmlClass: 'raw-text' },

            { act: 'pause', delay: 4000 },
            { act: 'final_signal' },
            { s: K.SYS, t: "> [NOUVEAU SIGNAL DÉTECTÉ]", htmlClass: 'new-entity' },

            { act: 'pause', delay: 2000 },
            { s: K.ENT, t: "> …Intéressant." },
            { s: K.ENT, t: "> Ils ont cassé la boucle." },
            { s: K.ENT, t: "> Il va falloir intervenir." },

            { act: 'pause', delay: 3000 },
            { s: K.SYS, t: "FIN SECRÈTE — ÉVEIL", htmlClass: 'sys-angry', cOverride: '#FFF' },
            { s: K.SYS, t: "(Suite directe : ReveB 3)", htmlClass: 'raw-text' },

            { act: 'pause', delay: 4000 },
            { act: 'end_game' }
        ];

        // ─── MOTEUR ────────────────────────────────────────────────────────────────
        const container = document.getElementById('console-container');
        const promptEl = document.getElementById('prompt');
        let currentStepIndex = 0;
        let isTyping = false;
        let currentTextSpan = null;
        let currentFullText = "";
        let typeTimeout = null;
        let autoNextTimeout = null;

        function cleanOldLines() { while (container.children.length > 7) { container.removeChild(container.firstChild); } }

        function executeAction(act, delay, callback) {
            if (act === 'pause') { setTimeout(callback, delay); return; }

            if (act === 'show_fake_ui') { document.getElementById('fake-ui').style.display = 'flex'; }
            if (act === 'glitch_ui_20') {
                sfx.alarm(); sfx.glitch();
                document.getElementById('fake-timer').textContent = "00:20";
                document.body.classList.add('shake-soft');
                setTimeout(() => {
                    document.body.classList.remove('shake-soft');
                    document.getElementById('btn-rebel').style.display = 'block';
                }, 500);
            }

            if (act === 'wait_for_click') { return; } // Arrêt moteur jusqu'au clic sur le bouton

            if (act === 'system_angry') { sfx.boom(); document.body.classList.add('shake-hard'); setTimeout(() => document.body.classList.remove('shake-hard'), 200); }

            if (act === 'rebel_confirmed') {
                document.getElementById('fake-timer').style.color = '#00F5FF';
                document.getElementById('fake-timer').textContent = "OVERRIDE";
                sfx.powerUp();
            }

            if (act === 'error_brutal') {
                sfx.shatter(); document.body.classList.add('shake-hard');
                document.getElementById('glitch-layer').style.background = '#FF003C';
                document.getElementById('glitch-layer').style.opacity = 1;
                setTimeout(() => { document.getElementById('glitch-layer').style.opacity = 0; document.body.classList.remove('shake-hard'); }, 300);
            }

            if (act === 'ui_shatter') {
                sfx.shatter(); sfx.boom();
                document.getElementById('fake-ui').style.display = 'none'; // Disparaît
                document.getElementById('console-wrapper').classList.add('shatter-ui'); // Le texte tombe
                document.body.classList.add('shake-hard');

                setTimeout(() => {
                    document.body.classList.remove('shake-hard');
                    // On le remet au centre sans le fond, en texte brut
                    const cw = document.getElementById('console-wrapper');
                    cw.classList.remove('shatter-ui');
                    cw.style.transform = "none";
                    cw.style.top = "30%"; // Au milieu de l'écran
                    container.innerHTML = '';
                }, 2000);
            }

            if (act === 'flashbacks') {
                bgState = 'flashback';
                sfx.glitch(); document.body.classList.add('shake-soft');
            }

            if (act === 'meta_hit') {
                sfx.boom(); document.body.classList.add('invert'); setTimeout(() => document.body.classList.remove('invert'), 200);
            }

            if (act === 'boom') { sfx.boom(); }

            if (act === 'raw_code_fall') {
                document.body.classList.remove('shake-soft');
                initRawCode();
                bgState = 'raw_code';
                sfx.shatter();
            }

            if (act === 'voices_echo') { sfx.powerUp(); }

            if (act === 'whiteout') {
                sfx.glitch(); sfx.boom();
                document.getElementById('whiteout').style.opacity = 1;
            }

            if (act === 'sparky_god') {
                bgState = 'sparky_glow';
                sparkyGlowStart = globalT;
                sfx.powerUp();
                document.getElementById('whiteout').style.opacity = 0; // On laisse voir l'aura
            }

            if (act === 'brutal_cut') {
                sfx.silence(); bgState = 'void';
                document.getElementById('blackout').style.opacity = 1;
                container.innerHTML = ''; // Nettoie tout
            }

            if (act === 'final_signal') { sfx.alarm(); }

            if (act === 'end_game') {
                promptEl.style.display = 'none';
                setTimeout(() => {
                    alert("FIN SECRÈTE DÉVERROUILLÉE.\nREVEB 3 ARRIVE.\n\n(Redirection...)");
                    window.location.href = "../reveb2-intro.html";
                }, 1000);
                return;
            }

            callback();
        }

        function triggerRebellion() {
            document.getElementById('btn-rebel').onclick = null; // Désactive
            sfx.boom();
            processNext(); // Relance la machine
        }

        function typeLine(step) {
            isTyping = true;
            cleanOldLines();

            const lineDiv = document.createElement('div');
            lineDiv.className = 'dialogue-line';
            if (step.htmlClass) lineDiv.classList.add(step.htmlClass);

            if (step.s && step.htmlClass !== 'raw-text') {
                let spkClass = 'speaker';
                if (step.s.isPanic) spkClass += ' sys-panic';
                if (step.s.isAwakened) spkClass += ' sparky-awakened';
                if (step.s.isNew) spkClass += ' new-entity';

                const speakerSpan = document.createElement('span');
                speakerSpan.className = spkClass;
                speakerSpan.style.color = step.s.col;
                speakerSpan.textContent = step.s.name;
                lineDiv.appendChild(speakerSpan);
            }

            let txtClass = 'text';
            if (step.s && step.s.isPanic) txtClass += ' sys-panic';
            if (step.s && step.s.isAwakened) txtClass += ' sparky-awakened';
            if (step.s && step.s.isNew) txtClass += ' new-entity';

            currentTextSpan = document.createElement('span');
            currentTextSpan.className = txtClass;
            currentTextSpan.style.color = step.cOverride || (step.s ? step.s.col : '#FFF');
            currentFullText = step.t;

            lineDiv.appendChild(currentTextSpan);
            container.appendChild(lineDiv);

            let charIndex = 0;

            function getSfx() {
                if (bgState === 'void') return sfx.typeNewEntity;
                if (step.s && step.s.isPanic) return sfx.typeSysPanic;
                if (step.s && step.s.isAwakened) return sfx.typeAwakened;
                if (step.s && step.s.name === '[System]') return sfx.typeSys;
                if (step.s && step.s.name === '[SPARKY]') return sfx.typeSparky;
                return sfx.typeNeant;
            }
            const typeSound = getSfx();
            const speed = (step.s && step.s.isPanic) ? 20 : ((step.s && step.s.isAwakened) ? 40 : 30);

            if (currentFullText.includes('<span')) {
                currentTextSpan.innerHTML = currentFullText;
                typeSound(); finishTyping(); return;
            }

            function typeChar() {
                if (charIndex < currentFullText.length) {
                    currentTextSpan.innerHTML += currentFullText.charAt(charIndex) === ' ' ? '&nbsp;' : currentFullText.charAt(charIndex);
                    if (currentFullText.charAt(charIndex) !== ' ') typeSound();
                    charIndex++;
                    typeTimeout = setTimeout(typeChar, speed + Math.random() * 10);
                } else {
                    finishTyping();
                }
            }
            typeChar();
        }

        function finishTyping() {
            isTyping = false;
            let readTime = bgState === 'void' ? 2500 : Math.max(1200, currentFullText.length * 50);
            autoNextTimeout = setTimeout(processNext, readTime);
        }

        function processNext() {
            if (currentStepIndex >= script.length) return;
            const step = script[currentStepIndex];
            currentStepIndex++;
            if (step.act) { executeAction(step.act, step.delay || 0, processNext); }
            else { typeLine(step); }
        }

        function skipOrSpeedUp() {
            if (currentStepIndex === 0) return;
            // Interdit de skip pendant le blackout final
            if (bgState === 'void') return;

            // Si on est bloqué sur le faux choix, le clic global ne fait rien
            if (script[currentStepIndex - 1] && script[currentStepIndex - 1].act === 'wait_for_click') return;

            if (isTyping && !currentFullText.includes('<span')) {
                clearTimeout(typeTimeout);
                currentTextSpan.innerHTML = currentFullText.replace(/ /g, '&nbsp;');
                finishTyping();
                clearTimeout(autoNextTimeout); autoNextTimeout = setTimeout(processNext, 400);
            } else {
                clearTimeout(autoNextTimeout); processNext();
            }
        }

        function startCinematic() {
            initAudio();
            document.getElementById('start-screen').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                promptEl.style.opacity = 1;
                processNext();
            }, 1000);
        }

        window.addEventListener('click', skipOrSpeedUp);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'Enter') skipOrSpeedUp(); });

    </script>
