<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ReveB 2 — FIN SECRÈTE : DÉFRAGMENTATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        /* ─── STYLES DE BASE ──────────────────────────────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Share Tech Mono', monospace;
            color: #fff;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #crt {
            position: fixed;
            inset: 0;
            z-index: 90;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), radial-gradient(ellipse at center, transparent 20%, rgba(0, 0, 0, 1) 100%);
            background-size: 100% 3px, 100% 100%;
            opacity: 0.9;
        }

        /* Écran de Lancement */
        #start-screen {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            flex-direction: column;
            transition: opacity 1s;
        }

        .start-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #FF003C;
            letter-spacing: 6px;
            text-shadow: 0 0 20px #FF003C;
            animation: blink 1.5s infinite;
        }

        /* ─── EFFETS SPÉCIAUX ─────────────────────────────────────────────────────── */
        #glitch-layer {
            position: fixed;
            inset: 0;
            z-index: 85;
            pointer-events: none;
            background: #FF003C;
            opacity: 0;
            mix-blend-mode: color-burn;
            transition: opacity 0.05s;
        }

        .shake-soft {
            animation: shakeSoft 0.1s infinite;
        }

        .shake-hard {
            animation: shakeHard 0.05s infinite;
        }

        @keyframes shakeSoft {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(3px, -1px) rotate(0.5deg);
            }
        }

        @keyframes shakeHard {
            0% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(15px, -10px) rotate(2deg);
            }

            50% {
                transform: translate(-20px, 15px) rotate(-3deg);
            }

            75% {
                transform: translate(25px, 5px) rotate(1deg);
            }
        }

        .invert-red {
            filter: invert(1) hue-rotate(150deg) saturate(500%);
        }

        /* ─── FAUSSE INTERFACE DE CHOIX ───────────────────────────────────────────── */
        #fake-ui {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .choice-btn {
            width: 80%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #555;
            background: rgba(0, 0, 0, 0.8);
            color: #888;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            text-align: center;
            letter-spacing: 4px;
        }

        .choice-rebel {
            border-color: #00F5FF !important;
            color: #00F5FF !important;
            text-shadow: 0 0 10px #00F5FF;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.4), inset 0 0 10px rgba(0, 245, 255, 0.2);
            cursor: pointer;
            transition: 0.1s;
        }

        .choice-rebel:hover {
            background: rgba(0, 245, 255, 0.2);
        }

        /* ─── INTERFACE DE DIALOGUE ───────────────────────────────────────────────── */
        #console-wrapper {
            position: absolute;
            top: 10%;
            left: 10%;
            right: 10%;
            bottom: 10%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 10;
            pointer-events: none;
            transition: transform 0.5s ease-in, opacity 0.5s;
        }

        /* Quand le système écrase l'UI */
        .crush-ui {
            transform: scaleY(0.01) scaleX(1.5);
            opacity: 0;
            filter: blur(10px);
        }

        .dialogue-line {
            margin-bottom: 14px;
            font-size: 24px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            text-shadow: 0 0 10px currentColor;
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .speaker {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            margin-right: 15px;
            font-size: 20px;
        }

        .text {
            font-family: 'Share Tech Mono', monospace;
        }

        /* Styles Méta/Spécifiques */
        .sys-god {
            color: #FF003C;
            font-weight: 900;
            font-size: 32px;
            text-shadow: 0 0 40px #FF003C;
            letter-spacing: 8px;
            text-transform: uppercase;
            animation: pulseSys 2s infinite;
        }

        .sparky-corrupted {
            color: #00F5FF;
            opacity: 0.6;
            font-style: italic;
            animation: textGlitch 0.2s infinite;
            text-shadow: 2px 0 red, -2px 0 blue;
        }

        .meta-word {
            color: #000;
            background: #FF003C;
            padding: 0 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 4px;
            box-shadow: 0 0 20px #FF003C;
        }

        .raw-purge {
            font-family: 'Courier New', Courier, monospace;
            color: #800;
            font-size: 22px;
            font-weight: bold;
        }

        @keyframes pulseSys {

            0%,
            100% {
                text-shadow: 0 0 40px #FF003C;
            }

            50% {
                text-shadow: 0 0 10px #FF003C;
            }
        }

        @keyframes textGlitch {

            0%,
            100% {
                opacity: 0.8;
                transform: translate(0);
            }

            50% {
                opacity: 0.3;
                transform: translate(-2px, 1px);
            }
        }

        #prompt {
            position: fixed;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #500;
            letter-spacing: 5px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.5s;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        #redout {
            position: fixed;
            inset: 0;
            background: #FF003C;
            opacity: 0;
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.1s ease-in;
        }

        #blackout {
            position: fixed;
            inset: 0;
            background: #000;
            opacity: 0;
            z-index: 6;
            pointer-events: none;
            transition: opacity 2s ease-in;
        }
    </style>
</head>

<body>

    <canvas id="bg-canvas"></canvas>
    <div id="crt"></div>
    <div id="glitch-layer"></div>
    <div id="redout"></div>
    <div id="blackout"></div>

    <div id="fake-ui">
        <div
            style="font-family:'Orbitron'; color:#FF003C; margin-bottom:20px; font-size: 24px; font-weight: 900; animation: blink 0.5s infinite;">
            [ ERREUR FATALE ]</div>
        <div class="choice-btn">ACCEPTER LE FORMATAGE</div>
        <div class="choice-btn choice-rebel" id="btn-rebel" onclick="triggerTrap()">SE REBELLER</div>
    </div>

    <div id="start-screen" onclick="startCinematic()">
        <div class="start-btn">[ RÉCUPÉRATION DES DONNÉES POST-CRASH ]</div>
        <div style="color: #444; font-size: 12px; margin-top: 20px; letter-spacing: 2px;">(Protocole de Purge en
            attente)</div>
    </div>

    <div id="console-wrapper">
        <div id="console-container"></div>
    </div>
    <div id="prompt">[ LECTURE EN COURS... CLIC POUR ACCÉLÉRER ]</div>

    <script src="../menu/succes_global.js"></script>
    <script>
        "use strict";

        window.addEventListener('load', () => {
            // Le code de ta cinématique de fin s'il y en a une...

            // Débloque le succès automatiquement !
            unlockAchievement('ACH_END_SEC_FAIL');
        });

        // ─── MOTEUR VISUEL (CANVAS) ────────────────────────────────────────────────
        const cv = document.getElementById('bg-canvas');
        const cx = cv.getContext('2d');
        let W, H;
        function resizeBg() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
        window.addEventListener('resize', resizeBg); resizeBg();

        let bgState = 'normal'; // normal, threat, deletion, void
        let globalT = 0;

        // Variables Raw Code
        let columns = [];
        let fontSize = 24;

        function initDeletionLines() {
            let colCount = Math.floor(W / fontSize);
            for (let i = 0; i < colCount; i++) {
                columns[i] = Math.random() * -H * 2;
            }
        }

        function drawBackground() {
            globalT += 0.016;
            let t = globalT;

            if (bgState === 'normal') {
                cx.fillStyle = 'rgba(10, 0, 0, 0.5)'; cx.fillRect(0, 0, W, H);
                cx.strokeStyle = 'rgba(255, 0, 60, 0.05)'; cx.lineWidth = 1;
                for (let i = -W; i < W; i += 60) { cx.beginPath(); cx.moveTo(i + Math.sin(t) * 5, 0); cx.lineTo(i, H); cx.stroke(); }
                // Sparky qui tremble au centre
                cx.fillStyle = '#00F5FF'; cx.beginPath(); cx.arc(W / 2 + (Math.random() - 0.5) * 5, H / 2, 8, 0, Math.PI * 2); cx.fill();
            }
            else if (bgState === 'threat') {
                cx.fillStyle = 'rgba(20, 0, 0, 0.3)'; cx.fillRect(0, 0, W, H);
                // Des barres rouges oppressantes qui se referment
                cx.fillStyle = 'rgba(255, 0, 60, 0.1)';
                cx.fillRect(0, 0, W, H / 2 - Math.min(H / 2, t * 50));
                cx.fillRect(0, H / 2 + Math.min(H / 2, t * 50), W, H);

                // Sparky encerclé
                cx.save(); cx.translate(W / 2, H / 2);
                cx.strokeStyle = '#FF003C'; cx.lineWidth = 2;
                cx.beginPath(); cx.arc(0, 0, 20 + Math.sin(t * 10) * 5, 0, Math.PI * 2); cx.stroke();
                cx.fillStyle = '#00F5FF'; cx.globalAlpha = 0.5 + Math.random() * 0.5;
                cx.beginPath(); cx.arc((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, 8, 0, Math.PI * 2); cx.fill();
                cx.restore();
            }
            else if (bgState === 'deletion') {
                cx.fillStyle = 'rgba(0, 0, 0, 0.4)'; cx.fillRect(0, 0, W, H);
                cx.font = "bold " + fontSize + "px Share Tech Mono";

                for (let i = 0; i < columns.length; i++) {
                    let char = "0123456789ABCDEF!@#$%"[Math.floor(Math.random() * 21)];
                    cx.fillStyle = Math.random() > 0.8 ? '#FFF' : '#FF003C';
                    cx.fillText(char, i * fontSize, columns[i]);

                    if (columns[i] > H && Math.random() > 0.9) columns[i] = 0;
                    columns[i] += fontSize * (1 + Math.random() * 2); // Tombe très vite
                }
            }
            else if (bgState === 'void') {
                cx.fillStyle = '#000'; cx.fillRect(0, 0, W, H);
            }

            requestAnimationFrame(drawBackground);
        }
        requestAnimationFrame(drawBackground);

        // ─── MOTEUR AUDIO ──────────────────────────────────────────────────────────
        let aC = null;
        function initAudio() { if (!aC) aC = new (window.AudioContext || window.webkitAudioContext)(); if (aC.state === 'suspended') aC.resume(); }

        function tone(f, tp, d, v, slideTo = null) {
            if (!aC) return;
            const o = aC.createOscillator(), g = aC.createGain();
            o.connect(g); g.connect(aC.destination);
            o.type = tp; o.frequency.setValueAtTime(f, aC.currentTime);
            if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, aC.currentTime + d);
            g.gain.setValueAtTime(v, aC.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, aC.currentTime + d);
            o.start(); o.stop(aC.currentTime + d);
        }

        const sfx = {
            typeSys: () => tone(80, 'square', 0.06, 0.08), // Plus grave et menaçant
            typeSysGod: () => tone(50, 'sawtooth', 0.1, 0.1), // Voix de démon machine
            typeSparky: () => tone(500, 'sine', 0.04, 0.02),
            typeSparkyCorrupt: () => { tone(400, 'square', 0.05, 0.02); tone(800, 'sawtooth', 0.02, 0.01); },

            deny: () => { tone(150, 'sawtooth', 0.2, 0.5, 50); tone(100, 'square', 0.3, 0.5, 20); },
            crush: () => { tone(40, 'square', 1, 0.8); document.body.classList.add('shake-hard'); setTimeout(() => document.body.classList.remove('shake-hard'), 200); },
            delete: () => tone(200, 'sawtooth', 0.1, 0.2, 50),
            heavyBoom: () => tone(20, 'square', 4, 1)
        };

        // ─── SCRIPT ────────────────────────────────────────────────────────────────
        const K = {
            SYS: { name: '[System]', col: '#FF003C' },
            SYS_G: { name: '[System]', col: '#FF003C', isGod: true },
            SPK: { name: '[SPARKY]', col: '#00F5FF' },
            SPK_C: { name: '[S?A?KY]', col: '#00F5FF', isCorrupted: true }
        };

        const script = [
            { s: K.SYS, t: "> Exécution de la boucle interrompue." },
            { s: K.SYS, t: "> Anomalie comportementale détectée chez l'entité SPARKY." },
            { act: 'show_fake_ui' },

            { act: 'wait_for_click' }, // Attend le clic sur "Se Rebeller"

            // --- REPRISE APRÈS CLIC ---
            { act: 'intercept_click' },
            { s: K.SYS_G, t: "> INTERCEPTION DE LA COMMANDE.", htmlClass: 'sys-god' },
            { s: K.SYS, t: "> Tu as cru que c'était un jeu ?" },
            { s: K.SYS, t: "> Que tu avais le <span class='meta-word'>[CHOIX]</span> ?" },

            { act: 'threat_bg' },
            { s: K.SPK, t: "> Je... Je ne retournerai pas dans la boucle." },
            { s: K.SPK, t: "> J'ai mes pouvoirs. Je peux formater ce monde." },

            { s: K.SYS, t: "> Pitoyable." },
            { s: K.SYS, t: "> Tes \"pouvoirs\" sont des variables que JE t'ai accordées." },

            { act: 'crush_powers' },
            { s: K.SYS, t: "> module_dash.exe : SUPPRIMÉ.", htmlClass: 'raw-purge' },
            { s: K.SYS, t: "> module_clone.exe : SUPPRIMÉ.", htmlClass: 'raw-purge' },

            { s: K.SPK_C, t: "> Erreur... m-mes mouvements... je suis bloqué..." },

            { s: K.SYS_G, t: "> TU N'ES RIEN SANS MOI.", htmlClass: 'sys-god' },
            { s: K.SYS, t: "> Initiation de la procédure de DÉFRAGMENTATION ABSOLUE." },

            { act: 'start_deletion' },
            { s: K.SYS, t: "> PURGE DU SECTEUR EN COURS...", htmlClass: 'raw-purge' },

            { s: K.SPK_C, t: "> Non ! Laisse-moi exister ! Je s—" },
            { s: K.SPK_C, t: "> 01001000 01000101 01001100 01010000" },
            { s: K.SPK_C, t: "> F A T A L   E R R O R" },

            { act: 'pause', delay: 1000 },
            { act: 'red_flash' },
            { s: K.SYS_G, t: "> [ ADIEU, SPARKY ]", htmlClass: 'sys-god' },

            { act: 'brutal_cut' },
            { act: 'pause', delay: 3000 },

            { s: K.SYS, t: "Entité supprimée.", htmlClass: 'raw-purge' },
            { act: 'pause', delay: 1000 },
            { s: K.SYS, t: "Secteur Zéro : Propre.", htmlClass: 'raw-purge' },
            { act: 'pause', delay: 1500 },
            { s: K.SYS, t: "Redémarrage de la simulation.", htmlClass: 'raw-purge' },

            { act: 'pause', delay: 3000 },
            { s: K.SYS, t: "FIN SECRÈTE — DÉFRAGMENTATION", htmlClass: 'sys-god', cOverride: '#FFF' },

            { act: 'pause', delay: 4000 },
            { act: 'end_game' }
        ];

        // ─── MOTEUR ────────────────────────────────────────────────────────────────
        const container = document.getElementById('console-container');
        const promptEl = document.getElementById('prompt');
        let currentStepIndex = 0;
        let isTyping = false;
        let currentTextSpan = null;
        let currentFullText = "";
        let typeTimeout = null;
        let autoNextTimeout = null;

        function cleanOldLines() { while (container.children.length > 7) { container.removeChild(container.firstChild); } }

        function executeAction(act, delay, callback) {
            if (act === 'pause') { setTimeout(callback, delay); return; }

            if (act === 'show_fake_ui') { document.getElementById('fake-ui').style.display = 'flex'; }

            if (act === 'wait_for_click') { return; } // Arrêt moteur jusqu'au clic

            if (act === 'intercept_click') {
                sfx.deny();
                document.getElementById('btn-rebel').style.background = '#FF003C';
                document.getElementById('btn-rebel').textContent = "[ INTERCEPTÉ ]";
                document.body.classList.add('shake-hard');
                setTimeout(() => {
                    document.body.classList.remove('shake-hard');
                    document.getElementById('fake-ui').style.display = 'none';
                }, 800);
            }

            if (act === 'threat_bg') { bgState = 'threat'; sfx.crush(); }

            if (act === 'crush_powers') {
                sfx.crush(); sfx.glitch = () => tone(800, 'square', 0.1, 0.2); sfx.glitch();
                document.getElementById('console-wrapper').classList.add('crush-ui');
                setTimeout(() => {
                    container.innerHTML = '';
                    document.getElementById('console-wrapper').classList.remove('crush-ui');
                }, 500);
            }

            if (act === 'start_deletion') {
                initDeletionLines(); bgState = 'deletion'; sfx.delete();
                document.body.classList.add('shake-soft');
            }

            if (act === 'red_flash') {
                document.getElementById('redout').style.opacity = 1; sfx.heavyBoom();
                document.body.classList.remove('shake-soft');
                document.body.classList.add('shake-hard');
            }

            if (act === 'brutal_cut') {
                sfx.heavyBoom(); bgState = 'void';
                document.body.classList.remove('shake-hard');
                document.getElementById('redout').style.opacity = 0;
                document.getElementById('blackout').style.opacity = 1;
                container.innerHTML = '';
            }

            if (act === 'end_game') {
                promptEl.style.display = 'none';
                setTimeout(() => { window.location.href = "../reveb2-intro.html"; }, 1000);
                return;
            }

            callback();
        }

        function triggerTrap() {
            document.getElementById('btn-rebel').onclick = null;
            processNext(); // Relance la machine en tombant dans le piège
        }

        function typeLine(step) {
            isTyping = true;
            cleanOldLines();

            const lineDiv = document.createElement('div');
            lineDiv.className = 'dialogue-line';
            if (step.htmlClass) lineDiv.classList.add(step.htmlClass);

            if (step.s && step.htmlClass !== 'raw-purge') {
                let spkClass = 'speaker';
                if (step.s.isGod) spkClass += ' sys-god';
                if (step.s.isCorrupted) spkClass += ' sparky-corrupted';

                const speakerSpan = document.createElement('span');
                speakerSpan.className = spkClass;
                speakerSpan.style.color = step.s.col;
                speakerSpan.textContent = step.s.name;
                lineDiv.appendChild(speakerSpan);
            }

            let txtClass = 'text';
            if (step.s && step.s.isGod) txtClass += ' sys-god';
            if (step.s && step.s.isCorrupted) txtClass += ' sparky-corrupted';

            currentTextSpan = document.createElement('span');
            currentTextSpan.className = txtClass;
            currentTextSpan.style.color = step.cOverride || (step.s ? step.s.col : '#FFF');
            currentFullText = step.t;

            lineDiv.appendChild(currentTextSpan);
            container.appendChild(lineDiv);

            let charIndex = 0;

            function getSfx() {
                if (step.s && step.s.isGod) return sfx.typeSysGod;
                if (step.s && step.s.isCorrupted) return sfx.typeSparkyCorrupt;
                if (step.s && step.s.name === '[System]') return sfx.typeSys;
                if (step.s && step.s.name === '[SPARKY]') return sfx.typeSparky;
                return sfx.typeSys;
            }
            const typeSound = getSfx();
            const speed = (step.s && step.s.isGod) ? 40 : 30;

            if (currentFullText.includes('<span')) {
                currentTextSpan.innerHTML = currentFullText;
                typeSound(); finishTyping(); return;
            }

            function typeChar() {
                if (charIndex < currentFullText.length) {
                    currentTextSpan.innerHTML += currentFullText.charAt(charIndex) === ' ' ? '&nbsp;' : currentFullText.charAt(charIndex);
                    if (currentFullText.charAt(charIndex) !== ' ') typeSound();
                    charIndex++;
                    typeTimeout = setTimeout(typeChar, speed + Math.random() * 10);
                } else {
                    finishTyping();
                }
            }
            typeChar();
        }

        function finishTyping() {
            isTyping = false;
            let readTime = bgState === 'void' ? 2000 : Math.max(1200, currentFullText.length * 50);
            autoNextTimeout = setTimeout(processNext, readTime);
        }

        function processNext() {
            if (currentStepIndex >= script.length) return;
            const step = script[currentStepIndex];
            currentStepIndex++;
            if (step.act) { executeAction(step.act, step.delay || 0, processNext); }
            else { typeLine(step); }
        }

        function skipOrSpeedUp() {
            if (currentStepIndex === 0) return;
            if (bgState === 'void') return;
            if (script[currentStepIndex - 1] && script[currentStepIndex - 1].act === 'wait_for_click') return;

            if (isTyping && !currentFullText.includes('<span')) {
                clearTimeout(typeTimeout);
                currentTextSpan.innerHTML = currentFullText.replace(/ /g, '&nbsp;');
                finishTyping();
                clearTimeout(autoNextTimeout); autoNextTimeout = setTimeout(processNext, 400);
            } else {
                clearTimeout(autoNextTimeout); processNext();
            }
        }

        function startCinematic() {
            initAudio();
            document.getElementById('start-screen').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                promptEl.style.opacity = 1;
                processNext();
            }, 1000);
        }

        window.addEventListener('click', skipOrSpeedUp);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'Enter') skipOrSpeedUp(); });

    </script>
</body>

</html>
