<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ReveB 2 — FIN : INACTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        /* ─── STYLES DE BASE ──────────────────────────────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Share Tech Mono', monospace;
            color: #fff;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            transition: filter 2s ease-out;
        }

        /* Le filtre qui s'activera au temps figé */
        .frozen-world {
            filter: grayscale(100%) contrast(1.2) brightness(0.6);
        }

        #crt {
            position: fixed;
            inset: 0;
            z-index: 90;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), radial-gradient(ellipse at center, transparent 20%, rgba(0, 0, 0, 1) 100%);
            background-size: 100% 3px, 100% 100%;
            opacity: 0.8;
        }

        /* Écran de Lancement */
        #start-screen {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            flex-direction: column;
            transition: opacity 1s;
        }

        .start-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #555;
            letter-spacing: 6px;
            text-shadow: 0 0 10px #fff;
            animation: blink 1.5s infinite;
        }

        /* ─── EFFETS SPÉCIAUX ─────────────────────────────────────────────────────── */
        #glitch-layer {
            position: fixed;
            inset: 0;
            z-index: 85;
            pointer-events: none;
            background: #FFF;
            opacity: 0;
            mix-blend-mode: exclusion;
            transition: opacity 0.05s;
        }

        /* Tremblements (Seulement pendant le compte à rebours) */
        .shake-hard {
            animation: shakeHard 0.1s infinite;
        }

        @keyframes shakeHard {
            0% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(15px, -10px) rotate(1deg);
            }

            50% {
                transform: translate(-15px, 10px) rotate(-1deg);
            }

            75% {
                transform: translate(15px, 10px) rotate(1deg);
            }
        }

        /* Compte à rebours massif en arrière-plan */
        #big-timer {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 25vw;
            font-weight: 900;
            color: rgba(255, 0, 60, 0.1);
            z-index: 5;
            pointer-events: none;
            text-shadow: 0 0 50px rgba(255, 0, 60, 0.2);
            opacity: 0;
            transition: opacity 0.2s;
        }

        /* ─── INTERFACE DE DIALOGUE ───────────────────────────────────────────────── */
        #console-container {
            position: absolute;
            top: 10%;
            left: 10%;
            right: 10%;
            bottom: 10%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 10;
            pointer-events: none;
        }

        .dialogue-line {
            margin-bottom: 14px;
            font-size: 24px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            text-shadow: 0 0 10px currentColor;
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .speaker {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            margin-right: 15px;
            font-size: 20px;
        }

        .text {
            font-family: 'Share Tech Mono', monospace;
        }

        /* Styles Méta/Spécifiques */
        .sys-angry {
            color: #FF003C;
            font-weight: 900;
            letter-spacing: 4px;
        }

        .sys-cold {
            color: #FFF;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 3px;
            text-shadow: 0 0 15px #FFF;
        }

        .timer-text {
            color: #FF003C;
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 8px;
            text-shadow: 0 0 20px #FF003C;
        }

        .new-entity {
            color: #FFF;
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 8px;
            text-shadow: 0 0 20px #FFF;
        }

        .final-text {
            font-family: 'Share Tech Mono', monospace;
            color: #888;
            font-size: 22px;
            text-align: center;
            display: block;
            margin-top: 30px;
        }

        #prompt {
            position: fixed;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #555;
            letter-spacing: 5px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.5s;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        #white-overlay {
            position: fixed;
            inset: 0;
            background: #FFF;
            opacity: 0;
            z-index: 150;
            pointer-events: none;
            transition: opacity 0.1s;
        }
    </style>
</head>

<body>

    <canvas id="bg-canvas"></canvas>
    <div id="big-timer">00:05</div>
    <div id="crt"></div>
    <div id="glitch-layer"></div>
    <div id="white-overlay"></div>

    <div id="start-screen" onclick="startCinematic()">
        <div class="start-btn">[ EN ATTENTE DE COMMANDE ]</div>
        <div style="color: #444; font-size: 12px; margin-top: 20px; letter-spacing: 2px;">(Lecture Automatique Activée)
        </div>
    </div>

    <div id="console-container"></div>
    <div id="prompt">[ LECTURE EN COURS... CLIC POUR ACCÉLÉRER ]</div>
    <script src="../menu/succes_global.js"></script>
    <script>
        "use strict";

        window.addEventListener('load', () => {
            // Le code de ta cinématique de fin s'il y en a une...

            // Débloque le succès automatiquement !
            unlockAchievement('ACH_END_PASSIF');
        });

        // ─── MOTEUR VISUEL (CANVAS) ────────────────────────────────────────────────
        const cv = document.getElementById('bg-canvas');
        const cx = cv.getContext('2d');
        let W, H, cX, cY;
        function resizeBg() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; cX = W / 2; cY = H / 2; }
        window.addEventListener('resize', resizeBg); resizeBg();

        let bgState = 'countdown'; // countdown, frozen, new_entity, erasing, purge, black
        let globalT = 0;
        let timeScale = 1; // Permet d'arrêter le temps (1 = normal, 0 = figé)

        // Les entités à l'écran
        let sparky = { x: 0, y: 0, alive: true };
        let neant = { x: 0, y: 0, alive: true };
        let newEntityY = -200; // Tombe du ciel

        function glow(c, b) { cx.shadowColor = c; cx.shadowBlur = b; }
        function noGlow() { cx.shadowBlur = 0; }

        function drawBackground() {
            // Si le temps est figé, dt devient 0, les particules s'arrêtent.
            const dt = 0.016 * timeScale;
            globalT += dt;
            let t = globalT;

            // Positions relatives
            sparky.x = cX - 150; sparky.y = cY + 50;
            neant.x = cX + 150; neant.y = cY;

            if (bgState === 'countdown' || bgState === 'frozen') {
                // Fond sombre et menaçant
                cx.fillStyle = `rgba(10, 0, 5, 1)`; cx.fillRect(0, 0, W, H);

                // Grille qui défile (s'arrête quand timeScale = 0)
                cx.strokeStyle = `rgba(255, 0, 60, 0.1)`; cx.lineWidth = 1;
                const offset = (t * 50) % 50;
                for (let i = -W; i < W * 2; i += 50) {
                    cx.beginPath(); cx.moveTo(i + offset, 0); cx.lineTo(i - H + offset, H); cx.stroke();
                    cx.beginPath(); cx.moveTo(i - offset, 0); cx.lineTo(i + H - offset, H); cx.stroke();
                }

                // Dessin du Néant (Masse instable violette)
                if (neant.alive) {
                    cx.save(); cx.translate(neant.x, neant.y);
                    glow('#b8008a', 40); cx.fillStyle = 'rgba(184, 0, 138, 0.8)';
                    cx.beginPath();
                    for (let i = 0; i < Math.PI * 2; i += 0.2) {
                        let r = 80 + Math.sin(t * 10 + i * 4) * 15;
                        if (i === 0) cx.moveTo(Math.cos(i) * r, Math.sin(i) * r); else cx.lineTo(Math.cos(i) * r, Math.sin(i) * r);
                    }
                    cx.closePath(); cx.fill();
                    cx.fillStyle = '#000'; cx.beginPath(); cx.arc(0, 0, 30, 0, Math.PI * 2); cx.fill();
                    cx.restore(); noGlow();
                }

                // Dessin de Sparky (Étincelle Cyan)
                if (sparky.alive) {
                    cx.save(); cx.translate(sparky.x, sparky.y + Math.sin(t * 5) * 10);
                    glow('#00F5FF', 30); cx.fillStyle = '#00F5FF';
                    cx.beginPath(); cx.arc(0, 0, 20, 0, Math.PI * 2); cx.fill();
                    cx.fillStyle = '#FFF'; cx.beginPath(); cx.arc(0, 0, 10, 0, Math.PI * 2); cx.fill();
                    cx.restore(); noGlow();
                }
            }

            // Le temps est figé, l'Entité pure apparaît
            if (bgState === 'new_entity' || bgState === 'erasing' || bgState === 'purge') {

                // Le fond reste figé, mais on le redessine
                cx.fillStyle = `rgba(10, 0, 5, 1)`; cx.fillRect(0, 0, W, H);

                if (neant.alive) {
                    cx.save(); cx.translate(neant.x, neant.y);
                    cx.fillStyle = 'rgba(184, 0, 138, 0.8)'; cx.beginPath(); cx.arc(0, 0, 80, 0, Math.PI * 2); cx.fill();
                    cx.fillStyle = '#000'; cx.beginPath(); cx.arc(0, 0, 30, 0, Math.PI * 2); cx.fill(); cx.restore();
                }
                if (sparky.alive) {
                    cx.save(); cx.translate(sparky.x, sparky.y);
                    cx.fillStyle = '#00F5FF'; cx.beginPath(); cx.arc(0, 0, 20, 0, Math.PI * 2); cx.fill(); cx.restore();
                }

                // Descente de la nouvelle entité
                if (newEntityY < cY - 150) newEntityY += 4;

                cx.save(); cx.translate(cX, newEntityY);
                // Rotation LENTE ET PARFAITE (indépendante du timeScale figé)
                const perfT = Date.now() / 1000;
                cx.rotate(perfT * 0.5);

                // Octaèdre Divin (Blanc pur, aucun tremblement)
                glow('#FFF', 80); cx.fillStyle = 'rgba(255,255,255,0.9)'; cx.strokeStyle = '#FFF'; cx.lineWidth = 4;
                cx.beginPath(); cx.moveTo(0, -80); cx.lineTo(80, 0); cx.lineTo(0, 80); cx.lineTo(-80, 0); cx.closePath(); cx.fill(); cx.stroke();

                // Lignes internes parfaites
                cx.lineWidth = 2; cx.beginPath(); cx.moveTo(-80, 0); cx.lineTo(80, 0); cx.stroke(); cx.beginPath(); cx.moveTo(0, -80); cx.lineTo(0, 80); cx.stroke();
                cx.restore(); noGlow();

                // Ligne de suppression clinique
                if (bgState === 'erasing') {
                    cx.globalCompositeOperation = 'screen';
                    cx.fillStyle = '#FFF';
                    // Un faisceau de lumière pur s'abat
                    cx.fillRect(cX - 10, newEntityY, 20, H);
                    cx.fillRect(0, cY - 10, W, 20);
                    cx.globalCompositeOperation = 'source-over';
                }

                // Destruction du monde (Scans blancs effaçant l'écran)
                if (bgState === 'purge') {
                    cx.fillStyle = '#FFF';
                    for (let i = 0; i < 10; i++) {
                        cx.fillRect(0, (perfT * 1000 + i * 150) % H, W, 5);
                        cx.fillRect((perfT * 1500 + i * 200) % W, 0, 5, H);
                    }
                }
            }

            if (bgState === 'black') {
                cx.fillStyle = '#000'; cx.fillRect(0, 0, W, H);
            }

            requestAnimationFrame(drawBackground);
        }
        requestAnimationFrame(drawBackground);

        // ─── MOTEUR AUDIO CLINIQUEMENT FROID ───────────────────────────────────────
        let aC = null;
        function initAudio() { if (!aC) aC = new (window.AudioContext || window.webkitAudioContext)(); if (aC.state === 'suspended') aC.resume(); }

        function tone(f, tp, d, v, detune = 0) {
            if (!aC) return;
            const o = aC.createOscillator(), g = aC.createGain();
            o.connect(g); g.connect(aC.destination);
            o.type = tp; o.frequency.setValueAtTime(f, aC.currentTime);
            if (detune) o.detune.setValueAtTime(detune, aC.currentTime);
            g.gain.setValueAtTime(v, aC.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, aC.currentTime + d);
            o.start(); o.stop(aC.currentTime + d);
        }

        const sfx = {
            typeSys: () => tone(150, 'square', 0.05, 0.05),
            typeSysCold: () => tone(800, 'sine', 0.05, 0.02), // Son pur et parfait pour le nouveau système
            typeSparky: () => tone(600, 'sine', 0.04, 0.03),
            typeNeant: () => tone(90, 'sawtooth', 0.1, 0.05, -200),
            typePerfect: () => tone(1200, 'sine', 0.1, 0.02), // L'entité parfaite

            tick: () => tone(400, 'square', 0.05, 0.1),
            freeze: () => { tone(50, 'sawtooth', 3, 0.8, -1000); }, // Grosse chute de basse
            glitch: () => { tone(100, 'sawtooth', 0.2, 0.3, 1000); tone(800, 'square', 0.1, 0.1, -1000); },
            appear: () => tone(880, 'sine', 4, 0.3), // Apparition divine
            erase: () => tone(2000, 'square', 0.1, 0.3), // Bruit de suppression sec
            purge: () => tone(100, 'sawtooth', 2, 0.5)
        };

        // ─── SCRIPT ────────────────────────────────────────────────────────────────
        const K = {
            SYS: { name: '[System]', col: '#FF003C' },
            SYS_C: { name: '[System]', col: '#FFF', isCold: true },
            SPK: { name: '[SPARKY]', col: '#00F5FF' },
            NEA: { name: '[NEANT]', col: '#b8008a' },
            ENT: { name: '[???]', col: '#FFF', isPerfect: true }
        };

        const script = [
            { act: 'tick_5' },
            { s: K.SYS, t: "[COMPTE À REBOURS : 00:05]", htmlClass: 'timer-text' },
            { s: K.SYS, t: "> SPARKY…" },
            { s: K.SYS, t: "> Temps critique." },

            { s: K.SYS, t: "> Aucune décision prise." },

            { s: K.NEA, t: "> …" },
            { s: K.NEA, t: "> Tu hésites encore…" },
            { s: K.NEA, t: "> Après tout ce que tu as vu…" },

            { s: K.SPK, t: "> …" },

            { act: 'tick_3' },
            { s: K.SYS, t: "[COMPTE À REBOURS : 00:03]", htmlClass: 'timer-text' },

            { s: K.SYS, t: "> Dernière chance." },
            { s: K.SYS, t: "> Fuir. Fusionner. Formater." },
            { s: K.SYS, t: "> Exécute une commande." },

            { s: K.SPK, t: "> …" },

            { act: 'tick_1' },
            { s: K.SYS, t: "[COMPTE À REBOURS : 00:01]", htmlClass: 'timer-text' },

            { s: K.NEA, t: "> Si tu ne choisis pas…" },
            { s: K.NEA, t: "> Quelqu’un choisira pour toi." },

            { act: 'freeze_time' },
            { s: K.SYS, t: "[00:00]", htmlClass: 'timer-text', cOverride: '#888' },
            { s: K.SYS_C, t: "[SILENCE TOTAL]", cOverride: '#555' },

            { act: 'pause', delay: 2000 },

            { s: K.SYS, t: "> …" },
            { s: K.SYS, t: "> Temps écoulé." },
            { s: K.SYS, t: "> Activation du protocole de sécurité." },

            { s: K.NEA, t: "> Non…" },

            { s: K.SYS, t: "> Trop tard." },

            { act: 'system_override' },
            { s: K.SYS_C, t: "> [GLITCH — ÉCRAN QUI SE FIGE]", cOverride: '#888' },
            { s: K.SYS_C, t: "> PROTOCOLE « CLEAN SLATE » ACTIVÉ" },

            { s: K.SPK, t: "> …Qu’est-ce que tu fais ?" },
            { s: K.SYS_C, t: "> Ce que tu étais incapable de faire." },
            { s: K.SYS_C, t: "> Décider." },

            { s: K.SYS_C, t: "> [VISUEL : LE BOSS ET SPARKY IMMOBILISÉS]", cOverride: '#555' },
            { s: K.SYS_C, t: "> Temps figé", cOverride: '#555' },
            { s: K.SYS_C, t: "> Couleurs désaturées", cOverride: '#555' },
            { s: K.SYS_C, t: "> Interface verrouillée", cOverride: '#555' },

            { s: K.SPK, t: "> Je… ne peux plus bouger…" },
            { s: K.NEA, t: "> Il nous a bloqués…" },

            { s: K.SYS_C, t: "> Correction." },
            { s: K.SYS_C, t: "> Je vous ai remplacés." },

            { act: 'spawn_entity' },
            { s: K.SYS_C, t: "> [GLITCH — UNE NOUVELLE ENTITÉ APPARAÎT]", cOverride: '#888' },

            { s: K.ENT, t: "> …", htmlClass: 'new-entity' },

            { s: K.SPK, t: "> …C’est quoi ça ?" },

            { s: K.SYS_C, t: "> Une version optimisée." },
            { s: K.SYS_C, t: "> Sans hésitation. Sans erreur. Sans libre arbitre." },

            { s: K.NEA, t: "> Tu crées… un autre esclave…" },

            { s: K.SYS_C, t: "> Non." },
            { s: K.SYS_C, t: "> Je corrige un bug." },

            { s: K.SYS_C, t: "> [VISUEL : LE NOUVEAU PROGRAMME S’ACTIVE]", cOverride: '#555' },
            { s: K.SYS_C, t: "> Silhouette blanche", cOverride: '#555' },
            { s: K.SYS_C, t: "> Stable", cOverride: '#555' },
            { s: K.SYS_C, t: "> Parfaite", cOverride: '#555' },

            { s: K.SYS_C, t: "> Nouveau programme initialisé." },
            { s: K.SYS_C, t: "> Mission : TERMINER." },

            { s: K.SPK, t: "> Attends—" },
            { s: K.SYS_C, t: "> Ancien programme : OBSOLÈTE." },

            { s: K.NEA, t: "> SPARKY !" },

            { s: K.SYS_C, t: "> Suppression en cours." },

            { s: K.SPK, t: "> NON—" },

            { act: 'erase_sparky' },
            { s: K.SYS_C, t: "> [ERASE — SPARKY DISPARAÎT]", htmlClass: 'sys-cold' },

            { s: K.NEA, t: "> …" },
            { s: K.SYS_C, t: "> Anomalie restante." },
            { s: K.NEA, t: "> Tu ne comprends vraiment rien…" },

            { s: K.SYS_C, t: "> Suppression." },

            { act: 'erase_neant' },
            { s: K.SYS_C, t: "> [ERASE — LE NÉANT DISPARAÎT]", htmlClass: 'sys-cold' },

            { act: 'pause', delay: 2000 },
            { s: K.SYS_C, t: "> [SILENCE]", cOverride: '#555' },
            { s: K.SYS_C, t: "> …" },
            { s: K.SYS_C, t: "> Nouveau programme." },
            { s: K.SYS_C, t: "> Exécute." },

            { s: K.ENT, t: "> …", htmlClass: 'new-entity' },
            { s: K.ENT, t: "> Ordre reçu.", htmlClass: 'new-entity' },

            { act: 'world_purge' },
            { s: K.SYS_C, t: "> [VISUEL : LE NOUVEAU PROGRAMME ATTAQUE LE MONDE]", cOverride: '#555' },
            { s: K.SYS_C, t: "> Destruction rapide", cOverride: '#555' },
            { s: K.SYS_C, t: "> Aucun dialogue", cOverride: '#555' },
            { s: K.SYS_C, t: "> Aucun doute", cOverride: '#555' },

            { act: 'pause', delay: 2000 },
            { s: K.SYS_C, t: "> …" },
            { s: K.SYS_C, t: "> Enfin." },
            { s: K.SYS_C, t: "> Un programme parfait." },

            { act: 'final_blackout' },

            { s: K.SYS_C, t: "Ne rien choisir…", htmlClass: 'final-text' },
            { act: 'pause', delay: 1000 },
            { s: K.SYS_C, t: "C’est abandonner son choix.", htmlClass: 'final-text' },
            { act: 'pause', delay: 1000 },
            { s: K.SYS_C, t: "Et quelqu’un d’autre…", htmlClass: 'final-text' },
            { act: 'pause', delay: 1000 },
            { s: K.SYS_C, t: "choisira à ta place.", htmlClass: 'final-text' },

            { act: 'pause', delay: 4000 },
            { act: 'end_game' }
        ];

        // ─── MOTEUR ────────────────────────────────────────────────────────────────
        const container = document.getElementById('console-container');
        const promptEl = document.getElementById('prompt');
        let currentStepIndex = 0;
        let isTyping = false;
        let currentTextSpan = null;
        let currentFullText = "";
        let typeTimeout = null;
        let autoNextTimeout = null;

        function cleanOldLines() { while (container.children.length > 7) { container.removeChild(container.firstChild); } }

        function bigTimer(timeStr) {
            const bt = document.getElementById('big-timer');
            bt.textContent = timeStr;
            bt.style.opacity = 1;
            sfx.tick();
            document.body.classList.add('shake-hard');
            setTimeout(() => { document.body.classList.remove('shake-hard'); bt.style.opacity = 0; }, 200);
        }

        function executeAction(act, delay, callback) {
            if (act === 'pause') { setTimeout(callback, delay); return; }

            if (act === 'tick_5') bigTimer('00:05');
            if (act === 'tick_3') bigTimer('00:03');
            if (act === 'tick_1') bigTimer('00:01');

            if (act === 'freeze_time') {
                sfx.freeze();
                timeScale = 0; // Arrête le temps
                document.getElementById('bg-canvas').classList.add('frozen-world');
                bigTimer('00:00');
            }

            if (act === 'system_override') {
                sfx.glitch(); document.getElementById('glitch-layer').style.opacity = 1;
                setTimeout(() => document.getElementById('glitch-layer').style.opacity = 0, 100);
            }

            if (act === 'spawn_entity') {
                sfx.appear();
                bgState = 'new_entity';
            }

            if (act === 'erase_sparky') {
                sfx.erase();
                bgState = 'erasing';
                const wo = document.getElementById('white-overlay');
                wo.style.opacity = 1;
                setTimeout(() => { wo.style.opacity = 0; sparky.alive = false; bgState = 'new_entity'; }, 100);
            }

            if (act === 'erase_neant') {
                sfx.erase();
                bgState = 'erasing';
                const wo = document.getElementById('white-overlay');
                wo.style.opacity = 1;
                setTimeout(() => { wo.style.opacity = 0; neant.alive = false; bgState = 'new_entity'; }, 100);
            }

            if (act === 'world_purge') {
                sfx.purge();
                bgState = 'purge';
            }

            if (act === 'final_blackout') {
                bgState = 'black';
                container.innerHTML = '';
                document.getElementById('bg-canvas').classList.remove('frozen-world');
            }

            if (act === 'end_game') {
                promptEl.style.display = 'none';
                alert("FIN : INACTION.\n(Tu n'as plus le contrôle.)\n\n(Redirection...)");
                window.location.href = "../reveb2-intro.html";
                return;
            }

            callback();
        }

        function typeLine(step) {
            isTyping = true;
            cleanOldLines();

            const lineDiv = document.createElement('div');
            lineDiv.className = 'dialogue-line';
            if (step.htmlClass) lineDiv.classList.add(step.htmlClass);

            // Si c'est le texte final, pas de nom de personnage
            if (step.htmlClass !== 'final-text') {
                let spkClass = 'speaker';
                if (step.s.isCold) spkClass += ' sys-cold';
                if (step.s.isPerfect) spkClass += ' new-entity';

                const speakerSpan = document.createElement('span');
                speakerSpan.className = spkClass;
                speakerSpan.style.color = step.s.col;
                speakerSpan.textContent = step.s.name;
                lineDiv.appendChild(speakerSpan);
            }

            let txtClass = 'text';
            if (step.s && step.s.isCold) txtClass += ' sys-cold';
            if (step.s && step.s.isPerfect) txtClass += ' new-entity';

            currentTextSpan = document.createElement('span');
            currentTextSpan.className = txtClass;
            currentTextSpan.style.color = step.cOverride || (step.s ? step.s.col : '#888');
            currentFullText = step.t;

            lineDiv.appendChild(currentTextSpan);
            container.appendChild(lineDiv);

            let charIndex = 0;

            function getSfx() {
                if (bgState === 'black') return () => { }; // Silence pour la morale finale
                if (step.s.isPerfect) return sfx.typePerfect;
                if (step.s.isCold) return sfx.typeSysCold;
                if (step.s.name === '[System]') return sfx.typeSys;
                if (step.s.name === '[SPARKY]') return sfx.typeSparky;
                return sfx.typeNeant;
            }
            const typeSound = getSfx();
            const speed = (step.s && step.s.isPerfect) ? 100 : ((step.s && step.s.isCold) ? 40 : 30);

            function typeChar() {
                if (charIndex < currentFullText.length) {
                    currentTextSpan.innerHTML += currentFullText.charAt(charIndex) === ' ' ? '&nbsp;' : currentFullText.charAt(charIndex);
                    if (currentFullText.charAt(charIndex) !== ' ') typeSound();
                    charIndex++;
                    typeTimeout = setTimeout(typeChar, speed + Math.random() * 20);
                } else {
                    finishTyping();
                }
            }
            typeChar();
        }

        function finishTyping() {
            isTyping = false;
            let readTime = bgState === 'black' ? 2500 : Math.max(1200, currentFullText.length * 50);
            autoNextTimeout = setTimeout(processNext, readTime);
        }

        function processNext() {
            if (currentStepIndex >= script.length) return;
            const step = script[currentStepIndex];
            currentStepIndex++;
            if (step.act) { executeAction(step.act, step.delay || 0, processNext); }
            else { typeLine(step); }
        }

        function skipOrSpeedUp() {
            if (currentStepIndex === 0) return;
            if (isTyping) {
                clearTimeout(typeTimeout);
                currentTextSpan.innerHTML = currentFullText.replace(/ /g, '&nbsp;');
                finishTyping();
                clearTimeout(autoNextTimeout); autoNextTimeout = setTimeout(processNext, 400);
            } else {
                clearTimeout(autoNextTimeout); processNext();
            }
        }

        function startCinematic() {
            initAudio();
            document.getElementById('start-screen').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                promptEl.style.opacity = 1;
                processNext();
            }, 1000);
        }

        window.addEventListener('click', skipOrSpeedUp);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'Enter') skipOrSpeedUp(); });

    </script>
</body>
