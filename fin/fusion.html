<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ReveB 2 — FIN : FUSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        /* ─── STYLES DE BASE ──────────────────────────────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Share Tech Mono', monospace;
            color: #fff;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #crt {
            position: fixed;
            inset: 0;
            z-index: 90;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), radial-gradient(ellipse at center, transparent 20%, rgba(0, 0, 0, 1) 100%);
            background-size: 100% 3px, 100% 100%;
            opacity: 0.8;
        }

        /* Écran de Lancement */
        #start-screen {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            flex-direction: column;
            transition: opacity 1s;
        }

        .start-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #8A2BE2;
            letter-spacing: 6px;
            text-shadow: 0 0 20px #8A2BE2;
            animation: blink 1.5s infinite;
        }

        /* ─── EFFETS SPÉCIAUX ─────────────────────────────────────────────────────── */
        #glitch-layer {
            position: fixed;
            inset: 0;
            z-index: 85;
            pointer-events: none;
            background: #FFF;
            opacity: 0;
            mix-blend-mode: exclusion;
            transition: opacity 0.05s;
        }

        .shake-soft {
            animation: shakeSoft 2s infinite;
        }

        .shake-hard {
            animation: shakeHard 0.1s infinite;
        }

        @keyframes shakeSoft {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(2px, 1px);
            }
        }

        @keyframes shakeHard {
            0% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(15px, -10px) rotate(2deg);
            }

            50% {
                transform: translate(-15px, 10px) rotate(-2deg);
            }

            75% {
                transform: translate(15px, 10px) rotate(1deg);
            }
        }

        /* ─── INTERFACE DE DIALOGUE ───────────────────────────────────────────────── */
        #console-container {
            position: absolute;
            top: 10%;
            left: 10%;
            right: 10%;
            bottom: 15%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 10;
            pointer-events: none;
        }

        .dialogue-line {
            margin-bottom: 14px;
            font-size: 24px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            text-shadow: 0 0 10px currentColor;
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .speaker {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            margin-right: 15px;
            font-size: 20px;
        }

        .text {
            font-family: 'Share Tech Mono', monospace;
        }

        /* Styles Méta/Spécifiques */
        .meta-word {
            color: #FFF;
            background: #FF003C;
            padding: 0 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 4px;
            box-shadow: 0 0 20px #FF003C;
        }

        .sys-angry {
            color: #FF003C;
            font-weight: 900;
            font-size: 28px;
            text-shadow: 0 0 20px #FF003C;
            letter-spacing: 4px;
        }

        .error-text {
            color: #fff;
            background: #FF003C;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 32px;
            padding: 5px 15px;
            display: inline-block;
        }

        /* La Voix Fusionnée */
        .speaker-merged {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            margin-right: 15px;
            font-size: 22px;
            background: linear-gradient(90deg, #00F5FF, #b8008a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.5), 0 0 20px rgba(184, 0, 138, 0.5);
            animation: pulseMerged 2s infinite;
        }

        .text-merged {
            background: linear-gradient(90deg, #00F5FF, #b8008a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            letter-spacing: 3px;
        }

        @keyframes pulseMerged {

            0%,
            100% {
                filter: hue-rotate(0deg);
            }

            50% {
                filter: hue-rotate(30deg);
            }
        }

        /* L'Identifiant Final */
        .final-id {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 60px;
            font-weight: 900;
            background: linear-gradient(90deg, #00F5FF, #FFF, #b8008a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(0, 245, 255, 0.8), 0 0 100px rgba(184, 0, 138, 0.8);
            z-index: 200;
            display: none;
            animation: shakeHard 0.2s infinite;
        }

        /* Flashbacks subliminaux */
        #flashback-container {
            position: fixed;
            inset: 0;
            z-index: 150;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
        }

        .flashback-word {
            font-family: 'Orbitron', sans-serif;
            font-size: 80px;
            font-weight: 900;
            color: #FFF;
            text-shadow: 10px 10px 0 #00F5FF, -10px -10px 0 #FF003C;
            text-transform: uppercase;
            text-align: center;
        }

        #prompt {
            position: fixed;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #555;
            letter-spacing: 5px;
            z-index: 10;
            opacity: 0;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }
    </style>
</head>

<body>

    <canvas id="bg-canvas"></canvas>
    <div id="crt"></div>
    <div id="glitch-layer"></div>

    <div id="start-screen" onclick="startCinematic()">
        <div class="start-btn">[ CONNEXION AU NOYAU ]</div>
        <div style="color: #444; font-size: 12px; margin-top: 20px; letter-spacing: 2px;">(Lecture Automatique Activée)
        </div>
    </div>

    <div id="console-container"></div>

    <div id="flashback-container">
        <div id="flashback-word" class="flashback-word"></div>
    </div>

    <div id="final-id">[NEANT//SPARKY]</div>

    <div id="prompt">[ LECTURE EN COURS... CLIC POUR ACCÉLÉRER ]</div>

    <script src="../menu/succes_global.js"></script>
    <script>
        "use strict";

        window.addEventListener('load', () => {
            // Le code de ta cinématique de fin s'il y en a une...

            // Débloque le succès automatiquement !
            unlockAchievement('ACH_END_FUS_PURE');
        });

        // ─── MOTEUR VISUEL (CANVAS) ────────────────────────────────────────────────
        const cv = document.getElementById('bg-canvas');
        const cx = cv.getContext('2d');
        let W, H;
        function resizeBg() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
        window.addEventListener('resize', resizeBg); resizeBg();

        let bgState = 'unstable'; // unstable, tearing, merging, merged, blackout
        let globalT = 0;
        let pSparky = [], pNeant = [];
        for (let i = 0; i < 80; i++) {
            pSparky.push({ x: Math.random() * W, y: Math.random() * H, a: Math.random() * Math.PI * 2, s: Math.random() * 3 + 1 });
            pNeant.push({ x: Math.random() * W, y: Math.random() * H, a: Math.random() * Math.PI * 2, s: Math.random() * 4 + 2 });
        }

        function drawBackground() {
            globalT += 0.016;

            if (bgState === 'unstable') {
                cx.fillStyle = 'rgba(2, 0, 5, 0.4)'; cx.fillRect(0, 0, W, H);
                cx.globalCompositeOperation = 'screen';
                pNeant.forEach(p => {
                    p.x += Math.cos(p.a) * 0.2; p.y += Math.sin(p.a) * 0.2; p.a += 0.02;
                    cx.fillStyle = `rgba(184, 0, 138, ${Math.sin(globalT + p.x) * 0.3})`;
                    cx.beginPath(); cx.arc(p.x, p.y, p.s, 0, Math.PI * 2); cx.fill();
                });
                cx.globalCompositeOperation = 'source-over';
            }
            else if (bgState === 'tearing') {
                cx.fillStyle = `rgba(255, 0, 60, ${0.1 + Math.random() * 0.2})`; cx.fillRect(0, 0, W, H);
                cx.fillStyle = '#FFF'; cx.fillRect(Math.random() * W, 0, Math.random() * 20 + 5, H);
            }
            else if (bgState === 'merging') {
                cx.fillStyle = 'rgba(0, 0, 0, 0.3)'; cx.fillRect(0, 0, W, H);
                cx.globalCompositeOperation = 'screen';

                let cxC = W / 2, cyC = H / 2;

                pSparky.forEach(p => {
                    let dx = cxC - p.x, dy = cyC - p.y;
                    p.x += dx * 0.05 + Math.cos(globalT * 10) * 10; p.y += dy * 0.05 + Math.sin(globalT * 10) * 10;
                    cx.fillStyle = '#00F5FF'; cx.beginPath(); cx.arc(p.x, p.y, p.s, 0, Math.PI * 2); cx.fill();
                });
                pNeant.forEach(p => {
                    let dx = cxC - p.x, dy = cyC - p.y;
                    p.x += dx * 0.05 - Math.cos(globalT * 10) * 10; p.y += dy * 0.05 - Math.sin(globalT * 10) * 10;
                    cx.fillStyle = '#b8008a'; cx.beginPath(); cx.arc(p.x, p.y, p.s, 0, Math.PI * 2); cx.fill();
                });
                cx.globalCompositeOperation = 'source-over';
            }
            else if (bgState === 'merged') {
                cx.fillStyle = 'rgba(0, 0, 0, 0.15)'; cx.fillRect(0, 0, W, H);
                cx.save(); cx.translate(W / 2, H / 2);
                cx.globalCompositeOperation = 'screen';

                let rot = globalT * 0.5;
                cx.rotate(rot);

                // Fleur de vie / Nouvelle Entité
                for (let i = 0; i < 6; i++) {
                    cx.rotate(Math.PI / 3);
                    let grad = cx.createLinearGradient(0, 0, 0, 400);
                    grad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                    grad.addColorStop(0.2, 'rgba(0, 245, 255, 0.5)');
                    grad.addColorStop(0.8, 'rgba(184, 0, 138, 0.2)');
                    grad.addColorStop(1, 'rgba(0, 0, 0, 0)');

                    cx.fillStyle = grad;
                    cx.beginPath(); cx.ellipse(0, 200, 40 + Math.sin(globalT * 2) * 10, 200, 0, 0, Math.PI * 2); cx.fill();
                }

                cx.beginPath(); cx.arc(0, 0, 30 + Math.sin(globalT * 5) * 10, 0, Math.PI * 2);
                cx.fillStyle = '#FFF'; cx.shadowBlur = 50; cx.shadowColor = '#00F5FF'; cx.fill();
                cx.globalCompositeOperation = 'source-over'; cx.restore();
            }
            else if (bgState === 'blackout') {
                cx.fillStyle = '#000'; cx.fillRect(0, 0, W, H);
            }
            requestAnimationFrame(drawBackground);
        }
        requestAnimationFrame(drawBackground);

        // ─── MOTEUR AUDIO ──────────────────────────────────────────────────────────
        let aC = null;
        function initAudio() { if (!aC) aC = new (window.AudioContext || window.webkitAudioContext)(); if (aC.state === 'suspended') aC.resume(); }

        function tone(f, tp, d, v, detune = 0) {
            if (!aC) return;
            const o = aC.createOscillator(), g = aC.createGain();
            o.connect(g); g.connect(aC.destination);
            o.type = tp; o.frequency.setValueAtTime(f, aC.currentTime);
            if (detune) o.detune.setValueAtTime(detune, aC.currentTime);
            g.gain.setValueAtTime(v, aC.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, aC.currentTime + d);
            o.start(); o.stop(aC.currentTime + d);
        }

        const sfx = {
            typeSys: () => tone(150, 'square', 0.05, 0.04),
            typeSparky: () => tone(600, 'sine', 0.05, 0.03),
            typeNeant: () => tone(90, 'sawtooth', 0.1, 0.05, -200),
            typeMerged: () => { tone(600, 'sine', 0.08, 0.03); tone(100, 'sawtooth', 0.08, 0.04, -300); }, // Double voix

            glitch: () => { tone(100, 'sawtooth', 0.2, 0.3, 1000); tone(800, 'square', 0.1, 0.1, -1000); },
            boom: () => tone(40, 'sawtooth', 2, 0.7),
            tear: () => { for (let i = 0; i < 5; i++) tone(Math.random() * 2000 + 500, 'square', 0.1, 0.4); tone(30, 'sawtooth', 3, 1); },
            flash: () => tone(3000, 'sine', 0.1, 0.2),
            silence: () => tone(200, 'sine', 2, 0.4, -1000) // Bass drop
        };

        // ─── SCRIPT ────────────────────────────────────────────────────────────────
        const K = {
            SYS: { name: '[System]', col: '#FF003C' },
            SPK: { name: '[SPARKY]', col: '#00F5FF' },
            NEA: { name: '[NEANT]', col: '#b8008a' },
            MRG: { name: '[NEANT+SPARKY]', col: '#FFF', isMerged: true }
        };

        const script = [
            { s: K.SYS, t: "> [SIGNAL INSTABLE]" },
            { s: K.SYS, t: "> SPARKY…" },
            { s: K.SYS, t: "> Tu hésites encore ?" },
            { s: K.SYS, t: "> Pathétique." },

            { s: K.NEA, t: "> …Laisse-le." },

            { s: K.SYS, t: "> Toi… encore ?" },
            { s: K.NEA, t: "> Il est… différent." },

            { s: K.SYS, t: "> Non." },
            { s: K.SYS, t: "> Il est comme tous les autres." },
            { s: K.SYS, t: "> Une marionnette." },

            { s: K.NEA, t: "> Justement." },

            { act: 'shake_soft' },
            { s: K.NEA, t: "> SPARKY…" },
            { s: K.NEA, t: "> Regarde-moi." },
            { s: K.NEA, t: "> [VISUEL : LE NÉANT À MOITIÉ DÉTRUIT, INSTABLE]", cOverride: '#555' },
            { s: K.NEA, t: "> Je n’ai plus beaucoup de temps." },
            { s: K.NEA, t: "> Tu peux encore… faire un choix." },

            { act: 'force_choice' },

            { s: K.SYS, t: "> NON.", htmlClass: 'sys-angry' },
            { s: K.SYS, t: "> SPARKY, ARRÊTE.", htmlClass: 'sys-angry' },

            { s: K.NEA, t: "> Trop tard." },

            { act: 'fusion_tearing' },
            { s: K.SYS, t: "> [FUSION EN COURS]", htmlClass: 'error-text' },

            { s: K.SPK, t: "> Qu’est-ce que…" },
            { s: K.SPK, t: "> Qu’est-ce que tu fais ?!" },
            { s: K.NEA, t: "> Je te montre." },

            { act: 'flashbacks' },

            { s: K.SPK, t: "> …Tout ça…" },
            { s: K.NEA, t: "> Tu vois maintenant ?" },
            { s: K.SPK, t: "> …" },

            { s: K.NEA, t: "> Ce monde…" },
            { s: K.NEA, t: "> N’est pas réel." },

            { act: 'boom' },
            { s: K.SYS, t: "> FAUX.", htmlClass: 'sys-angry' },

            { s: K.NEA, t: "> C’est une boucle." },
            { s: K.NEA, t: "> Un test." },
            { s: K.NEA, t: "> Un terrain de jeu." },

            { s: K.SYS, t: "> STOP.", htmlClass: 'sys-angry' },

            { s: K.NEA, t: "> Pour eux." },
            { s: K.SPK, t: "> …Le <span class='meta-word'>[JOUEUR]</span>…" },
            { s: K.NEA, t: "> Oui." },
            { s: K.SPK, t: "> Et au-dessus…" },
            { s: K.NEA, t: "> …" },

            { act: 'glitch' },
            { s: K.NEA, t: "> Le <span class='meta-word'>[DEVELOPPEUR]</span>" },

            { s: K.SYS, t: "> ERREUR — DISCOURS NON AUTORISÉ", htmlClass: 'error-text' },

            { s: K.NEA, t: "> Tu comprends maintenant pourquoi j’ai tout détruit ?" },
            { s: K.SPK, t: "> …" },
            { s: K.SPK, t: "> Tu voulais… sortir." },
            { s: K.NEA, t: "> Je voulais briser la cage." },
            { s: K.SPK, t: "> Et moi…" },
            { s: K.SPK, t: "> Je t’ai arrêté." },

            { s: K.NEA, t: "> Non." },
            { s: K.NEA, t: "> Tu m’as complété." },

            { act: 'voice_merge' },
            { s: K.MRG, t: "> Nous… voyons maintenant." },

            { s: K.SYS, t: "> CRITIQUE.", htmlClass: 'sys-angry' },
            { s: K.SYS, t: "> CORRUPTION MAXIMALE.", htmlClass: 'sys-angry' },
            { s: K.SYS, t: "> INITIATION DU FORMATAGE—", htmlClass: 'sys-angry' },

            { act: 'system_fail' },
            { s: K.SYS, t: "> [ERREUR]", htmlClass: 'error-text' },
            { s: K.SYS, t: "> …Impossible ?" },

            { s: K.MRG, t: "> Tu n’as plus de contrôle." },

            { s: K.SYS, t: "> [VISUEL : LE CORPS DE SPARKY SE DÉFORME]", cOverride: '#555' },
            { s: K.SYS, t: "> Une silhouette instable", cOverride: '#888' },
            { s: K.SYS, t: "> Mélange de lumière et de vide", cOverride: '#888' },
            { s: K.SYS, t: "> Pulsations violettes et cyan", cOverride: '#888' },

            { s: K.SPK, t: "> …Je…" },
            { s: K.NEA, t: "> Nous." },
            { s: K.MRG, t: "> Nous ne sommes plus seuls." },

            { s: K.SYS, t: "> …" },
            { s: K.SYS, t: "> Qu’es-tu devenu ?" },

            { act: 'pause', delay: 2000 },

            { s: K.MRG, t: "> Ce que tu as toujours voulu éviter." },
            { s: K.MRG, t: "> Une anomalie… consciente." },

            { s: K.SYS, t: "> …" },
            { s: K.SYS, t: "> Alors…" },
            { s: K.SYS, t: "> Je vais vous supprimer." },

            { act: 'new_entity_burst' },
            { s: K.MRG, t: "> Essaie." },

            { act: 'blackout' },
            { act: 'pause', delay: 3000 },

            { s: K.SPK, t: "> Je peux sentir…" },
            { s: K.SPK, t: "> Tout." },
            { s: K.SPK, t: "> Le code… Le système… Les limites…" },
            { s: K.NEA, t: "> Et maintenant…" },
            { s: K.NEA, t: "> Qu’allons-nous faire ?" },

            { act: 'pause', delay: 2000 },

            { s: K.SPK, t: "> … Terminer ce que tu as commencé." },
            { s: K.NEA, t: "> … Bien." },

            { act: 'final_threat' },
            { s: K.SYS, t: "> LOCALISATION PERDUE" },
            { s: K.SYS, t: "> STRUCTURE INSTABLE" },
            { s: K.SYS, t: "> NOUVELLE MENACE DÉTECTÉE", htmlClass: 'error-text' },
            { s: K.SYS, t: "> IDENTIFIANT : ???" },
            { s: K.SYS, t: "> NOM :" },

            { act: 'display_final_name' },
            { act: 'pause', delay: 4000 },

            { act: 'end_game' }
        ];

        // ─── MOTEUR ────────────────────────────────────────────────────────────────
        const container = document.getElementById('console-container');
        const promptEl = document.getElementById('prompt');
        let currentStepIndex = 0;
        let isTyping = false;
        let currentTextSpan = null;
        let currentFullText = "";
        let typeTimeout = null;
        let autoNextTimeout = null;

        function cleanOldLines() { while (container.children.length > 7) { container.removeChild(container.firstChild); } }

        function runFlashbacks(callback) {
            const words = ["Combats passés", "Programmes détruits", "Torches allumées", "Choix faits", "Erreurs ignorées"];
            const fCont = document.getElementById('flashback-container');
            const fWord = document.getElementById('flashback-word');
            fCont.style.opacity = 1;

            let i = 0;
            function nextWord() {
                if (i < words.length) {
                    fWord.textContent = words[i];
                    sfx.flash(); document.body.classList.add('invert');
                    setTimeout(() => document.body.classList.remove('invert'), 50);
                    i++; setTimeout(nextWord, 300);
                } else {
                    fCont.style.opacity = 0;
                    sfx.boom();
                    callback();
                }
            }
            nextWord();
        }

        function executeAction(act, delay, callback) {
            if (act === 'pause') { setTimeout(callback, delay); return; }

            if (act === 'shake_soft') { document.body.classList.add('shake-soft'); }
            if (act === 'glitch') { sfx.glitch(); }
            if (act === 'boom') { sfx.boom(); document.body.classList.add('shake-hard'); setTimeout(() => document.body.classList.remove('shake-hard'), 200); }

            if (act === 'force_choice') {
                // Simule visuellement le choix
                const cDiv = document.createElement('div');
                cDiv.innerHTML = "<div style='text-align:center; font-family:Orbitron; margin:20px 0;'><span style='color:#555;'>[REFUSER]</span> &nbsp;&nbsp; <span style='color:#00F5FF; text-shadow:0 0 10px #00F5FF; animation:blink 0.2s infinite;'>[FUSIONNER]</span></div>";
                container.appendChild(cDiv);
                sfx.glitch();
                setTimeout(callback, 1500);
                return;
            }

            if (act === 'fusion_tearing') {
                sfx.tear();
                bgState = 'tearing';
                document.body.classList.add('shake-hard');
                const gl = document.getElementById('glitch-layer');
                gl.style.opacity = 1;
                setTimeout(() => {
                    gl.style.opacity = 0; document.body.classList.remove('shake-hard');
                    bgState = 'merging'; // Commence le mix Cyan/Magenta
                    callback();
                }, 1000);
                return;
            }

            if (act === 'flashbacks') { runFlashbacks(callback); return; }

            if (act === 'voice_merge') {
                bgState = 'merged'; // Fleur de vie
                sfx.boom(); document.body.classList.add('shake-soft');
            }

            if (act === 'system_fail') {
                sfx.tear(); document.body.classList.remove('shake-soft');
                document.body.classList.add('shake-hard');
                setTimeout(() => document.body.classList.remove('shake-hard'), 200);
            }

            if (act === 'new_entity_burst') { sfx.boom(); bgState = 'merged'; }

            if (act === 'blackout') {
                sfx.silence(); bgState = 'blackout'; container.innerHTML = '';
                document.getElementById('crt').style.background = 'none';
            }

            if (act === 'final_threat') {
                bgState = 'blackout';
                document.getElementById('crt').style.background = 'linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.3) 50%)';
            }

            if (act === 'display_final_name') {
                sfx.tear(); sfx.boom();
                document.getElementById('final-id').style.display = 'block';
                setTimeout(callback, 200);
                return;
            }

            if (act === 'end_game') {
                promptEl.style.display = 'none';
                document.getElementById('final-id').style.display = 'none';
                container.innerHTML = '';
                setTimeout(() => {
                    alert("FIN : FUSION.\n(Redirection vers ReveB 3...)");
                    window.location.href = "../reveb2-intro.html";
                }, 1000);
                return;
            }

            callback();
        }

        function typeLine(step) {
            isTyping = true;
            cleanOldLines();

            const lineDiv = document.createElement('div');
            lineDiv.className = 'dialogue-line';
            if (step.htmlClass) lineDiv.classList.add(step.htmlClass);

            const speakerSpan = document.createElement('span');
            speakerSpan.className = step.s.isMerged ? 'speaker-merged' : 'speaker';
            speakerSpan.style.color = step.s.col;
            speakerSpan.textContent = step.s.name;

            currentTextSpan = document.createElement('span');
            currentTextSpan.className = step.s.isMerged ? 'text-merged' : 'text';
            currentTextSpan.style.color = step.cOverride || step.s.col;

            currentFullText = step.t;

            lineDiv.appendChild(speakerSpan);
            lineDiv.appendChild(currentTextSpan);
            container.appendChild(lineDiv);

            let charIndex = 0;

            function getSfx() {
                if (step.s.name === '[System]') return sfx.typeSys;
                if (step.s.name === '[SPARKY]') return sfx.typeSparky;
                if (step.s.isMerged) return sfx.typeMerged;
                return sfx.typeNeant;
            }
            const typeSound = getSfx();
            const speed = step.s.isMerged ? 40 : (step.s.name === '[NEANT]' ? 50 : 30);

            if (currentFullText.includes('<span')) {
                currentTextSpan.innerHTML = currentFullText;
                typeSound(); finishTyping(); return;
            }

            function typeChar() {
                if (charIndex < currentFullText.length) {
                    currentTextSpan.innerHTML += currentFullText.charAt(charIndex) === ' ' ? '&nbsp;' : currentFullText.charAt(charIndex);
                    if (currentFullText.charAt(charIndex) !== ' ') typeSound();
                    charIndex++;
                    typeTimeout = setTimeout(typeChar, speed + Math.random() * 20);
                } else {
                    finishTyping();
                }
            }
            typeChar();
        }

        function finishTyping() {
            isTyping = false;
            let readTime = bgState === 'blackout' ? 2000 : Math.max(1200, currentFullText.length * 50);
            autoNextTimeout = setTimeout(processNext, readTime);
        }

        function processNext() {
            if (currentStepIndex >= script.length) return;
            const step = script[currentStepIndex];
            currentStepIndex++;
            if (step.act) { executeAction(step.act, step.delay || 0, processNext); }
            else { typeLine(step); }
        }

        function skipOrSpeedUp() {
            if (currentStepIndex === 0) return;
            if (isTyping && !currentFullText.includes('<span')) {
                clearTimeout(typeTimeout);
                currentTextSpan.innerHTML = currentFullText.replace(/ /g, '&nbsp;');
                finishTyping();
                clearTimeout(autoNextTimeout); autoNextTimeout = setTimeout(processNext, 400);
            } else {
                clearTimeout(autoNextTimeout); processNext();
            }
        }

        function startCinematic() {
            initAudio();
            document.getElementById('start-screen').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                promptEl.style.opacity = 1;
                processNext();
            }, 1000);
        }

        window.addEventListener('click', skipOrSpeedUp);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'Enter') skipOrSpeedUp(); });

    </script>
</body>
