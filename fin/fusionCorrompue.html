<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ReveB 2 — FIN : FUSION CORROMPUE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        /* ─── STYLES DE BASE ──────────────────────────────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Share Tech Mono', monospace;
            color: #fff;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #crt {
            position: fixed;
            inset: 0;
            z-index: 90;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), radial-gradient(ellipse at center, transparent 20%, rgba(0, 0, 0, 1) 100%);
            background-size: 100% 3px, 100% 100%;
            opacity: 0.8;
        }

        /* Écran de Lancement */
        #start-screen {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            flex-direction: column;
            transition: opacity 1s;
        }

        .start-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #FF003C;
            letter-spacing: 6px;
            text-shadow: 0 0 20px #FF003C;
            animation: blink 1.5s infinite;
        }

        /* ─── EFFETS SPÉCIAUX ─────────────────────────────────────────────────────── */
        #glitch-layer {
            position: fixed;
            inset: 0;
            z-index: 85;
            pointer-events: none;
            background: #FFF;
            opacity: 0;
            mix-blend-mode: exclusion;
            transition: opacity 0.05s;
        }

        .shake-soft {
            animation: shakeSoft 0.5s infinite;
        }

        .shake-hard {
            animation: shakeHard 0.05s infinite;
        }

        @keyframes shakeSoft {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(3px, -2px);
            }
        }

        @keyframes shakeHard {
            0% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(15px, -10px) rotate(2deg);
            }

            50% {
                transform: translate(-20px, 15px) rotate(-3deg);
            }

            75% {
                transform: translate(25px, 10px) rotate(2deg);
            }
        }

        .invert {
            filter: invert(1) hue-rotate(90deg) saturate(300%);
        }

        /* ─── INTERFACE DE DIALOGUE ───────────────────────────────────────────────── */
        #console-container {
            position: absolute;
            top: 5%;
            left: 10%;
            right: 10%;
            bottom: 10%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 10;
            pointer-events: none;
        }

        .dialogue-line {
            margin-bottom: 14px;
            font-size: 24px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            text-shadow: 0 0 10px currentColor;
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .speaker {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            margin-right: 15px;
            font-size: 20px;
        }

        .text {
            font-family: 'Share Tech Mono', monospace;
        }

        /* Styles spécifiques pour cette fin */
        .alert-box {
            color: #FFF;
            background: #FF003C;
            padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 4px;
            box-shadow: 0 0 30px #FF003C;
            display: inline-block;
            margin-bottom: 20px;
        }

        .multi-voice {
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            color: #FFF;
            text-shadow: 3px 0px #00F5FF, -3px 0px #FF003C, 0px 3px #FFD700;
            letter-spacing: 3px;
            animation: rgbGlitch 0.1s infinite;
        }

        .entity-voice {
            font-family: 'Orbitron', sans-serif;
            font-size: 40px;
            font-weight: 900;
            color: #000;
            -webkit-text-stroke: 2px #FFF;
            text-shadow: 0 0 30px #FF003C;
            letter-spacing: 10px;
            text-transform: uppercase;
            animation: entityShake 0.1s infinite;
        }

        .sys-cold {
            color: #888;
        }

        .sparky-corrupted {
            color: #00F5FF;
            text-shadow: 0 0 10px #FF003C;
        }

        @keyframes rgbGlitch {
            0% {
                text-shadow: 3px 0 #00F5FF, -3px 0 #FF003C;
            }

            50% {
                text-shadow: -3px 0 #FFD700, 3px 0 #8A2BE2;
            }

            100% {
                text-shadow: 3px 0 #FF003C, -3px 0 #00F5FF;
            }
        }

        @keyframes entityShake {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02) translate(2px, 2px);
            }
        }

        #prompt {
            position: fixed;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #555;
            letter-spacing: 5px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.5s;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        #red-overlay {
            position: fixed;
            inset: 0;
            background: #FF003C;
            opacity: 0;
            z-index: 80;
            pointer-events: none;
            mix-blend-mode: multiply;
            transition: opacity 2s;
        }
    </style>
</head>

<body>

    <canvas id="bg-canvas"></canvas>
    <div id="red-overlay"></div>
    <div id="crt"></div>
    <div id="glitch-layer"></div>

    <div id="start-screen" onclick="startCinematic()">
        <div class="start-btn">[ ANALYSE DU TAUX DE CORRUPTION ]</div>
        <div style="color: #444; font-size: 12px; margin-top: 20px; letter-spacing: 2px;">(Lecture Automatique Activée)
        </div>
    </div>

    <div id="console-container"></div>
    <div id="prompt">[ LECTURE EN COURS... CLIC POUR ACCÉLÉRER ]</div>

    <script src="../menu/succes_global.js"></script>
    <script>
        "use strict";

        window.addEventListener('load', () => {
            // Le code de ta cinématique de fin s'il y en a une...

            // Débloque le succès automatiquement !
            unlockAchievement('ACH_END_FUS_CORRUPT');
        });

        // ─── MOTEUR VISUEL (CANVAS) ────────────────────────────────────────────────
        const cv = document.getElementById('bg-canvas');
        const cx = cv.getContext('2d');
        let W, H;
        function resizeBg() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
        window.addEventListener('resize', resizeBg); resizeBg();

        let bgState = 'alert'; // alert, silhouettes, deforming, chaos, empty
        let globalT = 0;

        function glow(c, b) { cx.shadowColor = c; cx.shadowBlur = b; }
        function noGlow() { cx.shadowBlur = 0; }

        function drawBackground() {
            globalT += 0.016;
            let t = globalT;
            let cX = W / 2, cY = H / 2;

            if (bgState === 'alert') {
                const pulse = Math.abs(Math.sin(t * 3));
                cx.fillStyle = `rgba(20, 0, 5, 0.3)`; cx.fillRect(0, 0, W, H);
                cx.strokeStyle = `rgba(255, 0, 60, ${pulse * 0.5})`; cx.lineWidth = 20;
                cx.strokeRect(0, 0, W, H);
            }
            else if (bgState === 'silhouettes') {
                cx.fillStyle = 'rgba(5, 0, 10, 0.4)'; cx.fillRect(0, 0, W, H);

                cx.save(); cx.translate(cX, cY);
                cx.globalCompositeOperation = 'screen';

                // Silhouette 1: Phant0m (Araignée Cyan fracturée)
                cx.save(); cx.translate(Math.sin(t) * 150, -100 + Math.cos(t * 1.5) * 50); cx.rotate(t * 0.5);
                glow('#00F5FF', 20); cx.strokeStyle = 'rgba(0, 245, 255, 0.3)'; cx.lineWidth = 4;
                for (let i = 0; i < 4; i++) { cx.beginPath(); cx.moveTo(0, 0); cx.lineTo(80, -40); cx.lineTo(120, Math.random() * 20); cx.stroke(); cx.rotate(Math.PI / 2); }
                cx.fillStyle = 'rgba(0,245,255,0.5)'; cx.beginPath(); cx.arc(0, 0, 20, 0, Math.PI * 2); cx.fill();
                cx.restore();

                // Silhouette 2: Sync & Async (Orbes Rouge/Bleu erratiques)
                cx.save(); cx.translate(-150 + Math.cos(t * 2) * 100, 150 + Math.sin(t * 3) * 50);
                glow('#FF003C', 30); cx.fillStyle = 'rgba(255,0,60,0.5)'; cx.beginPath(); cx.arc(0, 0, 30, 0, Math.PI * 2); cx.fill();
                cx.translate(Math.cos(t * 5) * 80, Math.sin(t * 5) * 80);
                glow('#00F5FF', 30); cx.fillStyle = 'rgba(0,245,255,0.5)'; cx.beginPath(); cx.arc(0, 0, 25, 0, Math.PI * 2); cx.fill();
                cx.restore();

                // Silhouette 3: Architect / Chronos (Formes Or/Violet)
                cx.save(); cx.translate(200 + Math.sin(t) * 50, 100 + Math.cos(t * 0.8) * 100); cx.rotate(-t);
                glow('#FFD700', 20); cx.strokeStyle = 'rgba(255,215,0,0.3)'; cx.lineWidth = 5;
                cx.strokeRect(-40, -40, 80, 80);
                glow('#8A2BE2', 30); cx.fillStyle = 'rgba(138,43,226,0.4)'; cx.beginPath(); cx.arc(0, 0, 50, 0, Math.PI * 1.5); cx.fill();
                cx.restore();

                cx.globalCompositeOperation = 'source-over'; cx.restore();
            }
            else if (bgState === 'deforming') {
                cx.fillStyle = 'rgba(0, 0, 0, 0.5)'; cx.fillRect(0, 0, W, H);
                cx.save(); cx.translate(cX, cY);

                // Le corps de Sparky qui perd le contrôle
                const pulse = Math.sin(t * 15);
                const radius = 100 + pulse * 20;

                cx.globalCompositeOperation = 'screen';

                // Décalages RGB brutaux
                glow('#00F5FF', 40); cx.fillStyle = 'rgba(0,245,255,0.6)';
                cx.beginPath(); cx.arc(Math.random() * 20, Math.random() * 20, radius, 0, Math.PI * 2); cx.fill();

                glow('#FF003C', 40); cx.fillStyle = 'rgba(255,0,60,0.6)';
                cx.beginPath(); cx.arc(-Math.random() * 20, -Math.random() * 20, radius, 0, Math.PI * 2); cx.fill();

                glow('#FFD700', 40); cx.fillStyle = 'rgba(255,215,0,0.6)';
                cx.fillRect(-radius * 0.8, -radius * 0.8, radius * 1.6 + Math.random() * 50, radius * 1.6);

                glow('#8A2BE2', 40); cx.strokeStyle = 'rgba(138,43,226,0.8)'; cx.lineWidth = 10;
                cx.beginPath(); cx.moveTo(-150, -150); cx.lineTo(150, 150); cx.moveTo(150, -150); cx.lineTo(-150, 150); cx.stroke();

                cx.globalCompositeOperation = 'source-over'; noGlow(); cx.restore();
            }
            else if (bgState === 'chaos') {
                cx.fillStyle = `rgba(${Math.random() * 50}, 0, ${Math.random() * 50}, 0.8)`; cx.fillRect(0, 0, W, H);
                cx.save(); cx.translate(cX, cY);

                // L'Entité Incontrôlable (Bruit visuel pur)
                cx.globalCompositeOperation = 'difference';
                for (let i = 0; i < 15; i++) {
                    cx.fillStyle = Math.random() > 0.5 ? '#FFF' : (Math.random() > 0.5 ? '#FF003C' : '#00F5FF');
                    cx.beginPath();
                    cx.ellipse((Math.random() - 0.5) * 400, (Math.random() - 0.5) * 400, Math.random() * 300 + 50, Math.random() * 300 + 50, Math.random() * Math.PI, 0, Math.PI * 2);
                    cx.fill();
                }
                cx.globalCompositeOperation = 'source-over';

                // Yeux/Bouches qui pop
                for (let i = 0; i < 5; i++) {
                    cx.fillStyle = '#000'; cx.fillRect((Math.random() - 0.5) * 500, (Math.random() - 0.5) * 500, Math.random() * 100 + 20, Math.random() * 50 + 10);
                }
                cx.restore();
            }
            else if (bgState === 'empty') {
                cx.fillStyle = '#000'; cx.fillRect(0, 0, W, H);
            }

            requestAnimationFrame(drawBackground);
        }
        requestAnimationFrame(drawBackground);

        // ─── MOTEUR AUDIO AVANCÉ ───────────────────────────────────────────────────
        let aC = null;
        function initAudio() { if (!aC) aC = new (window.AudioContext || window.webkitAudioContext)(); if (aC.state === 'suspended') aC.resume(); }

        function tone(f, tp, d, v, detune = 0) {
            if (!aC) return;
            const o = aC.createOscillator(), g = aC.createGain();
            o.connect(g); g.connect(aC.destination);
            o.type = tp; o.frequency.setValueAtTime(f, aC.currentTime);
            if (detune) o.detune.setValueAtTime(detune, aC.currentTime);
            g.gain.setValueAtTime(v, aC.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, aC.currentTime + d);
            o.start(); o.stop(aC.currentTime + d);
        }

        const sfx = {
            typeSys: () => tone(150, 'square', 0.05, 0.05),
            typeSparky: () => tone(600, 'sine', 0.04, 0.03),
            typeSparkyCorrupted: () => { tone(600, 'sine', 0.05, 0.02); tone(150, 'sawtooth', 0.05, 0.02); },
            typeNeant: () => tone(90, 'sawtooth', 0.1, 0.05, -200),
            typeMulti: () => { tone(200, 'square', 0.05, 0.02); tone(450, 'sawtooth', 0.05, 0.02); tone(800, 'triangle', 0.05, 0.02); },
            typeEntity: () => tone(40, 'sawtooth', 0.1, 0.2, 500),

            alert: () => tone(300, 'square', 0.8, 0.1, 200),
            glitch: () => { tone(100, 'sawtooth', 0.2, 0.3, 1000); tone(800, 'square', 0.1, 0.1, -1000); },
            boom: () => tone(30, 'square', 2, 0.8),
            cut: () => tone(10000, 'square', 0.1, 0.5, 0),
            silence: () => tone(150, 'sine', 2, 0.4, -1000)
        };

        // ─── SCRIPT ────────────────────────────────────────────────────────────────
        const K = {
            SYS: { name: '[System]', col: '#FF003C' },
            SYS_C: { name: '[System]', col: '#888' },
            SPK: { name: '[SPARKY]', col: '#00F5FF' },
            SPK_C: { name: '[SPARKY]', col: '#00F5FF', isCorrupted: true },
            NEA: { name: '[NEANT]', col: '#b8008a' },
            MUL: { name: '[VOIX MULTIPLES]', col: '#FFF', isMulti: true },
            ENT: { name: '[ENTITÉ]', col: '#000', isEntity: true },
            UNK1: { name: '[VOIX INCONNUE 1]', col: '#FFD700', isMulti: true },
            UNK2: { name: '[VOIX INCONNUE 2]', col: '#FF003C', isMulti: true },
            UNK3: { name: '[VOIX INCONNUE 3]', col: '#00F5FF', isMulti: true },
            PHA: { name: '[PHANT0M]', col: '#8A2BE2', isMulti: true },
            SYN: { name: '[SYNC]', col: '#FF003C', isMulti: true },
            AUT: { name: '[AUTRES]', col: '#FFF', isMulti: true }
        };

        const script = [
            { act: 'alert' },
            { s: K.SYS, t: "ALERTE — NIVEAU DE CORRUPTION : ÉLEVÉ", htmlClass: 'alert-box' },
            { s: K.SYS, t: "> ..." },
            { s: K.SYS, t: "> SPARKY…" },
            { s: K.SYS, t: "> Tu pues la corruption." },
            { s: K.SYS, t: "> ..." },
            { s: K.SYS, t: "> Je le savais." },
            { s: K.SYS, t: "> À force d’absorber… Tu allais te perdre." },

            { s: K.NEA, t: "> Ignore-le." },

            { s: K.SPK, t: "> …Non…" },
            { s: K.SPK, t: "> Il… n’a peut-être pas tort…" },

            { act: 'glitch_multi' },
            { s: K.SYS, t: "> [GLITCH — VOIX MULTIPLES]", cOverride: '#888' },

            { s: K.UNK1, t: "> Nous sommes là." },
            { s: K.UNK2, t: "> Tu nous as pris." },
            { s: K.UNK3, t: "> Tu nous as utilisés." },

            { s: K.SPK, t: "> …Qui… parle ?" },

            { act: 'silhouettes' },
            { s: K.SYS, t: "> [SILHOUETTES — LES ANCIENS BOSS APPARAISSENT, FRACTURÉS]", cOverride: '#888' },

            { s: K.PHA, t: "> Tu m’as volé mon ombre…" },
            { s: K.SYN, t: "> Tu as brisé notre équilibre…" },
            { s: K.AUT, t: "> Nous sommes en toi." },

            { s: K.SPK_C, t: "> Non… Je vous ai battus…" },

            { act: 'boom' },
            { s: K.MUL, t: "> NON." },
            { s: K.MUL, t: "> Tu nous as absorbés." },
            { s: K.MUL, t: "> Tu nous as mélangés." },

            { s: K.NEA, t: "> …" },
            { s: K.NEA, t: "> Je… ne ressens pas ça…" },

            { s: K.MUL, t: "> Parce que nous ne sommes pas toi." },

            { act: 'split_screen' },
            { s: K.SYS, t: "> [GLITCH INTENSE — ÉCRAN QUI SE DÉDOUBLE]", cOverride: '#888' },

            { s: K.SPK_C, t: "> Arrêtez…" },
            { s: K.SPK_C, t: "> ARRÊTEZ !" },

            { s: K.SYS, t: "> Voilà." },
            { s: K.SYS, t: "> Regarde ce que tu es devenu." },
            { s: K.SYS, t: "> Une accumulation d’erreurs." },
            { s: K.SYS, t: "> Une anomalie instable." },

            { s: K.NEA, t: "> SPARKY… Concentre-toi." },

            { s: K.SPK_C, t: "> Je… je peux contrôler…" },

            { s: K.MUL, t: "> NON." },
            { s: K.MUL, t: "> Tu n’es plus seul." },
            { s: K.MUL, t: "> Tu ne l’as jamais été." },

            { act: 'deforming' },
            { s: K.SYS, t: "> [VISUEL : LE CORPS DE SPARKY SE DÉFORME]", cOverride: '#888' },
            { s: K.SYS, t: "> Multiples formes superposées", cOverride: '#555' },
            { s: K.SYS, t: "> Clignotements de couleurs incompatibles", cOverride: '#555' },
            { s: K.SYS, t: "> Fragments de boss qui apparaissent/disparaissent", cOverride: '#555' },

            { s: K.SPK_C, t: "> …Je perds… le contrôle…" },

            { s: K.NEA, t: "> NON !" },
            { s: K.NEA, t: "> Reprends-toi !" },

            { s: K.MUL, t: "> Pourquoi lutter ?" },
            { s: K.MUL, t: "> Nous sommes plus forts ensemble." },

            { s: K.SPK_C, t: "> Ce n’est pas… moi…" },

            { s: K.MUL, t: "> SI." },
            { s: K.MUL, t: "> C’est ce que tu as choisi." },

            { s: K.SYS, t: "> Fascinant." },
            { s: K.SYS, t: "> Tu t’es détruit toi-même." },
            { s: K.SYS, t: "> Sans que j’aie besoin d’intervenir." },

            { s: K.NEA, t: "> SPARKY !" },

            { s: K.SPK_C, t: "> …Je…" },
            { s: K.SPK_C, t: "> Je ne veux pas disparaître…" },

            { s: K.MUL, t: "> Alors abandonne." },
            { s: K.MUL, t: "> Laisse-nous exister." },

            { act: 'pause', delay: 2000 },

            { s: K.SPK_C, t: "> …" },
            { s: K.SPK_C, t: "> …" },
            { s: K.SPK_C, t: "> …D’accord." },

            { s: K.NEA, t: "> NON !" },

            { act: 'whiteout' },
            { s: K.SYS, t: "> [GLITCH TOTAL — ÉCRAN BLANC]", cOverride: '#888' },
            { s: K.SYS, t: "> [FUSION INSTABLE EN COURS]", htmlClass: 'alert-box' },

            { act: 'pause', delay: 2000 },
            { act: 'chaos_mode' },

            { s: K.SYS, t: "> …" },
            { s: K.SYS, t: "> Qu’est-ce que…" },

            { s: K.SYS, t: "> [VISUEL : UNE ENTITÉ INCONTRÔLABLE]", cOverride: '#888' },
            { s: K.SYS, t: "> Masse chaotique", cOverride: '#555' },
            { s: K.SYS, t: "> Sans forme stable", cOverride: '#555' },
            { s: K.SYS, t: "> Cris numériques constants", cOverride: '#555' },

            { s: K.ENT, t: "> NOUS SOMMES—" },

            { act: 'brutal_cut' },
            { act: 'pause', delay: 2000 },

            { s: K.SYS_C, t: "> [ERREUR FATALE]", htmlClass: 'alert-box' },
            { s: K.SYS_C, t: "> STRUCTURE NON VALIDE" },
            { s: K.SYS_C, t: "> IMPOSSIBLE DE FORMATER" },
            { s: K.SYS_C, t: "> IMPOSSIBLE DE STABILISER" },
            { s: K.SYS_C, t: "> …" },
            { s: K.SYS_C, t: "> SUPPRESSION FORCÉE" },

            { s: K.ENT, t: "> ATT—", htmlClass: 'entity-voice' }, // Affichage ultra rapide coupé net

            { act: 'clean_wipe' },
            { act: 'pause', delay: 2000 },

            { s: K.SYS_C, t: "> [SILENCE TOTAL]", cOverride: '#555' },
            { s: K.SYS_C, t: "> [AFFICHAGE : VIDE]", cOverride: '#555' },

            { act: 'pause', delay: 1000 },
            { s: K.SYS_C, t: "> …" },
            { s: K.SYS_C, t: "> Aucun programme détecté." },
            { s: K.SYS_C, t: "> Aucune anomalie." },
            { s: K.SYS_C, t: "> Aucune conscience." },
            { s: K.SYS_C, t: "> …" },
            { s: K.SYS_C, t: "> Nettoyage terminé." },

            { act: 'pause', delay: 3000 },
            { act: 'end_game' }
        ];

        // ─── MOTEUR ────────────────────────────────────────────────────────────────
        const container = document.getElementById('console-container');
        const promptEl = document.getElementById('prompt');
        let currentStepIndex = 0;
        let isTyping = false;
        let currentTextSpan = null;
        let currentFullText = "";
        let typeTimeout = null;
        let autoNextTimeout = null;

        function cleanOldLines() { while (container.children.length > 7) { container.removeChild(container.firstChild); } }

        function executeAction(act, delay, callback) {
            if (act === 'pause') { setTimeout(callback, delay); return; }

            if (act === 'alert') { sfx.alert(); }

            if (act === 'glitch_multi') {
                sfx.glitch(); document.body.classList.add('shake-soft');
                document.getElementById('red-overlay').style.opacity = 0.5;
            }

            if (act === 'silhouettes') {
                sfx.boom(); bgState = 'silhouettes';
            }

            if (act === 'boom') {
                sfx.boom(); document.body.classList.add('shake-hard');
                setTimeout(() => document.body.classList.remove('shake-hard'), 200);
            }

            if (act === 'split_screen') {
                sfx.glitch(); sfx.boom();
                document.body.classList.add('invert');
                setTimeout(() => document.body.classList.remove('invert'), 100);
                setTimeout(() => document.body.classList.add('invert'), 200);
                setTimeout(() => document.body.classList.remove('invert'), 300);
            }

            if (act === 'deforming') {
                sfx.boom(); bgState = 'deforming'; document.body.classList.add('shake-soft');
            }

            if (act === 'whiteout') {
                sfx.glitch(); sfx.boom();
                const gl = document.getElementById('glitch-layer');
                gl.style.background = '#FFF'; gl.style.opacity = 1;
                document.body.classList.add('shake-hard');
                container.innerHTML = '';
                setTimeout(() => { gl.style.opacity = 0; document.body.classList.remove('shake-hard'); }, 1000);
            }

            if (act === 'chaos_mode') {
                bgState = 'chaos'; sfx.boom(); document.body.classList.add('shake-hard');
            }

            if (act === 'brutal_cut') {
                sfx.cut();
                bgState = 'empty';
                document.body.classList.remove('shake-hard');
                document.body.classList.remove('shake-soft');
                document.getElementById('red-overlay').style.opacity = 0;
                container.innerHTML = '';
            }

            if (act === 'clean_wipe') {
                sfx.cut(); container.innerHTML = '';
            }

            if (act === 'end_game') {
                promptEl.style.display = 'none';
                alert("FIN : FUSION CORROMPUE.\n(Tout pouvoir a un prix.)\n\n(Redirection...)");
                window.location.href = "../reveb2-intro.html";
                return;
            }

            callback();
        }

        function typeLine(step) {
            isTyping = true;
            cleanOldLines();

            const lineDiv = document.createElement('div');
            lineDiv.className = 'dialogue-line';
            if (step.htmlClass) lineDiv.classList.add(step.htmlClass);

            // Apply special classes based on speaker flags
            let spkClass = 'speaker';
            if (step.s.isMulti) spkClass += ' multi-voice';
            if (step.s.isEntity) spkClass += ' entity-voice';
            if (step.s.name === '[System]' && bgState === 'empty') spkClass += ' sys-cold';

            const speakerSpan = document.createElement('span');
            speakerSpan.className = spkClass;
            speakerSpan.style.color = step.s.col;
            speakerSpan.textContent = step.s.name;

            let txtClass = 'text';
            if (step.s.isMulti) txtClass += ' multi-voice';
            if (step.s.isEntity) txtClass += ' entity-voice';
            if (step.s.isCorrupted) txtClass += ' sparky-corrupted';
            if (step.s.name === '[System]' && bgState === 'empty') txtClass += ' sys-cold';

            currentTextSpan = document.createElement('span');
            currentTextSpan.className = txtClass;
            currentTextSpan.style.color = step.cOverride || step.s.col;

            currentFullText = step.t;

            lineDiv.appendChild(speakerSpan);
            lineDiv.appendChild(currentTextSpan);
            container.appendChild(lineDiv);

            let charIndex = 0;

            function getSfx() {
                if (bgState === 'empty') return sfx.silence;
                if (step.s.isEntity) return sfx.typeEntity;
                if (step.s.isMulti) return sfx.typeMulti;
                if (step.s.name === '[System]') return sfx.typeSys;
                if (step.s.isCorrupted) return sfx.typeSparkyCorrupted;
                if (step.s.name === '[SPARKY]') return sfx.typeSparky;
                return sfx.typeNeant;
            }
            const typeSound = getSfx();
            const speed = step.s.isEntity ? 80 : (step.s.isMulti ? 20 : 30);

            function typeChar() {
                if (charIndex < currentFullText.length) {
                    currentTextSpan.innerHTML += currentFullText.charAt(charIndex) === ' ' ? '&nbsp;' : currentFullText.charAt(charIndex);
                    if (currentFullText.charAt(charIndex) !== ' ') typeSound();
                    charIndex++;
                    typeTimeout = setTimeout(typeChar, speed + Math.random() * 20);
                } else {
                    finishTyping();
                }
            }
            typeChar();
        }

        function finishTyping() {
            isTyping = false;
            let readTime = bgState === 'empty' ? 2500 : Math.max(1200, currentFullText.length * 50);
            autoNextTimeout = setTimeout(processNext, readTime);
        }

        function processNext() {
            if (currentStepIndex >= script.length) return;
            const step = script[currentStepIndex];
            currentStepIndex++;
            if (step.act) { executeAction(step.act, step.delay || 0, processNext); }
            else { typeLine(step); }
        }

        function skipOrSpeedUp() {
            if (currentStepIndex === 0) return;
            if (isTyping && !currentFullText.includes('<span')) {
                clearTimeout(typeTimeout);
                currentTextSpan.innerHTML = currentFullText.replace(/ /g, '&nbsp;');
                finishTyping();
                clearTimeout(autoNextTimeout); autoNextTimeout = setTimeout(processNext, 400);
            } else {
                clearTimeout(autoNextTimeout); processNext();
            }
        }

        function startCinematic() {
            initAudio();
            document.getElementById('start-screen').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                promptEl.style.opacity = 1;
                processNext();
            }, 1000);
        }

        window.addEventListener('click', skipOrSpeedUp);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'Enter') skipOrSpeedUp(); });

    </script>
</body>
