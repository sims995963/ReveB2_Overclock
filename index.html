<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReveB 2 — Index du Système</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #010005;
        color: #fff;
        font-family: 'Share Tech Mono', monospace;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    /* Effet CRT de fond */
    #crt {
        position: fixed; inset: 0; z-index: 90; pointer-events: none;
        background: linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,.15) 50%),
                    linear-gradient(90deg,rgba(255,0,60,.03),rgba(0,245,255,.02),rgba(138,43,226,.02));
        background-size: 100% 3px, 3px 100%;
    }

    h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 3rem;
        color: #00F5FF;
        text-shadow: 0 0 20px #00F5FF;
        margin-bottom: 40px;
        letter-spacing: 5px;
    }

    .container {
        width: 100%;
        max-width: 600px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .nav-btn {
        background: rgba(0, 10, 20, 0.8);
        border: 1px solid #00F5FF;
        color: #00F5FF;
        padding: 20px;
        text-align: left;
        cursor: pointer;
        font-family: 'Orbitron', sans-serif;
        font-size: 1.1rem;
        transition: all 0.3s;
        text-decoration: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: inset 0 0 10px rgba(0, 245, 255, 0.1);
    }

    .nav-btn:hover {
        background: #00F5FF;
        color: #000;
        box-shadow: 0 0 30px #00F5FF;
        transform: translateX(10px);
    }

    .nav-btn span {
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.8rem;
        opacity: 0.7;
    }

    .status {
        color: #FF003C;
        text-shadow: 0 0 10px #FF003C;
        margin-top: 30px;
        font-size: 0.9rem;
        animation: blink 1.5s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Cercles d'énergie en fond */
    .bg-circle {
        position: absolute;
        border: 1px solid rgba(0, 245, 255, 0.05);
        border-radius: 50%;
        z-index: 1;
        animation: rotate 20s linear infinite;
    }

    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="crt"></div>

<div class="bg-circle" style="width: 800px; height: 800px;"></div>
<div class="bg-circle" style="width: 1200px; height: 1200px; animation-duration: 40s; animation-direction: reverse;"></div>

<h1>REVEB 2 — CORE</h1>

<div class="container">
    <a href="reveb2-intro-sequence.html" class="nav-btn">
        JOUER <span>[INTRO.SYS]</span>
    </a>
</div>

<div class="status">>>> SYSTÈME OPÉRATIONNEL : ATTENTE DE CONNEXION...</div>

<script>
    // Petit effet de glitch aléatoire au survol
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('mouseenter', () => {
            if(window.AudioContext) {
                // Tu peux ajouter ici un son de clic si tu as un fichier audio prêt
            }
        });
    });
</script>

</body>
</html>
