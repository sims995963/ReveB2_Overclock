<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReveB 2 — SCANNER DÉTAILLÉ</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --cyan: #00F5FF;
      --red: #FF003C;
      --purple: #8A2BE2;
      --green: #00FF41;
      --bg-dark: #010005;
      --font-ui: 'Orbitron', sans-serif;
      --font-term: 'Share Tech Mono', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--cyan);
      font-family: var(--font-term);
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* --- EFFETS VISUELS GLOBAUX --- */
    #crt {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, .15) 50%),
        linear-gradient(90deg, rgba(0, 245, 255, .02), rgba(255, 0, 60, .02), rgba(138, 43, 226, .02));
      background-size: 100% 3px, 3px 100%;
      opacity: 0.8;
    }

    #vignette {
      position: fixed;
      inset: 0;
      z-index: 998;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 30%, rgba(0, 0, 0, 0.95) 100%);
    }

    #bg-grid {
      position: absolute;
      inset: -50%;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
      animation: gridMove 15s linear infinite;
    }

    @keyframes gridMove {
      from {
        transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px);
      }

      to {
        transform: perspective(500px) rotateX(60deg) translateY(60px) translateZ(-200px);
      }
    }

    /* --- BOUTON RETOUR --- */
    .btn-back {
      position: absolute;
      top: 30px;
      left: 30px;
      z-index: 100;
      background: rgba(0, 20, 40, 0.6);
      border: 1px solid rgba(0, 245, 255, 0.3);
      border-left: 4px solid var(--cyan);
      color: var(--cyan);
      padding: 10px 20px;
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-back:hover {
      background: var(--cyan);
      color: #000;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.6);
      transform: translateX(-5px);
    }

    /* --- PANNEAU GAUCHE (LE GRAND SCANNER) --- */
    #scanner-container {
      position: absolute;
      left: 5%;
      top: 50%;
      transform: translateY(-50%);
      width: 600px;
      height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .radar-box {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 0 0 80px rgba(0, 255, 65, 0.1);
    }

    /* Anneaux de base */
    .radar-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(0, 255, 65, 0.3);
    }

    .ring-10 {
      width: 20%;
      height: 20%;
    }

    .ring-20 {
      width: 40%;
      height: 40%;
    }

    .ring-30 {
      width: 60%;
      height: 60%;
    }

    .ring-40 {
      width: 80%;
      height: 80%;
    }

    .ring-50 {
      width: 100%;
      height: 100%;
      border: 2px solid rgba(0, 255, 65, 0.6);
      box-shadow: inset 0 0 30px rgba(0, 255, 65, 0.1), 0 0 30px rgba(0, 255, 65, 0.2);
    }

    /* Anneaux détaillés supplémentaires */
    .detail-ring-1 {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 1px dashed rgba(0, 255, 65, 0.4);
      animation: spin 30s linear infinite;
    }

    .detail-ring-2 {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 2px dotted rgba(0, 255, 65, 0.2);
      animation: spin 40s linear infinite reverse;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .radar-cross {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(transparent 49.8%, rgba(0, 255, 65, 0.4) 49.8%, rgba(0, 255, 65, 0.4) 50.2%, transparent 50.2%),
        linear-gradient(90deg, transparent 49.8%, rgba(0, 255, 65, 0.4) 49.8%, rgba(0, 255, 65, 0.4) 50.2%, transparent 50.2%);
      border-radius: 50%;
    }

    .radar-sweep {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 70%, rgba(0, 255, 65, 0.1) 95%, rgba(0, 255, 65, 0.8) 100%);
      animation: sweep 4s linear infinite;
    }

    @keyframes sweep {
      to {
        transform: rotate(360deg);
      }
    }

    /* SVG Recalculé pour 600x600 */
    .radar-connections {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .radar-connections polyline {
      fill: none;
      stroke: var(--green);
      stroke-width: 2;
      stroke-dasharray: 6 6;
      opacity: 0.6;
      animation: dashAnim 20s linear infinite;
    }

    @keyframes dashAnim {
      to {
        stroke-dashoffset: -100;
      }
    }

    /* Nœuds (Plus grands) */
    .boss-node {
      position: absolute;
      width: 30px;
      height: 30px;
      background: #051005;
      border: 2px solid var(--green);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      color: var(--green);
      box-shadow: 0 0 15px var(--green);
      z-index: 5;
    }

    .b10 {
      left: 57%;
      top: 43%;
    }

    .b20 {
      left: 68%;
      top: 60%;
    }

    .b30 {
      left: 40%;
      top: 78%;
    }

    .b40 {
      left: 20%;
      top: 25%;
    }

    .b50 {
      left: 85%;
      top: 15%;
      border-color: var(--purple);
      color: var(--red);
      box-shadow: 0 0 25px var(--purple);
      animation: bossGlitch 2s infinite;
    }

    @keyframes bossGlitch {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        border-color: var(--purple);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.2);
        border-color: var(--red);
        box-shadow: 0 0 30px var(--red);
      }
    }

    .boss-label {
      position: absolute;
      color: rgba(0, 255, 65, 0.8);
      font-size: 12px;
      pointer-events: none;
      white-space: nowrap;
      font-weight: bold;
      text-shadow: 0 0 5px var(--green);
    }

    .boss-desc {
      position: absolute;
      color: #88c;
      font-size: 10px;
      margin-top: 14px;
    }

    /* Décorations autour du scanner */
    .scan-hud-data {
      position: absolute;
      font-size: 10px;
      color: var(--green);
      opacity: 0.7;
    }

    .d-top {
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
    }

    .d-bot {
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
    }

    .d-left {
      left: -60px;
      top: 50%;
      transform: translateY(-50%);
      text-align: right;
    }

    .d-right {
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* --- PANNEAU DROIT (TERMINAL + DIALOGUE) --- */
    #right-panel {
      position: absolute;
      right: 40px;
      top: 40px;
      bottom: 40px;
      width: 450px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 50;
    }

    /* Le Terminal */
    .terminal-box {
      flex: 1;
      /* Prend 1/3 de l'espace */
      background: rgba(0, 10, 5, 0.8);
      border: 1px solid rgba(0, 255, 65, 0.4);
      border-top: 15px solid rgba(0, 255, 65, 0.3);
      padding: 10px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
    }

    .terminal-box::before {
      content: 'LOGS_RÉSEAU.exe';
      position: absolute;
      top: -13px;
      left: 5px;
      font-size: 9px;
      color: var(--green);
      opacity: 0.8;
    }

    .log-container {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100%;
    }

    .log-line {
      font-size: 0.8rem;
      color: #88c;
      margin-top: 6px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .log-success {
      color: var(--green);
    }

    .log-warn {
      color: #FFD700;
    }

    .log-error {
      color: var(--red);
      font-weight: bold;
      text-shadow: 0 0 5px var(--red);
    }

    .cursor::after {
      content: '█';
      color: var(--cyan);
      margin-left: 3px;
      animation: blink 1s step-end infinite;
    }

    /* Le Boitier de Dialogue */
    .chat-box {
      flex: 2;
      /* Prend 2/3 de l'espace */
      background: rgba(10, 0, 5, 0.8);
      border: 1px solid rgba(0, 245, 255, 0.4);
      border-top: 15px solid rgba(0, 245, 255, 0.3);
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.1);
    }

    .chat-box::before {
      content: 'COM_LINK : LE_SYSTÈME';
      position: absolute;
      top: -13px;
      left: 5px;
      font-size: 9px;
      color: var(--cyan);
      opacity: 0.8;
    }

    .chat-history {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      /* Scrollbar stylisée */
      scrollbar-width: thin;
      scrollbar-color: var(--cyan) transparent;
    }

    .msg {
      font-size: 0.95rem;
      line-height: 1.5;
      padding: 8px 12px;
      border-radius: 4px;
      max-width: 90%;
    }

    .msg-sys {
      background: rgba(255, 0, 60, 0.15);
      color: #FFF;
      border-left: 3px solid var(--red);
      align-self: flex-start;
    }

    .msg-sys .name {
      font-weight: bold;
      color: var(--red);
      font-size: 0.8rem;
      margin-bottom: 4px;
      display: block;
    }

    .msg-ply {
      background: rgba(0, 245, 255, 0.15);
      color: var(--cyan);
      border-right: 3px solid var(--cyan);
      align-self: flex-end;
      text-align: right;
    }

    .chat-options {
      padding: 15px;
      border-top: 1px solid rgba(0, 245, 255, 0.2);
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-btn {
      background: transparent;
      border: 1px dashed var(--cyan);
      color: var(--cyan);
      padding: 10px;
      font-family: var(--font-term);
      font-size: 0.9rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chat-btn:hover {
      background: var(--cyan);
      color: #000;
      box-shadow: 0 0 10px var(--cyan);
    }
  </style>
</head>

<body>

  <div id="crt"></div>
  <div id="vignette"></div>
  <div id="bg-grid"></div>

  <div class="btn-back" onclick="window.history.back()">[ < RETOUR ]</div>

      <div id="scanner-container">
        <div class="radar-box">

          <div class="detail-ring-1"></div>
          <div class="detail-ring-2"></div>

          <div class="radar-ring ring-10"></div>
          <div class="radar-ring ring-20"></div>
          <div class="radar-ring ring-30"></div>
          <div class="radar-ring ring-40"></div>
          <div class="radar-ring ring-50"></div>

          <div class="radar-cross"></div>
          <div class="radar-sweep"></div>

          <svg class="radar-connections" viewBox="0 0 600 600">
            <polyline points="300,300 342,258 408,360 240,468 120,150 510,90" />
          </svg>

          <div class="boss-node b10">!</div>
          <div class="boss-label" style="left:59%; top:41%;">P10<div class="boss-desc">PHANT0M.exe</div>
          </div>

          <div class="boss-node b20">⇄</div>
          <div class="boss-label" style="left:71%; top:58%;">P20<div class="boss-desc">INTERFACE</div>
          </div>

          <div class="boss-node b30">Δ</div>
          <div class="boss-label" style="left:40%; top:81%;">P30<div class="boss-desc">ARCHITECTE</div>
          </div>

          <div class="boss-node b40">∞</div>
          <div class="boss-label" style="left:14%; top:23%;">P40<div class="boss-desc">NULL_POINTER</div>
          </div>

          <div class="boss-node b50">Ω</div>
          <div class="boss-label" style="left:88%; top:15%; color:var(--purple); text-shadow:0 0 5px var(--red);">P50
            <div class="boss-desc" style="color:var(--red);">N.E.A.N.T</div>
          </div>
        </div>

        <div class="scan-hud-data d-top">ANALYSE SECTORIELLE<br>EN COURS...</div>
        <div class="scan-hud-data d-bot" id="hud-coord">COORD: 0.000, 0.000</div>
        <div class="scan-hud-data d-left">SYS_LOAD<br>42%</div>
        <div class="scan-hud-data d-right">STABILITÉ<br>CRITIQUE</div>
      </div>

      <div id="right-panel">

        <div class="terminal-box">
          <div class="log-container" id="terminal-logs"></div>
        </div>

        <div class="chat-box">
          <div class="chat-history" id="chat-history">
          </div>
          <div class="chat-options" id="chat-options">
          </div>
        </div>

      </div>

      <script>
        // ─── EFFETS HUD SCANNER ───
        setInterval(() => {
          document.getElementById('hud-coord').innerText = `COORD: ${(Math.random() * 100).toFixed(3)}, ${(Math.random() * 100).toFixed(3)}`;
        }, 2000);

        // ─── GESTION DU TERMINAL (Recyclé du menu, un peu plus grand) ───
        const terminal = document.getElementById('terminal-logs');
        const logDatabase = [
          { text: "Ping de la zone infectée...", type: "normal" },
          { text: "Lecture des signatures thermiques... 0", type: "normal" },
          { text: "[OK] Radar longue portée activé.", type: "log-success" },
          { text: "SCAN: Détection de mouvements sur le Palier 20.", type: "normal" },
          { text: "[ATTENTION] Interférences magnétiques (P30).", type: "log-warn" },
          { text: "[ERREUR] Tentative d'accès aux logs du N.E.A.N.T bloquée.", type: "log-error" },
          { text: "Mise à jour de la topologie du Noyau...", type: "log-success" }
        ];

        function typeLine(text, cssClass) {
          return new Promise(resolve => {
            const line = document.createElement('div');
            line.className = `log-line ${cssClass}`;
            terminal.appendChild(line);

            if (terminal.children.length > 7) terminal.removeChild(terminal.firstChild);
            Array.from(terminal.children).forEach(c => c.classList.remove('cursor'));
            line.classList.add('cursor');

            const d = new Date();
            const timeStr = `[${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}] `;
            const fullText = timeStr + text;

            let i = 0;
            const typeInterval = setInterval(() => {
              line.textContent += fullText.charAt(i);
              i++;
              if (i >= fullText.length) { clearInterval(typeInterval); resolve(); }
            }, 15); // Plus rapide pour le grand terminal
          });
        }

        async function terminalLoop() {
          while (true) {
            const logData = logDatabase[Math.floor(Math.random() * logDatabase.length)];
            await typeLine(logData.text, logData.type !== 'normal' ? logData.type : '');
            await new Promise(r => setTimeout(r, Math.random() * 1000 + 500));
          }
        }
        terminalLoop();

        // ─── GESTION DU DIALOGUE (L'Arbre de conversation) ───

        // Voici où tu peux rajouter tes textes super facilement !
        const dialogueTree = {
          start: {
            text: "Connexion établie. Je vois que tu observes la carte du Noyau, Sparky. Que veux-tu savoir ?",
            options: [
              { label: "> Parle-moi des menaces sur le radar.", next: "menaces" },
              { label: "> C'est quoi ce truc violet au fond ?", next: "neant" },
              { label: "> Je suis prêt. (Fermer la connexion)", next: "end" }
            ]
          },
          menaces: {
            text: "Ce sont les composants majeurs du système. Phant0m, l'Architecte... Ils étaient censés nous protéger. Mais la peur du N.E.A.N.T les a rendus fous. Prudence.",
            options: [
              { label: "> Et le N.E.A.N.T, c'est quoi ?", next: "neant" },
              { label: "> Compris. Retour.", next: "start" }
            ]
          },
          neant: {
            text: "L'Anomalie Critique. Palier 50. Une erreur de compilation qui a pris vie et qui dévore le code. Si elle atteint le sommet, il n'y aura plus de simulation. Plus rien.",
            options: [
              { label: "> Je vais le formater.", next: "end" },
              { label: "> J'ai d'autres questions.", next: "start" }
            ]
          },
          end: {
            text: "Fin de la transmission. Bonne chance.",
            options: [] // S'il n'y a plus d'options, la conversation s'arrête.
          }
        };

        const chatHistory = document.getElementById('chat-history');
        const chatOptions = document.getElementById('chat-options');

        // Fonction pour afficher un message du Système
        function addSystemMessage(text) {
          const msg = document.createElement('div');
          msg.className = 'msg msg-sys';
          msg.innerHTML = `<span class="name">LE_SYSTÈME</span>${text}`;
          chatHistory.appendChild(msg);
          chatHistory.scrollTop = chatHistory.scrollHeight; // Scroll en bas
        }

        // Fonction pour afficher la réponse du joueur
        function addPlayerMessage(text) {
          const msg = document.createElement('div');
          msg.className = 'msg msg-ply';
          msg.textContent = text;
          chatHistory.appendChild(msg);
          chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // Charge un nœud de dialogue
        function loadNode(nodeId) {
          const node = dialogueTree[nodeId];
          if (!node) return;

          chatOptions.innerHTML = ''; // Efface les anciens boutons

          // Petit délai pour faire "genre" le système réfléchit
          setTimeout(() => {
            addSystemMessage(node.text);

            // Crée les nouveaux boutons de réponse
            node.options.forEach(opt => {
              const btn = document.createElement('button');
              btn.className = 'chat-btn';
              btn.textContent = opt.label;
              btn.onclick = () => {
                addPlayerMessage(opt.label);
                loadNode(opt.next); // Charge la suite !
              };
              chatOptions.appendChild(btn);
            });

            if (node.options.length === 0) {
              chatOptions.innerHTML = '<div style="color:#555; text-align:center; font-size:0.8rem;">[ CONNEXION FERMÉE ]</div>';
            }
          }, 500);
        }

        // Lancer la première conversation
        loadNode('start');

      </script>
</body>

</html>
