<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReveB 2 — SÉQUENCE D'AMORÇAGE</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --cyan: #00F5FF;
      --red: #FF003C;
      --purple: #8A2BE2;
      --green: #00FF41;
      --bg-dark: #010005;
      --font-ui: 'Orbitron', sans-serif;
      --font-term: 'Share Tech Mono', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--cyan);
      font-family: var(--font-term);
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* --- ARRIÈRE-PLAN ANIMÉ (LE CODE) --- */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.15;
      transition: opacity 2s, filter 0.5s;
    }

    /* --- OVERLAYS CRT --- */
    #crt {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, .15) 50%);
      background-size: 100% 3px;
      opacity: 0.8;
    }

    #vignette {
      position: fixed;
      inset: 0;
      z-index: 998;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 40%, rgba(0, 0, 0, 0.9) 100%);
    }

    #glitch-overlay {
      position: fixed;
      inset: 0;
      z-index: 997;
      pointer-events: none;
      background: rgba(255, 0, 60, 0.3);
      display: none;
    }

    /* --- TERMINAL DE BOOT --- */
    #terminal {
      position: absolute;
      left: 40px;
      top: 40px;
      right: 40px;
      bottom: 40px;
      z-index: 10;
      font-size: 1rem;
      line-height: 1.4;
      overflow: hidden;
      display: flex;
      flex-direction: column-reverse;
      /* Tape de bas en haut */
    }

    .log-line {
      margin-top: 4px;
      opacity: 0;
      animation: logIn 0.1s forwards;
    }

    .log-line::before {
      content: '> ';
      opacity: 0.5;
    }

    .hack {
      color: var(--red);
      font-weight: bold;
    }

    @keyframes logIn {
      to {
        opacity: 1;
      }
    }

    /* --- FORMATION DU TITRE FINAL --- */
    #title-container {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle, rgba(138, 43, 226, 0.3) 0%, rgba(1, 0, 5, 0) 70%);
      opacity: 0;
      transition: opacity 1s;
    }

    #title-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #title-formed {
      font-family: var(--font-ui);
      font-size: 8rem;
      font-weight: 900;
      letter-spacing: 20px;
      color: #FFF;
      text-shadow: 0 0 30px var(--purple), 0 0 100px var(--cyan);
      position: relative;
      animation: glitchTitle 0.2s infinite alternate-reverse;
    }

    #title-formed .version {
      position: absolute;
      right: -60px;
      top: -20px;
      font-size: 2rem;
      color: var(--red);
      font-family: var(--font-term);
      transform: rotate(15deg);
      text-shadow: 0 0 10px var(--red);
    }

    #title-overclock {
      font-family: var(--font-term);
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 25px;
      color: var(--cyan);
      text-shadow: 0 0 15px var(--cyan);
      margin-top: -15px;
      margin-left: 25px;
      /* Ajuste le centrage à cause du letter-spacing */
      animation: glitchTitle 0.2s infinite alternate-reverse;
    }

    /* --- SYSTÈME DE BLOCS DE TEXTE GLITCHÉS POUR FORMATION --- */
    .glitch-block {
      position: absolute;
      font-family: var(--font-ui);
      font-size: 2rem;
      color: rgba(255, 255, 255, 0.8);
      pointer-events: none;
    }

    /* ANIMATIONS */
    @keyframes glitchTitle {
      0% {
        transform: skew(0deg);
        text-shadow: 0 0 30px var(--purple);
      }

      100% {
        transform: skew(-5deg) translateX(5px);
        text-shadow: 4px 0 var(--cyan), -4px 0 var(--red);
      }
    }
  </style>
</head>

<body>

  <canvas id="bg-canvas"></canvas>
  <div id="crt"></div>
  <div id="vignette"></div>
  <div id="glitch-overlay"></div>

  <div id="particle-container"></div>

  <div id="terminal">
    <div id="log-list"></div>
  </div>

  <div id="title-container">
    <div id="title-group">
      <div id="title-formed">REVEB<span class="version">2.0</span></div>
      <div id="title-overclock">OVERCLOCK</div>
    </div>
  </div>

  <script>
    // --- CONFIGURATION ---
    const NEXT_PAGE = "reveb2-intro.html"; // La page du menu final

    // --- GESTION AUDIO ---
    const au = new (window.AudioContext || window.webkitAudioContext)();
    function tone(f, tp, d, v) { let o = au.createOscillator(), g = au.createGain(); o.connect(g); g.connect(au.destination); o.type = tp; o.frequency.value = f; g.gain.setValueAtTime(v, au.currentTime); g.gain.exponentialRampToValueAtTime(0.001, au.currentTime + d); o.start(); o.stop(au.currentTime + d); }
    const sfx = {
      boot: () => tone(880 + Math.random() * 400, 'square', 0.03, 0.01),
      hack: () => { tone(120, 'sawtooth', 0.2, 0.05); tone(80, 'square', 0.3, 0.1); },
      boom: () => tone(60, 'sine', 1.5, 0.3)
    };

    // --- ARRIÈRE-PLAN ANIMÉ ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, columns;
    const fontSize = 16;
    let drops = [];
    const hexChars = "0123456789ABCDEF REVEB";
    let bgSpeed = 1;
    let bgCol = '#00F5FF';

    function resizeBg() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      columns = Math.floor(W / fontSize);
      drops = [];
      for (let i = 0; i < columns; i++) drops[i] = 1;
    }
    window.addEventListener('resize', resizeBg);
    resizeBg();

    function drawBg() {
      ctx.fillStyle = 'rgba(1, 0, 5, 0.05)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = bgCol;
      ctx.font = fontSize + 'px Share Tech Mono';
      for (let i = 0; i < drops.length; i++) {
        const text = hexChars.charAt(Math.floor(Math.random() * hexChars.length));
        const y = drops[i] * fontSize;
        const scale = 0.5 + (y / H) * 0.5;
        ctx.fillText(text, i * fontSize, y, fontSize * scale);
        if (y > H && Math.random() > 0.975) drops[i] = 0;
        drops[i] += bgSpeed;
      }
    }

    const bootLogs = [
      "RÉVEB_OS [Noyau v2.0.50] Initialisation...",
      "VÉRIFICATION DE LA ZONE MÉMOIRE BASE...",
      "CPU 0: Authentification Phant0m... ÉCHEC [Ignoré]",
      "CPU 1: Authentification Architecte... OK",
      "CPU 2: Authentification Chronos... OK",
      "Lancement des sous-systèmes de simulation...",
      "Chargement des textures géométriques... 100%",
      "Chargement des bases de données lore... 100%",
      "VÉRIFICATION INTEGRITÉ PALIER 10... STABLE",
      "VÉRIFICATION INTEGRITÉ PALIER 30... STABLE",
      "VÉRIFICATION INTEGRITÉ PALIER 50... ERREUR SYSTÈME",
      "Analyse de l'anomalie 'N.E.A.N.T'...",
      "TENTATIVE DE QUARANTAINE DU PALIER 50... ÉCHEC",
      "Protocole d'urgence 'OriginDev' : RECHERCHE...",
      "Variable 'Sparky' détectée. Allotissement mémoire...",
      "LANCEMENT INTERFACE GRAPHIQUE..."
    ];

    const hackLogs = [
      "!!! ALERTE DE SÉCURITÉ !!!",
      "HACKING EN COURS : SECTEUR NÉANT",
      "Contournement pare-feu Architecte...",
      "Injection de code : INFECTÉ_P50",
      "DÉSAVANTAGE PROTOCOLE ORIGINDEv",
      "SUPPRESSION DES DONNÉES DE SAUVEGARDE RVB2...",
      "LE N.E.A.N.T EST LÀ.",
      "Système d'exploitation REVEB en cours de formatage...",
      "REVEB 2.0 INITIALISATION..."
    ];

    const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    const logList = document.getElementById('log-list');

    function addLog(text, isHack) {
      const line = document.createElement('div');
      line.className = 'log-line' + (isHack ? ' hack' : '');
      line.textContent = text;
      logList.appendChild(line);
      if (isHack) sfx.hack(); else sfx.boot();
    }

    async function runIntro() {
      canvas.addEventListener('mousedown', () => au.resume(), { once: true });

      await wait(500);
      addLog("BIOS VERSION 4.1.73 [OriginDev]", false);
      await wait(500);
      for (let line of bootLogs) {
        addLog(line, false);
        await wait(200 + Math.random() * 200);
        if (line.includes("ERREUR")) {
          sfx.hack(); canvas.style.filter = "hue-rotate(90deg)";
          await wait(800);
          canvas.style.filter = "hue-rotate(0deg)";
        }
      }

      await wait(1000);
      sfx.boom();
      document.getElementById('glitch-overlay').style.display = 'block';
      bgCol = '#FF003C';
      bgSpeed = 8;
      await wait(100);
      document.getElementById('glitch-overlay').style.display = 'none';

      for (let line of hackLogs) {
        addLog(line, true);
        await wait(100 + Math.random() * 100);
        document.body.style.transform = `translate(${rng(-5, 5)}px, ${rng(-5, 5)}px)`;
      }
      await wait(100);
      document.body.style.transform = `translate(0, 0)`;

      await wait(1500);
      document.getElementById('terminal').style.display = 'none';
      canvas.style.opacity = '0.05';
      startTitleFormation();
    }

    const pContainer = document.getElementById('particle-container');
    const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+=/";

    function rng(min, max) { return Math.random() * (max - min) + min; }

    function spawnGlitchBlock(targetText, fx, fy, delay) {
      setTimeout(() => {
        const b = document.createElement('div');
        b.className = 'glitch-block';
        b.style.left = fx + '%';
        b.style.top = fy + '%';
        b.textContent = targetText;
        pContainer.appendChild(b);

        sfx.boot();

        let glitchInterval = setInterval(() => {
          if (Math.random() < 0.2) b.textContent = targetText;
          else b.textContent = CHARS.charAt(Math.floor(Math.random() * CHARS.length)).repeat(targetText.length);
          b.style.transform = `translate(${rng(-10, 10)}px, ${rng(-10, 10)}px) scale(${rng(1.1, 1.4)})`;
        }, 50);

        setTimeout(() => {
          clearInterval(glitchInterval);
          b.textContent = targetText;
          b.style.transition = "all 0.5s cubic-bezier(0.1, 0.9, 0.2, 1)";
          b.style.left = '50%';
          b.style.top = '50%';
          b.style.transform = 'translate(-50%, -50%) scale(0.5)';
          b.style.opacity = '0';
          b.style.color = targetText === "REVEB" ? '#8A2BE2' : '#00F5FF';
        }, rng(500, 1000));

        setTimeout(() => b.remove(), 1600);
      }, delay);
    }

    function startTitleFormation() {
      const formationDelay = 300;
      for (let i = 0; i < 40; i++) {
        const text = Math.random() < 0.7 ? "REVEB" : "2";
        spawnGlitchBlock(text, rng(0, 100), rng(0, 100), i * formationDelay);
      }

      setTimeout(() => {
        pContainer.style.display = 'none';
        document.getElementById('title-container').style.opacity = '1';
        sfx.boom();
        canvas.style.opacity = '0.3';
        finishIntro();
      }, 40 * formationDelay + 800);
    }

    function finishIntro() {
      setTimeout(() => {
        canvas.style.opacity = '0';
        document.getElementById('title-container').style.opacity = '0';
      }, 3500);

      setTimeout(() => {
        window.location.href = NEXT_PAGE;
      }, 4500);
    }

    setInterval(drawBg, 30);
    runIntro();

  </script>
</body>

</html>
