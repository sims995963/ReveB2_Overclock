<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReveB 2 — OS_SYSTEM (Radar & Terminal)</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --cyan: #00F5FF;
      --red: #FF003C;
      --purple: #8A2BE2;
      --green: #00FF41;
      --bg-dark: #010005;
      --font-ui: 'Orbitron', sans-serif;
      --font-term: 'Share Tech Mono', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--cyan);
      font-family: var(--font-term);
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* --- EFFETS VISUELS GLOBAUX --- */
    #crt {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, .15) 50%),
        linear-gradient(90deg, rgba(0, 245, 255, .02), rgba(255, 0, 60, .02), rgba(138, 43, 226, .02));
      background-size: 100% 3px, 3px 100%;
      opacity: 0.8;
    }

    #vignette {
      position: fixed;
      inset: 0;
      z-index: 998;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 40%, rgba(0, 0, 0, 0.9) 100%);
    }

    #bg-grid {
      position: absolute;
      inset: -50%;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 245, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
      animation: gridMove 10s linear infinite;
    }

    @keyframes gridMove {
      from {
        transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px);
      }

      to {
        transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px);
      }
    }

    /* --- MENU PRINCIPAL (GAUCHE) --- */
    #main-menu {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 50vw;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding-left: 8vw;
      padding-bottom: 5vh;
      transition: opacity 0.5s;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .sys-title {
      font-family: var(--font-ui);
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: 10px;
      margin-bottom: 5px;
      text-shadow: 0 0 20px var(--cyan);
    }

    .sys-subtitle {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 40px;
      letter-spacing: 4px;
    }

    /* Modif : gap réduit de 15px à 10px */
    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 450px;
    }

    /* Modif : padding et font-size légèrement réduits */
    .menu-btn {
      background: rgba(0, 20, 40, 0.6);
      border: 1px solid rgba(0, 245, 255, 0.3);
      border-left: 4px solid var(--cyan);
      color: var(--cyan);
      padding: 12px 20px;
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .menu-btn::before {
      content: '> ';
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .menu-btn:hover {
      background: var(--cyan);
      color: #000;
      box-shadow: 0 0 25px rgba(0, 245, 255, 0.6);
      transform: translateX(15px);
    }

    .menu-btn:hover::before {
      opacity: 1;
      color: #000;
    }

    /* Pour le survol du bouton rouge */
    .menu-btn.btn-red:hover {
      background: var(--red);
      color: #000 !important;
      /* Force le texte en noir au survol pour la lisibilité */
      box-shadow: 0 0 25px rgba(255, 0, 60, 0.6);
    }

    /* --- PANNEAU DROIT (RADAR + TERMINAL) --- */
    #right-panel {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 50vw;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: opacity 0.5s;
      animation: fadeIn 1.5s ease-in-out;
    }

    .panel-title {
      font-family: var(--font-ui);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 3px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(0, 255, 65, 0.5);
      padding-bottom: 5px;
      text-shadow: 0 0 10px var(--green);
      transition: opacity 0.3s;
    }

    /* ─── LE RADAR ─── */
    .radar-box {
      position: relative;
      width: 320px;
      height: 320px;
      margin-bottom: 30px;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
    }

    .radar-box:hover {
      box-shadow: 0 0 50px rgba(0, 255, 65, 0.3);
    }

    .radar-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(0, 255, 65, 0.3);
      box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.1);
    }

    .ring-10 {
      width: 20%;
      height: 20%;
    }

    .ring-20 {
      width: 40%;
      height: 40%;
    }

    .ring-30 {
      width: 60%;
      height: 60%;
    }

    .ring-40 {
      width: 80%;
      height: 80%;
    }

    .ring-50 {
      width: 100%;
      height: 100%;
      border-color: rgba(0, 255, 65, 0.6);
    }

    .radar-cross {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(transparent 49.5%, rgba(0, 255, 65, 0.2) 49.5%, rgba(0, 255, 65, 0.2) 50.5%, transparent 50.5%),
        linear-gradient(90deg, transparent 49.5%, rgba(0, 255, 65, 0.2) 49.5%, rgba(0, 255, 65, 0.2) 50.5%, transparent 50.5%);
      border-radius: 50%;
    }

    .radar-sweep {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 70%, rgba(0, 255, 65, 0.1) 95%, rgba(0, 255, 65, 0.8) 100%);
      animation: sweep 4s linear infinite;
    }

    @keyframes sweep {
      to {
        transform: rotate(360deg);
      }
    }

    .radar-connections {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .radar-connections polyline {
      fill: none;
      stroke: var(--green);
      stroke-width: 2;
      stroke-dasharray: 4 4;
      opacity: 0.6;
      animation: dashAnim 20s linear infinite;
    }

    @keyframes dashAnim {
      to {
        stroke-dashoffset: -100;
      }
    }

    .boss-node {
      position: absolute;
      width: 22px;
      height: 22px;
      background: #051005;
      border: 2px solid var(--green);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      color: var(--green);
      box-shadow: 0 0 10px var(--green);
      z-index: 5;
      transition: transform 0.2s;
    }

    .b10 {
      left: 57%;
      top: 43%;
    }

    .b20 {
      left: 68%;
      top: 60%;
    }

    .b30 {
      left: 40%;
      top: 78%;
    }

    .b40 {
      left: 20%;
      top: 25%;
    }

    .b50 {
      left: 85%;
      top: 15%;
      border-color: var(--purple);
      color: var(--red);
      box-shadow: 0 0 15px var(--purple);
      animation: bossGlitch 2s infinite;
    }

    @keyframes bossGlitch {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        border-color: var(--purple);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.2);
        border-color: var(--red);
        box-shadow: 0 0 20px var(--red);
      }
    }

    .boss-label {
      position: absolute;
      color: rgba(0, 255, 65, 0.7);
      font-size: 10px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ─── MINI TERMINAL ─── */
    .mini-terminal {
      width: 100%;
      max-width: 400px;
      height: 110px;
      background: rgba(0, 10, 5, 0.75);
      border: 1px solid rgba(0, 255, 65, 0.4);
      border-top: 15px solid rgba(0, 255, 65, 0.2);
      padding: 8px 10px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
      transition: opacity 0.3s;
    }

    .mini-terminal::before {
      content: 'DIAGNOSTIC_SYSTÈME.exe';
      position: absolute;
      top: -13px;
      left: 5px;
      font-size: 9px;
      color: var(--green);
      opacity: 0.8;
    }

    .log-container {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100%;
    }

    .log-line {
      font-size: 0.75rem;
      color: #88c;
      margin-top: 6px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .log-success {
      color: var(--green);
    }

    .log-warn {
      color: #FFD700;
    }

    .log-error {
      color: var(--red);
      font-weight: bold;
      text-shadow: 0 0 5px var(--red);
    }

    .cursor::after {
      content: '█';
      color: var(--cyan);
      margin-left: 3px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <audio id="menu-music" src="music/main_menu2.mp3" loop preload="auto"></audio>

  <div id="crt"></div>
  <div id="vignette"></div>
  <div id="bg-grid"></div>

  <div id="main-menu">
    <div class="sys-title">REVEB_OS</div>
    <div class="sys-subtitle">NOYAU v2.0.50 // CONNEXION STABLE</div>

    <div class="menu-list">
      <div class="menu-btn" onclick="startNewGame()">NOUVELLE SIMULATION</div>
      <div class="menu-btn" onclick="goToPage('menu/restauration.html')">RESTAURER SESSION</div>
      <div class="menu-btn" onclick="goToPage('menu/succes.html')">MÉTRIQUES & SUCCÈS</div>
      <div class="menu-btn" onclick="goToPage('menu/archive.html')">ARCHIVES SYSTÈME</div>
      <div class="menu-btn" onclick="goToPage('menu/parametre.html')">PARAMÈTRES</div>
      <div class="menu-btn" onclick="goToPage('menu/code_source.html')">CODE_SOURCE</div>
      <div class="menu-btn btn-red" style="border-left-color: var(--red); color: var(--red);" onclick="quitGame()">
        DÉCONNEXION</div>
    </div>
  </div>

  <div id="right-panel">

    <div class="panel-title">[ RADAR DES MENACES ]</div>

    <div class="radar-box" onclick="openScanner()">
      <div class="radar-ring ring-10"></div>
      <div class="radar-ring ring-20"></div>
      <div class="radar-ring ring-30"></div>
      <div class="radar-ring ring-40"></div>
      <div class="radar-ring ring-50"></div>

      <div class="radar-cross"></div>
      <div class="radar-sweep"></div>

      <svg class="radar-connections" viewBox="0 0 320 320">
        <polyline points="160,160 182,137 217,192 128,249 64,80 272,48" />
      </svg>

      <div class="boss-node b10">!</div>
      <div class="boss-label" style="left:61%; top:41%;">P10</div>

      <div class="boss-node b20">⇄</div>
      <div class="boss-label" style="left:73%; top:58%;">P20</div>

      <div class="boss-node b30">Δ</div>
      <div class="boss-label" style="left:40%; top:83%;">P30</div>

      <div class="boss-node b40">∞</div>
      <div class="boss-label" style="left:12%; top:23%;">P40</div>

      <div class="boss-node b50">Ω</div>
      <div class="boss-label" style="left:88%; top:10%; color:var(--purple); text-shadow:0 0 5px var(--red);">
        P50_CRITIQUE</div>
    </div>

    <div class="mini-terminal">
      <div class="log-container" id="terminal-logs"></div>
    </div>

  </div>
  <script src="menu/succes_global.js"></script>
  <script>

    // 300 000 ms = 5 minutes. Si le joueur reste sur ce menu sans lancer le jeu, le succès pop !
    setTimeout(() => {
      if (typeof unlockAchievement === 'function') {
        unlockAchievement('ACH_STOCKHOLM');
      }
    }, 300000);


    // ─── GESTION AUDIO (Bips du Menu) ───
    const au = new (window.AudioContext || window.webkitAudioContext)();
    function tone(f, tp, d, v) {
      try {
        let o = au.createOscillator(), g = au.createGain();
        o.connect(g); g.connect(au.destination);
        o.type = tp; o.frequency.value = f;
        g.gain.setValueAtTime(v, au.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, au.currentTime + d);
        o.start(); o.stop(au.currentTime + d);
      } catch (e) { }
    }
    const sfx = {
      hover: () => tone(440, 'square', 0.05, 0.02),
      click: () => tone(600, 'sine', 0.4, 0.05),
      error: () => { tone(150, 'sawtooth', 0.3, 0.1); tone(100, 'square', 0.4, 0.1); }
    };

    document.querySelectorAll('.menu-btn, .radar-box').forEach(el => {
      el.addEventListener('mouseenter', () => { if (au.state === 'suspended') au.resume(); sfx.hover(); });
    });

    function startNewGame() {
      sfx.click();

      // 1. Récupérer les sauvegardes existantes
      let saves = JSON.parse(localStorage.getItem('reveb_saves') || '[]');

      // Si le tableau est vide (première fois qu'on lance le jeu)
      if (saves.length === 0) {
        saves = Array.from({ length: 5 }, (_, i) => ({ id: i, slot: String.fromCharCode(65 + i), isEmpty: true }));
      }

      // 2. Trouver un slot vide
      let slotIndex = saves.findIndex(s => s.isEmpty);

      // 3. Si tout est plein, on cherche le plus ancien (basé sur le timestamp)
      if (slotIndex === -1) {
        slotIndex = 0;
        let oldest = saves[0].timestamp || Date.now();
        for (let i = 1; i < saves.length; i++) {
          let ts = saves[i].timestamp || Date.now();
          if (ts < oldest) {
            oldest = ts;
            slotIndex = i;
          }
        }
      }

      // 4. Écraser ou créer la nouvelle sauvegarde
      saves[slotIndex] = {
        id: slotIndex,
        slot: String.fromCharCode(65 + slotIndex),
        isEmpty: false,
        status: 'ok',
        statusLabel: 'NOUVELLE',
        label: `SESSION_0${slotIndex + 1} — SLOT ${String.fromCharCode(65 + slotIndex)}`,
        palier: 1,
        duree: '00h 00m',
        saved: new Date().toLocaleDateString('fr-FR'),
        timestamp: Date.now(),
        corruption: 0,
        entities: [],
        // ---> AJOUT : On crée un inventaire de pouvoirs vide pour cette partie
        powers: { clone: false, regen: false, invis: false, slowmo: false, b10_dead: false, b20_dead: false, b30_dead: false, b40_dead: false },
        logs: [{ text: '[OK] Nouvelle session initialisée.', type: 'ok' }]
      };

      // 5. Sauvegarder dans le navigateur et définir comme "slot actif"
      localStorage.setItem('reveb_saves', JSON.stringify(saves));
      localStorage.setItem('reveb_active_slot', slotIndex);

      // On efface les mémoires d'anciens boss d'une run précédente
      localStorage.removeItem('rvb2_bossReturn');

      // 6. Lancer l'animation et rediriger vers le jeu
      document.getElementById('main-menu').style.opacity = '0';
      document.getElementById('right-panel').style.opacity = '0';

      setTimeout(() => {
        window.location.href = 'archives-de-la-chute.html'; // Mets ici le bon lien de ton jeu
      }, 800);
    }


    // ─── REDIRECTION GENERIQUE (AVEC FADE OUT) ───
    function goToPage(url) {
      sfx.click();
      document.getElementById('main-menu').style.opacity = '0';
      document.getElementById('right-panel').style.opacity = '0';

      setTimeout(() => {
        window.location.href = url;
      }, 800);
    }

    // ─── FERMETURE DU JEU ───
    function quitGame() {
      sfx.error();
      document.body.innerHTML = `
      <div style='height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#FF003C;'>
        <div style='font-size:2rem; font-weight:bold; letter-spacing:4px;'>[ CONNEXION ROMPUE ]</div>
        <div style='font-size:0.9rem; color:#888; margin-top:20px; font-family:"Share Tech Mono";'>VOUS POUVEZ FERMER CET ONGLET</div>
      </div>
    `;
      setTimeout(() => window.close(), 1000);
    }

    // ─── ANIMATION DE TRANSITION VERS SCANNER ───
    function openScanner() {
      sfx.click();
      const radar = document.querySelector('.radar-box');

      // Disparition des autres éléments de l'UI
      document.getElementById('main-menu').style.opacity = '0';
      document.querySelector('.mini-terminal').style.opacity = '0';
      document.querySelector('.panel-title').style.opacity = '0';

      const rect = radar.getBoundingClientRect();
      const startCenterX = rect.left + rect.width / 2;
      const startCenterY = rect.top + rect.height / 2;

      const targetCenterX = (window.innerWidth * 0.05) + 300;
      const targetCenterY = window.innerHeight / 2;

      const moveX = targetCenterX - startCenterX;
      const moveY = targetCenterY - startCenterY;

      radar.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.875)`;

      setTimeout(() => {
        window.location.href = 'menu/scanner.html';
      }, 900);
    }

    // ─── GESTION DU MINI TERMINAL ───
    const terminal = document.getElementById('terminal-logs');

    const logDatabase = [
      { text: "Ping serveur local... 0ms", type: "normal" },
      { text: "Vérification de l'intégrité du Noyau...", type: "normal" },
      { text: "[OK] Secteurs 1 à 9 stables.", type: "log-success" },
      { text: "SCAN: Phant0m.exe est en attente d'engagement.", type: "normal" },
      { text: "Requête d'architecture géométrique générée.", type: "normal" },
      { text: "[ATTENTION] Surcharge mémoire détectée sur le nœud 30.", type: "log-warn" },
      { text: "Synchronisation des flux visuels en cours...", type: "log-success" },
      { text: "Analyse de la boucle temporelle (P40)... stable.", type: "normal" },
      { text: "Recherche de la variable 'Sparky' dans le cache...", type: "normal" },
      { text: "[ERREUR] Le N.E.A.N.T refuse la quarantaine.", type: "log-error" },
      { text: "[ALERTE] Corruption du palier 50 en cours de propagation.", type: "log-error" },
      { text: "Tentative de reconnexion à l'Architecte...", type: "normal" }
    ];

    function typeLine(text, cssClass) {
      return new Promise(resolve => {
        const line = document.createElement('div');
        line.className = `log-line ${cssClass}`;
        terminal.appendChild(line);

        if (terminal.children.length > 4) {
          terminal.removeChild(terminal.firstChild);
        }

        Array.from(terminal.children).forEach(c => c.classList.remove('cursor'));
        line.classList.add('cursor');

        const d = new Date();
        const timeStr = `[${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}] `;
        const fullText = timeStr + text;

        let i = 0;
        const typeInterval = setInterval(() => {
          line.textContent += fullText.charAt(i);
          i++;
          if (i >= fullText.length) {
            clearInterval(typeInterval);
            resolve();
          }
        }, 25);
      });
    }

    async function terminalLoop() {
      while (true) {
        const logData = logDatabase[Math.floor(Math.random() * logDatabase.length)];
        await typeLine(logData.text, logData.type !== 'normal' ? logData.type : '');
        await new Promise(r => setTimeout(r, Math.random() * 1500 + 500));
      }
    }

    terminalLoop();



    const menuMusic = document.getElementById('menu-music');
    menuMusic.volume = 0.5;

    // 1. Quand la page s'ouvre, on reprend la musique là où elle s'est arrêtée
    window.addEventListener('load', () => {
      let savedTime = sessionStorage.getItem('rvb2_music_time');
      if (savedTime !== null) {
        menuMusic.currentTime = parseFloat(savedTime);
        // On relance la musique (les navigateurs autorisent l'autoplay 
        // si l'utilisateur a déjà cliqué sur la page précédente)
        let playPromise = menuMusic.play();
        if (playPromise !== undefined) {
          playPromise.catch(e => console.log("Attente d'un clic pour l'audio..."));
        }
      }
    });

    // 2. Juste avant de quitter la page (pour aller dans Paramètres par ex), on sauvegarde le chrono
    window.addEventListener('beforeunload', () => {
      sessionStorage.setItem('rvb2_music_time', menuMusic.currentTime);
    });

    // 3. Sécurité : si la musique n'a pas encore démarré, on la lance au premier clic
    window.addEventListener('click', () => {
      if (menuMusic.paused) {
        menuMusic.play();
      }
    }, { once: true });

  </script>
</body>

</html>
